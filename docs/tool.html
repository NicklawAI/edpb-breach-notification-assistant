<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDPB Breach Notification Assistant</title>
  <meta name="description" content="Offline, privacy-by-design tool for personal data breach triage, ENISA severity scoring and EDPB notification preparation." />
  <style>
    :root {
      --navy: #0f2740; --blue: #1f5fae; --accent: #2e7d32; --alert: #b3261e;
      --warn: #8a6d00; --bg: #f5f7fa; --card: #ffffff; --line: #e2e8f0; --muted: #5b6b7c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: #16222e; line-height: 1.5; }
    #app { max-width: 920px; margin: 0 auto; padding: 24px 18px 64px; }
    header h1 { color: var(--navy); margin: 0 0 4px; font-size: 1.7rem; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); margin: 0 0 12px; }
    .disclaimer { background: #fff8e1; border: 1px solid #ffe08a; color: #6a5400; padding: 10px 12px;
      border-radius: 8px; font-size: 0.86rem; margin-bottom: 12px; }
    .langbox { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; }
    select, input[type=text], input[type=number], input[type=date], input[type=datetime-local], textarea {
      font: inherit; padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; width: 100%; max-width: 520px; background: #fff; }
    select.lang { width: auto; display: inline-block; }
    textarea { resize: vertical; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0; border-bottom: 1px solid var(--line); }
    .tab { background: none; border: none; padding: 9px 12px; cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent; font: inherit; }
    .tab.active { color: var(--navy); border-bottom-color: var(--blue); font-weight: 600; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 18px; }
    .card h2 { margin-top: 0; color: var(--navy); }
    .card h3 { color: var(--blue); margin: 18px 0 6px; font-size: 1rem; }
    .card h3.section { margin-top: 24px; padding-top: 10px; border-top: 1px solid var(--line); color: var(--navy); font-size: 0.95rem; }
    .muted { color: var(--muted); }
    .small { font-size: 0.84rem; }
    .formula { font-family: ui-monospace, Menlo, monospace; background: #f0f4f8; padding: 6px 10px; border-radius: 6px; display: inline-block; }
    .q { margin: 12px 0; }
    .q > label { display: block; font-weight: 500; margin-bottom: 6px; }
    .opt { display: inline-flex; align-items: center; gap: 4px; margin-right: 14px; }
    .opt label { font-weight: 400; }
    .field { margin: 12px 0; }
    .field > label { display: block; font-weight: 500; margin-bottom: 4px; }
    .gdpr { color: var(--accent); font-weight: 400; font-size: 0.82rem; }
    .tooltip { margin-bottom: 4px; }
    .cond { font-style: italic; }
    .multi .opt { display: flex; margin: 2px 0; }
    /* segmented buttons (DPC/EI/CB) */
    .segmented { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
    .seg { background: #fff; border: 1px solid var(--line); color: #16222e; padding: 8px 12px; border-radius: 8px;
      cursor: pointer; font: inherit; margin: 0; min-height: 40px; transition: background .12s, border-color .12s; }
    .seg:hover { border-color: var(--blue); }
    .seg.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
    .seg-label { display: block; font-weight: 500; margin: 8px 0 2px; font-size: .92rem; }
    .help { margin: 2px 0 4px; }
    .mitigant { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #eef2f7; }
    .mit-label { font-size: .9rem; }
    .mit-tag { color: var(--accent); font-size: .78rem; }
    .verdict.sticky { position: sticky; bottom: 8px; background: var(--card); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px 14px; box-shadow: 0 2px 10px rgba(15,39,64,.08); z-index: 5; }
    .se-num { font-size: 1.25rem; }
    .obligations { border-left: 4px solid var(--blue); }
    .obl { padding: 10px 12px; border-radius: 8px; margin: 8px 0; border: 1px solid var(--line); }
    .obl.yes { background: #fdecea; border-color: #f5c2bd; }
    .obl.no { background: #eef7ee; border-color: #cfe6cf; }
    .obl.assess { background: #fff8e1; border-color: #ffe08a; }
    .obl-head { margin-bottom: 3px; }
    .obl-badge { display: inline-block; font-size: .74rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; color: #fff; }
    .obl-badge.yes { background: var(--alert); } .obl-badge.no { background: var(--accent); } .obl-badge.assess { background: var(--warn); }
    .obl-ref { font-weight: 400; }
    .stepnav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 4px 0 18px; }
    .stepcount { white-space: nowrap; }
    .verdict { margin-top: 14px; }
    .banner { padding: 9px 12px; border-radius: 7px; margin: 6px 0; font-size: 0.9rem; }
    .banner.alert { background: #fdecea; border: 1px solid #f5c2bd; color: var(--alert); }
    .banner.info { background: #e8f1fb; border: 1px solid #bcd7f3; color: var(--blue); }
    .banner.warn { background: #fff8e1; border: 1px solid #ffe08a; color: var(--warn); }
    .score { font-size: 1.1rem; margin-bottom: 6px; }
    .band-low { color: var(--accent); } .band-medium { color: #b8860b; }
    .band-high { color: #d2691e; } .band-very_high { color: var(--alert); }
    button.primary { background: var(--blue); color: #fff; border: none; padding: 10px 16px; border-radius: 8px;
      cursor: pointer; font: inherit; font-weight: 600; margin-top: 8px; }
    button.primary:hover { background: #174a86; }
    button { background: #eef2f7; border: 1px solid var(--line); padding: 8px 14px; border-radius: 8px; cursor: pointer; font: inherit; margin-top: 8px; }
    .actions { margin-top: 16px; }
    .records { padding-left: 18px; }
    footer { margin-top: 26px; padding-top: 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: 0.8rem; }
    footer a { color: var(--blue); }
    /* mobile: full-width controls, larger tap targets, no overflow */
    @media (max-width: 600px) {
      #app { padding: 16px 12px 56px; }
      header h1 { font-size: 1.4rem; }
      .card { padding: 16px 14px; }
      .tabs { gap: 2px; }
      .tab { padding: 8px 8px; font-size: .9rem; flex: 1 1 auto; text-align: center; }
      .segmented { gap: 5px; }
      .seg { flex: 1 1 auto; min-width: 64px; text-align: center; min-height: 44px; }
      select, input[type=text], input[type=number], input[type=date], input[type=datetime-local], textarea { max-width: 100%; }
      .opt { margin-right: 8px; }
      .mitigant { flex-direction: column; align-items: stretch; }
      .verdict.sticky { bottom: 0; border-radius: 10px 10px 0 0; }
      .stepnav button { min-height: 44px; }
    }
  </style>
</head>

 {"id": 58, "section": "3.2", "label": "Type of integrity breach", "type": "enum", "options": [{"key": "a", "label": "Alteration or modification of the data, with no evidence of illegal or wrong use"}, {"key": "b", "label": "Alteration or modification of the data, with evidence of illegal or wrong use, but with the possibility of reversing/recovering the damages to data subjects"}, {"key": "c", "label": "Alteration or modification of the data with evidence of illegal or wrong use, without the possibility of reversing/recovering damages to the data subjects"}], "mandatory": "conditional", "visible_if": "only if integrity", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 59, "section": "3.2", "label": "Type of availability breach", "type": "enum", "options": [{"key": "a", "label": "Temporary availability issue"}, {"key": "b", "label": "Permanent availability issue"}, {"key": "c", "label": "not determined"}], "mandatory": "conditional", "visible_if": "only if availability", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please assess the availability issue form the data subject’s perspective", "allow_multiple": false}, {"id": 60, "section": "3.2", "label": "Nature of the incident", "type": "enum", "options": [{"key": "a", "label": "Abuse of access privileges by employee"}, {"key": "b", "label": "Encrypted device / ransomware"}, {"key": "c", "label": "Hacking / malware activity detected"}, {"key": "d", "label": "Phishing / social engineering"}, {"key": "e", "label": "Security vulnerability (likely) exploited (known CVE or zero day)"}, {"key": "f", "label": "Unauthorised access to personal data in IT systems"}, {"key": "g", "label": "Data exfiltration / unauthorised extraction of personal data"}, {"key": "h", "label": "Data of wrong data subject shown (mix-up of records)"}, {"key": "i", "label": "Device lost or stolen"}, {"key": "j", "label": "E-waste (personal data still present on obsolete device)"}, {"key": "k", "label": "Incorrect disposal of personal data on paper"}, {"key": "l", "label": "Mail lost or opened / misdelivery (post/email)"}, {"key": "m", "label": "Misconfiguration"}, {"key": "n", "label": "Incorrect access permissions (e.g., cloud storage, shared folder)"}, {"key": "o", "label": "Paper lost or stolen or left in insecure location"}, {"key": "p", "label": "Personal data deleted/destroyed"}, {"key": "q", "label": "Personal data displayed to wrong recipient"}, {"key": "r", "label": "Personal data sent by mistake (post/email)"}, {"key": "s", "label": "Sending email to multiple recipients without blind copy / with open distribution list"}, {"key": "t", "label": "Technical malfunction"}, {"key": "u", "label": "Unauthorised data modification"}, {"key": "v", "label": "Unintended publication (e.g., public link / public website / shared drive)"}, {"key": "w", "label": "Verbal unauthorised disclosure of personal data"}, {"key": "x", "label": "to be determined"}, {"key": "y", "label": "Other (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 61, "section": "3.2", "label": "Cause of the personal data breach", "type": "enum", "options": [{"key": "a", "label": "Internal non malicious"}, {"key": "b", "label": "Internal malicious"}, {"key": "c", "label": "External non malicious"}, {"key": "d", "label": "External malicious"}, {"key": "e", "label": "To be determined"}, {"key": "f", "label": "Unknown"}], "mandatory": "yes", "visible_if": "”To be determined” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 62, "section": "3.2", "label": "Further description of the nature of the incident", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please describe the nature of the breach (detection, awareness, cause, measures in place) shortly and provide on what facts your decision is grounded. If possible indicate the root cause of the incident.", "allow_multiple": false}, {"id": 63, "section": "3.2", "label": "Description of the systems, software, services, and infrastructures involved in the personal data breach and where they are located", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please list the descriptions them in semantic groups, e.g. \n\nSystems:\n• production database :\n  o client database (full/partial) that countains ****, located in ***\n  o internal HR database (full/partial) that countains ****, located in ***\n• test infrastucture\n  o testing database (full/partial) that countains ****; located in ***\nSoftware:\n• Accounting software\n• Payment system software", "allow_multiple": false}, {"id": 65, "section": "3.3", "label": "Categories of concerned data subjects", "type": "enum", "options": [{"key": "a", "label": "Customers (current and prospects)"}, {"key": "b", "label": "Employees (former, current and candidates)"}, {"key": "c", "label": "Military or law enforcement staff"}, {"key": "d", "label": "Minors"}, {"key": "e", "label": "Patients"}, {"key": "f", "label": "Students"}, {"key": "g", "label": "Subscribers"}, {"key": "h", "label": "Users"}, {"key": "i", "label": "Vulnerable individuals (elderly, refugees, disabled people, victims, …)"}, {"key": "j", "label": "Additional concerned data subjects (please specify in further description)"}, {"key": "k", "label": "Not yet known"}], "mandatory": "yes", "visible_if": "”Not yet known” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "If you answered i), please indicate what kind of vulnerable people. If you are not sure if or how the concerned data subject are vulnerable, please describe them shortly and why you would consider them as vulnerable.", "allow_multiple": false}, {"id": 66, "section": "3.3", "label": "Further description of categories of concerned data subjects and additional data subjects", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 67, "section": "3.3", "label": "Data subjects concerned by the personal data breach", "type": "enum", "options": [{"key": "a", "label": "Exact number"}, {"key": "b", "label": "Approximate number"}, {"key": "c", "label": "Number cannot be determined"}, {"key": "d", "label": "Number to be determined"}], "mandatory": "yes", "visible_if": "”Number to be determined ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 68, "section": "3.3", "label": "Number of data subjects concerned by the personal data breach", "type": "number", "options": [], "mandatory": "conditional", "visible_if": "Only if a/b selected\n\nask according to selected value before, Tooltip: “if c) the current estimate is: …”", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 70, "section": "3.4", "label": "Type of breached data", "type": "enum", "options": [{"key": "a", "label": "Basic data (e.g. name, surname, date of birth)"}, {"key": "b", "label": "Contact details (e.g. address, phone number, e-mail)"}, {"key": "c", "label": "Biometric data"}, {"key": "d", "label": "Criminal convictions, offence or security measures"}, {"key": "e", "label": "Data revealing political opinions"}, {"key": "f", "label": "Data revealing racial or ethnic origin"}, {"key": "g", "label": "Data revealing religious or philosophical beliefs"}, {"key": "h", "label": "Data revealing sex life or sexual orientation"}, {"key": "i", "label": "Data revealing trade union membership"}, {"key": "j", "label": "Genetic data"}, {"key": "k", "label": "Health data (e.g. medical records, test results, …)"}, {"key": "l", "label": "Economic and financial data"}, {"key": "m", "label": "Employment related health data (e.g. proof of sick leave, proof of medical attendance, results of medical fitness tests or similar)"}, {"key": "n", "label": "Identification data (e.g. National identification number, ID number)"}, {"key": "o", "label": "Location data"}, {"key": "p", "label": "Official documents (e.g. scanned copies)"}, {"key": "q", "label": "Payment methods (e.g. credit card, bank accounts)"}, {"key": "r", "label": "Profile data (e.g. social network, credit score, psychology or other profile"}, {"key": "s", "label": "s) User credentials (e.g. usernames, passwords, tokens)"}, {"key": "t", "label": "Not yet known"}, {"key": "u", "label": "Additional data types (please specify in further description)"}], "mandatory": "yes", "visible_if": "”Not yet known” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 71, "section": "3.4", "label": "Further description of breached data and additional data categories", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 72, "section": "3.4", "label": "Personal data records concerned by the personal data breach", "type": "enum", "options": [{"key": "a", "label": "Exact number"}, {"key": "b", "label": "Approximate number"}, {"key": "c", "label": "Number cannot be determined"}, {"key": "d", "label": "Number to be determined"}], "mandatory": "yes", "visible_if": "”Number to be determined ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please specify the type of record: number of data about each concerned data subject. For instance, to avoid just mentionning “500”. Because “5 types of data (namely *,*,*,*,*,*) about 100 people” and “100 types of data (namely *,*,*,*,*) about 5 people” may not lead to the same risks assessment, even if it could both be sumed up to “500 records”.", "allow_multiple": false}, {"id": 73, "section": "3.4", "label": "Number of personal data records concerned by the personal data breach", "type": "number", "options": [], "mandatory": "yes", "visible_if": "ask according to selected value before", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please indicate here the number of records concerned by the breach, meaning the number of single entries in the database concerned by the breach.", "allow_multiple": false}, {"id": 75, "section": "3.5", "label": "Relevant measures in place when the personal data breach occurred", "type": "enum", "options": [{"key": "a", "label": "Pseudonymisation"}, {"key": "b", "label": "Backup / Recovery plan"}, {"key": "c", "label": "Data encryption"}, {"key": "d", "label": "Data protection and information security policies"}, {"key": "e", "label": "Data protection and security training"}, {"key": "f", "label": "Incident log"}, {"key": "g", "label": "Levels of access to data"}, {"key": "h", "label": "Logical access control (e.g. MFA)"}, {"key": "i", "label": "Periodic audits"}, {"key": "j", "label": "Physical access control"}, {"key": "k", "label": "Up-to-date IT systems"}, {"key": "l", "label": "Other measures (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 32; Art. 33(3)", "tooltip": "This list is not exhaustive and just covers common measures. \n\nYou may have not applied some measures because they were not applicables or useful.\n\nAt the same time, you may have applied non-listed measures that were useful. If so, please specify them with answer L.", "allow_multiple": false}, {"id": 76, "section": "3.5", "label": "Further description of relevant measures in place when the personal data breach occurred", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": "If 57 indicated that measures in place are likely to be subverted, remind DCs here to detail on this in the tooltip", "gdpr_ref": "Art. 32; Art. 33(3)", "tooltip": "Reminder: You indicated that technical measures are likely to be subverted by the adversaries. Please add the relevant level of detail here to these measures, along the description of the other relevant measures.", "allow_multiple": false}, {"id": 79, "section": "4.1", "label": "Likely consequences in case of breach of confidentiality", "type": "enum", "options": [{"key": "a", "label": "Data were disclosed beyond the scope of the privacy policy or relevant legislation"}, {"key": "b", "label": "Data may be linked, without unreasonable effort, with other information regarding data subjects"}, {"key": "c", "label": "Data may be used for purposes other than the intended purpose or unlawfully"}, {"key": "d", "label": "Other"}, {"key": "e", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Confidentiality\"= yes\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 80, "section": "4.1", "label": "Description of other confidentiality consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 81, "section": "4.1", "label": "Likely consequences in case of breach of integrity", "type": "enum", "options": [{"key": "a", "label": "Data may have been modified and used even though it is no longer valid"}, {"key": "b", "label": "Data may have been modified into otherwise valid data and subsequently used for other purposes"}, {"key": "c", "label": "Other"}, {"key": "d", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Integrity\"= 1\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 82, "section": "4.1", "label": "Description of other integrity consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 83, "section": "4.1", "label": "Likely consequences in case of breach of availability", "type": "enum", "options": [{"key": "a", "label": "Inability to access services"}, {"key": "b", "label": "Service disruptions and difficulties in service use"}, {"key": "c", "label": "Other"}, {"key": "d", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Integrity\"= 1\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 84, "section": "4.1", "label": "Description of other availability consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 85, "section": "4.1", "label": "Nature of the potential impact for the data subject", "type": "enum", "options": [{"key": "a", "label": "Loss of control of their personal data"}, {"key": "b", "label": "Limitation of their rights"}, {"key": "c", "label": "Discrimination"}, {"key": "d", "label": "Identity theft or usurpation"}, {"key": "e", "label": "Fraud"}, {"key": "f", "label": "Financial loss"}, {"key": "g", "label": "Unauthorised reversal of pseudonymisation"}, {"key": "h", "label": "Damage to reputation"}, {"key": "i", "label": "Loss of confidentiality of personal data protected by professional secrecy"}, {"key": "j", "label": "Disclosure of data to unauthorised third parties"}, {"key": "k", "label": "Significant economic or social disadvantage"}, {"key": "l", "label": "Physical or mental harm"}, {"key": "m", "label": "Material or non-material damage to property"}, {"key": "n", "label": "Other impact (please specify in further description)"}, {"key": "o", "label": "To be determined"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(c)", "tooltip": "Please indicate here the nature of the impact on the data subject rights and freedoms.", "allow_multiple": false}, {"id": 86, "section": "4.1", "label": "Further description of the other impacts for the data subjects", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Description of the potential impact for the data subject\" = \"other\"", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 87, "section": "4.1", "label": "Severity of the potential impacts", "type": "enum", "options": [{"key": "a", "label": "Minor"}, {"key": "b", "label": "Moderate"}, {"key": "c", "label": "Severe"}, {"key": "d", "label": "To be determined"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(c)", "tooltip": "Indicate here the result of your self-assessment of the severity of the impact of the breach for the data subjects. Please select the highest severity if multiple potential impacts can occur.", "allow_multiple": false}, {"id": 89, "section": "4.2", "label": "Outcome of the risk assessment carried out by the controller", "type": "enum", "options": [{"key": "a", "label": "The personal data breach is likely to result in a high risk to the rights and freedoms of natural persons"}, {"key": "b", "label": "The personal data breach is likely to result in a (not high) risk to the rights and freedoms of natural persons"}, {"key": "c", "label": "The personal data breach is unlikely to result in a risk to the rights and freedoms of natural personsc) Additional information is needed to assess the risk to the rights and freedoms of natural persons"}], "mandatory": "yes", "visible_if": "”Additional information is needed to assess the risk to the rights and freedoms of natural persons ” only available for incomplete notification.", "gdpr_ref": "Art. 33(1); Art. 34(1)", "tooltip": null, "allow_multiple": false}, {"id": 90, "section": "4.2", "label": "Further description  of the risk assessment carried out by the data controller", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(1); Art. 34(1)", "tooltip": "Please describe the metodology used and the relevant factors you put into account.", "allow_multiple": false}, {"id": 92, "section": "4.3", "label": "Measures taken to address the personal data breach and to mitigate its consequences", "type": "text", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": "Please indicate to what extend the measures resolve the issue.", "allow_multiple": false}, {"id": 94, "section": "4.4", "label": "Relevant measures taken to prevent similar personal data breach", "type": "enum", "options": [{"key": "a", "label": "Anonymisation"}, {"key": "b", "label": "Backup / Recovery plan"}, {"key": "c", "label": "Change of processes"}, {"key": "d", "label": "Data encryption"}, {"key": "e", "label": "Data protection and information security policies"}, {"key": "f", "label": "Data protection and security training"}, {"key": "g", "label": "Erasure of the data"}, {"key": "h", "label": "Incident log"}, {"key": "i", "label": "Levels of access to data"}, {"key": "j", "label": "Logical access control (e.g. MFA)"}, {"key": "k", "label": "Periodic audits"}, {"key": "l", "label": "Physical access control"}, {"key": "m", "label": "Pseudonymisation"}, {"key": "n", "label": "Up-to-date IT systems"}, {"key": "o", "label": "Other measures (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": null, "allow_multiple": false}, {"id": 95, "section": "4.4", "label": "Further description of relevant updated permanent measures to avoid similar incidents in the future", "type": "date", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": "Please indicate to what extend the measures resolve the issue and improve the situation.\n\nA description is expected if you answered with “Other measures” in the previous question m).\n\nNevertheless, do not hesitate to describe further measures taken after the breach, or to be taken, if you think it is relevant.", "allow_multiple": false}, {"id": 97, "section": "4.4", "label": "Has the personal data breach been communicated to data subjects?", "type": "enum", "options": [{"key": "a", "label": "Yes"}, {"key": "b", "label": "No, but it will be communicated on a specific date b1) No, but it will be communicated on a date to be determined"}, {"key": "c", "label": "No, the investigation is still ongoing"}, {"key": "d", "label": "No, it will not be communicated since the personal data breach is unlikely to result in a high risk to the rights and freedoms of natural persons"}, {"key": "e", "label": "No, it will not be communicated since one of the conditions referred to in article 34(3) of the GDPR is met"}], "mandatory": "yes", "visible_if": "No, the risk assessment is still ongoing’ only available for incomplete notifications.", "gdpr_ref": "Art. 34(1); Art. 34(2)", "tooltip": "If you have not assessed yet if you are going to notify, please note that you will have to make a follow-up notification once you have make your decision\n\nIf you communicate the data breach to the data subjects in phases or if you cannot reach out to all data subjects, yet. Please indicated that in field 98 and 98a.", "allow_multiple": false}, {"id": 98, "section": "4.4", "label": "Date of when information was given to data subjects", "type": "date", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"information of data subject\" = Yes", "gdpr_ref": "Art. 34(1); Art. 34(2)", "tooltip": "Please indicate here the date on which you have started to inform the data subjects.", "allow_multiple": false}, {"id": 99, "section": "4.4", "label": "Future date on which the data breach will be communicated to the data subjects", "type": "date", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"information of data subject\" = \"No, but it will be communicated\"", "gdpr_ref": "Art. 34(1); Art. 34(2)", "tooltip": null, "allow_multiple": false}, {"id": 100, "section": "4.4", "label": "Further information about conditions referred to in article 34(3) of the GDPR that are met", "type": "enum", "options": [{"key": "a", "label": "The controller has implemented appropriate technical and organisational protection measures, and those measures were applied to the personal data affected by the personal data breach, in particular those that render the personal data unintelligible to any person who is not authorised to access it, such as encryption."}, {"key": "b", "label": "The controller has taken subsequent measures which ensure that the high risk to the rights and freedoms of data subjects referred to in paragraph 1 is no longer likely to materialise."}, {"key": "c", "label": "It would involve disproportionate effort. In such a case, there shall instead be a public communication or similar measure whereby the data subjects are informed in an equally effective manner."}], "mandatory": "conditional", "visible_if": "visible only if \"information of data subject\" = \"No they will not be informed\"", "gdpr_ref": "Art. 34(3)(a)(b)(c)", "tooltip": null, "allow_multiple": false}, {"id": 101, "section": "4.4", "label": "Further description why the conditions referred to in article 34(3) of the GDPR that are met and the measures taken", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"information of data subject\" = \"No they will not be informed\"", "gdpr_ref": "Art. 34(3)(a)(b)(c)", "tooltip": null, "allow_multiple": false}, {"id": 102, "section": "4.4", "label": "Number of data subjects informed", "type": "enum", "options": [{"key": "a", "label": "All data subjects have been informed"}, {"key": "b", "label": "Not all data subjects have been informed"}], "mandatory": "conditional", "visible_if": "visible only if \"information of data subje ility, not recoverable"}]}}, "malicious_intent": {"points": 0.5, "label": "Malicious intent", "provenance": "[verbatim +0.5]"}, "note": "Sum the applicable points (verbatim: 'the points obtained for each CB element are added')."}, "bands": [{"key": "low", "label": "Low", "min": null, "max": 2, "rule": "SE < 2", "meaning": "Individuals either will not be affected or may encounter a few inconveniences."}, {"key": "medium", "label": "Medium", "min": 2, "max": 3, "rule": "2 <= SE < 3", "meaning": "Individuals may encounter significant inconveniences, which they will be able to overcome despite some difficulties."}, {"key": "high", "label": "High", "min": 3, "max": 4, "rule": "3 <= SE < 4", "meaning": "Individuals may encounter significant consequences, which they should be able to overcome albeit with serious difficulties."}, {"key": "very_high", "label": "Very High", "min": 4, "max": null, "rule": "SE >= 4", "meaning": "Individuals may encounter significant, or even irreversible, consequences which they may not overcome."}], "notification_trigger": {"rule": "SE >= 2", "meaning": "At Medium severity or above, activate the breach assessment / notification path (DPA notification under Art. 33; data-subject communication under Art. 34 if high risk)."}, "mitigating_factors": {"note": "Mitigating circumstances that lower the score. Per the accountability principle (Art. 5), these are EDITABLE suggestions, not an imposed black-box adjustment: each toggle moves the indicated variable in the indicated direction; the controller may override. Exact numeric steps are ENISA-default and pending confirmation against the ENISA 2013 PDF.", "numbers_status": "ENISA-default, to confirm against ENISA 2013 methodology PDF", "factors": [{"key": "single_subject", "label": "Single data subject / very low volume", "variable": "DPC", "direction": "decrease", "hint": "Lower the DPC base by one volume step."}, {"key": "recipient_confirms_deletion", "label": "Wrong recipient confirms deletion of the data", "variable": "CB", "direction": "decrease", "effect": "neutralise_confidentiality", "hint": "Confidentiality loss neutralised toward 0; if recipient could not identify, EI also drops."}, {"key": "weak_linkage", "label": "Common name / homonymy / weak linkage", "variable": "EI", "direction": "decrease", "hint": "Choose a lower EI level (negligible/limited)."}, {"key": "strong_encryption", "label": "Strong encryption / data unintelligible to recipient", "variable": "CB", "direction": "decrease", "effect": "zero_confidentiality", "hint": "Confidentiality loss -> 0 (links to Art. 34(3)(a) exemption)."}, {"key": "pseudonymisation_no_key", "label": "Pseudonymisation with no accessible key", "variable": "EI", "direction": "decrease", "hint": "Choose a lower EI level."}, {"key": "professional_secrecy", "label": "Recipient bound by professional secrecy / legal confidentiality", "variable": "CB", "direction": "decrease", "hint": "Reduce confidentiality increment."}, {"key": "availability_restored", "label": "Availability quickly restored from backup (short outage)", "variable": "CB", "direction": "decrease", "effect": "zero_availability", "hint": "Availability loss reduced / 0."}, {"key": "public_low_criticality", "label": "Data already public / low criticality", "variable": "DPC", "direction": "decrease", "hint": "Lower the DPC base."}]}}, "iso27035": {"$schema": "https://json-schema.org/draft/2020-12/schema", "title": "ISO/IEC 27035 incident management lifecycle alignment", "description": "ISO/IEC 27035-1:2023 provides an incident management PROCESS LIFECYCLE and vocabulary, NOT a closed taxonomy of breach types. Used here as an interoperability anchor so a controller's incident-management process feeds the EDPB notification without re-mapping.", "source": "ISO/IEC 27035-1:2023, Information security incident management - Part 1: Principles and process", "source_url": "https://www.iso.org/standard/78973.html", "caveat": "Full normative text is paywalled; phases belo   <script>
/* EDPB Breach Notification Assistant - app engine.
 * Apache-2.0 (code). (c) 2026 Nicola Franchetto, Martim Taborda Barata.
 * Runs fully client-side, offline. No data leaves the browser.
 */
(function () {
  "use strict";
  var DATA = window.EBNA_DATA;
  var I18N = window.EBNA_I18N;
  var lang = "en";
  var state = { pre: {}, enisa: {}, form: {}, severity: null };

  function t(key) {
    var L = I18N[lang] || {};
    if (L[key] != null) return L[key];
    return (I18N.en[key] != null) ? I18N.en[key] : key;
  }
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function (k) {
      if (k === "class") e.className = attrs[k];
      else if (k === "html") e.innerHTML = attrs[k];
      else if (k.slice(0, 2) === "on") e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(function (c) {
      if (typeof c === "string") e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
    return e;
  }

  /* ---------- ENISA severity engine (graduated CB, verbatim ENISA Annex 3) ---------- */
  var ENISA = DATA.enisa;
  // cbState = { confidentiality: 0|0.25|0.5, integrity: ..., availability: ..., malicious: bool }
  function cbTotal(cb) {
    cb = cb || {};
    var sum = (cb.confidentiality || 0) + (cb.integrity || 0) + (cb.availability || 0);
    if (cb.malicious) sum += ENISA.cb.malicious_intent.points;
    return sum;
  }
  function computeSeverity(dpcBase, eiScore, cb) {
    var se = dpcBase * eiScore + cbTotal(cb);
    var band = ENISA.bands.find(function (b) {
      var okMin = (b.min == null) || se >= b.min;
      var okMax = (b.max == null) || se < b.max;
      return okMin && okMax;
    });
    return { se: Math.round(se * 100) / 100, band: band, notify: se >= 2 };
  }

  /* Segmented button group: immediate selection, active-state feedback, no dropdown.
     options: [{value,label,title}]; current: selected value; onpick(value). Updates
     its own active state in place (no full re-render) and calls onpick. */
  function segmented(options, current, onpick) {
    var group = el("div", { class: "segmented" });
    options.forEach(function (o) {
      var b = el("button", { type: "button", "aria-pressed": String(o.value === current),
        class: "seg" + (o.value === current ? " active" : ""), title: o.title || "",
        onclick: function () {
          Array.prototype.forEach.call(group.children, function (c) { c.className = "seg"; c.setAttribute("aria-pressed", "false"); });
          b.className = "seg active"; b.setAttribute("aria-pressed", "true");
          onpick(o.value);
        } }, [o.label]);
      group.appendChild(b);
    });
    return group;
  }
  function helpLine(text) { return el("p", { class: "help muted small" }, [text]); }

  /* ---------- Conditional visibility (best-effort from raw business logic) ---------- */
  function fieldVisible(field) {
    // Section headers and unconditional fields always show. visible_if is raw
    // EDPB business logic; we surface it but default to visible so the form is
    // never under-inclusive. Fine-grained rule evaluation is a roadmap item.
    return true;
  }

  /* ---------- Views ---------- */
  function viewPreAssessment() {
    var wrap = el("section", { class: "card" }, [
      el("h2", {}, [t("pre.title")]),
      el("p", { class: "muted" }, [t("pre.intro")]),
    ]);
    var qs = [
      ["isbreach", "pre.q_isbreach"],
      ["personaldata", "pre.q_personaldata"],
      ["risk", "pre.q_risk"],
      ["highrisk", "pre.q_highrisk"],
    ];
    qs.forEach(function (q) {
      var row = el("div", { class: "q" }, [el("label", {}, [t(q[1])])]);
      ["yes", "no", "unknown"].forEach(function (v) {
        var id = "pre_" + q[0] + "_" + v;
        var input = el("input", {
          type: "radio", name: "pre_" + q[0], id: id, value: v,
          onchange: function () { state.pre[q[0]] = v; renderVerdict(); },
        });
        if (state.pre[q[0]] === v) input.checked = true;
        row.appendChild(el("span", { class: "opt" }, [input, el("label", { for: id }, [t("common." + v)])]));
      });
      wrap.appendChild(row);
    });
    var verdict = el("div", { class: "verdict", id: "pre-verdict" });
    wrap.appendChild(verdict);
    function renderVerdict() {
      var p = state.pre, msgs = [];
      if (p.isbreach === "no" || p.personaldata === "no") msgs.push(["warn", t("pre.verdict.notbreach")]);
      else {
        if (p.risk === "no") msgs.push(["info", t("pre.verdict.norisk")]);
        if (p.risk === "yes") msgs.push(["alert", t("pre.verdict.notify_dpa")]);
        if (p.highrisk === "yes") msgs.push(["alert", t("pre.verdict.notify_subjects")]);
      }
      verdict.innerHTML = "";
      msgs.forEach(function (m) { verdict.appendChild(el("div", { class: "banner " + m[0] }, [m[1]])); });
    }
    renderVerdict();
    return wrap;
  }

  function viewSeverity() {
    var wrap = el("section", { class: "card" }, [
      el("h2", {}, [t("enisa.title")]),
      el("p", { class: "muted" }, [t("enisa.intro")]),
      el("p", { class: "formula" }, ["SE = DPC × EI + CB"]),
    ]);
    var s = state.enisa;
    s.cb = (s.cb && typeof s.cb === "object" && !Array.isArray(s.cb)) ? s.cb : { confidentiality: 0, integrity: 0, availability: 0, malicious: false };
    s.mitigants = s.mitigants || {};
    var result = el("div", { class: "verdict sticky", id: "enisa-result" });

    // DPC base - segmented buttons (verbatim ENISA values, only the control type changes)
    wrap.appendChild(el("h3", {}, [t("enisa.dpc")]));
    wrap.appendChild(helpLine("Data Processing Context: how critical the data is. 1 simple, 2 behavioural, 3 financial, 4 sensitive (special categories)."));
    wrap.appendChild(segmented(Object.keys(ENISA.dpc.base).map(function (k) {
      var b = ENISA.dpc.base[k]; return { value: b.score, label: b.label.split(" (")[0] + " (" + b.score + ")", title: b.label };
    }), s.dpc, function (v) { s.dpc = v; recalc(); }));

    // EI - segmented buttons
    wrap.appendChild(el("h3", {}, [t("enisa.ei")]));
    wrap.appendChild(helpLine("Ease of Identification: how easily the data identifies a person (multiplies DPC). 0.25 negligible to 1 maximum."));
    wrap.appendChild(segmented(Object.keys(ENISA.ei.levels).map(function (k) {
      var lv = ENISA.ei.levels[k]; return { value: lv.score, label: lv.label.split(" -")[0] + " (" + lv.score + ")", title: lv.label };
    }), s.ei, function (v) { s.ei = v; recalc(); }));

    // CB graduated 0 / +0.25 / +0.5 per C/I/A (verbatim ENISA Annex 3) + malicious +0.5
    wrap.appendChild(el("h3", {}, [t("enisa.cb")]));
    wrap.appendChild(helpLine("Circumstances of the Breach: added points for loss of confidentiality, integrity, availability (each 0 / +0.25 / +0.5) and malicious intent (+0.5)."));
    Object.keys(ENISA.cb.graduated).forEach(function (k) {
      var g = ENISA.cb.graduated[k];
      wrap.appendChild(el("label", { class: "seg-label" }, [g.label]));
      wrap.appendChild(segmented(g.levels.map(function (lv) {
        return { value: lv.points, label: "+" + lv.points, title: lv.label };
      }), (s.cb[k] || 0), function (v) { s.cb[k] = v; recalc(); }));
    });
    // Malicious intent as a toggle button
    wrap.appendChild(el("label", { class: "seg-label" }, [ENISA.cb.malicious_intent.label + " (+" + ENISA.cb.malicious_intent.points + ")"]));
    wrap.appendChild(segmented([{ value: false, label: "No" }, { value: true, label: "Yes (+0.5)" }], !!s.cb.malicious, function (v) { s.cb.malicious = v; recalc(); }));

    // Mitigating factors (P5) - editable toggle buttons; apply a one-time nudge to the
    // indicated variable (Art. 5: editable suggestion, the controller sees the change).
    if (ENISA.mitigating_factors) {
      wrap.appendChild(el("h3", {}, ["Mitigating factors"]));
      wrap.appendChild(helpLine(ENISA.mitigating_factors.note));
      ENISA.mitigating_factors.factors.forEach(function (m) {
        var row = el("div", { class: "mitigant" }, [
          el("span", { class: "mit-label" }, [m.label, el("span", { class: "mit-tag" }, [" " + m.variable + " " + m.direction])]),
        ]);
        row.appendChild(segmented([{ value: false, label: "Off" }, { value: true, label: "Apply" }], !!s.mitigants[m.key],
          function (v) { var was = !!s.mitigants[m.key]; s.mitigants[m.key] = v; if (v && !was) applyMitigant(m); activeTab = "enisa"; render(); }));
        wrap.appendChild(row);
      });
    }
    function applyMitigant(m) {
      if (m.effect === "zero_confidentiality" || m.effect === "neutralise_confidentiality") s.cb.confidentiality = 0;
      else if (m.effect === "zero_availability") s.cb.availability = 0;
      else if (m.variable === "DPC" && m.direction === "decrease") s.dpc = Math.max(1, (s.dpc || 1) - 1); // whole-step, qualitative
      else if (m.variable === "EI" && m.direction === "decrease") {
        var order = [0.25, 0.5, 0.75, 1.0]; var i = order.indexOf(s.ei != null ? s.ei : 1.0);
        s.ei = order[Math.max(0, i - 1)];
      } else if (m.variable === "CB" && m.direction === "decrease") s.cb.confidentiality = Math.max(0, (s.cb.confidentiality || 0) - 0.25);
    }

    wrap.appendChild(result);
    if (ENISA.provenance) wrap.appendChild(el("p", { class: "muted small prov" }, ["Provenance: " + ENISA.provenance]));
    function recalc() {
      if (s.dpc == null || s.ei == null) {
        result.innerHTML = ""; result.appendChild(el("div", { class: "muted small" }, ["Select DPC and EI to compute the severity."]));
        return;
      }
      var r = computeSeverity(s.dpc, s.ei, s.cb);
      state.severity = r;
      result.innerHTML = "";
      result.appendChild(el("div", { class: "score" }, [t("enisa.result") + ": ", el("b", { class: "se-num" }, [String(r.se)]),
        "  -  " + t("enisa.band") + ": ", el("b", { class: "band-" + r.band.key }, [r.band.label])]));
      result.appendChild(el("div", { class: "banner " + (r.notify ? "alert" : "info") }, [r.notify ? t("enisa.trigger_on") : t("enisa.trigger_off")]));
      result.appendChild(el("div", { class: "muted small" }, [r.band.meaning]));
    }
    recalc();
    return wrap;
  }

  function viewForm() {
    var wrap = el("section", { class: "card" }, [
      el("h2", {}, [t("form.title")]),
      el("p", { class: "muted" }, [t("form.intro")]),
    ]);
    // Prefill: ENISA severity -> field 87 (severity) + field 90 (methodology)
    if (state.severity) {
      var sevMap = { low: "a", medium: "b", high: "c", very_high: "c" };
      state.form["field_87"] = sevMap[state.severity.band.key] || state.form["field_87"];
      state.form["field_90"] = "ENISA severity methodology: SE = DPC x EI + CB = " + state.severity.se +
        " (" + state.severity.band.label + "). " + state.severity.band.meaning;
    }
    var currentSection = null;
    DATA.fields.forEach(function (f) {
      if (f.section && f.section !== currentSection) {
        currentSection = f.section;
        wrap.appendChild(el("h3", { class: "section" }, [f.section]));
      }
      if (!fieldVisible(f)) return;
      wrap.appendChild(renderField(f));
    });
    var btn = el("button", { class: "primary", onclick: exportJSON }, [t("form.export_json")]);
    wrap.appendChild(el("div", { class: "actions" }, [btn]));
    wrap.appendChild(el("p", { class: "muted small" }, [t("form.export_note")]));
    return wrap;
  }

  function renderField(f) {
    var key = "field_" + f.id;
    var row = el("div", { class: "field" });
    var labelText = f.label + (f.mandatory === "yes" ? " *" : "");
    var label = el("label", {}, [labelText]);
    if (f.gdpr_ref) label.appendChild(el("span", { class: "gdpr" }, [" [" + t("form.gdpr") + ": " + f.gdpr_ref + "]"]));
    row.appendChild(label);
    if (f.tooltip) row.appendChild(el("div", { class: "tooltip muted small" }, [f.tooltip]));
    var ctl;
    if (f.type === "enum" && f.options.length) {
      ctl = el("select", { onchange: function (e) { state.form[key] = e.target.value; } });
      ctl.appendChild(el("option", { value: "" }, ["--"]));
      f.options.forEach(function (o) {
        var op = el("option", { value: o.key }, [o.key + ") " + o.label]);
        if (state.form[key] === o.key) op.selected = true;
        ctl.appendChild(op);
      });
    } else if (f.type === "multi-select" && f.options.length) {
      ctl = el("div", { class: "multi" });
      f.options.forEach(function (o) {
        var cb = el("input", { type: "checkbox", id: key + "_" + o.key,
          onchange: function (e) {
            state.form[key] = state.form[key] || [];
            if (e.target.checked) state.form[key].push(o.key);
            else state.form[key] = state.form[key].filter(function (x) { return x !== o.key; });
          } });
        if ((state.form[key] || []).indexOf(o.key) >= 0) cb.checked = true; // restore state on re-render
        ctl.appendChild(el("span", { class: "opt" }, [cb, el("label", { for: key + "_" + o.key }, [o.key + ") " + o.label])]));
      });
    } else if (f.type === "textarea") {
      ctl = el("textarea", { rows: "2", oninput: function (e) { state.form[key] = e.target.value; } });
      if (state.form[key]) ctl.value = state.form[key];
    } else if (f.type === "date" || f.type === "datetime") {
      ctl = el("input", { type: f.type === "date" ? "date" : "datetime-local", oninput: function (e) { state.form[key] = e.target.value; } });
      if (state.form[key]) ctl.value = state.form[key];
    } else if (f.type === "number") {
      ctl = el("input", { type: "number", min: "0", oninput: function (e) { state.form[key] = e.target.value; } });
      if (state.form[key] != null && state.form[key] !== "") ctl.value = state.form[key]; // restore state
    } else if (f.type === "boolean") {
      ctl = el("input", { type: "checkbox", onchange: function (e) { state.form[key] = e.target.checked; } });
      if (state.form[key]) ctl.checked = true; // restore state on re-render
    } else {
      ctl = el("input", { type: "text", oninput: function (e) { state.form[key] = e.target.value; } });
      if (state.form[key]) ctl.value = state.form[key];
    }
    if (f.visible_if) row.appendChild(el("div", { class: "cond muted small" }, ["⤷ " + f.visible_if]));
    row.appendChild(ctl);
    return row;
  }

  /* ---------- Obligations checklist ("Your obligations for this breach") ----------
   * Derives the duties from data already entered (pre-assessment risk/high-risk +
   * ENISA severity + notification fields). Read-only summary with article refs. */
  function viewObligations() {
    var p = state.pre || {}, sev = state.severity, n = state.form || {};
    var card = el("div", { class: "card obligations" }, [
      el("h3", {}, ["Your obligations for this breach"]),
      el("p", { class: "muted small" }, ["Derived from your pre-assessment and ENISA severity. This is guidance; the legal qualification is the controller's, under Article 5 GDPR."]),
    ]);
    function item(state_, title, detail, ref) {
      return el("div", { class: "obl " + state_ }, [
        el("div", { class: "obl-head" }, [el("span", { class: "obl-badge " + state_ }, [state_ === "yes" ? "Required" : state_ === "no" ? "Not required" : "To assess"]),
          el("b", {}, [" " + title]), el("span", { class: "obl-ref muted small" }, ["  " + ref])]),
        el("div", { class: "muted small" }, [detail]),
      ]);
    }
    // Art. 33 - notify the supervisory authority
    var notifyAuth = (p.risk === "yes" || (sev && sev.notify)) ? "yes" : (p.risk === "no" ? "no" : "assess");
    card.appendChild(item(notifyAuth, "Notify the supervisory authority",
      notifyAuth === "yes" ? "A risk to individuals is likely - notify the authority without undue delay and, where feasible, within 72 hours of becoming aware." + (sev && sev.notify ? " (ENISA SE " + sev.se + " >= 2.)" : "")
        : notifyAuth === "no" ? "No likely risk - notification is generally not required, but you must still record the breach (Art. 33(5))."
        : "Assess the risk in step 1 (pre-assessment) / step 2 (ENISA).", "Art. 33"));
    // Art. 34 - communicate to data subjects
    var notifySubj = (p.highrisk === "yes") ? "yes" : (p.highrisk === "no" ? "no" : "assess");
    card.appendChild(item(notifySubj, "Communicate to the affected individuals",
      notifySubj === "yes" ? "High risk - communicate to individuals without undue delay, unless an Article 34(3) exemption applies (data rendered unintelligible e.g. encryption; subsequent measures removing the high risk; or disproportionate effort, then a public communication)."
        : notifySubj === "no" ? "Not high risk - communication to individuals is generally not required."
        : "Assess whether the breach is high risk (step 1).", "Art. 34"));
    // Art. 33(5) - internal documentation (always)
    card.appendChild(item("yes", "Document the breach internally",
      "Record this breach in your internal register even if it is not notified, with enough detail for the authority to verify your assessment. Use the breach record below (24-month retention).", "Art. 33(5)"));
    return card;
  }

  /* ---------- Record-keeping (PIPEDA-style, localStorage) ---------- */
  function getRecords() {
    try { return JSON.parse(localStorage.getItem("ebna_records") || "[]"); } catch (e) { return []; }
  }
  function viewRecord() {
    var container = el("div", {});
    container.appendChild(viewObligations()); // "Your obligations for this breach" checklist on top
    var wrap = el("section", { class: "card" }, [
      el("h2", {}, [t("record.title")]),
      el("p", { class: "muted" }, [t("record.intro")]),
    ]);
    // PIPEDA-style minimum fields (6) + 24-month retention note
    var rk = DATA.record_keeping;
    state.record = state.record || {};
    wrap.appendChild(el("p", { class: "muted small" }, ["Retention: " + rk.retention_months + " months. " + rk.retention_note]));
    rk.minimum_fields.forEach(function (mf) {
      var row = el("div", { class: "field" }, [el("label", {}, [mf.label])]);
      var ctl = mf.type === "textarea"
        ? el("textarea", { rows: "2", oninput: function (e) { state.record[mf.key] = e.target.value; } })
        : el("input", { type: "text", oninput: function (e) { state.record[mf.key] = e.target.value; } });
      if (state.record[mf.key]) ctl.value = state.record[mf.key];
      row.appendChild(ctl);
      wrap.appendChild(row);
    });
    wrap.appendChild(el("button", { class: "primary", onclick: function () {
      var recs = getRecords();
      recs.push({ saved_at: new Date().toISOString(), retention_until_months: rk.retention_months,
        severity: state.severity, pre: state.pre, minimum_record: state.record, notification: state.form });
      localStorage.setItem("ebna_records", JSON.stringify(recs));
      render();
    } }, [t("record.add")]));
    var recs = getRecords();
    if (!recs.length) wrap.appendChild(el("p", { class: "muted" }, [t("record.empty")]));
    else {
      var list = el("ul", { class: "records" });
      recs.forEach(function (r, i) {
        var sev = r.severity ? (r.severity.band.label + " / SE " + r.severity.se) : "n/a";
        list.appendChild(el("li", {}, ["#" + (i + 1) + " - " + r.saved_at + " - " + sev]));
      });
      wrap.appendChild(list);
      var bar = el("div", { class: "actions" }, [
        el("button", { onclick: function () { downloadJSON(recs, "breach-record.json"); } }, ["Export JSON"]),
        el("button", { onclick: function () { downloadText(registerCSV(recs), "breach-register.csv", "text/csv"); } }, ["Export CSV"]),
        el("button", { onclick: function () { downloadText(registerXLS(recs), "breach-register.xls", "application/vnd.ms-excel"); } }, ["Export XLS"]),
        el("button", { onclick: exportAggregate }, ["Export aggregate statistics (anonymised)"]),
      ]);
      wrap.appendChild(bar);
      wrap.appendChild(el("p", { class: "muted small" }, ["Aggregate export: anonymised counts by taxonomy, k-anonymity k=" + DATA.aggregate_transparency.k_default + " (small cells suppressed). No single-notification rows, no controller identity."]));
    }
    container.appendChild(wrap);
    return container;
  }

  /* ---------- Breach register export (Frank P8): rich record, CSV + XLS ---------- */
  // Columns combine the Canadian record fields with data pulled from the
  // pre-assessment, ENISA score and the EDPB notification.
  var REGISTER_COLUMNS = [
    ["reference", "Internal reference"],
    ["date_period", "Date / period of incident"],
    ["circumstances_cause", "Circumstances and cause"],
    ["nature_cia", "Nature (C-I-A)"],
    ["incident_type", "Incident type (taxonomy)"],
    ["data_categories", "Data categories"],
    ["numbers", "Number of data subjects / records (approx.)"],
    ["risk_outcome", "Risk assessment outcome"],
    ["methodology_enisa", "Methodology (ENISA SE)"],
    ["notified_authority", "Notified to supervisory authority"],
    ["notified_individuals", "Communicated to individuals"],
    ["reasoned_basis", "Reasoned basis if not notified/communicated"],
    ["measures", "Measures taken"],
    ["retention", "Retention"],
    ["saved_at", "Record created"],
  ];
  function optLabel(fieldId, key) {
    var f = DATA.fields.find(function (x) { return x.id === fieldId; });
    if (!f || !key) return key || "";
    var o = (f.options || []).find(function (x) { return x.key === key; });
    return o ? (key + ") " + o.label) : key;
  }
  function registerRow(r) {
    var n = r.notification || {}, mr = r.minimum_record || {}, sev = r.severity;
    var f97 = n.field_97; // communicated to data subjects
    var authority = (r.pre && r.pre.risk === "yes") ? "Yes (Art. 33)" : (r.pre && r.pre.risk === "no" ? "No (no likely risk - recorded)" : "To assess");
    var individuals = f97 ? optLabel(97, f97) : ((r.pre && r.pre.highrisk === "yes") ? "Yes (Art. 34)" : "No / not required");
    return {
      reference: n.field_7 || "",
      date_period: n.field_44 ? optLabel(44, n.field_44) : (mr.date_or_period || ""),
      circumstances_cause: (mr.circumstances_cause || "") + (n.field_61 ? " | cause: " + optLabel(61, n.field_61) : ""),
      nature_cia: n.field_55 ? optLabel(55, n.field_55) : "",
      incident_type: n.field_60 ? optLabel(60, n.field_60) : "",
      data_categories: mr.personal_information || (n.field_70 ? optLabel(70, n.field_70) : ""),
      numbers: mr.number_affected || n.field_68 || n.field_73 || "",
      risk_outcome: n.field_89 ? optLabel(89, n.field_89) : (sev && sev.notify ? "Risk -> notification path" : "No high risk"),
      methodology_enisa: sev ? ("ENISA SE = " + sev.se + " (" + sev.band.label + ")") : "",
      notified_authority: authority,
      notified_individuals: individuals,
      reasoned_basis: n.field_100 ? optLabel(100, n.field_100) : (n.field_101 || mr.notification_steps || ""),
      measures: mr.mitigation_steps || (n.field_92 || ""),
      retention: (r.retention_until_months || 24) + " months min.",
      saved_at: r.saved_at || "",
    };
  }
  function csvCell(v) { v = (v == null ? "" : String(v)); return '"' + v.replace(/"/g, '""') + '"'; }
  function registerCSV(recs) {
    var head = REGISTER_COLUMNS.map(function (c) { return csvCell(c[1]); }).join(",");
    var rows = recs.map(function (r) {
      var row = registerRow(r);
      return REGISTER_COLUMNS.map(function (c) { return csvCell(row[c[0]]); }).join(",");
    });
    return "﻿" + [head].concat(rows).join("\r\n");
  }
  function xmlEsc(v) { return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function registerXLS(recs) {
    // SpreadsheetML 2003 (Excel-native, dependency-free, opens offline).
    var head = REGISTER_COLUMNS.map(function (c) { return '<Cell><Data ss:Type="String">' + xmlEsc(c[1]) + "</Data></Cell>"; }).join("");
    var body = recs.map(function (r) {
      var row = registerRow(r);
      var cells = REGISTER_COLUMNS.map(function (c) { return '<Cell><Data ss:Type="String">' + xmlEsc(row[c[0]]) + "</Data></Cell>"; }).join("");
      return "<Row>" + cells + "</Row>";
    }).join("");
    return '<?xml version="1.0"?>\n' +
      '<?mso-application progid="Excel.Sheet"?>\n' +
      '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">' +
      '<Worksheet ss:Name="Breach register"><Table>' +
      "<Row>" + head + "</Row>" + body +
      "</Table></Worksheet></Workbook>";
  }

  /* ---------- Aggregate transparency (Frank/Martim P2, California model) ----------
   * Anonymised aggregate statistics by template taxonomy. Counts only, by category,
   * over a period. k-anonymity: cells with count < k are suppressed into __suppressed__.
   */
  function subjectsBucket(r) {
    var raw = (r.minimum_record && r.minimum_record.number_affected) || (r.notification && (r.notification.field_68 || r.notification.field_73)) || "";
    var n = parseInt(String(raw).replace(/[^0-9]/g, ""), 10);
    if (!n) return "unknown";
    if (n === 1) return "1";
    if (n < 10) return "2-9";
    if (n < 100) return "10-99";
    if (n < 1000) return "100-999";
    if (n < 10000) return "1k-10k";
    return ">10k";
  }
  function aggregateRecords(recs, k, period) {
    var dims = { incident_type: {}, cause: {}, nature_cia: {}, data_categories: {}, severity_band: {}, nace_sector: {}, data_subjects_range: {}, art34_communicated: {} };
    function bump(map, key) { if (key == null || key === "") return; map[key] = (map[key] || 0) + 1; }
    recs.forEach(function (r) {
      var n = r.notification || {};
      bump(dims.incident_type, n.field_60);
      bump(dims.cause, n.field_61);
      bump(dims.nature_cia, n.field_55);
      bump(dims.data_categories, n.field_70);
      bump(dims.severity_band, r.severity && r.severity.band ? r.severity.band.key : null);
      bump(dims.nace_sector, n.field_17);
      bump(dims.data_subjects_range, subjectsBucket(r));
      bump(dims.art34_communicated, n.field_97 ? "communicated" : "not_communicated");
    });
    // k-anonymity: suppress small cells into __suppressed__
    Object.keys(dims).forEach(function (d) {
      var m = dims[d], supp = 0;
      Object.keys(m).forEach(function (key) { if (m[key] < k) { supp += m[key]; delete m[key]; } });
      if (supp > 0) m.__suppressed__ = supp;
    });
    return {
      period: { granularity: (period && period.granularity) || "year", label: (period && period.label) || String(new Date().getUTCFullYear ? "" : "") || "current" },
      k_anonymity_threshold: k,
      total_notifications: recs.length,
      anonymisation_guarantees: DATA.aggregate_transparency.guarantees,
      dimensions: dims,
    };
  }

  /* ---------- Export ---------- */
  function exportJSON() {
    downloadJSON(state.form, "edpb-breach-notification.json");
  }
  function exportAggregate() {
    var k = DATA.aggregate_transparency.k_default;
    var agg = aggregateRecords(getRecords(), k, { granularity: "year", label: "current" });
    downloadJSON(agg, "aggregate-transparency.json");
  }
  function downloadJSON(obj, name) { downloadText(JSON.stringify(obj, null, 2), name, "application/json"); }
  function downloadText(text, name, mime) {
    var blob = new Blob([text], { type: (mime || "text/plain") + ";charset=utf-8" });
    var a = el("a", { href: URL.createObjectURL(blob), download: name });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  /* ---------- Shell ---------- */
  var activeTab = "pre";
  function render() {
    var root = document.getElementById("app");
    root.innerHTML = "";
    // header
    var header = el("header", {}, [
      el("h1", {}, [t("app.title")]),
      el("p", { class: "subtitle" }, [t("app.subtitle")]),
      el("div", { class: "disclaimer" }, [t("app.disclaimer")]),
    ]);
    // language selector
    var sel = el("select", { class: "lang", onchange: function (e) { lang = e.target.value; render(); } });
    Object.keys(I18N).forEach(function (code) {
      var meta = I18N[code]._meta || {};
      var label = (meta.name || code) + (meta.status === "complete" ? "" : " " + t("lang.incomplete"));
      var o = el("option", { value: code }, [label]);
      if (code === lang) o.selected = true;
      sel.appendChild(o);
    });
    header.appendChild(el("div", { class: "langbox" }, [el("span", {}, [t("lang.label") + ": "]), sel]));
    root.appendChild(header);
    // tabs
    var tabs = el("nav", { class: "tabs" });
    [["pre", "nav.preassessment"], ["enisa", "nav.severity"], ["form", "nav.notification"], ["record", "nav.record"]].forEach(function (tb) {
      tabs.appendChild(el("button", { class: activeTab === tb[0] ? "tab active" : "tab",
        onclick: function () { activeTab = tb[0]; render(); } }, [t(tb[1])]));
    });
    root.appendChild(tabs);
    // body
    var body;
    if (activeTab === "pre") body = viewPreAssessment();
    else if (activeTab === "enisa") body = viewSeverity();
    else if (activeTab === "form") body = viewForm();
    else body = viewRecord();
    root.appendChild(body);
    // step navigation (Back / Next)
    var order = ["pre", "enisa", "form", "record"];
    var idx = order.indexOf(activeTab);
    var nav = el("div", { class: "stepnav" });
    if (idx > 0) nav.appendChild(el("button", { onclick: function () { activeTab = order[idx - 1]; render(); window.scrollTo(0, 0); } }, ["← " + t("common.back")]));
    else nav.appendChild(el("span", {}));
    nav.appendChild(el("span", { class: "stepcount muted small" }, ["Step " + (idx + 1) + " / " + order.length]));
    if (idx < order.length - 1) nav.appendChild(el("button", { class: "primary", onclick: function () { activeTab = order[idx + 1]; render(); window.scrollTo(0, 0); } }, [t("common.next") + " →"]));
    else nav.appendChild(el("span", {}));
    root.appendChild(nav);
    // footer
    root.appendChild(el("footer", {}, [
      el("span", {}, ["EDPB template v1.0 - consultation until 2026-08-05 - "]),
      el("a", { href: DATA.template.source_url, target: "_blank" }, ["source"]),
      el("span", {}, [" - Apache-2.0 + CC-BY-4.0 - (c) Nicola Franchetto, Martim Taborda Barata"]),
    ]));
  }

  /* Deep-link: #tab=<pre|enisa|form|record>[&demo=1] sets the initial tab and,
     with demo=1, seeds an example ENISA score (used for docs/screenshots). */
  function applyHash() {
    var h = (location.hash || "").replace(/^#/, "");
    var params = {};
    h.split("&").forEach(function (kv) { var p = kv.split("="); if (p[0]) params[p[0]] = p[1]; });
    if (params.tab && ["pre", "enisa", "form", "record"].indexOf(params.tab) >= 0) activeTab = params.tab;
    if (params.demo === "1") {
      state.pre = { isbreach: "yes", personaldata: "yes", risk: "yes", highrisk: "yes" };
      var demoCb = { confidentiality: 0.5, integrity: 0, availability: 0, malicious: true };
      state.enisa = { dpc: 4, ei: 1.0, cb: demoCb };
      state.severity = computeSeverity(4, 1.0, demoCb);
      state.record = { circumstances_cause: "Ransomware exfiltration of customer database.", date_or_period: "2026-06-15", personal_information: "Names, emails, payment methods.", number_affected: "~12,000", mitigation_steps: "Isolated systems, rotated credentials, engaged IR firm.", notification_steps: "Email to affected individuals scheduled." };
      state.form = { field_55: "a", field_60: "b", field_89: "a" };
      // Seed one saved record so the export bar (JSON/CSV/XLS) is demonstrable.
      try {
        if (!getRecords().length) {
          localStorage.setItem("ebna_records", JSON.stringify([{ saved_at: "2026-06-16T09:00:00Z", retention_until_months: 24, severity: state.severity, pre: state.pre, minimum_record: state.record, notification: state.form }]));
        }
      } catch (e) { /* localStorage unavailable */ }
    }
  }

  window.addEventListener("DOMContentLoaded", function () { applyHash(); render(); });
})();

</script>
