<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDPB Breach Notification Assistant</title>
  <meta name="description" content="Offline, privacy-by-design tool for personal data breach triage, ENISA severity scoring and EDPB notification preparation." />
  <style>
    :root {
      --navy: #0f2740; --blue: #1f5fae; --accent: #2e7d32; --alert: #b3261e;
      --warn: #8a6d00; --bg: #f5f7fa; --card: #ffffff; --line: #e2e8f0; --muted: #5b6b7c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: #16222e; line-height: 1.5; }
    #app { max-width: 920px; margin: 0 auto; padding: 24px 18px 64px; }
    header h1 { color: var(--navy); margin: 0 0 4px; font-size: 1.7rem; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); margin: 0 0 12px; }
    .disclaimer { background: #fff8e1; border: 1px solid #ffe08a; color: #6a5400; padding: 10px 12px;
      border-radius: 8px; font-size: 0.86rem; margin-bottom: 12px; }
    .langbox { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; }
    select, input[type=text], input[type=number], input[type=date], input[type=datetime-local], textarea {
      font: inherit; padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; width: 100%; max-width: 520px; background: #fff; }
    select.lang { width: auto; display: inline-block; }
    textarea { resize: vertical; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0; border-bottom: 1px solid var(--line); }
    .tab { background: none; border: none; padding: 9px 12px; cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent; font: inherit; }
    .tab.active { color: var(--navy); border-bottom-color: var(--blue); font-weight: 600; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 18px; }
    .card h2 { margin-top: 0; color: var(--navy); }
    .card h3 { color: var(--blue); margin: 18px 0 6px; font-size: 1rem; }
    .card h3.section { margin-top: 24px; padding-top: 10px; border-top: 1px solid var(--line); color: var(--navy); font-size: 0.95rem; }
    .muted { color: var(--muted); }
    .small { font-size: 0.84rem; }
    .formula { font-family: ui-monospace, Menlo, monospace; background: #f0f4f8; padding: 6px 10px; border-radius: 6px; display: inline-block; }
    .q { margin: 12px 0; }
    .q > label { display: block; font-weight: 500; margin-bottom: 6px; }
    .opt { display: inline-flex; align-items: center; gap: 4px; margin-right: 14px; }
    .opt label { font-weight: 400; }
    .field { margin: 12px 0; }
    .field > label { display: block; font-weight: 500; margin-bottom: 4px; }
    .gdpr { color: var(--accent); font-weight: 400; font-size: 0.82rem; }
    .tooltip { margin-bottom: 4px; }
    .cond { font-style: italic; }
    .multi .opt { display: flex; margin: 2px 0; }
    /* segmented buttons (DPC/EI/CB) */
    .segmented { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
    .seg { background: #fff; border: 1px solid var(--line); color: #16222e; padding: 8px 12px; border-radius: 8px;
      cursor: pointer; font: inherit; margin: 0; min-height: 40px; transition: background .12s, border-color .12s; }
    .seg:hover { border-color: var(--blue); }
    .seg.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
    .seg-label { display: block; font-weight: 500; margin: 8px 0 2px; font-size: .92rem; }
    .help { margin: 2px 0 4px; }
    .mitigant { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #eef2f7; }
    .mit-label { font-size: .9rem; }
    .mit-tag { color: var(--accent); font-size: .78rem; }
    .verdict.sticky { position: sticky; bottom: 8px; background: var(--card); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px 14px; box-shadow: 0 2px 10px rgba(15,39,64,.08); z-index: 5; }
    .se-num { font-size: 1.25rem; }
    .obligations { border-left: 4px solid var(--blue); }
    .obl { padding: 10px 12px; border-radius: 8px; margin: 8px 0; border: 1px solid var(--line); }
    .obl.yes { background: #fdecea; border-color: #f5c2bd; }
    .obl.no { background: #eef7ee; border-color: #cfe6cf; }
    .obl.assess { background: #fff8e1; border-color: #ffe08a; }
    .obl-head { margin-bottom: 3px; }
    .obl-badge { display: inline-block; font-size: .74rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; color: #fff; }
    .obl-badge.yes { background: var(--alert); } .obl-badge.no { background: var(--accent); } .obl-badge.assess { background: var(--warn); }
    .obl-ref { font-weight: 400; }
    .stepnav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 4px 0 18px; }
    .stepcount { white-space: nowrap; }
    .verdict { margin-top: 14px; }
    .banner { padding: 9px 12px; border-radius: 7px; margin: 6px 0; font-size: 0.9rem; }
    .banner.alert { background: #fdecea; border: 1px solid #f5c2bd; color: var(--alert); }
    .banner.info { background: #e8f1fb; border: 1px solid #bcd7f3; color: var(--blue); }
    .banner.warn { background: #fff8e1; border: 1px solid #ffe08a; color: var(--warn); }
    .score { font-size: 1.1rem; margin-bottom: 6px; }
    .band-low { color: var(--accent); } .band-medium { color: #b8860b; }
    .band-high { color: #d2691e; } .band-very_high { color: var(--alert); }
    button.primary { background: var(--blue); color: #fff; border: none; padding: 10px 16px; border-radius: 8px;
      cursor: pointer; font: inherit; font-weight: 600; margin-top: 8px; }
    button.primary:hover { background: #174a86; }
    button { background: #eef2f7; border: 1px solid var(--line); padding: 8px 14px; border-radius: 8px; cursor: pointer; font: inherit; margin-top: 8px; }
    .actions { margin-top: 16px; }
    .records { padding-left: 18px; }
    footer { margin-top: 26px; padding-top: 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: 0.8rem; }
    footer a { color: var(--blue); }
    /* mobile: full-width controls, larger tap targets, no overflow */
    @media (max-width: 600px) {
      #app { padding: 16px 12px 56px; }
      header h1 { font-size: 1.4rem; }
      .card { padding: 16px 14px; }
      .tabs { gap: 2px; }
      .tab { padding: 8px 8px; font-size: .9rem; flex: 1 1 auto; text-align: center; }
      .segmented { gap: 5px; }
      .seg { flex: 1 1 auto; min-width: 64px; text-align: center; min-height: 44px; }
      select, input[type=text], input[type=number], input[type=date], input[type=datetime-local], textarea { max-width: 100%; }
      .opt { margin-right: 8px; }
      .mitigant { flex-direction: column; align-items: stretch; }
      .verdict.sticky { bottom: 0; border-radius: 10px 10px 0 0; }
      .stepnav button { min-height: 44px; }
    }
  </style>
</head>

 false}, {"id": 58, "section": "3.2", "label": "Type of integrity breach", "type": "enum", "options": [{"key": "a", "label": "Alteration or modification of the data, with no evidence of illegal or wrong use"}, {"key": "b", "label": "Alteration or modification of the data, with evidence of illegal or wrong use, but with the possibility of reversing/recovering the damages to data subjects"}, {"key": "c", "label": "Alteration or modification of the data with evidence of illegal or wrong use, without the possibility of reversing/recovering damages to the data subjects"}], "mandatory": "conditional", "visible_if": "only if integrity", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 59, "section": "3.2", "label": "Type of availability breach", "type": "enum", "options": [{"key": "a", "label": "Temporary availability issue"}, {"key": "b", "label": "Permanent availability issue"}, {"key": "c", "label": "not determined"}], "mandatory": "conditional", "visible_if": "only if availability", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please assess the availability issue form the data subject’s perspective", "allow_multiple": false}, {"id": 60, "section": "3.2", "label": "Nature of the incident", "type": "enum", "options": [{"key": "a", "label": "Abuse of access privileges by employee"}, {"key": "b", "label": "Encrypted device / ransomware"}, {"key": "c", "label": "Hacking / malware activity detected"}, {"key": "d", "label": "Phishing / social engineering"}, {"key": "e", "label": "Security vulnerability (likely) exploited (known CVE or zero day)"}, {"key": "f", "label": "Unauthorised access to personal data in IT systems"}, {"key": "g", "label": "Data exfiltration / unauthorised extraction of personal data"}, {"key": "h", "label": "Data of wrong data subject shown (mix-up of records)"}, {"key": "i", "label": "Device lost or stolen"}, {"key": "j", "label": "E-waste (personal data still present on obsolete device)"}, {"key": "k", "label": "Incorrect disposal of personal data on paper"}, {"key": "l", "label": "Mail lost or opened / misdelivery (post/email)"}, {"key": "m", "label": "Misconfiguration"}, {"key": "n", "label": "Incorrect access permissions (e.g., cloud storage, shared folder)"}, {"key": "o", "label": "Paper lost or stolen or left in insecure location"}, {"key": "p", "label": "Personal data deleted/destroyed"}, {"key": "q", "label": "Personal data displayed to wrong recipient"}, {"key": "r", "label": "Personal data sent by mistake (post/email)"}, {"key": "s", "label": "Sending email to multiple recipients without blind copy / with open distribution list"}, {"key": "t", "label": "Technical malfunction"}, {"key": "u", "label": "Unauthorised data modification"}, {"key": "v", "label": "Unintended publication (e.g., public link / public website / shared drive)"}, {"key": "w", "label": "Verbal unauthorised disclosure of personal data"}, {"key": "x", "label": "to be determined"}, {"key": "y", "label": "Other (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 61, "section": "3.2", "label": "Cause of the personal data breach", "type": "enum", "options": [{"key": "a", "label": "Internal non malicious"}, {"key": "b", "label": "Internal malicious"}, {"key": "c", "label": "External non malicious"}, {"key": "d", "label": "External malicious"}, {"key": "e", "label": "To be determined"}, {"key": "f", "label": "Unknown"}], "mandatory": "yes", "visible_if": "”To be determined” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 62, "section": "3.2", "label": "Further description of the nature of the incident", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please describe the nature of the breach (detection, awareness, cause, measures in place) shortly and provide on what facts your decision is grounded. If possible indicate the root cause of the incident.", "allow_multiple": false}, {"id": 63, "section": "3.2", "label": "Description of the systems, software, services, and infrastructures involved in the personal data breach and where they are located", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please list the descriptions them in semantic groups, e.g. \n\nSystems:\n• production database :\n  o client database (full/partial) that countains ****, located in ***\n  o internal HR database (full/partial) that countains ****, located in ***\n• test infrastucture\n  o testing database (full/partial) that countains ****; located in ***\nSoftware:\n• Accounting software\n• Payment system software", "allow_multiple": false}, {"id": 65, "section": "3.3", "label": "Categories of concerned data subjects", "type": "multi-select", "options": [{"key": "a", "label": "Customers (current and prospects)"}, {"key": "b", "label": "Employees (former, current and candidates)"}, {"key": "c", "label": "Military or law enforcement staff"}, {"key": "d", "label": "Minors"}, {"key": "e", "label": "Patients"}, {"key": "f", "label": "Students"}, {"key": "g", "label": "Subscribers"}, {"key": "h", "label": "Users"}, {"key": "i", "label": "Vulnerable individuals (elderly, refugees, disabled people, victims, …)"}, {"key": "j", "label": "Additional concerned data subjects (please specify in further description)"}, {"key": "k", "label": "Not yet known"}], "mandatory": "yes", "visible_if": "”Not yet known” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "If you answered i), please indicate what kind of vulnerable people. If you are not sure if or how the concerned data subject are vulnerable, please describe them shortly and why you would consider them as vulnerable.", "allow_multiple": false}, {"id": 66, "section": "3.3", "label": "Further description of cate mber of personal data records concerned by the personal data breach", "type": "number", "options": [], "mandatory": "yes", "visible_if": "ask according to selected value before", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please indicate here the number of records concerned by the breach, meaning the number of single entries in the database concerned by the breach.", "allow_multiple": false}, {"id": 75, "section": "3.5", "label": "Relevant measures in place when the personal data breach occurred", "type": "multi-select", "options": [{"key": "a", "label": "Pseudonymisation"}, {"key": "b", "label": "Backup / Recovery plan"}, {"key": "c", "label": "Data encryption"}, {"key": "d", "label": "Data protection and information security policies"}, {"key": "e", "label": "Data protection and security training"}, {"key": "f", "label": "Incident log"}, {"key": "g", "label": "Levels of access to data"}, {"key": "h", "label": "Logical access control (e.g. MFA)"}, {"key": "i", "label": "Periodic audits"}, {"key": "j", "label": "Physical access control"}, {"key": "k", "label": "Up-to-date IT systems"}, {"key": "l", "label": "Other measures (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 32; Art. 33(3)", "tooltip": "This list is not exhaustive and just covers common measures. \n\nYou may have not applied some measures because they were not applicables or useful.\n\nAt the same time, you may have applied non-listed measures that were useful. If so, please specify them with answer L.", "allow_multiple": false}, {"id": 76, "section": "3.5", "label": "Further description of relevant measures in place when the personal data breach occurred", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": "If 57 indicated that measures in place are likely to be subverted, remind DCs here to detail on this in the tooltip", "gdpr_ref": "Art. 32; Art. 33(3)", "tooltip": "Reminder: You indicated that technical measures are likely to be subverted by the adversaries. Please add the relevant level of detail here to these measures, along the description of the other relevant measures.", "allow_multiple": false}, {"id": 79, "section": "4.1", "label": "Likely consequences in case of breach of confidentiality", "type": "multi-select", "options": [{"key": "a", "label": "Data were disclosed beyond the scope of the privacy policy or relevant legislation"}, {"key": "b", "label": "Data may be linked, without unreasonable effort, with other information regarding data subjects"}, {"key": "c", "label": "Data may be used for purposes other than the intended purpose or unlawfully"}, {"key": "d", "label": "Other"}, {"key": "e", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Confidentiality\"= yes\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 80, "section": "4.1", "label": "Description of other confidentiality consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 81, "section": "4.1", "label": "Likely consequences in case of breach of integrity", "type": "multi-select", "options": [{"key": "a", "label": "Data may have been modified and used even though it is no longer valid"}, {"key": "b", "label": "Data may have been modified into otherwise valid data and subsequently used for other purposes"}, {"key": "c", "label": "Other"}, {"key": "d", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Integrity\"= 1\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 82, "section": "4.1", "label": "Description of other integrity consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 83, "section": "4.1", "label": "Likely consequences in case of breach of availability", "type": "multi-select", "options": [{"key": "a", "label": "Inability to access services"}, {"key": "b", "label": "Service disruptions and difficulties in service use"}, {"key": "c", "label": "Other"}, {"key": "d", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Integrity\"= 1\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 84, "section": "4.1", "label": "Description of other availability consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 85, "section": "4.1", "label": "Nature of the potential impact for the data subject", "type": "multi-select", "options": [{"key": "a", "label": "Loss of control of their personal data"}, {"key": "b", "label": "Limitation of their rights"}, {"key": "c", "label": "Discrimination"}, {"key": "d", "label": "Identity theft or usurpation"}, {"key": "e", "label": "Fraud"}, {"key": "f", "label": "Financial loss"}, {"key": "g", "label": "Unauthorised reversal of pseudonymisation"}, {"key": "h", "label": "Damage to reputation"}, {"key": "i", "label": "Loss of confidentiality of personal data protected by professional secrecy"}, {"key": "j", "label": "Disclosure of data to unauthorised third parties"}, {"key": "k", "label": "Significant economic or social disadvantage"}, {"key": "l", "label": "Physical or mental harm"}, {"key": "m", "label": "Material or non-material damage to property"}, {"key": "n", "label": "Other impact (please specify in further description)"}, {"key": "o", "label": "To be determined"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(c)", "tooltip": "Please indicate here the nature of the impact on the data subject rights and freedoms.", "allow_multiple": false}, {"id": 86, "section": "4.1", "label": "Further description of the other impacts for the data subjects", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Description of the potential impact for the data subject\" = \"other\"", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 87, "section": "4.1", "label": "Severity of the potential impacts", "type": "enum", "options": [{"key": "a", "label": "Minor"}, {"key": "b", "label": "Moderate"}, {"key": "c", "label": "Severe"}, {"key": "d", "label": "To be determined"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(c)", "tooltip": "Indicate here the result of your self-assessment of the severity of the impact of the breach for the data subjects. Please select the highest severity if multiple potential impacts can occur.", "allow_multiple": false}, {"id": 89, "section": "4.2", "label": "Outcome of the risk assessment carried out by the controller", "type": "enum", "options": [{"key": "a", "label": "The personal data breach is likely to result in a high risk to the rights and freedoms of natural persons"}, {"key": "b", "label": "The personal data breach is likely to result in a (not high) risk to the rights and freedoms of natural persons"}, {"key": "c", "label": "The personal data breach is unlikely to result in a risk to the rights and freedoms of natural personsc) Additional information is needed to assess the risk to the rights and freedoms of natural persons"}], "mandatory": "yes", "visible_if": "”Additional information is needed to assess the risk to the rights and freedoms of natural persons ” only available for incomplete notification.", "gdpr_ref": "Art. 33(1); Art. 34(1)", "tooltip": null, "allow_multiple": false}, {"id": 90, "section": "4.2", "label": "Further description  of the risk assessment carried out by the data controller", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(1); Art. 34(1)", "tooltip": "Please describe the metodology used and the relevant factors you put into account.", "allow_multiple": false}, {"id": 92, "section": "4.3", "label": "Measures taken to address the personal data breach and to mitigate its consequences", "type": "text", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": "Please indicate to what extend the measures resolve the issue.", "allow_multiple": false}, {"id": 94, "section": "4.4", "label": "Relevant measures taken to prevent similar personal data breach", "type": "multi-select", "options": [{"key": "a", "label": "Anonymisation"}, {"key": "b", "label": "Backup / Recovery plan"}, {"key": "c", "label": "Change of processes"}, {"key": "d", "label": "Data encryption"}, {"key": "e", "label": "Data protection and information security policies"}, {"key": "f", "label": "Data protection and security training"}, {"key": "g", "label": "Erasure of the data"}, {"key": "h", "label": "Incident log"}, {"key": "i", "label": "Levels of access to data"}, {"key": "j", "label": "Logical access control (e.g. MFA)"}, {"key": "k", "label": "Periodic audits"}, {"key": "l", "label": "Physical access control"}, {"key": "m", "label": "Pseudonymisation"}, {"key": "n", "label": "Up-to-date IT systems"}, {"key": "o", "label": "Other measures (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": null, "allow_multiple": false}, {"id": 95, "section": "4.4", "label": "Further description of relevant updated permanent measures to avoid similar incidents in the future", "type": "date", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": "Please indicate to what extend the measures resolve the issue and improve the situation.\n\nA description is expected if you answered with “Other measures” in the previous question m).\n\nNevertheless, do not hesitate to describe further measures taken after the breach, or to be taken, if you think it is relevant.", "allow_multiple": false}, {"id": 97, "section": "4.4", "label": "Has the personal data breach been communicated to data subjects?", "type": "enum", "options": [{"key": "a", "label": "Yes"}, {"key": "b", "label": "No, but it will be communicated on a specific date b1) No, but it will be communicated on a date to be determined"}, {"key": "c", "label": "No, the investigation is still ongoing"}, {"key": "d", "label": "No, it will not be communicated since the personal data breach is unlikely to result in a high risk to the rights and freedoms of natural persons"}, {"key": "e", "label": "No, it will not be communicated since one of the conditions referred to in article 34(3) of the GDPR is met"}], "mandatory": "yes", "visible_if": "No, the risk assessment is still ongoing’ only available for incomplete notifications.", "gdpr_ref": "Art. 34(1); Art. 34(2)", "tooltip": "If you have not assessed yet if you are going to notify, please note that you will have to make a follow-up notification once you have make your decision\n\nIf you communicate the data breach to the data subjects in phases or if you cannot reach out to all data subjects, yet. Please indicated that in field 98 and 98a.", "allow_multiple": false}, {"id": 98, "section": "4.4", "label": "Date of when information was given to data subjects", "type": "date", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"information of data subject\" = Yes", "gdpr_ref": "Art. 34(1); Art. 34(2)", "tooltip": "Please indicate here the date on which you have started to inform the data subjects.", "allow_multiple": false}, {"id": 99, "section": "4.4", "label": "Future date on which the data breach will be communicated to the data subjects", "type": "date", "options": [], "m ffic, preferences)", "enisa.dpc.base.financial": "Financial data", "enisa.dpc.base.sensitive": "Sensitive data (special categories, Art. 9/10 GDPR)", "enisa.ei.label": "Ease of Identification", "enisa.ei.lvl.negligible": "Negligible - identification practically impossible", "enisa.ei.lvl.limited": "Limited - identification difficult but possible", "enisa.ei.lvl.significant": "Significant - identification reasonably easy", "enisa.ei.lvl.maximum": "Maximum - data directly identifies the subject", "enisa.cb.confidentiality.label": "Loss of confidentiality", "enisa.cb.confidentiality.lvl0": "No evidence of illicit processing", "enisa.cb.confidentiality.lvl1": "Disclosure to known/limited recipients", "enisa.cb.confidentiality.lvl2": "Publication / disclosure to unknown recipients", "enisa.cb.integrity.label": "Loss of integrity", "enisa.cb.integrity.lvl0": "No illicit use identified", "enisa.cb.integrity.lvl1": "Data altered, recovery possible", "enisa.cb.integrity.lvl2": "Data altered, no recovery possible", "enisa.cb.availability.label": "Loss of availability", "enisa.cb.availability.lvl0": "Data recoverable without difficulty", "enisa.cb.availability.lvl1": "Partial / temporary unavailability", "enisa.cb.availability.lvl2": "Full unavailability, not recoverable", "enisa.cb.malicious": "Malicious intent", "enisa.band.low": "Low", "enisa.band.low.meaning": "Individuals either will not be affected or may encounter a few inconveniences.", "enisa.band.medium": "Medium", "enisa.band.medium.meaning": "Individuals may encounter significant inconveniences, which they will be able to overcome despite some difficulties.", "enisa.band.high": "High", "enisa.band.high.meaning": "Individuals may encounter significant consequences, which they should be able to overcome albeit with serious difficulties.", "enisa.band.very_high": "Very High", "enisa.band.very_high.meaning": "Individuals may encounter significant, or even irreversible, consequences which they may not overcome.", "enisa.mit.single_subject": "Single data subject / very low volume", "enisa.mit.recipient_confirms_deletion": "Wrong recipient confirms deletion of the data", "enisa.mit.weak_linkage": "Common name / homonymy / weak linkage", "enisa.mit.strong_encryption": "Strong encryption / data unintelligible to recipient", "enisa.mit.pseudonymisation_no_key": "Pseudonymisation with no accessible key", "enisa.mit.professional_secrecy": "Recipient bound by professional secrecy / legal confidentiality", "enisa.mit.availability_restored": "Availability quickly restored from backup (short outage)", "enisa.mit.public_low_criticality": "Data already public / low criticality", "enisa.mit.note": "Mitigating circumstances that lower the score. Per the accountability principle (Art. 5), these are EDITABLE suggestions, not an imposed black-box adjustment: each toggle moves the indicated variable in the indicated direction; the controller may override. Exact numeric steps are ENISA-default and pending confirmation against the ENISA 2013 PDF.", "enisa.provenance": "SE < 2 = Low is verbatim from the ENISA document text. The upper cutoffs (Medium 2-<3, High 3-<4, Very High >=4) are the standard, universally-cited ENISA bands but were not extracted verbatim from this PDF's text layer; treat as 'ENISA standard consolidated bands'.", "rk.circumstances_cause": "Circumstances and cause of the breach (if known)", "rk.date_or_period": "Date or period of the breach (or approximation)", "rk.personal_information": "Description of the personal information involved (to the extent known)", "rk.number_affected": "Number of individuals affected (or approximation)", "rk.mitigation_steps": "Steps taken to reduce/mitigate the risk of harm", "rk.notification_steps": "Steps taken or planned to notify affected individuals (where applicable)", "rk.retention_note": "Minimum 24 months after the day the organisation determines the breach occurred (SOR/2018-64).", "help.dpc": "Data Processing Context: how critical the data i rige Frage m) mit „Sonstige Maßnahmen“ beantwortet haben.\n\nZögern Sie dennoch nicht, weitere nach der Verletzung ergriffene oder noch zu ergreifende Maßnahmen zu beschreiben, wenn Sie dies für relevant halten.", "f.97.label": "Wurde die Verletzung des Schutzes personenbezogener Daten den betroffenen Personen mitgeteilt?", "f.97.tip": "Wenn Sie noch nicht bewertet haben, ob Sie eine Benachrichtigung vornehmen werden, beachten Sie bitte, dass Sie eine Folgemeldung vornehmen müssen, sobald Sie Ihre Entscheidung getroffen haben.\n\nWenn Sie die Verletzung des Schutzes personenbezogener Daten den betroffenen Personen in Phasen mitteilen oder noch nicht alle betroffenen Personen erreichen können, geben Sie dies bitte in den Feldern 98 und 98a an.", "f.97.opt.a": "Ja", "f.97.opt.b": "Nein, aber sie wird zu einem bestimmten Datum mitgeteilt b1) Nein, aber sie wird zu einem noch zu bestimmenden Datum mitgeteilt", "f.97.opt.c": "Nein, die Untersuchung ist noch im Gange", "f.97.opt.d": "Nein, sie wird nicht mitgeteilt, da die Verletzung des Schutzes personenbezogener Daten voraussichtlich nicht zu einem hohen Risiko für die Rechte und Freiheiten natürlicher Personen führt", "f.97.opt.e": "Nein, sie wird nicht mitgeteilt, da eine der in Artikel 34 Absatz 3 DSGVO genannten Bedingungen erfüllt ist", "f.98.label": "Datum, an dem die Informationen an die betroffenen Personen gegeben wurden", "f.98.tip": "Bitte geben Sie hier das Datum an, an dem Sie begonnen haben, die betroffenen Personen zu informieren.", "f.99.label": "Zukünftiges Datum, an dem die Verletzung des Schutzes personenbezogener Daten den betroffenen Personen mitgeteilt wird", "f.100.label": "Weitere Informationen zu den erfüllten Bedingungen nach Artikel 34 Absatz 3 DSGVO", "f.100.opt.a": "Der Verantwortliche hat geeignete technische und organisatorische Schutzmaßnahmen getroffen und diese Maßnahmen wurden auf die von der Verletzung des Schutzes personenbezogener Daten betroffenen personenbezogenen Daten angewandt, rt; sie sind als 'ENISA-standardisierte konsolidierte Bänder' zu behandeln.", "rk.circumstances_cause": "Umstände und Ursache der Verletzung (sofern bekannt)", "rk.date_or_period": "Datum oder Zeitraum der Verletzung (oder Näherungswert)", "rk.personal_information": "Beschreibung der betroffenen personenbezogenen Informationen (soweit bekannt)", "rk.number_affected": "Anzahl der betroffenen Einzelpersonen (oder Näherungswert)", "rk.mitigation_steps": "Ergriffene Schritte zur Verringerung/Minderung des Schadensrisikos", "rk.notification_steps": "Ergriffene oder geplante Schritte zur Benachrichtigung der betroffenen Einzelpersonen (sofern zutreffend)", "rk.retention_note": "Mindestens 24 Monate nach dem Tag, an dem die Organisation feststellt, dass die Verletzung eingetreten ist (SOR/2018-64).", "help.dpc": "Datenverarbeitungskontext: wie kritisch die Daten sind. 1 einfach, 2 Verhalten, 3 finanziell, 4 sensibel (besondere Kategorien).", "help.ei": "Leichtigkeit der Identifizierung: wie leicht die Daten eine Person identifizieren (multipliziert DPC). 0,25 vernachlässigbar bis 1 maximal.", "help.cb": "Umstände der Verletzung: zusätzliche Punkte für den Verlust von Vertraulichkeit, Integrität, Verfügbarkeit (jeweils 0 / +0,25 / +0,5) und böswillige Absicht (+0,5).", "enisa.mititle": "Mildernde Faktoren", "enisa.cbtitle_mal": "Böswillige Absicht", "btn.export_csv": "CSV exportieren", "btn.export_xls": "XLS exportieren", "btn.export_aggregate": "Aggregierte Statistiken exportieren (anonymisiert)", "record.retention_prefix": "Aufbewahrung", "record.aggregate_note": "Aggregierter Export: anonymisierte Zählungen nach Taxonomie, k-Anonymität", "obl.title": "Ihre Pflichten für diese Verletzung", "obl.intro": "Indikative Orientierungshilfe, erstellt aus den von Ihnen eingegebenen Daten.", "obl.badge.required": "Erforderlich", "obl.badge.notreq": "Nicht erforderlich", "obl.badge.assess": "Zu bewerten", "obl.auth.title": "Die Aufsichtsbehörde benachrichtigen", "obl.auth.required": "Erforderlich, es sei denn, die Verletzung führt voraussichtlich nicht zu einem Risiko für die Rechte und Freiheiten natürlicher Personen (Art. 33 Abs. 1). Frist: unverzüglich und, sofern machbar, binnen 72 Stunden nach Bekanntwerden.", "obl.auth.notreq": "Nicht erforderlich nur, wenn die Verletzung voraussichtlich nicht zu einem Risiko für die Rechte und Freiheiten führt (Art. 33 Abs. 1). Dokumentieren Sie die Begründung (Art. 33 Abs. 5).", "obl.auth.assess": "Bewerten Sie, ob die Verletzung voraussichtlich zu einem Risiko führt. Der ENISA-Schweregrad fließt in diese Bewertung ein, bestimmt aber für sich allein nicht die rechtliche Pflicht.", "obl.subj.title": "Die betroffenen Einzelpersonen benachrichtigen", "obl.subj.text": "Nur erforderlich, wenn die Verletzung voraussichtlich zu einem HOHEN Risiko für die Rechte und Freiheiten führt (Art. 34 Abs. 1), und zwar unverzüglich. Ausnahmen (Art. 34 Abs. 3): (a) Daten unzugänglich, z. B. starke Verschlüsselung; (b) nachfolgende Maßnahmen, durch die das hohe Risiko aller Wahrscheinlichkeit nach nicht mehr besteht; (c) unverhältnismäßiger Aufwand -> stattdessen öffentliche Bekanntmachung.", "obl.doc.title": "Die Verletzung intern dokumentieren", "obl.doc.text": "Stets erforderlich, für ALLE Verletzungen, einschließlich der nicht gemeldeten (Art. 33 Abs. 5). Die DSGVO legt keine Aufbewahrungsfrist fest; ein Mindestzeitraum von 24 Monaten wird in Anlehnung an das kanadische Modell empfohlen (PIPEDA, SOR/2018-64), wie im Positionspapier vorgeschlagen (Teil III.5).", "obl.disclaimer": "Dies ist eine indikative Orientierungshilfe, die aus den von Ihnen eingegebenen Daten erstellt wurde; sie stellt keine Rechtsberatung dar und ersetzt nicht die einzelfallbezogene Bewertung des Verantwortlichen nach den Artikeln 33 und 34 DSGVO. Der Verantwortliche bleibt für die Feststellung und für die angegebenen Werte verantwortlich (Rechenschaftspflicht, Art. 5 Abs. 2).", "enisa.select_prompt": "Wählen Sie DPC und EI, um den Schweregrad zu berechnen.", "common.option_dash": "--", "mit.off": "Aus", "mit.apply": "Anwenden", "common.step": "Schritt", "record.aggregate_note2": "(kleine Zellen unterdrückt). Keine Einzelmeldungszeilen, keine Identität des Verantwortlichen.", "form.methodology_prefix": "ENISA-Schweregradmethodik: SE = DPC x EI + CB = "}, "el": {"_meta": {"lang": "el", "name": "Ελληνικά", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Βοηθός γνωστοποίησης παραβιάσεων EDPB", "app.subtitle": "Εργαλείο εκτός σύνδεσης, σχεδιασμένο με γνώμονα την προστασία της ιδιωτικής ζωής, για τη διαλογή παραβιάσεων δεδομένων προσωπικού χαρακτήρα, τη βαθμολόγηση σοβαρότητας κατά ENISA και την προετοιμασία της γνωστοποίησης EDPB", "app.disclaimer": "Σχέδιο βασισμένο στο υπόδειγμα EDPB v1.0 (δημόσια διαβούλευση έως τις 5 Αυγούστου 2026). Εκτελείται εξ ολοκλήρου στο πρόγραμμα περιήγησής σας - κανένα δεδομένο δεν εγκαταλείπει τη συσκευή σας. Δεν αποτελεί επίσημο δίαυλο υποβολής· μην το χρησιμοποιείτε για πραγματικές γνωστοποιήσεις προς εποπτική αρχή έως ότου οι αρχές εφαρμόσουν το υπόδειγμα.", "nav.preassessment": "1. Προκαταρκτική αξιολόγηση", "nav.severity": "2. Σοβαρότητα ENISA", "nav.notification": "3. Γνωστοποίηση EDPB", "nav.record": "4. Αρχείο παραβιάσεων", "lang.label": "Γλώσσα", "lang.incomplete": "(πρόχειρη μετάφραση - εφεδρική απόδοση στα αγγλικά)", "pre.title": "Προκαταρκτική αξιολόγηση (διαλογή)", "pre.intro": "Γρήγορη διαλογή, εμπνευσμένη από την αυτοαξιολόγηση της ICO, για να αποφασιστεί αν πρόκειται για παραβίαση δεδομένων προσωπικού χαρακτήρα που υπόκειται σε γνωστοποίηση, πριν από τη συμπλήρωση του πλήρους υποδείγματος.", "pre.q_isbreach": "Πρόκειται για παραβίαση της ασφάλειας που οδηγεί σε τυχαία ή παράνομη καταστροφή, απώλεια, μεταβολή, άνευ αδείας κοινολόγηση ή πρόσβαση δεδομένων προσωπικού χαρακτήρα;", "pre.q_personaldata": "Η παραβίαση αφορά δεδομένα προσωπικού χαρακτήρα (πληροφορίες που αφορούν ταυτοποιημένο ή ταυτοποιήσιμο πρόσωπο);", "pre.q_risk": "Είναι πιθανό η παραβίαση να επιφέρει κίνδυνο για τα δικαιώματα και τις ελευθερίες των φυσικών προσώπων;", "pre.q_highrisk": "Είναι πιθανό η παραβίαση να επιφέρει ΥΨΗΛΟ κίνδυνο για τα φυσικά πρόσωπα;", "pre.verdict.notbreach": "Αυτό δεν φαίνεται να αποτελεί παραβίαση δεδομένων προσωπικού χαρακτήρα βάσει του ΓΚΠΔ. Τηρήστε ωστόσο εσωτερικό αρχείο.", "pre.verdict.norisk": "Παραβίαση δεδομένων προσωπικού χαρακτήρα χωρίς πιθανό κίνδυνο: η γνωστοποίηση προς την εποπτική αρχή ενδέχεται να μην απαιτείται, αλλά οφείλετε να την καταγράψετε (άρθρο 33 παρ. 5).", "pre.verdict.notify_dpa": "Πιθανώς υπόκειται σε γνωστοποίηση προς την εποπτική αρχή εντός 72 ωρών (άρθρο 33).", "pre.verdict.notify_subjects": "Υψηλός κίνδυνος: ανακοινώστε επίσης στα θιγόμενα φυσικά πρόσωπα χωρίς αδικαιολόγητη καθυστέρηση (άρθρο 34), εκτός εάν ισχύει εξαίρεση του άρθρου 34 παρ. 3.", "enisa.title": "Αξιολόγηση σοβαρότητας ENISA", "enisa.intro": "Υπολογίζει SE = DPC x EI + CB και τη ζώνη σοβαρότητας. Μια αναπαραγώγιμη βαθμολογία για την απάντηση στο πεδίο του υποδείγματος 'περιγράψτε τη μεθοδολογία που χρησιμοποιήθηκε'.", "enisa.dpc": "Πλαίσιο επεξεργασίας δεδομένων (DPC)", "enisa.ei": "Ευκολία ταυτοποίησης (EI)", "enisa.cb": "Περιστάσεις της παραβίασης (CB)", "enisa.result": "Βαθμολογία σοβαρότητας (SE)", "enisa.band": "Ζώνη σοβαρότητας", "enisa.trigger_on": "SE >= 2: ενεργοποιήθηκε η διαδρομή αξιολόγησης / γνωστοποίησης.", "enisa.trigger_off": "SE < 2 (χαμηλή): η γνωστοποίηση προς την αρχή γενικά δεν απαιτείται, αλλά καταγράψτε την παραβίαση.", "enisa.prefill": "Χρησιμοποιήστε αυτή τη βαθμολογία για την προσυμπλήρωση της γνωστοποίησης EDPB", "form.title": "Γνωστοποίηση EDPB", "form.intro": "Το πλήρες υπόδειγμα EDPB, προσυμπληρωμένο με βάση την προκαταρκτική αξιολόγησή σας και τη βαθμολογία ENISA. Τα υπό όρους πεδία εμφανίζονται ανάλογα με τις απαντήσεις σας.", "form.export_json": "Εξαγωγή JSON (φορτίο API)", "form.export_note": "Το εξαγόμενο αρχείο JSON επικυρώνεται έναντι του ανοικτού σχήματος γνωστοποίησης παραβιάσεων και μπορεί να υποβληθεί μέσω του ανοικτού API από το σύστημα διαχείρισής σας.", "form.required": "υποχρεωτικό", "form.gdpr": "ΓΚΠΔ", "record.title": "Αρχείο παραβιάσεων (λογοδοσία)", "record.intro": "Μητρώο ΟΛΩΝ των παραβιάσεων, συμπεριλαμβανομένων εκείνων που δεν υπόκεινται σε γνωστοποίηση, εμπνευσμένο από την καναδική υποχρέωση τήρησης αρχείων PIPEDA και το άρθρο 33 παρ. 5 του ΓΚΠΔ. Αποθηκεύεται τοπικά στο πρόγραμμα περιήγησής σας.", "record.add": "Αποθήκευση της τρέχουσας παραβίασης στο αρχείο", "record.empty": "Δεν έχουν καταγραφεί ακόμη παραβιάσεις.", "record.export": "Εξαγωγή αρχείου (JSON)", "common.yes": "Ναι", "common.no": "Όχι", "common.unknown": "Άγνωστο", "common.next": "Επόμενο", "common.back": "Πίσω"}, "es": {"_meta": {"lang": "es", "name": "Español", "status": "complete", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Asistente de notificación de violaciones del CEPD", "app.subtitle": "Herramienta offline, basada en la privacidad desde el diseño, para el triaje de violaciones de la seguridad de los datos personales, la puntuación de gravedad de ENISA y la preparación de notificaciones al CEPD", "app.disclaimer": "Borrador basado en la plantilla del CEPD v1.0 (consulta pública hasta el 5 de agosto de 2026). Se ejecuta íntegramente en su navegador - ningún dato sale de su dispositivo. No es un canal oficial de presentación; no lo utilice para notificaciones reales a una autoridad de control hasta que las autoridades implementen la plantilla.", "nav.preassessment": "1. Evaluación previa", "nav.severity": "2. Gravedad ENISA", "nav.notification": "3. Notificación al CEPD", "nav.record": "4. Registro de violaciones", "lang.label": "Idioma", "lang.incomplete": "(traducción provisional - se recurre al inglés)", "pre.title": ": "No, la investigación sigue en curso", "f.97.opt.d": "No, no se comunicará puesto que es improbable que la violación de la seguridad de los datos personales entrañe un alto riesgo para los derechos y libertades de las personas físicas", "f.97.opt.e": "No, no se comunicará puesto que se cumple una de las condiciones a que se refiere el artículo 34, apartado 3, del RGPD", "f.98.label": "Fecha en que se facilitó la información a los interesados", "f.98.tip": "Indique aquí la fecha en que comenzó a informar a los interesados.", "f.99.label": "Fecha futura en que se comunicará la violación de datos a los interesados", "f.100.label": "Información adicional sobre las condiciones a que se refiere el artículo 34, apartado 3, del RGPD que se cumplen", "f.100.opt.a": "El responsable del tratamiento ha adoptado medidas de protección técnicas y organizativas apropiadas y estas se han aplicado a los datos personales afectados por la violación de la seguridad de los datos personales, en particular aquellas que hagan ininteligibles los datos personales para cualquier persona que no esté autorizada a acceder a ellos, como el cifrado.", "f.100.opt.b": "El responsable del tratamiento ha tomado medidas ulteriores que garantizan que ya no exista la probabilidad de que se concretice el alto riesgo para los derechos y libertades de los interesados a que se refiere el apartado 1.", "f.100.opt.c": "Supondría un esfuerzo desproporcionado. En tal caso, se optará en su lugar por una comunicación pública o una medida semejante mediante la que se informe de manera igualmente efectiva a los interesados.", "f.101.label": "Descripción adicional de por qué se cumplen las condiciones a que se refiere el artículo 34, apartado 3, del RGPD y de las medidas adoptadas", "f.102.label": "Número de interesados informados", "f.102.opt.a": "Se ha informado a todos los interesados", "f.102.opt.b": "No se ha informado a todos los interesados", "f.103.label": "Descripción adicional de por qué no se ha informado a todos los interesados", "f.103.tip": "Especifique el motivo por el que no se ha informado a algunos interesados; por ejemplo, algunos pueden no haber sido informados por el motivo A, otros por el motivo B, etc.\n\nLos motivos pueden ser de diversa índole y no deben considerarse únicamente los de carácter técnico: proceso en curso, algunos interesados no pueden ser contactados de la misma manera, se les aplican leyes adicionales, el coste de la información es mucho mayor, etc.", "f.104.label": "Medios de comunicación utilizados para informar al interesado", "f.104.opt.a": "Comunicación individual (carta/correo electrónico/comunicación personal)", "f.104.opt.b": "Anuncio público (sitio web/comunicado de prensa/red social)", "f.104.opt.c": "Otro", "f.105.label": "Descripción adicional de los otros medios de comunicación", "f.106.label": "Contenido de la información facilitada a los interesados", "f.106.tip": "Facilite este contenido de la forma más pertinente. Por ejemplo, si la información facilitada es solo un correo electrónico con texto sin formato, basta con copiar el texto aquí. Si, por ejemplo, su información contiene imágenes/vídeos útiles para su comprensión, facilite los medios para que la autoridad de protección de datos pueda consultarla (página web, capturas de pantalla del correo electrónico, página de descarga, etc.).", "f.109.label": "¿Se ha denunciado el incidente a la policía o a las autoridades judiciales como infracción penal?", "f.109.opt.a": "Sí", "f.109.opt.b": "No", "f.109.opt.c": "Desconocido", "f.110.label": "¿Se ha notificado el incidente a otras autoridades de control u organismos de control en virtud de otra legislación pertinente? (p. ej. centro nacional de ciberseguridad, etc.)", "f.110.opt.a": "Sí", "f.110.opt.b": "No", "f.110.opt.c": "Desconocido", "f.111.label": "Información adicional sobre la notificación a otras autoridades u organismos", "f.111.tip": "Especifique de qué autoridad se trata (relativa a protección de datos o no) y, tifica ningún uso ilícito", "enisa.cb.integrity.lvl1": "Datos alterados, recuperación posible", "enisa.cb.integrity.lvl2": "Datos alterados, recuperación imposible", "enisa.cb.availability.label": "Pérdida de disponibilidad", "enisa.cb.availability.lvl0": "Datos recuperables sin dificultad", "enisa.cb.availability.lvl1": "Indisponibilidad parcial / temporal", "enisa.cb.availability.lvl2": "Indisponibilidad total, no recuperable", "enisa.cb.malicious": "Intención maliciosa", "enisa.band.low": "Bajo", "enisa.band.low.meaning": "Las personas no se verán afectadas o podrán encontrar algunos inconvenientes.", "enisa.band.medium": "Medio", "enisa.band.medium.meaning": "Las personas pueden encontrar inconvenientes significativos, que podrán superar a pesar de algunas dificultades.", "enisa.band.high": "Alto", "enisa.band.high.meaning": "Las personas pueden encontrar consecuencias significativas, que deberían poder superar aunque con serias dificultades.", "enisa.band.very_high": "Muy alto", "enisa.band.very_high.meaning": "Las personas pueden encontrar consecuencias significativas, o incluso irreversibles, que tal vez no puedan superar.", "enisa.mit.single_subject": "Un único interesado / volumen muy bajo", "enisa.mit.recipient_confirms_deletion": "El destinatario erróneo confirma la eliminación de los datos", "enisa.mit.weak_linkage": "Nombre común / homonimia / vinculación débil", "enisa.mit.strong_encryption": "Cifrado fuerte / datos ininteligibles para el destinatario", "enisa.mit.pseudonymisation_no_key": "Seudonimización sin clave accesible", "enisa.mit.professional_secrecy": "Destinatario sujeto a secreto profesional / confidencialidad legal", "enisa.mit.availability_restored": "Disponibilidad restablecida rápidamente a partir de copia de seguridad (interrupción breve)", "enisa.mit.public_low_criticality": "Datos ya públicos / baja criticidad", "enisa.mit.note": "Circunstancias atenuantes que reducen la puntuación. Conforme al principio de responsabilidad proactiva (art. 5), estas son sugerencias EDITABLES, no un ajuste impuesto de caja negra: cada interruptor mueve la variable indicada en la dirección indicada; el responsable del tratamiento puede modificarlo. Los incrementos numéricos exactos son los predeterminados de ENISA y están pendientes de confirmación con el PDF de ENISA 2013.", "enisa.provenance": "SE < 2 = Bajo es textual del texto del documento de ENISA. Los límites superiores (Medio 2-<3, Alto 3-<4, Muy alto >=4) son los niveles de ENISA estándar y universalmente citados, pero no se extrajeron textualmente de la capa de texto de este PDF; trátense como «niveles consolidados estándar de ENISA».", "rk.circumstances_cause": "Circunstancias y causa de la violación (si se conocen)", "rk.date_or_period": "Fecha o período de la violación (o aproximación)", "rk.personal_information": "Descripción de la información personal afectada (en la medida en que se conozca)", "rk.number_affected": "Número de personas afectadas (o aproximación)", "rk.mitigation_steps": "Medidas adoptadas para reducir/mitigar el riesgo de daño", "rk.notification_steps": "Medidas adoptadas o previstas para notificar a las personas afectadas (cuando proceda)", "rk.retention_note": "Mínimo 24 meses a partir del día en que la organización determina que se produjo la violación (SOR/2018-64).", "help.dpc": "Contexto del tratamiento de datos: lo crítico que son los datos. 1 simples, 2 de comportamiento, 3 financieros, 4 sensibles (categorías especiales).", "help.ei": "Facilidad de identificación: con qué facilidad los datos identifican a una persona (multiplica el DPC). 0,25 insignificante a 1 máxima.", "help.cb": "Circunstancias de la violación: puntos añadidos por la pérdida de confidencialidad, integridad y disponibilidad (cada una 0 / +0,25 / +0,5) y por la intención maliciosa (+0,5).", "enisa.mititle": "Factores atenuantes", "enisa.cbtitle_mal": "Intención maliciosa", "btn.export_csv": "Exportar CSV", "btn.export_xls": "Exportar XLS", "btn.export_aggregate": "Exportar estadísticas agregadas (anonimizadas)", "record.retention_prefix": "Conservación", "record.aggregate_note": "Exportación agregada: recuentos anonimizados por taxonomía, k-anonimato", "obl.title": "Sus obligaciones para esta violación", "obl.intro": "Orientación indicativa generada a partir de los datos que ha introducido.", "obl.badge.required": "Obligatorio", "obl.badge.notreq": "No obligatorio", "obl.badge.assess": "Por evaluar", "obl.auth.title": "Notificar a la autoridad de control", "obl.auth.required": "Obligatorio salvo que sea improbable que la violación entrañe un riesgo para los derechos y libertades de las personas físicas (art. 33, apdo. 1). Plazo: sin dilación indebida y, de ser posible, a más tardar 72 horas después de que haya tenido constancia de ella.", "obl.auth.notreq": "No obligatorio solo si es improbable que la violación entrañe un riesgo para los derechos y libertades (art. 33, apdo. 1). Documente el razonamiento (art. 33, apdo. 5).", "obl.auth.assess": "Evalúe si es probable que la violación entrañe un riesgo. La puntuación de gravedad de ENISA informa esta evaluación, pero no determina por sí sola la obligación legal.", "obl.subj.title": "Comunicar a las personas afectadas", "obl.subj.text": "Obligatorio solo si es probable que la violación entrañe un ALTO riesgo para los derechos y libertades (art. 34, apdo. 1), sin dilación indebida. Excepciones (art. 34, apdo. 3): (a) datos ininteligibles, p. ej. cifrado fuerte; (b) medidas ulteriores que hacen que el alto riesgo ya no sea probable; (c) esfuerzo desproporcionado -> comunicación pública en su lugar.", "obl.doc.title": "Documentar la violación internamente", "obl.doc.text": "Siempre obligatorio, para TODAS las violaciones, incluidas las no notificadas (art. 33, apdo. 5). El RGPD no fija ningún período de conservación; se recomienda un mínimo de 24 meses sobre el modelo canadiense (PIPEDA, SOR/2018-64), tal como se propone en el documento de posición (parte III.5).", "obl.disclaimer": "Esta es una orientación indicativa generada a partir de los datos que ha introducido; no constituye asesoramiento jurídico y no sustituye la evaluación caso por caso del responsable del tratamiento con arreglo a los artículos 33 y 34 del RGPD. El responsable del tratamiento sigue siendo responsable de la determinación y de los valores declarados (responsabilidad proactiva, art. 5, apdo. 2).", "enisa.select_prompt": "Seleccione DPC y EI para calcular la gravedad.", "common.option_dash": "--", "mit.off": "Desactivado", "mit.apply": "Aplicar", "common.step": "Paso", "record.aggregate_note2": "(celdas pequeñas suprimidas). Sin filas de notificación individual, sin identidad del responsable del tratamiento.", "form.methodology_prefix": "Metodología de gravedad de ENISA: SE = DPC x EI + CB = "}, "et": {"_meta": {"lang": "et", "name": "Eesti", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB rikkumisest teavitamise assistent", "app.subtitle": "Vorguvaba, lojimuga sisseehitatud andmekaitset pakkuv tooriist isikuandmetega seotud rikkumiste triaaziks, ENISA raskusastme hindamiseks ja EDPB teavituse ettevalmistamiseks", "app.disclaimer": "Kavand pohineb EDPB nailisel v1.0 (avalik konsultatsioon kuni 5. august 2026). Tootab taielikult teie brauseris - ukski andmed ei lahku teie seadmest. Ei ole ametlik esitamiskanal; arge kasutage tegelikeks teavitusteks jarelevalveasutusele enne, kui asutused nailise kasutusele votavad.", "nav.preassessment": "1. Eelhindamine", "nav.severity": "2. ENISA raskusaste", "nav.notification": "3. EDPB teavitus", "nav.record": "4. Rikkumiste register", "lang.label": "Keel", "lang.incomplete": "(tolke kavand - ingliskeelne varuvariant)", "pre.title": "Eelhindamine (triaaz)", "pre.intro": "Kiire triaaz, mille inspiratsiooniks on ICO enesehindamine, et otsustada, kas tegemist on teavitamiskohustusliku isikuandmetega seotud rikkumisega enne taieliku nailise taitmist.", "pre.q_isbreach": "Kas tegemist on turvanouete rikkumisega, mis pohjustab edastatavate, salvestatavate voi muul viisil tooeldavate isikuandmete juhuslikku voi ebaseaduslikku havitamist, kaotsiminekut, muutmist, loata avalikustamist voi neile juurdepaasu?", "pre.q_personaldata": "Kas rikkumine hoolmab isikuandmeid (tuvastatud voi tuvastatava isikuga seotud teavet)?", "pre.q_risk": "Kas rikkumine tooenaoliselt seab ohtu fuusiliste isikute oigused ja vabadused?", "pre.q_highrisk": "Kas rikkumine tooenaoliselt pohjustab fuusilistele isikutele SUURT ohtu?", "pre.verdict.notbreach": "See ei tundu olevat isikuandmetega seotud rikkumine isikuandmete kaitse uldmaaruse tahenduses. Pidage siiski sisemist registrit.", "pre.verdict.norisk": "Isikuandmetega seotud rikkumine ilma tooenaolise ohuta: jarelevalveasutusele teavitamine ei pruugi olla nouutav, kuid peate selle registreerima (art 33 lg 5).", "pre.verdict.notify_dpa": "Tooenaoliselt teavitamiskohustuslik jarelevalveasutusele 72 tunni jooksul (art 33).", "pre.verdict.notify_subjects": "Suur oht: teavitage pohjendamatu viivituseta ka asjaomaseid fuusilisi isikuid (art 34), valja arvatud juhul, kui kohaldub art 34 lg 3 erand.", "enisa.title": "ENISA raskusastme hindamine", "enisa.intro": "Arvutab SE = DPC x EI + CB ja raskusastme vahemiku. Korratav skoor nailise valja 'kirjeldage kasutatud metoodikat' taitmiseks.", "enisa.dpc": "Andmetootluse kontekst (DPC)", "enisa.ei": "Tuvastamise lihtsus (EI)", "enisa.cb": "Rikkumise asjaolud (CB)", "enisa.result": "Raskusastme skoor (SE)", "enisa.band": "Raskusastme vahemik", "enisa.trigger_on": "SE >= 2: hindamis- / teavitamistee aktiveeritud.", "enisa.trigger_off": "SE < 2 (Madal): asutusele teavitamine ei ole uldjuhul nouutav, kuid registreerige rikkumine.", "enisa.prefill": "Kasutage seda skoori EDPB teavituse eeltaitmiseks", "form.title": "EDPB teavitus", "form.intro": "Taielik EDPB nailis, mis on eeltaidetud teie triage)", "pre.intro": "Nopea triage, joka pohjautuu ICO:n itsearviointiin, sen ratkaisemiseksi, onko kyseessa ilmoitettava henkilotietojen tietoturvaloukkaus ennen koko mallin tayttamista.", "pre.q_isbreach": "Onko kyseessa tietoturvaloukkaus, joka johtaa henkilotietojen vahingossa tapahtuvaan tai lainvastaiseen tuhoamiseen, hakvioon, muuttamiseen, luvattomaan luovuttamiseen tai paasyyn niihin?", "pre.q_personaldata": "Liittyyko loukkaukseen henkilotietoja (tunnistettuun tai tunnistettavissa olevaan henkiloon liittyvia tietoja)?", "pre.q_risk": "Aiheutuuko loukkauksesta todennakoisesti riski luonnollisten henkiloiden oikeuksille ja vapauksille?", "pre.q_highrisk": "Aiheutuuko loukkauksesta todennakoisesti KORKEA riski luonnollisille henkiloille?", "pre.verdict.notbreach": "Tama ei nayta olevan GDPR:n mukainen henkilotietojen tietoturvaloukkaus. Pida silti sisainen seloste.", "pre.verdict.norisk": "Henkilotietojen tietoturvaloukkaus ilman todennakoista riskia: ilmoitusta valvontaviranomaiselle ei valttamatta vaadita, mutta sinun on dokumentoitava se (33 artiklan 5 kohta).", "pre.verdict.notify_dpa": "Todennakoisesti ilmoitettava valvontaviranomaiselle 72 tunnin kuluessa (33 artikla).", "pre.verdict.notify_subjects": "Korkea riski: ilmoita myos asianomaisille luonnollisille henkiloille ilman aiheetonta viivytysta (34 artikla), ellei 34 artiklan 3 kohdan mukaista poikkeusta sovelleta.", "enisa.title": "ENISA-vakavuusarviointi", "enisa.intro": "Laskee SE = DPC x EI + CB ja vakavuusluokan. Toistettavissa oleva pistemaara mallin kentan 'kuvaile kaytetty menetelma' vastaamiseen.", "enisa.dpc": "Tietojenkasittelyn konteksti (DPC)", "enisa.ei": "Tunnistamisen helppous (EI)", "enisa.cb": "Loukkauksen olosuhteet (CB)", "enisa.result": "Vakavuuspistemaara (SE)", "enisa.band": "Vakavuusluokka", "enisa.trigger_on": "SE >= 2: arviointi-/ilmoituspolku aktivoitu.", "enisa.trigger_off": "SE < 2 (Matala): ilmoitusta viranomaiselle ei yleensa vaadita, mutta dokumentoi loukkaus.", "enisa.prefill": "Kayta tata pistemaaraa EDPB-ilmoituksen esitaytossa", "form.title": "EDPB-ilmoitus", "form.intro": "Koko EDPB-malli, esitaytettyna esiarviointisi ja ENISA-pistemaarasi perusteella. Ehdolliset kentat tulevat nakyviin vastaustesi mukaan.", "form.export_json": "Vie JSON (API-data)", "form.export_note": "Viety JSON validoidaan avointa tietoturvaloukkausilmoituksen skeemaa vasten, ja hallintajarjestelmasi voi lahettaa sen avoimen API:n kautta.", "form.required": "pakollinen", "form.gdpr": "GDPR", "record.title": "Loukkausseloste (osoitusvelvollisuus)", "record.intro": "Rekisteri KAIKISTA loukkauksista, mukaan lukien ei-ilmoitettavat, joka pohjautuu Kanadan PIPEDA-selostevelvoitteeseen ja GDPR:n 33 artiklan 5 kohtaan. Tallennetaan paikallisesti selaimeesi.", "record.add": "Tallenna nykyinen loukkaus selosteeseen", "record.empty": "Loukkauksia ei ole viela kirjattu.", "record.export": "Vie seloste (JSON)", "common.yes": "Kylla", "common.no": "Ei", "common.unknown": "Tuntematon", "common.next": "Seuraava", "common.back": "Takaisin"}, "fr": {"_meta": {"lang": "fr", "name": "Français", "status": "complete", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Assistant de notification de violation EDPB", "app.subtitle": "Outil hors ligne, conçu selon le principe de protection des données dès la conception, pour le tri des violations de données à caractère personnel, le calcul de la gravité ENISA et la préparation des notifications EDPB", "app.disclaimer": "Projet fondé sur le modèle EDPB v1.0 (consultation publique jusqu'au 5 août 2026). Fonctionne entièrement dans votre navigateur - aucune donnée ne quitte votre appareil. Ne constitue pas un canal de transmission officiel ; ne pas utiliser pour des notifications réelles à une autorité de contrôle tant que les autorités n'ont pas mis en œuvre le modèle.", "nav.preassessment": "1. Évaluation préalable", "nav.severity": "2. Gravité ENISA", "nav.notification": "3. Notification EDPB", "nav.record": "4. Registre des violations", "lang.label": "Langue", "lang.incomplete": "(traduction provisoire - repli sur l'anglais)", "pre.title": "Évaluation préalable (tri)", "pre.intro": "Tri rapide, inspiré de l'auto-évaluation de l'ICO, pour déterminer s'il s'agit d'une violation de données à caractère personnel à notifier avant de remplir le modèle complet.", "pre.q_isbreach": "S'agit-il d'une violation de la sécurité entraînant, de manière accidentelle ou illicite, la destruction, la perte, l'altération, la divulgation non autorisée de données à caractère personnel ou l'accès non autorisé à de telles données ?", "pre.q_personaldata": "La violation concerne-t-elle des données à caractère personnel (informations se rapportant à une personne identifiée ou identifiable) ?", "pre.q_risk": "La violation est-elle susceptible d'engendrer un risque pour les droits et libertés des personnes physiques ?", "pre.q_highrisk": "La violation est-elle susceptible d'engendrer un risque ÉLEVÉ pour les personnes physiques ?", "pre.verdict.notbreach": "Il ne semble pas s'agir d'une violation de données à caractère personnel au sens du RGPD. Conservez néanmoins une trace interne.", "pre.verdict.norisk": "Violation de données à caractère personnel sans risque probable : la notification à l'autorité de contrôle peut ne pas être requise, mais vous devez la documenter (art. 33, par. 5).", "pre.verdict.notify_dpa": "Probablement à notifier à l'autorité de contrôle dans un délai de 72 heures (art. 33).", "pre.verdict.notify_subjects": "Risque élevé : communiquez également la violation aux personnes physiques concernées dans les meilleurs délais (art. 34), sauf si une exemption au titre de l'art. 34, par. 3 s'applique.", "enisa.title": "Évaluation de la gravité ENISA", "enisa.intro": "Calcule SE = DPC x EI + CB et le niveau de gravité. Un score reproductible pour répondre au champ du modèle 'décrire la méthodologie utilisée'.", "enisa.dpc": "Contexte du traitement des données (DPC)", "enisa.ei": "Facilité d'identification (EI)", "enisa.cb": "Circonstances de la violation (CB)", "enisa.result": "Score de gravité (SE)", "enisa.band": "Niveau de gravité", "enisa.trigger_on": "SE >= 2 : parcours d'évaluation / notification activé.", "enisa.trigger_off": "SE < 2 (faible) : la notification à l'autorité n'est généralement pas requise, mais documentez la violation.", "enisa.prefill": "Utiliser ce score pour préremplir la notification EDPB", "form.title": "Notification EDPB", "form.intro": "Le modèle EDPB complet, prérempli à partir de votre évaluation préalable et de votre score ENISA. Les champs conditionnels apparaissent en fonction de vos réponses.", "form.export_json": "Exporter le JSON (charge utile API)", "form.export_note": "Le JSON exporté est conforme au schéma ouvert de notification des violations et peut être transmis via l'API ouverte par votre système de gestion.", "form.required": "obligatoire", "form.gdpr": "RGPD", "record.title": "Registre des violations (responsabilité)", "record.intro": "Un registre de TOUTES les violations, y compris celles non soumises à notification, inspiré de l'obligation de conservation des registres de la loi canadienne PIPEDA et de l'art. 33, par. 5 du RGPD. Stocké localement dans votre navigateur.", "record.add": "Enregistrer la violation actuelle dans le registre", "record.empty": "Aucune violation enregistrée pour le moment.", "record.export": "Exporter le registre (JSON)", "common.yes": "Oui", "common.no": "Non", "common.unknown": "Inconnu", "common.next": "Suivant", "common.back": "Précédent", "f.3.label": "Type de notification", "f.3.tip": "Indiquez ici si vous notifiez une nouvelle violation de données ou si vous modifiez une notification antérieure", "f.3.opt.a": "Nouvelle notification", "f.3.opt.b": "Notification de suivi", "f.4.label": "Sous-type de notification", "f.4.tip": "Indiquez ici si vous fournissez une notificati  sera communiquée aux personnes concernées", "f.100.label": "Informations complémentaires sur les conditions visées à l'article 34(3) du GDPR qui sont remplies", "f.100.opt.a": "Le responsable du traitement a mis en œuvre les mesures de protection techniques et organisationnelles appropriées et ces mesures ont été appliquées aux données à caractère personnel affectées par la violation de données à caractère personnel, en particulier les mesures qui rendent les données à caractère personnel incompréhensibles pour toute personne qui n'est pas autorisée à y accéder, telles que le chiffrement.", "f.100.opt.b": "Le responsable du traitement a pris des mesures ultérieures qui garantissent que le risque élevé pour les droits et libertés des personnes concernées visé au paragraphe 1 n'est plus susceptible de se matérialiser.", "f.100.opt.c": "Cela exigerait des efforts disproportionnés. Dans ce cas, il est plutôt procédé à une communication publique ou à une mesure similaire permettant aux personnes concernées d'être informées de manière tout aussi efficace.", "f.101.label": "Description complémentaire des raisons pour lesquelles les conditions visées à l'article 34(3) du GDPR sont remplies et des mesures prises", "f.102.label": "Nombre de personnes concernées informées", "f.102.opt.a": "Toutes les personnes concernées ont été informées", "f.102.opt.b": "Toutes les personnes concernées n'ont pas été informées", "f.103.label": "Description complémentaire des raisons pour lesquelles toutes les personnes concernées n'ont pas été informées", "f.103.tip": "Veuillez préciser la raison pour laquelle certaines personnes concernées n'ont pas été informées, par ex. certaines pour la raison A, d'autres pour la raison B, etc.\n\nLes raisons peuvent être de diverses natures et il ne faut pas tenir compte uniquement des raisons techniques : processus en cours, certaines personnes concernées ne peuvent pas être jointes de la même manière, des lois supplémentaires leur sont applicables, le coût de l'information est bien plus élevé, etc.", "f.104.label": "Moyens de communication utilisés pour informer la personne concernée", "f.104.opt.a": "Communication individuelle (lettre/courriel/communication personnelle)", "f.104.opt.b": "Annonce publique (site web/communiqué de presse/réseau social)", "f.104.opt.c": "Autre", "f.105.label": "Description complémentaire des autres moyens de communication", "f.106.label": "Contenu de l'information fournie aux personnes concernées", "f.106.tip": "Veuillez fournir ce contenu de la manière la plus pertinente. Par exemple, si l'information fournie n'est qu'un courriel en texte brut, copier le texte ici est suffisant. Si, par exemple, votre information contient des images/vidéos utiles à la compréhension, veuillez fournir à l'autorité de protection des données les moyens de la consulter (page web, captures d'écran de courriels, page de téléchargement, etc.).", "f.109.label": "L'incident a-t-il été signalé à la police / aux autorités judiciaires en tant qu'infraction pénale ?", "f.109.opt.a": "Oui", "f.109.opt.b": "Non", "f.109.opt.c": "Inconnu", "f.110.label": "L'incident a-t-il été notifié à d'autres autorités de contrôle ou organes de contrôle au titre d'une autre législation pertinente ? (par ex. centre national de cybersécurité, etc.)", "f.110.opt.a": "Oui", "f.110.opt.b": "Non", "f.110.opt.c": "Inconnu", "f.111.label": "Informations complémentaires sur la notification à d'autres autorités ou organes", "f.111.tip": "Veuillez préciser de quelle autorité il s'agit (en matière de protection des données ou non) et, si possible, fournir l'identifiant du dossier utilisé par cette autorité et auquel il peut être fait référence.", "f.113.label": "La violation de données à caractère personnel concerne-t-elle un traitement transfrontalier effectué par un responsable du traitement établi dans l'Espace économique européen (EEE) ?", "f.113.opt.a": "Oui", "f.113.opt.b": "Non", "f.113.opt.c": "Inconnu", "f.114.label": "L'autorité
