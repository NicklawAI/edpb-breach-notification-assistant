ables sans difficulté", "enisa.cb.availability.lvl1": "Indisponibilité partielle / temporaire", "enisa.cb.availability.lvl2": "Indisponibilité totale, non récupérable", "enisa.cb.malicious": "Intention malveillante", "enisa.band.low": "Faible", "enisa.band.low.meaning": "Les personnes ne seront pas affectées ou pourront rencontrer quelques désagréments.", "enisa.band.medium": "Moyen", "enisa.band.medium.meaning": "Les personnes peuvent rencontrer des désagréments importants, qu'elles pourront surmonter malgré quelques difficultés.", "enisa.band.high": "Élevé", "enisa.band.high.meaning": "Les personnes peuvent rencontrer des conséquences importantes, qu'elles devraient pouvoir surmonter, mais au prix de sérieuses difficultés.", "enisa.band.very_high": "Très élevé", "enisa.band.very_high.meaning": "Les personnes peuvent rencontrer des conséquences importantes, voire irréversibles, qu'elles pourraient ne pas surmonter.", "enisa.mit.single_subject": "Personne concernée unique / volume très faible", "enisa.mit.recipient_confirms_deletion": "Le mauvais destinataire confirme la suppression des données", "enisa.mit.weak_linkage": "Nom courant / homonymie / faible corrélation", "enisa.mit.strong_encryption": "Chiffrement fort / données incompréhensibles pour le destinataire", "enisa.mit.pseudonymisation_no_key": "Pseudonymisation sans clé accessible", "enisa.mit.professional_secrecy": "Destinataire tenu par le secret professionnel / une obligation légale de confidentialité", "enisa.mit.availability_restored": "Disponibilité rapidement rétablie à partir d'une sauvegarde (interruption courte)", "enisa.mit.public_low_criticality": "Données déjà publiques / faible criticité", "enisa.mit.note": "Circonstances atténuantes qui réduisent le score. Conformément au principe de responsabilité (art. 5), il s'agit de suggestions MODIFIABLES, et non d'un ajustement de type boîte noire imposé : chaque commutateur déplace la variable indiquée dans le sens indiqué ; le responsable du traitement peut passer outre. Les pas numériques exacts sont les valeurs par défaut de l'ENISA et restent à confirmer par rapport au PDF ENISA 2013.", "enisa.provenance": "SE < 2 = Faible est repris textuellement du texte du document ENISA. Les seuils supérieurs (Moyen 2-<3, Élevé 3-<4, Très élevé >=4) sont les niveaux ENISA standard, universellement cités, mais n'ont pas été extraits textuellement de la couche de texte de ce PDF ; à considérer comme des « niveaux ENISA standard consolidés ».", "rk.circumstances_cause": "Circonstances et cause de la violation (si connues)", "rk.date_or_period": "Date ou période de la violation (ou approximation)", "rk.personal_information": "Description des renseignements personnels concernés (dans la mesure du connu)", "rk.number_affected": "Nombre de personnes touchées (ou approximation)", "rk.mitigation_steps": "Mesures prises pour réduire/atténuer le risque de préjudice", "rk.notification_steps": "Mesures prises ou prévues pour informer les personnes touchées (le cas échéant)", "rk.retention_note": "Au minimum 24 mois après le jour où l'organisation détermine que la violation s'est produite (SOR/2018-64).", "help.dpc": "Contexte de traitement des données : caractère critique des données. 1 simples, 2 comportementales, 3 financières, 4 sensibles (catégories particulières).", "help.ei": "Facilité d'identification : facilité avec laquelle les données identifient une personne (multiplie le DPC). 0,25 négligeable à 1 maximale.", "help.cb": "Circonstances de la violation : points ajoutés pour la perte de confidentialité, d'intégrité, de disponibilité (chacune 0 / +0,25 / +0,5) et l'intention malveillante (+0,5).", "enisa.mititle": "Facteurs atténuants", "enisa.cbtitle_mal": "Intention malveillante", "btn.export_csv": "Exporter CSV", "btn.export_xls": "Exporter XLS", "btn.export_aggregate": "Exporter les statistiques agrégées (anonymisées)", "record.retention_prefix": "Conservation", "record.aggregate_note": "Export agrégé : décomptes anonymisés par taxonomie, k-anonymat", "obl.title": "Vos obligations pour cette violation", "obl.intro": "Orientations indicatives générées à partir des données que vous avez saisies.", "obl.badge.required": "Requis", "obl.badge.notreq": "Non requis", "obl.badge.assess": "À évaluer", "obl.auth.title": "Notifier l'autorité de contrôle", "obl.auth.required": "Requis sauf si la violation n'est pas susceptible d'engendrer un risque pour les droits et libertés des personnes physiques (art. 33(1)). Délai : dans les meilleurs délais et, si possible, dans les 72 heures après en avoir pris connaissance.", "obl.auth.notreq": "Non requis uniquement si la violation n'est pas susceptible d'engendrer un risque pour les droits et libertés (art. 33(1)). Documentez le raisonnement (art. 33(5)).", "obl.auth.assess": "Évaluez si la violation est susceptible d'engendrer un risque. Le score de gravité ENISA éclaire cette évaluation mais ne détermine pas à lui seul l'obligation légale.", "obl.subj.title": "Communiquer aux personnes concernées affectées", "obl.subj.text": "Requis uniquement si la violation est susceptible d'engendrer un risque ÉLEVÉ pour les droits et libertés (art. 34(1)), dans les meilleurs délais. Exemptions (art. 34(3)) : (a) données incompréhensibles, par ex. chiffrement fort ; (b) mesures ultérieures rendant le risque élevé non susceptible de se matérialiser ; (c) efforts disproportionnés -> communication publique à la place.", "obl.doc.title": "Documenter la violation en interne", "obl.doc.text": "Toujours requis, pour TOUTES les violations, y compris celles non notifiées (art. 33(5)). Le GDPR ne fixe pas de durée de conservation ; un minimum de 24 mois est recommandé sur le modèle canadien (PIPEDA, SOR/2018-64), comme proposé dans le document de position (Partie III.5).", "obl.disclaimer": "Il s'agit d'orientations indicatives générées à partir des données que vous avez saisies ; elles ne constituent pas un conseil juridique et ne remplacent pas l'évaluation au cas par cas du responsable du traitement au titre des articles 33 et 34 du GDPR. Le responsable du traitement demeure responsable de la détermination et des valeurs déclarées (responsabilité, art. 5(2)).", "enisa.select_prompt": "Sélectionnez le DPC et le EI pour calculer la gravité.", "common.option_dash": "--", "mit.off": "Inactif", "mit.apply": "Appliquer", "common.step": "Étape", "record.aggregate_note2": "(petites cellules supprimées). Aucune ligne de notification individuelle, aucune identité du responsable du traitement.", "form.methodology_prefix": "Méthodologie de gravité ENISA : SE = DPC x EI + CB = "}, "ga": {"_meta": {"lang": "ga", "name": "Gaeilge", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Cúntóir Fógartha Sáruithe an EDPB", "app.subtitle": "Uirlis as líne, príobháideachas trí dhearadh, le haghaidh triáis sáruithe ar shonraí pearsanta, scórála déine ENISA agus ullmhúchán fógraí EDPB", "app.disclaimer": "Dréacht bunaithe ar theimpléad EDPB v1.0 (comhairliúchán poiblí go dtí an 5 Lúnasa 2026). Ritheann sé go hiomlán i do bhrabhsálaí - ní fhágann aon sonraí do ghléas. Ní cainéal oifigiúil aighneachta é; ná húsáid é le haghaidh fógraí beo chuig údarás maoirseachta go dtí go gcuirfidh na húdaráis an teimpléad i bhfeidhm.", "nav.preassessment": "1. Réamh-mheasúnú", "nav.severity": "2. Déine ENISA", "nav.notification": "3. Fógra EDPB", "nav.record": "4. Taifead sáruithe", "lang.label": "Teanga", "lang.incomplete": "(dréacht-aistriúchán - Béarla mar chúltaca)", "pre.title": "Réamh-mheasúnú (triáis)", "pre.intro": "Triáis thapa, spreagtha ag féinmheasúnú an ICO, chun a chinneadh an sárú ar shonraí pearsanta infhógartha é seo sula gcomhlánaítear an teimpléad iomlán.", "pre.q_isbreach": "An sárú slándála é seo as a dtagann scriosadh, cailliúint, athrú, nochtadh neamhúdaraithe sonraí pearsanta, nó rochtain orthu, go timpisteach nó go neamhdhleathach?", "pre.q_personaldata": "An mbaineann an sárú le sonraí pearsanta (faisnéis a bhaineann le duine nádúrtha sainaitheanta nó inaitheanta)?", "pre.q_risk": "An dócha go mbeidh riosca do chearta agus saoirsí daoine aonair mar thoradh ar an sárú?", "pre.q_highrisk": "An dócha go mbeidh riosca ARD do dhaoine aonair mar thoradh ar an sárú?", "pre.verdict.notbreach": "Ní cosúil gur sárú ar shonraí pearsanta é seo faoin RGCS. Coinnigh taifead inmheánach mar sin féin.", "pre.verdict.norisk": "Sárú ar shonraí pearsanta gan riosca dóchúil: b'fhéidir nach gá fógra a thabhairt don údarás maoirseachta, ach ní mór duit é a thaifeadadh (Airt. 33(5)).", "pre.verdict.notify_dpa": "Is dócha go mbeidh sé infhógartha don údarás maoirseachta laistigh de 72 uair an chloig (Airt. 33).", "pre.verdict.notify_subjects": "Riosca ard: cuir in iúl freisin do na daoine aonair lena mbaineann gan mhoill mhíchuí (Airt. 34), mura mbaineann díolúine faoi Airt. 34(3).", "enisa.title": "Measúnú déine ENISA", "enisa.intro": "Ríomhann sé SE = DPC x EI + CB agus an banda déine. Scór in-atáirgthe chun freagra a thabhairt ar réimse an teimpléid 'déan cur síos ar an modheolaíocht a úsáideadh'.", "enisa.dpc": "Comhthéacs Próiseála Sonraí (DPC)", "enisa.ei": "Éascaíocht Sainaitheanta (EI)", "enisa.cb": "Imthosca an tSáraithe (CB)", "enisa.result": "Scór déine (SE)", "enisa.band": "Banda déine", "enisa.trigger_on": "SE >= 2: gníomhachtaíodh an conair measúnaithe / fógartha.", "enisa.trigger_off": "SE < 2 (Íseal): go ginearálta ní gá fógra a thabhairt don údarás, ach taifead an sárú.", "enisa.prefill": "Úsáid an scór seo chun fógra an EDPB a réamhlíonadh", "form.title": "Fógra EDPB", "form.intro": "An teimpléad EDPB iomlán, réamhlíonta ó do réamh-mheasúnú agus scór ENISA. Taispeántar réimsí coinníollacha bunaithe ar do fhreagraí.", "form.export_json": "Easpórtáil JSON (pálasta API)", "form.export_note": "Bailíochtaíonn an JSON easpórtáilte i gcoinne na scéime oscailte fógartha sáruithe agus is féidir é a chur isteach tríd an API oscailte ag do chóras bainistíochta.", "form.required": "riachtanach", "form.gdpr": "RGCS", "record.title": "Taifead sáruithe (cuntasacht)", "record.intro": "Clár de na sáruithe GO LÉIR, lena n-áirítear cinn nach bhfuil infhógartha, spreagtha ag an oibleagáid choimeádta taifead PIPEDA Cheanada agus Airt. 33(5) den RGCS. Stóráilte go háitiúil i do bhrabhsálaí.", "record.add": "Sábháil an sárú reatha sa taifead", "record.empty": "Níl aon sárú taifeadta go fóill.", "record.export": "Easpórtáil an taifead (JSON)", "common.yes": "Tá", "common.no": "Níl", "common.unknown": "Anaithnid", "common.next": "Ar aghaidh", "common.back": "Siar"}, "hr": {"_meta": {"lang": "hr", "name": "Hrvatski", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB pomoćnik za izvješćivanje o povredi osobnih podataka", "app.subtitle": "Izvanmrežni alat osmišljen po načelu tehničke zaštite privatnosti za trijažu povreda osobnih podataka, ocjenu ozbiljnosti prema ENISA-i i pripremu EDPB izvješća", "app.disclaimer": "Nacrt na temelju EDPB predloška v1.0 (javno savjetovanje do 5. kolovoza 2026.). Radi u potpunosti u vašem pregledniku - nijedan podatak ne napušta vaš uređaj. Nije službeni kanal za podnošenje izvješća; nemojte koristiti za stvarna izvješća nadzornom tijelu dok tijela ne uvedu predložak.", "nav.preassessment": "1. Prethodna procjena", "nav.severity": "2. Ozbiljnost prema ENISA-i", "nav.notification": "3. EDPB izvješće", "nav.record": "4. Evidencija o povredi", "lang.label": "Jezik", "lang.incomplete": "(nacrt prijevoda - zamjena na engleskom)", "pre.title": "Prethodna procjena (trijaža)", "pre.intro": "Brza trijaža nadahnuta ICO-ovom samoprocjenom za odluku o tome je li riječ o povredi osobnih podataka koju treba prijaviti, prije ispunjavanja cjelovitog predloška.", "pre.q_isbreach": "Je li riječ o povredi sigurnosti koja dovodi do slučajnog ili nezakonitog uništenja, gubitka, izmjene, neovlaštenog otkrivanja ili pristupa osobnim podacima?", "pre.q_personaldata": "Uključuje li povreda osobne podatke (informacije koje se odnose na pojedinca čiji je identitet utvrđen ili se može utvrditi)?", "pre.q_risk": "Je li vjerojatno da će povreda prouzročiti rizik za prava i slobode pojedinaca?", "pre.q_highrisk": "Je li vjerojatno da će povreda prouzročiti VISOK rizik za pojedince?", "pre.verdict.notbreach": "Ne čini se da je riječ o povredi osobnih podataka prema GDPR-u. Ipak vodite internu evidenciju.", "pre.verdict.norisk": "Povreda osobnih podataka bez vjerojatnog rizika: izvješćivanje nadzornom tijelu možda nije potrebno, ali je morate evidentirati (čl. 33. st. 5.).", "pre.verdict.notify_dpa": "Vjerojatno je treba prijaviti nadzornom tijelu u roku od 72 sata (čl. 33.).", "pre.verdict.notify_subjects": "Visok rizik: bez nepotrebnog odgađanja obavijestite i pogođene pojedince (čl. 34.), osim ako se primjenjuje izuzeće iz čl. 34. st. 3.", "enisa.title": "Procjena ozbiljnosti prema ENISA-i", "enisa.intro": "Izračunava SE = DPC x EI + CB i razred ozbiljnosti. Ponovljiva ocjena za ispunjavanje polja predloška 'opišite primijenjenu metodologiju'.", "enisa.dpc": "Kontekst obrade podataka (DPC)", "enisa.ei": "Lakoća identifikacije (EI)", "enisa.cb": "Okolnosti povrede (CB)", "enisa.result": "Ocjena ozbiljnosti (SE)", "enisa.band": "Razred ozbiljnosti", "enisa.trigger_on": "SE >= 2: aktiviran put procjene / izvješćivanja.", "enisa.trigger_off": "SE < 2 (niska): izvješćivanje tijelu općenito nije potrebno, ali evidentirajte povredu.", "enisa.prefill": "Upotrijebi ovu ocjenu za predispunjavanje EDPB izvješća", "form.title": "EDPB izvješće", "form.intro": "Cjelovit EDPB predložak, predispunjen na temelju vaše prethodne procjene i ENISA ocjene. Uvjetna polja prikazuju se prema vašim odgovorima.", "form.export_json": "Izvezi JSON (API sadržaj)", "form.export_note": "Izvezeni JSON valjan je u odnosu na otvorenu shemu za izvješćivanje o povredama i vaš ga upravljački sustav može podnijeti putem otvorenog API-ja.", "form.required": "obvezno", "form.gdpr": "GDPR", "record.title": "Evidencija o povredi (pouzdanost)", "record.intro": "Registar SVIH povreda, uključujući one koje se ne prijavljuju, nadahnut kanadskom obvezom vođenja evidencije prema PIPEDA-i i čl. 33. st. 5. GDPR-a. Pohranjeno lokalno u vašem pregledniku.", "record.add": "Spremi trenutnu povredu u evidenciju", "record.empty": "Zasad nema evidentiranih povreda.", "record.export": "Izvezi evidenciju (JSON)", "common.yes": "Da", "common.no": "Ne", "common.unknown": "Nepoznato", "common.next": "Dalje", "common.back": "Natrag"}, "hu": {"_meta": {"lang": "hu", "name": "Magyar", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB adatvedelmi incidens bejelentesi asszisztens", "app.subtitle": "Offline, beepitett adatvedelmet biztosito eszkoz a szemelyes adatok megsertesevel jaro incidensek osztalyozasahoz, ENISA sulyossagi pontozasahoz es EDPB bejelentes elokeszitesehez", "app.disclaimer": "Az EDPB v1.0 sablon alapjan keszult tervezet (nyilvanos konzultacio 2026. augusztus 5-ig). Teljes egeszeben a bongeszojeben fut - semmilyen adat nem hagyja el a keszuleket. Nem hivatalos benyujtasi csatorna; ne hasznalja eles bejelentesekre a felugyeleti hatosag fele, amig a hatosagok be nem vezetik a sablont.", "nav.preassessment": "1. Elozetes ertekeles", "nav.severity": "2. ENISA sulyossag", "nav.notification": "3. EDPB bejelentes", "nav.record": "4. Incidensnyilvantartas", "lang.label": "Nyelv", "lang.incomplete": "(forditas tervezete - angol tartalek)", "pre.title": "Elozetes ertekeles (osztalyozas)", "pre.intro": "Gyors osztalyozas az ICO onertekeles altal inspiralva, annak eldontesere, hogy ez bejelentesi kotelezettseg ala eso, a szemelyes adatok megsertesevel jaro incidens-e, mielott kitolti a teljes sablont.", "pre.q_isbreach": "Ez olyan biztonsagi incidens, amely a tovabbitott, tarolt vagy mas modon kezelt szemelyes adatok veletlen vagy jogellenes megsemmisiteset, elvesziteset, megvaltoztatasat, jogosulatlan kozleset vagy az azokhoz valo jogosulatlan hozzaferest eredmenyezi?", "pre.q_personaldata": "Az incidens erint-e szemelyes adatokat (azonositott vagy azonosithato szemelyre vonatkozo informaciot)?", "pre.q_risk": "Az incidens valoszinusitheto-e, hogy kockazatot jelent a termeszetes szemelyek jogaira es szabadsagaira nezve?", "pre.q_highrisk": "Az incidens valoszinusitheto-e, hogy MAGAS kockazatot jelent a termeszetes szemelyekre nezve?", "pre.verdict.notbreach": "Ez nem tunik a szemelyes adatok megsertesevel jaro incidensnek a GDPR ertelmeben. Belso nyilvantartast ennek ellenere vezessen.", "pre.verdict.norisk": "A szemelyes adatok megsertesevel jaro incidens, amely valoszinusitheto kockazat nelkuli: a felugyeleti hatosagnak torteno bejelentes lehet, hogy nem szukseges, de nyilvantartast kell vezetnie rola (33. cikk (5) bekezdes).", "pre.verdict.notify_dpa": "Valoszinuleg bejelentesi kotelezettseg ala esik a felugyeleti hatosag fele 72 oran belul (33. cikk).", "pre.verdict.notify_subjects": "Magas kockazat: indokolatlan kesedelem nelkul tajekoztassa az erintett termeszetes szemelyeket is (34. cikk), kiveve, ha a 34. cikk (3) bekezdese szerinti kivetel alkalmazando.", "enisa.title": "ENISA sulyossagi ertekeles", "enisa.intro": "Kiszamitja az SE = DPC x EI + CB erteket es a sulyossagi savot. Reprodukalhato pontszam a sablon 'irja le az alkalmazott modszertant' mezojenek megvalaszolasahoz.", "enisa.dpc": "Adatkezelesi kontextus (DPC)", "enisa.ei": "Azonosithatosag konnyusege (EI)", "enisa.cb": "Az incidens korulmenyei (CB)", "enisa.result": "Sulyossagi pontszam (SE)", "enisa.band": "Sulyossagi sav", "enisa.trigger_on": "SE >= 2: ertekelesi / bejelentesi utvonal aktivalva.", "enisa.trigger_off": "SE < 2 (Alacsony): a hatosagnak torteno bejelentes altalaban nem szukseges, de rogzitse az incidenst.", "enisa.prefill": "Hasznalja ezt a pontszamot az EDPB bejelentes elozetes kitoltesehez", "form.title": "EDPB bejelentes", "form.intro": "A teljes EDPB sablon, az elozetes ertekeles es az ENISA pontszam alapjan elore kitoltve. A felteteles mezok a valaszai alapjan jelennek meg.", "form.export_json": "JSON exportalasa (API adattartalom)", "form.export_note": "Az exportalt JSON megfelel a nyilt incidensbejelentesi semanak, es az iranyitasi rendszere a nyilt API-n keresztul benyujthatja.", "form.required": "kotelezo", "form.gdpr": "GDPR", "record.title": "Incidensnyilvantartas (elszamoltathatosag)", "record.intro": "AZ OSSZES incidens nyilvantartasa, beleertve a nem bejelentesi kotelezettseg ala esoket is, a kanadai PIPEDA nyilvantartasi kotelezettsege es a GDPR 33. cikk (5) bekezdese altal inspiralva. Helyileg, a bongeszojeben tarolva.", "record.add": "Aktualis incidens mentese a nyilvantartasba", "record.empty": "Meg nincs rogzitett incidens.", "record.export": "Nyilvantartas exportalasa (JSON)", "common.yes": "Igen", "common.no": "Nem", "common.unknown": "Ismeretlen", "common.next": "Tovabb", "common.back": "Vissza"}, "it": {"_meta": {"lang": "it", "name": "Italiano", "status": "complete", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Assistente per le notifiche di violazione EDPB", "app.subtitle": "Strumento offline, basato sulla privacy-by-design, per il triage delle violazioni dei dati personali, il calcolo della gravità ENISA e la preparazione delle notifiche EDPB", "app.disclaimer": "Bozza basata sul modello EDPB v1.0 (consultazione pubblica fino al 5 agosto 2026). Funziona interamente nel tuo browser - nessun dato lascia il tuo dispositivo. Non costituisce un canale di trasmissione ufficiale; non utilizzare per notifiche reali a un'autorità di controllo finché le autorità non avranno implementato il modello.", "nav.preassessment": "1. Valutazione preliminare", "nav.severity": "2. Gravità ENISA", "nav.notification": "3. Notifica EDPB", "nav.record": "4. Registro delle violazioni", "lang.label": "Lingua", "lang.incomplete": "(bozza di traduzione - fallback in inglese)", "pre.title": "Valutazione preliminare (triage)", "pre.intro": "Triage rapido, ispirato all'autovalutazione dell'ICO, per stabilire se si tratta di una violazione dei dati personali da notificare prima di completare il modello integrale.", "pre.q_isbreach": "Si tratta di una violazione di sicurezza che comporta accidentalmente o in modo illecito la distruzione, la perdita, la modifica, la divulgazione non autorizzata o l'accesso a dati personali?", "pre.q_personaldata": "La violazione riguarda dati personali (informazioni relative a una persona identificata o identificabile)?", "pre.q_risk": "È probabile che la violazione presenti un rischio per i diritti e le libertà delle persone fisiche?", "pre.q_highrisk": "È probabile che la violazione presenti un rischio ELEVATO per le persone fisiche?", "pre.verdict.notbreach": "Non sembra trattarsi di una violazione dei dati personali ai sensi del RGPD. Conservane comunque una registrazione interna.", "pre.verdict.norisk": "Violazione dei dati personali senza rischio probabile: la notifica all'autorità di controllo potrebbe non essere richiesta, ma devi documentarla (art. 33(5)).", "pre.verdict.notify_dpa": "Probabilmente da notificare all'autorità di controllo entro 72 ore (art. 33).", "pre.verdict.notify_subjects": "Rischio elevato: comunica la violazione anche alle persone fisiche interessate senza ingiustificato ritardo (art. 34), salvo che si applichi un'esenzione ai sensi dell'art. 34(3).", "enisa.title": "Valutazione della gravità ENISA", "enisa.intro": "Calcola SE = DPC x EI + CB e la fascia di gravità. Un punteggio riproducibile per rispondere al campo del modello 'descrivere la metodologia utilizzata'.", "enisa.dpc": "Contesto del trattamento dei dati (DPC)", "enisa.ei": "Facilità di identificazione (EI)", "enisa.cb": "Circostanze della violazione (CB)", "enisa.result": "Punteggio di gravità (SE)", "enisa.band": "Fascia di gravità", "enisa.trigger_on": "SE >= 2: percorso di valutazione / notifica attivato.", "enisa.trigger_off": "SE < 2 (bassa): la notifica all'autorità generalmente non è richiesta, ma documenta la violazione.", "enisa.prefill": "Usa questo punteggio per precompilare la notifica EDPB", "form.title": "Notifica EDPB", "form.intro": "Il modello EDPB completo, precompilato a partire dalla valutazione preliminare e dal punteggio ENISA. I campi condizionali compaiono in base alle tue risposte.", "form.export_json": "Esporta JSON (payload API)", "form.export_note": "Il JSON esportato è conforme allo schema aperto di notifica delle violazioni e può essere inviato tramite l'API aperta dal tuo sistema di gestione.", "form.required": "obbligatorio", "form.gdpr": "RGPD", "record.title": "Registro delle violazioni (responsabilizzazione)", "record.intro": "Un registro di TUTTE le violazioni, comprese quelle non soggette a notifica, ispirato all'obbligo di conservazione dei registri della normativa canadese PIPEDA e all'art. 33(5) del RGPD. Memorizzato localmente nel tuo browser.", "record.add": "Salva la violazione corrente nel registro", "record.empty": "Nessuna violazione ancora registrata.", "record.export": "Esporta registro (JSON)", "common.yes": "Sì", "common.no": "No", "common.unknown": "Sconosciuto", "common.next": "Avanti", "common.back": "Indietro", "f.3.label": "Tipo di notifica", "f.3.tip": "Indicare qui se si sta notificando una nuova violazione dei dati personali oppure se si sta integrando una notifica precedente", "f.3.opt.a": "Nuova notifica", "f.3.opt.b": "Notifica di follow-up", "f.4.label": "Sotto-tipo di notifica", "f.4.tip": "Indicare qui se si fornisce una notifica completa, se si integra una notifica preliminare (incompleta) o se si forniscono informazioni pre ": "Numero esatto", "f.72.opt.b": "Numero approssimativo", "f.72.opt.c": "Numero non determinabile", "f.72.opt.d": "Numero da determinare", "f.73.label": "Numero di record di dati personali interessati dalla violazione dei dati personali", "f.73.tip": "Indicare qui il numero di record interessati dalla violazione, ossia il numero di singole voci presenti nella banca dati interessata dalla violazione.", "f.75.label": "Misure pertinenti in essere al momento del verificarsi della violazione dei dati personali", "f.75.tip": "Il presente elenco non è esaustivo e comprende soltanto le misure più comuni.\n\nÈ possibile che alcune misure non siano state applicate in quanto non applicabili o non utili.\n\nAllo stesso tempo, è possibile che siano state applicate misure non elencate ma utili. In tal caso, specificarle nella risposta L.", "f.75.opt.a": "Pseudonimizzazione", "f.75.opt.b": "Piano di backup / ripristino", "f.75.opt.c": "Cifratura dei dati", "f.75.opt.d": "Politiche in materia di protezione dei dati e sicurezza delle informazioni", "f.75.opt.e": "Formazione in materia di protezione dei dati e sicurezza", "f.75.opt.f": "Registro degli incidenti", "f.75.opt.g": "Livelli di accesso ai dati", "f.75.opt.h": "Controllo degli accessi logici (es. MFA)", "f.75.opt.i": "Audit periodici", "f.75.opt.j": "Controllo degli accessi fisici", "f.75.opt.k": "Sistemi informatici aggiornati", "f.75.opt.l": "Altre misure (specificare nella descrizione aggiuntiva)", "f.76.label": "Ulteriore descrizione delle misure pertinenti in essere al momento del verificarsi della violazione dei dati personali", "f.76.tip": "Promemoria: è stato indicato che le misure tecniche possono verosimilmente essere eluse dagli autori dell'attacco. Aggiungere qui il pertinente livello di dettaglio relativo a tali misure, unitamente alla descrizione delle altre misure pertinenti.", "f.79.label": "Conseguenze probabili in caso di violazione della riservatezza", "f.79.opt.a": "I dati sono stati divulgati al di là ativo svantaggio economico o sociale", "f.85.opt.l": "Danno fisico o psichico", "f.85.opt.m": "Danno patrimoniale o non patrimoniale ai beni", "f.85.opt.n": "Altro impatto (specificare nella descrizione aggiuntiva)", "f.85.opt.o": "Da determinare", "f.86.label": "Ulteriore descrizione degli altri impatti per gli interessati", "f.87.label": "Gravità dei potenziali impatti", "f.87.tip": "Indicare qui l'esito della propria autovalutazione della gravità dell'impatto della violazione per gli interessati. Selezionare la gravità più elevata qualora possano verificarsi più impatti potenziali.", "f.87.opt.a": "Lieve", "f.87.opt.b": "Moderato", "f.87.opt.c": "Grave", "f.87.opt.d": "Da determinare", "f.89.label": "Esito della valutazione del rischio effettuata dal titolare del trattamento", "f.89.opt.a": "È probabile che la violazione dei dati personali presenti un rischio elevato per i diritti e le libertà delle persone fisiche", "f.89.opt.b": "È probabile che la violazione dei dati personali presenti un rischio (non elevato) per i diritti e le libertà delle persone fisiche", "f.89.opt.c": "È improbabile che la violazione dei dati personali presenti un rischio per i diritti e le libertà delle persone fisiche c) Sono necessarie ulteriori informazioni per valutare il rischio per i diritti e le libertà delle persone fisiche", "f.90.label": "Ulteriore descrizione della valutazione del rischio effettuata dal titolare del trattamento", "f.90.tip": "Descrivere la metodologia utilizzata e i fattori pertinenti presi in considerazione.", "f.92.label": "Misure adottate per affrontare la violazione dei dati personali e per attenuarne le conseguenze", "f.92.tip": "Indicare in che misura tali misure risolvono il problema.", "f.94.label": "Misure pertinenti adottate per prevenire violazioni dei dati personali analoghe", "f.94.opt.a": "Anonimizzazione", "f.94.opt.b": "Piano di backup / ripristino", "f.94.opt.c": "Modifica dei processi", "f.94.opt.d": "Cifratura dei dati", "f.94.opt.e": "Politiche in materia di protezione dei dati e sicurezza delle informazioni", "f.94.opt.f": "Formazione in materia di protezione dei dati e sicurezza", "f.94.opt.g": "Cancellazione dei dati", "f.94.opt.h": "Registro degli incidenti", "f.94.opt.i": "Livelli di accesso ai dati", "f.94.opt.j": "Controllo degli accessi logici (es. MFA)", "f.94.opt.k": "Audit periodici", "f.94.opt.l": "Controllo degli accessi fisici", "f.94.opt.m": "Pseudonimizzazione", "f.94.opt.n": "Sistemi informatici aggiornati", "f.94.opt.o": "Altre misure (specificare nella descrizione aggiuntiva)", "f.95.label": "Ulteriore descrizione delle pertinenti misure permanenti aggiornate per evitare incidenti analoghi in futuro", "f.95.tip": "Indicare in che misura tali misure risolvono il problema e migliorano la situazione.\n\nÈ attesa una descrizione qualora sia stata selezionata l'opzione “Altre misure” nella domanda precedente m).\n\nIn ogni caso, non esitare a descrivere ulteriori misure adottate dopo la violazione, o da adottare, qualora le si ritenga pertinenti.", "f.97.label": "La violazione dei dati personali è stata comunicata agli interessati?", "f.97.tip": "Qualora non sia ancora stato valutato se procedere alla comunicazione, si tenga presente che sarà necessario effettuare una notifica di follow-up una volta presa la decisione.\n\nQualora la violazione dei dati venga comunicata agli interessati per fasi o qualora non sia ancora possibile raggiungere tutti gli interessati, indicarlo nei campi 98 e 98a.", "f.97.opt.a": "Sì", "f.97.opt.b": "No, ma sarà comunicata in una data specifica b1) No, ma sarà comunicata in una data da determinare", "f.97.opt.c": "No, l'indagine è ancora in corso", "f.97.opt.d": "No, non sarà comunicata in quanto è improbabile che la violazione dei dati personali presenti un rischio elevato per i diritti e le libertà delle persone fisiche", "f.97.opt.e": "No, non sarà comunicata in quanto è soddisfatta una delle condizioni di cui all'art. 34(3) del GDPR", "f.98.label": "Data in cui le informazioni sono state fornite agli interessati", "f.98.tip": "Indicare qui la data in cui si è iniziato a informare gli interessati.", "f.99.label": "Data futura in cui la violazione dei dati sarà comunicata agli interessati", "f.100.label": "Ulteriori informazioni sulle condizioni di cui all'art. 34(3) del GDPR che risultano soddisfatte", "f.100.opt.a": "Il titolare del trattamento ha messo in atto misure tecniche e organizzative adeguate di protezione e tali misure erano state applicate ai dati personali oggetto della violazione, in particolare quelle destinate a rendere i dati personali incomprensibili a chiunque non sia autorizzato ad accedervi, quali la cifratura.", "f.100.opt.b": "Il titolare del trattamento ha successivamente adottato misure atte a scongiurare il sopraggiungere di un rischio elevato per i diritti e le libertà degli interessati di cui al paragrafo 1.", "f.100.opt.c": "Detta comunicazione richiederebbe sforzi sproporzionati. In tal caso, si procede invece a una comunicazione pubblica o a una misura simile, tramite la quale gli interessati sono informati con analoga efficacia.", "f.101.label": "Ulteriore descrizione del motivo per cui risultano soddisfatte le condizioni di cui all'art. 34(3) del GDPR e delle misure adottate", "f.102.label": "Numero di interessati informati", "f.102.opt.a": "Tutti gli interessati sono stati informati", "f.102.opt.b": "Non tutti gli interessati sono stati informati", "f.103.label": "Ulteriore descrizione del motivo per cui non tutti gli interessati sono stati informati", "f.103.tip": "Specificare il motivo per cui alcuni interessati non sono stati informati; ad esempio, alcuni potrebbero non esserlo stati per il motivo A, altri per il motivo B, ecc.\n\nI motivi possono essere di varia natura e non vanno considerati soltanto quelli tecnici: processo in corso, alcuni interessati non possono essere raggiunti con la stessa modalità, ad essi si applicano leggi aggiuntive, il costo dell'informazione è molto più elevato, ecc.", "f.104.label": "Mezzi di comunicazione utilizzati per informare l'interessato", "f.104.opt.a": "Comunicazione individuale (lettera/email/comunicazione personale)", "f.104.opt.b": "Annuncio pubblico (sito web/comunicato stampa/social network)", "f.104.opt.c": "Altro", "f.105.label": "Ulteriore descrizione degli altri mezzi di comunicazione", "f.106.label": "Contenuto delle informazioni fornite agli interessati", "f.106.tip": "Fornire tale contenuto nel modo più pertinente. Ad esempio, se l'informazione fornita è semplicemente un'email in solo testo, è sufficiente copiarne qui il testo. Se, ad esempio, l'informazione contiene immagini/video utili alla comprensione, fornire all'autorità di controllo i mezzi per consultarli (pagina del sito web, screenshot delle email, pagina di download, ecc.).", "f.109.label": "L'incidente è stato segnalato alle autorità di polizia/giudiziarie come reato?", "f.109.opt.a": "Sì", "f.109.opt.b": "No", "f.109.opt.c": "Non noto", "f.110.label": "L'incidente è stato notificato ad altre autorità di controllo o organismi di vigilanza ai sensi di altra normativa applicabile? (es. centro nazionale per la sicurezza informatica, ecc.)", "f.110.opt.a": "Sì", "f.110.opt.b": "No", "f.110.opt.c": "Non noto", "f.111.label": "Ulteriori informazioni sulla notifica ad altre autorità o organismi", "f.111.tip": "Specificare quale autorità (in materia di protezione dei dati o meno) e, se possibile, fornire l'identificativo del caso utilizzato da tale autorità e a cui è possibile fare riferimento.", "f.113.label": "La violazione dei dati personali riguarda un trattamento transfrontaliero effettuato da un titolare del trattamento stabilito nello Spazio economico europeo (SEE)?", "f.113.opt.a": "Sì", "f.113.opt.b": "No", "f.113.opt.c": "Non noto", "f.114.label": "L'autorità di controllo capofila è:", "f.115.label": "Elenco dei paesi del SEE in cui il titolare del trattamento ha uno stabilimento", "f.115.tip": "Indicare qui i paesi interess re alcuni lievi inconvenienti.", "enisa.band.medium": "Medio", "enisa.band.medium.meaning": "Le persone fisiche potranno incontrare inconvenienti significativi, che saranno in grado di superare nonostante alcune difficoltà.", "enisa.band.high": "Alto", "enisa.band.high.meaning": "Le persone fisiche potranno incontrare conseguenze significative, che dovrebbero essere in grado di superare seppur con serie difficoltà.", "enisa.band.very_high": "Molto alto", "enisa.band.very_high.meaning": "Le persone fisiche potranno incontrare conseguenze significative, o persino irreversibili, che potrebbero non riuscire a superare.", "enisa.mit.single_subject": "Singolo interessato / volume molto basso", "enisa.mit.recipient_confirms_deletion": "Il destinatario errato conferma la cancellazione dei dati", "enisa.mit.weak_linkage": "Nome comune / omonimia / collegamento debole", "enisa.mit.strong_encryption": "Cifratura robusta / dati inintelligibili per il destinatario", "enisa.mit.pseudonymisation_no_key": "Pseudonimizzazione senza chiave accessibile", "enisa.mit.professional_secrecy": "Destinatario vincolato da segreto professionale / riservatezza legale", "enisa.mit.availability_restored": "Disponibilità ripristinata rapidamente da backup (breve interruzione)", "enisa.mit.public_low_criticality": "Dati già pubblici / bassa criticità", "enisa.mit.note": "Circostanze attenuanti che abbassano il punteggio. In base al principio di responsabilizzazione (art. 5), si tratta di suggerimenti MODIFICABILI, non di un aggiustamento black-box imposto: ogni opzione sposta la variabile indicata nella direzione indicata; il titolare del trattamento può intervenire in deroga. Gli incrementi numerici esatti sono valori predefiniti ENISA e in attesa di conferma rispetto al PDF ENISA 2013.", "enisa.provenance": "SE < 2 = Basso è riportato testualmente dal testo del documento ENISA. Le soglie superiori (Medio 2-<3, Alto 3-<4, Molto alto >=4) sono i livelli ENISA standard, universalmente citati, ma non sono stati estratti testualmente dal livello testuale di questo PDF; vanno considerati come 'livelli consolidati standard ENISA'.", "rk.circumstances_cause": "Circostanze e causa della violazione (se note)", "rk.date_or_period": "Data o periodo della violazione (o approssimazione)", "rk.personal_information": "Descrizione dei dati personali coinvolti (nella misura in cui è noto)", "rk.number_affected": "Numero di persone interessate (o approssimazione)", "rk.mitigation_steps": "Misure adottate per ridurre/attenuare il rischio di danno", "rk.notification_steps": "Misure adottate o previste per notificare le persone interessate (ove applicabile)", "rk.retention_note": "Minimo 24 mesi dal giorno in cui l'organizzazione stabilisce che la violazione si è verificata (SOR/2018-64).", "help.dpc": "Contesto del trattamento dei dati: quanto sono critici i dati. 1 semplici, 2 comportamentali, 3 finanziari, 4 sensibili (categorie particolari).", "help.ei": "Facilità di identificazione: con quale facilità i dati identificano una persona (moltiplica il DPC). Da 0,25 trascurabile a 1 massima.", "help.cb": "Circostanze della violazione: punti aggiuntivi per perdita di riservatezza, integrità, disponibilità (ciascuna 0 / +0,25 / +0,5) e intento doloso (+0,5).", "enisa.mititle": "Fattori attenuanti", "enisa.cbtitle_mal": "Intento doloso", "btn.export_csv": "Esporta CSV", "btn.export_xls": "Esporta XLS", "btn.export_aggregate": "Esporta statistiche aggregate (anonimizzate)", "record.retention_prefix": "Conservazione", "record.aggregate_note": "Esportazione aggregata: conteggi anonimizzati per tassonomia, k-anonimato", "obl.title": "I tuoi obblighi per questa violazione", "obl.intro": "Orientamento indicativo generato dai dati inseriti.", "obl.badge.required": "Richiesto", "obl.badge.notreq": "Non richiesto", "obl.badge.assess": "Da valutare", "obl.auth.title": "Notificare all'autorità di controllo", "obl.auth.required": "Richiesta a meno che sia improbabile che la violazione presenti un rischio per i diritti e le libertà delle persone fisiche (art. 33(1)). Termine: senza ingiustificato ritardo e, ove possibile, entro 72 ore dall'essere venuto a conoscenza della violazione.", "obl.auth.notreq": "Non richiesta solo se è improbabile che la violazione presenti un rischio per i diritti e le libertà (art. 33(1)). Documentare il ragionamento (art. 33(5)).", "obl.auth.assess": "Valutare se è probabile che la violazione presenti un rischio. Il punteggio di gravità ENISA informa questa valutazione ma non determina, di per sé, l'obbligo giuridico.", "obl.subj.title": "Comunicare alle persone interessate", "obl.subj.text": "Richiesta solo se è probabile che la violazione presenti un rischio ELEVATO per i diritti e le libertà (art. 34(1)), senza ingiustificato ritardo. Esenzioni (art. 34(3)): (a) dati inintelligibili, es. cifratura robusta; (b) misure successive che rendono non più probabile il rischio elevato; (c) sforzo sproporzionato -> comunicazione pubblica in alternativa.", "obl.doc.title": "Documentare internamente la violazione", "obl.doc.text": "Sempre richiesta, per TUTTE le violazioni, comprese quelle non notificate (art. 33(5)). Il GDPR non fissa un periodo di conservazione; si raccomanda un minimo di 24 mesi sul modello canadese (PIPEDA, SOR/2018-64), come proposto nel position paper (Parte III.5).", "obl.disclaimer": "Si tratta di un orientamento indicativo generato dai dati inseriti; non costituisce consulenza legale e non sostituisce la valutazione caso per caso del titolare del trattamento ai sensi degli articoli 33 e 34 GDPR. Il titolare del trattamento resta responsabile della determinazione e dei valori dichiarati (responsabilizzazione, art. 5(2)).", "enisa.select_prompt": "Selezionare DPC ed EI per calcolare la gravità.", "common.option_dash": "--", "mit.off": "Off", "mit.apply": "Applica", "common.step": "Passo", "record.aggregate_note2": "(celle di piccole dimensioni soppresse). Nessuna riga di notifica singola, nessuna identità del titolare del trattamento.", "form.methodology_prefix": "Metodologia di gravità ENISA: SE = DPC x EI + CB = "}, "lt": {"_meta": {"lang": "lt", "name": "Lietuvių", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB pranešimų apie duomenų saugumo pažeidimus pagalbinė priemonė", "app.subtitle": "Atsijungus veikianti, pagal pritaikytosios privatumo apsaugos principą sukurta priemonė asmens duomenų saugumo pažeidimų triažui, ENISA sunkumo vertinimui ir EDPB pranešimų rengimui", "app.disclaimer": "Juodraštis, parengtas pagal EDPB šabloną v1.0 (viešosios konsultacijos iki 2026 m. rugpjūčio 5 d.). Veikia tik jūsų naršyklėje - jokie duomenys neišeina iš jūsų įrenginio. Tai nėra oficialus pateikimo kanalas; nenaudokite realiems pranešimams priežiūros institucijai, kol institucijos neįdiegs šablono.", "nav.preassessment": "1. Išankstinis vertinimas", "nav.severity": "2. ENISA sunkumas", "nav.notification": "3. EDPB pranešimas", "nav.record": "4. Pažeidimų registras", "lang.label": "Kalba", "lang.incomplete": "(vertimo juodraštis - rodoma anglų kalba)", "pre.title": "Išankstinis vertinimas (triažas)", "pre.intro": "Greitas triažas, įkvėptas ICO savęs vertinimo, siekiant nuspręsti, ar tai yra asmens duomenų saugumo pažeidimas, apie kurį reikia pranešti, prieš užpildant visą šabloną.", "pre.q_isbreach": "Ar tai yra saugumo pažeidimas, dėl kurio netyčia arba neteisėtai sunaikinami, prarandami, pakeičiami, be leidimo atskleidžiami persiųsti, saugomi arba kitaip tvarkomi asmens duomenys, arba prie jų be leidimo gaunama prieiga?", "pre.q_personaldata": "Ar pažeidimas susijęs su asmens duomenimis (informacija, susijusia su fiziniu asmeniu, kurio tapatybė nustatyta arba kurio tapatybę galima nustatyti)?", "pre.q_risk": "Ar tikėtina, kad dėl pažeidimo kils pavojus fizinių asmenų teisėms ir laisvėms?", "pre.q_highrisk": "Ar tikėtina, kad dėl pažeidimo kils DIDELIS pavojus fiziniams asmenims?", "pre.verdict.notbreach": "Tai nėra asmens duomenų saugumo pažeidimas pagal BDAR. Vis tiek tvarkykite vidaus registrą.", "pre.verdict.norisk": "Asmens duomenų saugumo pažeidimas be tikėtino pavojaus: pranešti priežiūros institucijai gali būti nereikalaujama, tačiau privalote jį registruoti (33 str. 5 d.).", "pre.verdict.notify_dpa": "Tikėtina, kad apie jį reikia pranešti priežiūros institucijai per 72 valandas (33 str.).", "pre.verdict.notify_subjects": "Didelis pavojus: taip pat nedelsiant praneškite paveiktiems fiziniams asmenims (34 str.), nebent taikoma 34 str. 3 d. išimtis.", "enisa.title": "ENISA sunkumo vertinimas", "enisa.intro": "Apskaičiuoja SE = DPC x EI + CB ir sunkumo lygį. Atkartojamas įvertis, kuriuo atsakoma į šablono lauką „aprašykite naudotą metodiką“.", "enisa.dpc": "Duomenų tvarkymo kontekstas (DPC)", "enisa.ei": "Tapatybės nustatymo paprastumas (EI)", "enisa.cb": "Pažeidimo aplinkybės (CB)", "enisa.result": "Sunkumo įvertis (SE)", "enisa.band": "Sunkumo lygis", "enisa.trigger_on": "SE >= 2: vertinimo / pranešimo eiga aktyvuota.", "enisa.trigger_off": "SE < 2 (žemas): pranešti institucijai paprastai nereikalaujama, tačiau pažeidimą registruokite.", "enisa.prefill": "Naudokite šį įvertį EDPB pranešimui iš anksto užpildyti", "form.title": "EDPB pranešimas", "form.intro": "Visas EDPB šablonas, iš anksto užpildytas pagal jūsų išankstinį vertinimą ir ENISA įvertį. Sąlyginiai laukai atsiranda pagal jūsų atsakymus.", "form.export_json": "Eksportuoti JSON (API duomenis)", "form.export_note": "Eksportuotas JSON atitinka atvirą pranešimų apie pažeidimus schemą ir gali būti pateiktas per atvirą API jūsų valdymo sistemos.", "form.required": "privaloma", "form.gdpr": "BDAR", "record.title": "Pažeidimų registras (atskaitomybė)", "record.intro": "VISŲ pažeidimų registras, įskaitant tuos, apie kuriuos pranešti nereikia, įkvėptas Kanados PIPEDA registravimo pareigos ir BDAR 33 str. 5 d. Saugoma vietoje jūsų naršyklėje.", "record.add": "Įrašyti dabartinį pažeidimą į registrą", "record.empty": "Dar neužregistruota jokių pažeidimų.", "record.export": "Eksportuoti registrą (JSON)", "common.yes": "Taip", "common.no": "Ne", "common.unknown": "Nežinoma", "common.next": "Toliau", "common.back": "Atgal"}, "lv": {"_meta": {"lang": "lv", "name": "Latviešu", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB datu aizsardzības pārkāpumu paziņošanas palīgs", "app.subtitle": "Bezsaistē strādājošs, pēc integrētas privātuma aizsardzības principa veidots rīks personas datu aizsardzības pārkāpumu triāžai, ENISA smaguma novērtēšanai un EDPB paziņojumu sagatavošanai", "app.disclaimer": "Melnraksts, kas sagatavots pēc EDPB veidnes v1.0 (sabiedriskā apspriešana līdz 2026. gada 5. augustam). Darbojas tikai jūsu pārlūkprogrammā - nekādi dati neatstāj jūsu ierīci. Tas nav oficiāls iesniegšanas kanāls; nelietojiet to reāliem paziņojumiem uzraudzības iestādei, kamēr iestādes nav ieviesušas veidni.", "nav.preassessment": "1. Sākotnējais novērtējums", "nav.severity": "2. ENISA smagums", "nav.notification": "3. EDPB paziņojums", "nav.record": "4. Pārkāpumu reģistrs", "lang.label": "Valoda", "lang.incomplete": "(tulkojuma melnraksts - rāda angļu valodā)", "pre.title": "Sākotnējais novērtējums (triāža)", "pre.intro": "Ātra triāža, iedvesmota no ICO pašnovērtējuma, lai pirms pilnas veidnes aizpildīšanas izlemtu, vai šis ir paziņojams personas datu aizsardzības pārkāpums.", "pre.q_isbreach": "Vai šis ir drošības pārkāpums, kura rezultātā notiek nejauša vai nelikumīga personas datu iznīcināšana, nozaudēšana, pārveidošana, neatļauta izpaušana vai piekļuve tiem?", "pre.q_personaldata": "Vai pārkāpums skar personas datus (informāciju, kas attiecas uz identificētu vai identificējamu personu)?", "pre.q_risk": "Vai pārkāpums varētu radīt risku fizisku personu tiesībām un brīvībām?", "pre.q_highrisk": "Vai pārkāpums varētu radīt AUGSTU risku fiziskām personām?", "pre.verdict.notbreach": "Šķiet, ka šis nav personas datu aizsardzības pārkāpums saskaņā ar VDAR. Tomēr veiciet iekšēju uzskaiti.", "pre.verdict.norisk": "Personas datu aizsardzības pārkāpums bez iespējama riska: paziņošana uzraudzības iestādei var nebūt nepieciešama, taču jums tas ir jādokumentē (33. panta 5. punkts).", "pre.verdict.notify_dpa": "Iespējams, par to ir jāpaziņo uzraudzības iestādei 72 stundu laikā (33. pants).", "pre.verdict.notify_subjects": "Augsts risks: bez nepamatotas kavēšanās paziņojiet arī skartajām fiziskajām personām (34. pants), ja vien nav piemērojams 34. panta 3. punkta izņēmums.", "enisa.title": "ENISA smaguma novērtējums", "enisa.intro": "Aprēķina SE = DPC x EI + CB un smaguma līmeni. Atkārtojams rezultāts, lai atbildētu uz veidnes lauku “aprakstiet izmantoto metodiku”.", "enisa.dpc": "Datu apstrādes konteksts (DPC)", "enisa.ei": "Identifikācijas vieglums (EI)", "enisa.cb": "Pārkāpuma apstākļi (CB)", "enisa.result": "Smaguma rezultāts (SE)", "enisa.band": "Smaguma līmenis", "enisa.trigger_on": "SE >= 2: novērtēšanas / paziņošanas ceļš aktivizēts.", "enisa.trigger_off": "SE < 2 (zems): paziņošana iestādei parasti nav nepieciešama, taču dokumentējiet pārkāpumu.", "enisa.prefill": "Izmantojiet šo rezultātu, lai iepriekš aizpildītu EDPB paziņojumu", "form.title": "EDPB paziņojums", "form.intro": "Pilna EDPB veidne, iepriekš aizpildīta no jūsu sākotnējā novērtējuma un ENISA rezultāta. Nosacījuma lauki parādās atkarībā no jūsu atbildēm.", "form.export_json": "Eksportēt JSON (API saturu)", "form.export_note": "Eksportētais JSON atbilst atvērtajai pārkāpumu paziņošanas shēmai, un jūsu pārvaldības sistēma to var iesniegt, izmantojot atvērto API.", "form.required": "obligāts", "form.gdpr": "VDAR", "record.title": "Pārkāpumu reģistrs (pārskatatbildība)", "record.intro": "VISU pārkāpumu reģistrs, ieskaitot tos, par kuriem nav jāpaziņo, iedvesmots no Kanādas PIPEDA uzska tijiet u l-libertajiet tal-individwi?", "pre.q_highrisk": "Il-ksur x'aktarx jirriżulta f'riskju GĦOLI għall-individwi?", "pre.verdict.notbreach": "Dan ma jidhirx li huwa ksur ta' data personali skont il-GDPR. Xorta żomm reġistru intern.", "pre.verdict.norisk": "Ksur ta' data personali mingħajr riskju probabbli: in-notifika lill-awtorità superviżorja tista' ma tkunx meħtieġa, iżda trid tirreġistrah (Art. 33(5)).", "pre.verdict.notify_dpa": "X'aktarx li jeħtieġ notifika lill-awtorità superviżorja fi żmien 72 siegħa (Art. 33).", "pre.verdict.notify_subjects": "Riskju għoli: ikkomunika wkoll lill-individwi affettwati mingħajr dewmien żejjed (Art. 34), sakemm ma tapplikax eżenzjoni taħt l-Art. 34(3).", "enisa.title": "Valutazzjoni tas-severità tal-ENISA", "enisa.intro": "Tikkalkula SE = DPC x EI + CB u l-faxxa tas-severità. Skor riproduċibbli biex iwieġeb il-qasam tal-mudell 'iddeskrivi l-metodoloġija użata'.", "enisa.dpc": "Kuntest tal-Ipproċessar tad-Data (DPC)", "enisa.ei": "Faċilità ta' Identifikazzjoni (EI)", "enisa.cb": "Ċirkostanzi tal-Ksur (CB)", "enisa.result": "Skor tas-severità (SE)", "enisa.band": "Faxxa tas-severità", "enisa.trigger_on": "SE >= 2: il-perkors ta' valutazzjoni / notifika ġie attivat.", "enisa.trigger_off": "SE < 2 (Baxx): in-notifika lill-awtorità ġeneralment mhix meħtieġa, iżda rreġistra l-ksur.", "enisa.prefill": "Uża dan l-iskor biex timla minn qabel in-notifika tal-EDPB", "form.title": "Notifika EDPB", "form.intro": "Il-mudell sħiħ tal-EDPB, mimli minn qabel mill-valutazzjoni preliminari tiegħek u l-iskor tal-ENISA. L-oqsma kondizzjonali jidhru skont it-tweġibiet tiegħek.", "form.export_json": "Esporta JSON (payload tal-API)", "form.export_note": "Il-JSON esportat jivvalida mal-iskema miftuħa tan-notifika tal-ksur u jista' jiġi sottomess permezz tal-API miftuħa mis-sistema ta' ġestjoni tiegħek.", "form.required": "meħtieġ", "form.gdpr": "GDPR", "record.title": "Reġistru tal-ksur (obbligu ta' rendikont)", "record.intro": "Reġistru tal-ksur p-to-date IT-systemen", "f.94.opt.o": "Andere maatregelen (gelieve te specificeren in de nadere beschrijving)", "f.95.label": "Nadere beschrijving van relevante bijgewerkte permanente maatregelen om soortgelijke incidenten in de toekomst te voorkomen", "f.95.tip": "Geef aan in welke mate de maatregelen het probleem oplossen en de situatie verbeteren.\n\nEen beschrijving wordt verwacht indien u bij de vorige vraag m) met “Andere maatregelen” hebt geantwoord.\n\nAarzel desondanks niet om verdere maatregelen te beschrijven die na de inbreuk zijn genomen, of die nog moeten worden genomen, als u dat relevant acht.", "f.97.label": "Is de inbreuk in verband met persoonsgegevens aan de betrokkenen medegedeeld?", "f.97.tip": "Indien u nog niet hebt beoordeeld of u zult melden, houd er dan rekening mee dat u een vervolgmelding zult moeten doen zodra u uw beslissing hebt genomen\n\nIndien u de inbreuk gefaseerd aan de betrokkenen meedeelt of indien u nog niet alle betrokkenen kunt bereiken. Geef dit aan in veld 98 en 98a.", "f.97.opt.a": "Ja", "f.97.opt.b": "Nee, maar het zal op een specifieke datum worden medegedeeld b1) Nee, maar het zal op een nader te bepalen datum worden medegedeeld", "f.97.opt.c": "Nee, het onderzoek is nog gaande", "f.97.opt.d": "Nee, het zal niet worden medegedeeld aangezien de inbreuk in verband met persoonsgegevens waarschijnlijk geen hoog risico voor de rechten en vrijheden van natuurlijke personen met zich meebrengt", "f.97.opt.e": "Nee, het zal niet worden medegedeeld aangezien aan een van de in artikel 34, lid 3, van de GDPR bedoelde voorwaarden is voldaan", "f.98.label": "Datum waarop de informatie aan de betrokkenen is verstrekt", "f.98.tip": "Geef hier de datum aan waarop u bent begonnen met het informeren van de betrokkenen.", "f.99.label": "Toekomstige datum waarop de inbreuk aan de betrokkenen zal worden medegedeeld", "f.100.label": "Nadere informatie over de in artikel 34, lid 3, van de GDPR bedoelde voorwaarden waaraan is voldaan", "f.100.opt.a": "De verwerkingsverantwoordelijke heeft passende technische en organisatorische beschermingsmaatregelen getroffen, en deze maatregelen zijn toegepast op de persoonsgegevens waarop de inbreuk in verband met persoonsgegevens betrekking heeft, met name die welke de persoonsgegevens onbegrijpelijk maken voor onbevoegden, zoals versleuteling.", "f.100.opt.b": "De verwerkingsverantwoordelijke heeft achteraf maatregelen genomen die ervoor zorgen dat het in lid 1 bedoelde hoge risico voor de rechten en vrijheden van betrokkenen zich waarschijnlijk niet meer zal voordoen.", "f.100.opt.c": "Dit zou onevenredige inspanningen vergen. In een dergelijk geval vindt er in plaats daarvan een openbare mededeling of soortgelijke maatregel plaats waarbij de betrokkenen even doeltreffend worden geïnformeerd.", "f.101.label": "Nadere beschrijving waarom aan de in artikel 34, lid 3, van de GDPR bedoelde voorwaarden is voldaan en welke maatregelen zijn genomen", "f.102.label": "Aantal geïnformeerde betrokkenen", "f.102.opt.a": "Alle betrokkenen zijn geïnformeerd", "f.102.opt.b": "Niet alle betrokkenen zijn geïnformeerd", "f.103.label": "Nadere beschrijving waarom niet alle betrokkenen zijn geïnformeerd", "f.103.tip": "Geef de reden aan waarom sommige betrokkenen niet zijn geïnformeerd, bv. sommige niet vanwege reden A, andere vanwege reden B, enz.\n\nDe redenen kunnen van uiteenlopende aard zijn en niet alleen de technische redenen moeten in aanmerking worden genomen: lopend proces, sommige betrokkenen kunnen niet op dezelfde wijze worden bereikt, aanvullende wetgeving is op hen van toepassing, de kosten van informatieverstrekking liggen veel hoger, enz.", "f.104.label": "Communicatiemiddelen gebruikt om de betrokkene te informeren", "f.104.opt.a": "Individuele communicatie (brief/e-mail/persoonlijke communicatie)", "f.104.opt.b": "Openbare aankondiging (website/persbericht/sociaal netwerk)", "f.104.opt.c": "Overige", "f.105.label": "Nadere beschrijving van de andere communicatiemiddelen", "f.106.label": "Inhoud van de aan de betrokkenen verstrekte informatie", "f.106.tip": "Verstrek deze inhoud op de meest relevante wijze. Bijvoorbeeld, indien de verstrekte informatie slechts een e-mail met enkel platte tekst is, volstaat het de tekst hier te kopiëren. Indien uw informatie bijvoorbeeld afbeeldingen/video's bevat die nuttig zijn voor het begrip, verstrek dan de middelen waarmee de gegevensbeschermingsautoriteit deze kan raadplegen (websitepagina, e-mailscreenshots, downloadpagina, enz.).", "f.109.label": "Is het incident als strafbaar feit gemeld aan de politie/gerechtelijke autoriteiten?", "f.109.opt.a": "Ja", "f.109.opt.b": "Nee", "f.109.opt.c": "Onbekend", "f.110.label": "Is het incident gemeld aan andere toezichthoudende autoriteiten of controle-instanties uit hoofde van andere relevante wetgeving? (bv. nationaal cyberbeveiligingscentrum, enz.)", "f.110.opt.a": "Ja", "f.110.opt.b": "Nee", "f.110.opt.c": "Onbekend", "f.111.label": "Nadere informatie over de melding aan andere autoriteiten of instanties", "f.111.tip": "Geef aan welke autoriteit (al dan niet inzake gegevensbescherming) en verstrek indien mogelijk het dossiernummer dat deze autoriteit heeft gebruikt en waarnaar vervolgens kan worden verwezen.", "f.113.label": "Heeft de inbreuk in verband met persoonsgegevens betrekking op grensoverschrijdende verwerking uitgevoerd door een verwerkingsverantwoordelijke gevestigd in de Europese Economische Ruimte (EER)?", "f.113.opt.a": "Ja", "f.113.opt.b": "Nee", "f.113.opt.c": "Onbekend", "f.114.label": "De leidende toezichthoudende autoriteit is:", "f.115.label": "Lijst van EER-landen waar de verwerkingsverantwoordelijke een vestiging heeft", "f.115.tip": "Geef hier de landen aan die door de inbreuk worden geraakt.", "f.116.label": "Lijst van EER-landen waar getroffen betrokkenen zich bevinden", "f.116.tip": "Geef hier de landen aan die door de inbreuk worden geraakt.", "f.117.label": "Geschat aantal betrokkenen per land", "f.118.label": "Lijst van EER-toezichthoudende autoriteiten waaraan de inbreuk is of zal worden gemeld", "f.118.tip": "Geef hier de lijst aan van andere EU-toezichthoudende autoriteiten die u hebt gemeld of voornemens bent te melden.", "f.118.opt.a": "- Der Landesbeauftragte für Datenschutz und Informationsfreiheit Mecklenburg-Vorpommern Germany (North Rhine-Westphalia) - Landesbeauftragte für Datenschutz und Informationsfreiheit Nordrhein-Westfalen Germany (Rhineland-Palatinate) - Der Landesbeauftragte für den Datenschutz und die Informationsfreiheit Rheinland-Pfalz Germany (Saarland) - Unabhängiges Datenschutzzentrum Saarland / Landesbeauftragte für Datenschutz und Informationsfreiheit Germany (Saxony) - Sächsische Datenschutz- und Transparenzbeauftragte Germany (Saxony -Anhalt) - Landesbeauftragte für den Datenschutz Sachsen-Anhalt Germany (Schleswig-Holstein) - Landesbeauftragte für Datenschutz Schleswig-Holstein / Unabhängiges Landeszentrum für Datenschutz Schleswig-Holstein Germany (Thuringia) - Thüringer Landesbeauftragte für den Datenschutz und die Informationsfreiheit Greece - Αρχή Προστασίας Δεδομένων Προσωπικού Χαρακτήρα Hungary - Nemzeti Adatvédelmi és Információszabadság Hatóság Iceland - Persónuvernd Ireland - Data Protection Commission / An Comisiún um Chosaint Sonraí Italy - Garante per la protezione dei dati personaliLatvia - Datu valsts inspekcijaLiechtenstein - Datenschutzstelle Lithuania - Valstybinė duomenų apsaugos inspekcija Lithuania - Žurnalistų etikos inspektoriaus tarnyba Luxembourg - Commission Nationale pour la Protection des Données / Nationale Kommission für Datenschutz Großherzogtum Malta - Office of the Information and Data Protection Commissioner Norway – Datatilsynet The Netherlands - Autoriteit Persoonsgegevens Poland - Urząd Ochrony Danych Osobowych Portugal - Comissão Nacional de Proteção de Dados Romania - Autoritatea Naţională de Supraveghere a Prelucrării Datelor cu Caracter Personal Slovakia - Úrad na ochranu osobných údajov Slovenskej republ nali Latvia - Datu valsts inspekcija Liechtenstein - Datenschutzstelle Lithuania - Valstybinė duomenų apsaugos inspekcija Lithuania - Žurnalistų etikos inspektoriaus tarnyba Luxembourg - Commission Nationale pour la Protection des Données / Nationale Kommission für Datenschutz Großherzogtum Malta - Office of the Information and Data Protection Commissioner Norway – Datatilsynet The Netherlands - Autoriteit Persoonsgegevens Poland - Urząd Ochrony Danych Osobowych Portugal - Comissão Nacional de Proteção de Dados Romania - Autoritatea Naţională de Supraveghere a Prelucrării Datelor cu Caracter Personal Slovakia - Úrad na ochranu osobných údajov Slovenskej republiky Slovenia - Informacijski pooblaščenec Spain - Agencia Española de Protección de Datos Sweden - Integritetsskyddsmyndigheten", "f.125.label": "Identificeer de bijlagen bij deze melding", "f.125.tip": "Tooltip: met betrekking tot phishing moet er een opsplitsing van communicaties zijn, namelijk 3 categorieën: \nDe eigenaar, betrokkene van de mailbox\nBetrokkenen die een phishingmail hebben ontvangen\n\nBetrokkenen van wie persoonsgegevens zich in de gecompromitteerde mailbox bevonden", "f.125.opt.a": "Gedateerde kopie van de communicatie aan de betrokkene", "f.125.opt.b": "Gedateerde kopie van de risicobeoordeling", "f.125.opt.c": "Gedateerde kopie van het onderzoeksrapport naar de inbreuk (cyberincidenten)", "f.125.opt.d": "Gedateerde kopie van de ransomware-nota", "f.125.opt.e": "Gedateerde kopie van het phishingbericht", "f.125.opt.f": "Gedateerde kopie van de interne procedure om een inbreuk te melden", "f.125.opt.g": "Gedateerde kopie van het interne beleid om (verouderde) persoonsgegevens te wissen/vernietigen", "f.125.opt.h": "Gedateerde kopie van de communicatie aan de verkeerde ontvangers", "f.125.opt.i": "Gedateerde kopie van de externe melding/het externe bericht van de inbreuk", "f.125.opt.j": "Overige", "f.126.label": "Overige bijlagen", "enisa.dpc.label": "Context van de gegevensverwerking", "enisa.dpc.base.simple": "Eenvoudige gegevens (bv. biografische, contactgegevens)", "enisa.dpc.base.behavioural": "Gedragsgegevens (bv. locatie, verkeer, voorkeuren)", "enisa.dpc.base.financial": "Financiële gegevens", "enisa.dpc.base.sensitive": "Gevoelige gegevens (bijzondere categorieën, art. 9/10 GDPR)", "enisa.ei.label": "Gemak van identificatie", "enisa.ei.lvl.negligible": "Verwaarloosbaar - identificatie praktisch onmogelijk", "enisa.ei.lvl.limited": "Beperkt - identificatie moeilijk maar mogelijk", "enisa.ei.lvl.significant": "Aanzienlijk - identificatie redelijk eenvoudig", "enisa.ei.lvl.maximum": "Maximaal - gegevens identificeren de betrokkene rechtstreeks", "enisa.cb.confidentiality.label": "Verlies van vertrouwelijkheid", "enisa.cb.confidentiality.lvl0": "Geen aanwijzing van onrechtmatige verwerking", "enisa.cb.confidentiality.lvl1": "Openbaarmaking aan bekende/beperkte ontvangers", "enisa.cb.confidentiality.lvl2": "Publicatie / openbaarmaking aan onbekende ontvangers", "enisa.cb.integrity.label": "Verlies van integriteit", "enisa.cb.integrity.lvl0": "Geen onrechtmatig gebruik vastgesteld", "enisa.cb.integrity.lvl1": "Gegevens gewijzigd, herstel mogelijk", "enisa.cb.integrity.lvl2": "Gegevens gewijzigd, geen herstel mogelijk", "enisa.cb.availability.label": "Verlies van beschikbaarheid", "enisa.cb.availability.lvl0": "Gegevens zonder problemen herstelbaar", "enisa.cb.availability.lvl1": "Gedeeltelijke / tijdelijke onbeschikbaarheid", "enisa.cb.availability.lvl2": "Volledige onbeschikbaarheid, niet herstelbaar", "enisa.cb.malicious": "Kwaadwillig opzet", "enisa.band.low": "Laag", "enisa.band.low.meaning": "Individuen worden ofwel niet geraakt ofwel kunnen enkele ongemakken ondervinden.", "enisa.band.medium": "Gemiddeld", "enisa.band.medium.meaning": "Individuen kunnen aanzienlijke ongemakken ondervinden, die zij ondanks enige moeilijkheden zullen kunnen overwinnen.", "enisa.band.high": "Hoog", "enisa.band.high.meaning": "Individuen kunnen aanzienlijke gevolgen ondervinden, die zij zouden moeten kunnen overwinnen, zij het met ernstige moeilijkheden.", "enisa.band.very_high": "Zeer hoog", "enisa.band.very_high.meaning": "Individuen kunnen aanzienlijke, of zelfs onomkeerbare, gevolgen ondervinden die zij mogelijk niet kunnen overwinnen.", "enisa.mit.single_subject": "Enkele betrokkene / zeer laag volume", "enisa.mit.recipient_confirms_deletion": "Verkeerde ontvanger bevestigt verwijdering van de gegevens", "enisa.mit.weak_linkage": "Veelvoorkomende naam / naamgenoot / zwakke koppeling", "enisa.mit.strong_encryption": "Sterke versleuteling / gegevens onbegrijpelijk voor ontvanger", "enisa.mit.pseudonymisation_no_key": "Pseudonimisering zonder toegankelijke sleutel", "enisa.mit.professional_secrecy": "Ontvanger gebonden door beroepsgeheim / wettelijke vertrouwelijkheid", "enisa.mit.availability_restored": "Beschikbaarheid snel hersteld vanuit back-up (korte onderbreking)", "enisa.mit.public_low_criticality": "Gegevens reeds openbaar / lage kritikaliteit", "enisa.mit.note": "Verzachtende omstandigheden die de score verlagen. Volgens het verantwoordingsbeginsel (art. 5) zijn dit BEWERKBARE suggesties, geen opgelegde black-box-aanpassing: elke schakelaar verplaatst de aangegeven variabele in de aangegeven richting; de verwerkingsverantwoordelijke kan dit overrulen. Exacte numerieke stappen zijn ENISA-standaard en in afwachting van bevestiging aan de hand van de ENISA 2013-PDF.", "enisa.provenance": "SE < 2 = Laag is letterlijk overgenomen uit de tekst van het ENISA-document. De bovengrenzen (Gemiddeld 2-<3, Hoog 3-<4, Zeer hoog >=4) zijn de standaard, algemeen geciteerde ENISA-niveaus, maar zijn niet letterlijk uit de tekstlaag van deze PDF gehaald; behandel ze als 'ENISA-standaard geconsolideerde niveaus'.", "rk.circumstances_cause": "Omstandigheden en oorzaak van de inbreuk (indien bekend)", "rk.date_or_period": "Datum of periode van de inbreuk (of benadering)", "rk.personal_information": "Beschrijving van de betrokken persoonlijke informatie (voor zover bekend)", "rk.number_affected": "Aantal getroffen individuen (of benadering)", "rk.mitigation_steps": "Genomen stappen om het risico op schade te verminderen/beperken", "rk.notification_steps": "Genomen of geplande stappen om getroffen individuen te informeren (indien van toepassing)", "rk.retention_note": "Minimaal 24 maanden na de dag waarop de organisatie vaststelt dat de inbreuk heeft plaatsgevonden (SOR/2018-64).", "help.dpc": "Context van de gegevensverwerking: hoe kritiek de gegevens zijn. 1 eenvoudig, 2 gedrag, 3 financieel, 4 gevoelig (bijzondere categorieën).", "help.ei": "Gemak van identificatie: hoe gemakkelijk de gegevens een persoon identificeren (vermenigvuldigt DPC). 0,25 verwaarloosbaar tot 1 maximaal.", "help.cb": "Omstandigheden van de inbreuk: extra punten voor verlies van vertrouwelijkheid, integriteit, beschikbaarheid (elk 0 / +0,25 / +0,5) en kwaadwillig opzet (+0,5).", "enisa.mititle": "Verzachtende factoren", "enisa.cbtitle_mal": "Kwaadwillig opzet", "btn.export_csv": "CSV exporteren", "btn.export_xls": "XLS exporteren", "btn.export_aggregate": "Geaggregeerde statistieken exporteren (geanonimiseerd)", "record.retention_prefix": "Bewaartermijn", "record.aggregate_note": "Geaggregeerde export: geanonimiseerde aantallen per taxonomie, k-anonimiteit", "obl.title": "Uw verplichtingen voor deze inbreuk", "obl.intro": "Indicatieve richtsnoeren gegenereerd op basis van de door u ingevoerde gegevens.", "obl.badge.required": "Vereist", "obl.badge.notreq": "Niet vereist", "obl.badge.assess": "Te beoordelen", "obl.auth.title": "Meld aan de toezichthoudende autoriteit", "obl.auth.required": "Vereist tenzij de inbreuk waarschijnlijk geen risico voor de rechten en vrijheden van natuurlijke personen met zich meebrengt (art. 33, lid 1). Termijn: zonder onredelijke vertraging en, indien haalbaar, binnen 72 uur na kennisname.", "obl.auth.notreq": "Alleen niet vereist indien de inbreuk waarschijnlijk geen risico voor de rechten en vrijheden met zich meebrengt (art. 33, lid 1). Documenteer de redenering (art. 33, lid 5).", "obl.auth.assess": "Beoordeel of de inbreuk waarschijnlijk een risico met zich meebrengt. De ENISA-ernstscore voedt deze beoordeling, maar bepaalt op zichzelf niet de wettelijke verplichting.", "obl.subj.title": "Deel mee aan de getroffen individuen", "obl.subj.text": "Alleen vereist indien de inbreuk waarschijnlijk een HOOG risico voor de rechten en vrijheden met zich meebrengt (art. 34, lid 1), zonder onredelijke vertraging. Uitzonderingen (art. 34, lid 3): (a) gegevens onbegrijpelijk, bv. sterke versleuteling; (b) achteraf genomen maatregelen waardoor het hoge risico niet langer waarschijnlijk is; (c) onevenredige inspanning -> in plaats daarvan openbare mededeling.", "obl.doc.title": "Documenteer de inbreuk intern", "obl.doc.text": "Altijd vereist, voor ALLE inbreuken, inclusief die welke niet zijn gemeld (art. 33, lid 5). De GDPR stelt geen bewaartermijn vast; een minimum van 24 maanden wordt aanbevolen naar het Canadese model (PIPEDA, SOR/2018-64), zoals voorgesteld in het standpuntdocument (deel III.5).", "obl.disclaimer": "Dit zijn indicatieve richtsnoeren gegenereerd op basis van de door u ingevoerde gegevens; het is geen juridisch advies en vervangt niet de beoordeling per geval door de verwerkingsverantwoordelijke uit hoofde van de artikelen 33 en 34 GDPR. De verwerkingsverantwoordelijke blijft verantwoordelijk voor de vaststelling en voor de aangegeven waarden (verantwoordingsplicht, art. 5, lid 2).", "enisa.select_prompt": "Selecteer DPC en EI om de ernst te berekenen.", "common.option_dash": "--", "mit.off": "Uit", "mit.apply": "Toepassen", "common.step": "Stap", "record.aggregate_note2": "(kleine cellen onderdrukt). Geen rijen met enkele meldingen, geen identiteit van de verwerkingsverantwoordelijke.", "form.methodology_prefix": "ENISA-ernstmethodologie: SE = DPC x EI + CB = "}, "pl": {"_meta": {"lang": "pl", "name": "Polski", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Asystent zgłaszania naruszeń EDPB", "app.subtitle": "Działające offline narzędzie zaprojektowane w duchu prywatności do segregacji naruszeń ochrony danych osobowych, oceny dotkliwości ENISA i przygotowania zgłoszenia EDPB", "app.disclaimer": "Projekt oparty na szablonie EDPB v1.0 (konsultacje publiczne do 5 sierpnia 2026 r.). Działa w całości w Twojej przeglądarce - żadne dane nie opuszczają Twojego urządzenia. Nie jest to oficjalny kanał zgłoszeń; nie używaj do rzeczywistych zgłoszeń do organu nadzorczego, dopóki organy nie wdrożą szablonu.", "nav.preassessment": "1. Wstępna ocena", "nav.severity": "2. Dotkliwość ENISA", "nav.notification": "3. Zgłoszenie EDPB", "nav.record": "4. Rejestr naruszeń", "lang.label": "Język", "lang.incomplete": "(robocze tłumaczenie - tekst zastępczy w języku angielskim)", "pre.title": "Wstępna ocena (segregacja)", "pre.intro": "Szybka segregacja, inspirowana samooceną ICO, pozwalająca ustalić, czy mamy do czynienia z naruszeniem ochrony danych osobowych podlegającym zgłoszeniu, przed wypełnieniem pełnego szablonu.", "pre.q_isbreach": "Czy jest to naruszenie bezpieczeństwa prowadzące do przypadkowego lub niezgodnego z prawem zniszczenia, utraty, modyfikacji, nieuprawnionego ujawnienia lub nieuprawnionego dostępu do danych osobowych?", "pre.q_personaldata": "Czy naruszenie dotyczy danych osobowych (informacji odnoszących się do zidentyfikowanej lub możliwej do zidentyfikowania osoby)?", "pre.q_risk": "Czy naruszenie może powodować ryzyko naruszenia praw lub wolności osób fizycznych?", "pre.q_highrisk": "Czy naruszenie może powodować WYSOKIE ryzyko dla osób fizycznych?", "pre.verdict.notbreach": "Nie wydaje się, aby było to naruszenie ochrony danych osobowych w rozumieniu RODO. Mimo to zachowaj wewnętrzny rejestr.", "pre.verdict.norisk": "Naruszenie ochrony danych osobowych bez prawdopodobnego ryzyka: zgłoszenie do organu nadzorczego może nie być wymagane, lecz musisz je udokumentować (art. 33 ust. 5).", "pre.verdict.notify_dpa": "Prawdopodobnie podlega zgłoszeniu do organu nadzorczego w ciągu 72 godzin (art. 33).", "pre.verdict.notify_subjects": "Wysokie ryzyko: zawiadom również osoby, których dane dotyczą, bez zbędnej zwłoki (art. 34), chyba że ma zastosowanie wyłączenie z art. 34 ust. 3.", "enisa.title": "Ocena dotkliwości ENISA", "enisa.intro": "Oblicza SE = DPC x EI + CB oraz przedział dotkliwości. Odtwarzalny wynik pozwalający odpowiedzieć na pole szablonu 'opisz zastosowaną metodologię'.", "enisa.dpc": "Kontekst przetwarzania danych (DPC)", "enisa.ei": "Łatwość identyfikacji (EI)", "enisa.cb": "Okoliczności naruszenia (CB)", "enisa.result": "Wynik dotkliwości (SE)", "enisa.band": "Przedział dotkliwości", "enisa.trigger_on": "SE >= 2: aktywowano ścieżkę oceny / zgłoszenia.", "enisa.trigger_off": "SE < 2 (niski): zgłoszenie do organu zazwyczaj nie jest wymagane, lecz udokumentuj naruszenie.", "enisa.prefill": "Użyj tego wyniku do wstępnego wypełnienia zgłoszenia EDPB", "form.title": "Zgłoszenie EDPB", "form.intro": "Pełny szablon EDPB, wstępnie wypełniony na podstawie Twojej wstępnej oceny i wyniku ENISA. Pola warunkowe pojawiają się w zależności od Twoich odpowiedzi.", "form.export_json": "Eksportuj JSON (ładunek API)", "form.export_note": "Wyeksportowany plik JSON jest zgodny z otwartym schematem zgłaszania naruszeń i może zostać przesłany przez otwarte API przez Twój system zarządzania.", "form.required": "wymagane", "form.gdpr": "RODO", "record.title": "Rejestr naruszeń (rozliczalność)", "record.intro": "Rejestr WSZYSTKICH naruszeń, w tym tych niepodlegających zgłoszeniu, inspirowany kanadyjskim obowiązkiem prowadzenia dokumentacji PIPEDA oraz art. 33 ust. 5 RODO. Przechowywany lokalnie w Twojej przeglądarce.", "record.add": "Zapisz bieżące naruszenie w rejestrze", "record.empty": "Nie zarejestrowano jeszcze żadnych naruszeń.", "record.e
