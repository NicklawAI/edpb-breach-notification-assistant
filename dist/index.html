s significativas, ou mesmo irreversíveis, que poderão não conseguir ultrapassar.", "enisa.mit.single_subject": "Titular dos dados único / volume muito reduzido", "enisa.mit.recipient_confirms_deletion": "O destinatário errado confirma o apagamento dos dados", "enisa.mit.weak_linkage": "Nome comum / homonímia / ligação ténue", "enisa.mit.strong_encryption": "Cifragem forte / dados incompreensíveis para o destinatário", "enisa.mit.pseudonymisation_no_key": "Pseudonimização sem chave acessível", "enisa.mit.professional_secrecy": "Destinatário vinculado por sigilo profissional / confidencialidade legal", "enisa.mit.availability_restored": "Disponibilidade rapidamente restabelecida a partir de cópia de segurança (interrupção breve)", "enisa.mit.public_low_criticality": "Dados já públicos / baixa criticidade", "enisa.mit.note": "Circunstâncias atenuantes que reduzem a pontuação. Nos termos do princípio da responsabilidade (art. 5.º), trata-se de sugestões EDITÁVEIS, e não de um ajustamento imposto e opaco: cada comutador move a variável indicada na direção indicada; o responsável pelo tratamento pode anular. Os passos numéricos exatos são predefinições da ENISA e estão pendentes de confirmação face ao PDF da ENISA de 2013.", "enisa.provenance": "SE < 2 = Reduzido é uma transcrição literal do texto do documento da ENISA. Os limiares superiores (Médio 2-<3, Elevado 3-<4, Muito elevado >=4) são os níveis ENISA padrão, universalmente citados, mas não foram extraídos literalmente da camada de texto deste PDF; trate-os como “níveis consolidados padrão da ENISA”.", "rk.circumstances_cause": "Circunstâncias e causa da violação (se conhecidas)", "rk.date_or_period": "Data ou período da violação (ou aproximação)", "rk.personal_information": "Descrição das informações pessoais envolvidas (na medida do que é conhecido)", "rk.number_affected": "Número de pessoas afetadas (ou aproximação)", "rk.mitigation_steps": "Medidas adotadas para reduzir/mitigar o risco de danos", "rk.notification_steps": "Medidas adotadas ou previstas para notificar as pessoas afetadas (quando aplicável)", "rk.retention_note": "Mínimo de 24 meses após o dia em que a organização determina que ocorreu a violação (SOR/2018-64).", "help.dpc": "Contexto do tratamento de dados: quão críticos são os dados. 1 simples, 2 comportamentais, 3 financeiros, 4 sensíveis (categorias especiais).", "help.ei": "Facilidade de identificação: com que facilidade os dados identificam uma pessoa (multiplica o DPC). 0,25 insignificante a 1 máxima.", "help.cb": "Circunstâncias da violação: pontos adicionais por perda de confidencialidade, integridade, disponibilidade (cada uma 0 / +0,25 / +0,5) e intenção maliciosa (+0,5).", "enisa.mititle": "Fatores atenuantes", "enisa.cbtitle_mal": "Intenção maliciosa", "btn.export_csv": "Exportar CSV", "btn.export_xls": "Exportar XLS", "btn.export_aggregate": "Exportar estatísticas agregadas (anonimizadas)", "record.retention_prefix": "Conservação", "record.aggregate_note": "Exportação agregada: contagens anonimizadas por taxonomia, k-anonimato", "obl.title": "As suas obrigações relativamente a esta violação", "obl.intro": "Orientação indicativa gerada a partir dos dados que introduziu.", "obl.badge.required": "Obrigatória", "obl.badge.notreq": "Não obrigatória", "obl.badge.assess": "A avaliar", "obl.auth.title": "Notificar a autoridade de controlo", "obl.auth.required": "Obrigatória, salvo se for improvável que a violação implique um risco para os direitos e liberdades das pessoas singulares (art. 33.º, n.º 1). Prazo: sem demora injustificada e, sempre que possível, no prazo de 72 horas após ter tido conhecimento.", "obl.auth.notreq": "Não obrigatória apenas se for improvável que a violação implique um risco para os direitos e liberdades (art. 33.º, n.º 1). Documente a fundamentação (art. 33.º, n.º 5).", "obl.auth.assess": "Avalie se é provável que a violação implique um risco. A pontuação de gravidade da ENISA informa esta avaliação, mas não determina, por si só, a obrigação legal.", "obl.subj.title": "Comunicar às pessoas afetadas", "obl.subj.text": "Obrigatória apenas se for provável que a violação implique um risco ELEVADO para os direitos e liberdades (art. 34.º, n.º 1), sem demora injustificada. Isenções (art. 34.º, n.º 3): (a) dados incompreensíveis, por exemplo, cifragem forte; (b) medidas subsequentes que tornem o risco elevado já não provável; (c) esforço desproporcionado -> comunicação pública em alternativa.", "obl.doc.title": "Documentar a violação internamente", "obl.doc.text": "Sempre obrigatória, para TODAS as violações, incluindo as não notificadas (art. 33.º, n.º 5). O RGPD não fixa um período de conservação; recomenda-se um mínimo de 24 meses com base no modelo canadiano (PIPEDA, SOR/2018-64), conforme proposto no documento de posição (Parte III.5).", "obl.disclaimer": "Esta é uma orientação indicativa gerada a partir dos dados que introduziu; não constitui aconselhamento jurídico e não substitui a avaliação caso a caso do responsável pelo tratamento ao abrigo dos artigos 33.º e 34.º do RGPD. O responsável pelo tratamento continua a ser responsável pela determinação e pelos valores declarados (responsabilidade, art. 5.º, n.º 2).", "enisa.select_prompt": "Selecione DPC e EI para calcular a gravidade.", "common.option_dash": "--", "mit.off": "Inativo", "mit.apply": "Aplicar", "common.step": "Passo", "record.aggregate_note2": "(células pequenas suprimidas). Sem linhas de notificação individual, sem identidade do responsável pelo tratamento.", "form.methodology_prefix": "Metodologia de gravidade da ENISA: SE = DPC x EI + CB = "}, "ro": {"_meta": {"lang": "ro", "name": "Română", "status": "complete", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Asistent de notificare a încălcărilor EDPB", "app.subtitle": "Instrument offline, conceput cu respectarea confidențialității, pentru trierea încălcărilor securității datelor cu caracter personal, evaluarea gravității ENISA și pregătirea notificării EDPB", "app.disclaimer": "Proiect bazat pe șablonul EDPB v1.0 (consultare publică până la 5 august 2026). Funcționează în întregime în browserul dvs. - niciun fel de date nu părăsesc dispozitivul dvs. Nu este un canal oficial de transmitere; nu îl utilizați pentru notificări reale către o autoritate de supraveghere până când autoritățile nu implementează șablonul.", "nav.preassessment": "1. Evaluare preliminară", "nav.severity": "2. Gravitate ENISA", "nav.notification": "3. Notificare EDPB", "nav.record": "4. Evidența încălcărilor", "lang.label": "Limbă", "lang.incomplete": "(traducere provizorie - revenire la engleză)", "pre.title": "Evaluare preliminară (triere)", "pre.intro": "Triere rapidă, inspirată de autoevaluarea ICO, pentru a decide dacă este vorba despre o încălcare a securității datelor cu caracter personal care trebuie notificată, înainte de a completa șablonul integral.", "pre.q_isbreach": "Aceasta este o încălcare a securității care duce, în mod accidental sau ilegal, la distrugerea, pierderea, modificarea, divulgarea neautorizată a datelor cu caracter personal sau la accesul neautorizat la acestea?", "pre.q_personaldata": "Încălcarea implică date cu caracter personal (informații referitoare la o persoană identificată sau identificabilă)?", "pre.q_risk": "Este probabil ca încălcarea să genereze un risc pentru drepturile și libertățile persoanelor fizice?", "pre.q_highrisk": "Este probabil ca încălcarea să genereze un risc RIDICAT pentru persoanele fizice?", "pre.verdict.notbreach": "Aceasta nu pare a fi o încălcare a securității datelor cu caracter personal în temeiul RGPD. Păstrați totuși o evidență internă.", "pre.verdict.norisk": "Încălcare a securității datelor cu caracter personal fără risc probabil: notificarea către autoritatea de supraveghere ar putea să nu fie necesară, însă trebuie să o consemnați (art. 33 alin. (5)).", "pre.verdict.notify_dpa": "Probabil notificabilă autorității de supraveghere în termen de 72 de ore (art. 33).", "pre.verdict.notify_subjects": "Risc ridicat: comunicați totodată persoanelor afectate fără întârzieri nejustificate (art. 34), cu excepția cazului în care se aplică o derogare prevăzută la art. 34 alin. (3).", "enisa.title": "Evaluarea gravității ENISA", "enisa.intro": "Calculează SE = DPC x EI + CB și nivelul de gravitate. Un scor reproductibil pentru a răspunde la câmpul din șablon 'descrieți metodologia utilizată'.", "enisa.dpc": "Contextul prelucrării datelor (DPC)", "enisa.ei": "Ușurința identificării (EI)", "enisa.cb": "Circumstanțele încălcării (CB)", "enisa.result": "Scor de gravitate (SE)", "enisa.band": "Nivel de gravitate", "enisa.trigger_on": "SE >= 2: a fost activată calea de evaluare / notificare.", "enisa.trigger_off": "SE < 2 (scăzut): notificarea autorității nu este, în general, necesară, însă consemnați încălcarea.", "enisa.prefill": "Utilizați acest scor pentru a precompleta notificarea EDPB", "form.title": "Notificare EDPB", "form.intro": "Șablonul EDPB integral, precompletat pe baza evaluării preliminare și a scorului ENISA. Câmpurile condiționate apar în funcție de răspunsurile dvs.", "form.export_json": "Exportă JSON (sarcină utilă API)", "form.export_note": "Fișierul JSON exportat este validat în raport cu schema deschisă de notificare a încălcărilor și poate fi transmis prin API-ul deschis de către sistemul dvs. de management.", "form.required": "obligatoriu", "form.gdpr": "RGPD", "record.title": "Evidența încălcărilor (responsabilitate)", "record.intro": "Un registru al TUTUROR încălcărilor, inclusiv al celor care nu trebuie notificate, inspirat de obligația canadiană de păstrare a evidențelor PIPEDA și de art. 33 alin. (5) RGPD. Stocat local în browserul dvs.", "record.add": "Salvează încălcarea curentă în evidență", "record.empty": "Nicio încălcare consemnată încă.", "record.export": "Exportă evidența (JSON)", "common.yes": "Da", "common.no": "Nu", ical, dovada prezenței medicale, rezultatele testelor de aptitudine medicală sau similare)", "f.70.opt.n": "Date de identificare (de exemplu, număr național de identificare, număr de act de identitate)", "f.70.opt.o": "Date de localizare", "f.70.opt.p": "Documente oficiale (de exemplu, copii scanate)", "f.70.opt.q": "Metode de plată (de exemplu, card de credit, conturi bancare)", "f.70.opt.r": "Date de profil (de exemplu, rețea socială, scor de credit, profil psihologic sau de alt tip", "f.70.opt.s": "s) Credențiale de utilizator (de exemplu, nume de utilizator, parole, token-uri)", "f.70.opt.t": "Încă necunoscut", "f.70.opt.u": "Tipuri de date suplimentare (vă rugăm să specificați în descrierea suplimentară)", "f.71.label": "Descrierea suplimentară a datelor afectate de încălcare și a categoriilor de date suplimentare", "f.72.label": "Înregistrări de date cu caracter personal afectate de încălcarea securității datelor cu caracter personal", "f.72.tip": "Vă rugăm să specificați tipul de înregistrare: numărul de date despre fiecare persoană vizată afectată. De exemplu, pentru a evita menționarea doar a cifrei „500”. Deoarece „5 tipuri de date (și anume *,*,*,*,*,*) despre 100 de persoane” și „100 de tipuri de date (și anume *,*,*,*,*) despre 5 persoane” pot să nu conducă la aceeași evaluare a riscurilor, chiar dacă ambele ar putea fi rezumate la „500 de înregistrări”.", "f.72.opt.a": "Număr exact", "f.72.opt.b": "Număr aproximativ", "f.72.opt.c": "Numărul nu poate fi determinat", "f.72.opt.d": "Număr care urmează să fie determinat", "f.73.label": "Numărul de înregistrări de date cu caracter personal afectate de încălcarea securității datelor cu caracter personal", "f.73.tip": "Vă rugăm să indicați aici numărul de înregistrări afectate de încălcare, adică numărul de intrări individuale din baza de date afectată de încălcare.", "f.75.label": "Măsuri relevante existente la momentul producerii încălcării securității datelor cu caracter personal", "f.75.tip": "Această lis opt.b": "Datele pot fi modificate în date altfel valabile și utilizate ulterior în alte scopuri", "f.81.opt.c": "Altele", "f.81.opt.d": "În curs de evaluare", "f.82.label": "Descrierea altor consecințe asupra integrității", "f.83.label": "Consecințe probabile în caz de încălcare a disponibilității", "f.83.opt.a": "Imposibilitatea accesării serviciilor", "f.83.opt.b": "Întreruperi ale serviciilor și dificultăți în utilizarea serviciilor", "f.83.opt.c": "Altele", "f.83.opt.d": "În curs de evaluare", "f.84.label": "Descrierea altor consecințe asupra disponibilității", "f.85.label": "Natura impactului potențial asupra persoanei vizate", "f.85.tip": "Vă rugăm să indicați aici natura impactului asupra drepturilor și libertăților persoanei vizate.", "f.85.opt.a": "Pierderea controlului asupra datelor lor cu caracter personal", "f.85.opt.b": "Limitarea drepturilor lor", "f.85.opt.c": "Discriminare", "f.85.opt.d": "Furt sau uzurpare a identității", "f.85.opt.e": "Fraudă", "f.85.opt.f": "Pierdere financiară", "f.85.opt.g": "Inversarea neautorizată a pseudonimizării", "f.85.opt.h": "Prejudiciu de reputație", "f.85.opt.i": "Pierderea confidențialității datelor cu caracter personal protejate prin secret profesional", "f.85.opt.j": "Divulgarea datelor către părți terțe neautorizate", "f.85.opt.k": "Dezavantaj economic sau social semnificativ", "f.85.opt.l": "Vătămare fizică sau psihică", "f.85.opt.m": "Prejudiciu material sau moral asupra bunurilor", "f.85.opt.n": "Alt impact (vă rugăm să precizați în descrierea suplimentară)", "f.85.opt.o": "De stabilit", "f.86.label": "Descriere suplimentară a celorlalte tipuri de impact asupra persoanelor vizate", "f.87.label": "Gravitatea impacturilor potențiale", "f.87.tip": "Indicați aici rezultatul autoevaluării dumneavoastră privind gravitatea impactului încălcării asupra persoanelor vizate. Vă rugăm să selectați gravitatea cea mai ridicată dacă pot apărea mai multe impacturi potențiale.", "f.87.opt.a": "Minor", "f.87.opt.b": "Moderat", "f.87.opt.c": "Grav", "f.87.opt.d": "De stabilit", "f.89.label": "Rezultatul evaluării riscurilor efectuate de operator", "f.89.opt.a": "Este probabil ca încălcarea securității datelor cu caracter personal să genereze un risc ridicat pentru drepturile și libertățile persoanelor fizice", "f.89.opt.b": "Este probabil ca încălcarea securității datelor cu caracter personal să genereze un risc (nu ridicat) pentru drepturile și libertățile persoanelor fizice", "f.89.opt.c": "Este puțin probabil ca încălcarea securității datelor cu caracter personal să genereze un risc pentru drepturile și libertățile persoanelor fizice c) Sunt necesare informații suplimentare pentru a evalua riscul pentru drepturile și libertățile persoanelor fizice", "f.90.label": "Descriere suplimentară a evaluării riscurilor efectuate de operator", "f.90.tip": "Vă rugăm să descrieți metodologia utilizată și factorii relevanți pe care i-ați luat în considerare.", "f.92.label": "Măsuri luate pentru a remedia încălcarea securității datelor cu caracter personal și pentru a atenua consecințele acesteia", "f.92.tip": "Vă rugăm să indicați în ce măsură soluționează problema măsurile luate.", "f.94.label": "Măsuri relevante luate pentru a preveni o încălcare similară a securității datelor cu caracter personal", "f.94.opt.a": "Anonimizare", "f.94.opt.b": "Plan de backup / recuperare", "f.94.opt.c": "Modificarea proceselor", "f.94.opt.d": "Criptarea datelor", "f.94.opt.e": "Politici de protecție a datelor și de securitate a informațiilor", "f.94.opt.f": "Instruire privind protecția datelor și securitatea", "f.94.opt.g": "Ștergerea datelor", "f.94.opt.h": "Jurnal de incidente", "f.94.opt.i": "Niveluri de acces la date", "f.94.opt.j": "Control logic al accesului (de exemplu, MFA)", "f.94.opt.k": "Audituri periodice", "f.94.opt.l": "Control fizic al accesului", "f.94.opt.m": "Pseudonimizare", "f.94.opt.n": "Sisteme IT actualizate", "f.94.opt.o": "Alte măsuri (vă rugăm să precizați în descrierea suplimentară)", "f.95.label": "Descriere suplimentară a măsurilor permanente actualizate relevante pentru a evita incidente similare în viitor", "f.95.tip": "Vă rugăm să indicați în ce măsură soluționează problema și îmbunătățesc situația măsurile luate.\n\nSe așteaptă o descriere dacă ați răspuns cu „Alte măsuri” la întrebarea anterioară m).\n\nCu toate acestea, nu ezitați să descrieți măsuri suplimentare luate după încălcare, sau care urmează să fie luate, dacă considerați că este relevant.", "f.97.label": "A fost comunicată încălcarea securității datelor cu caracter personal persoanelor vizate?", "f.97.tip": "Dacă nu ați evaluat încă dacă veți notifica, vă rugăm să rețineți că va trebui să faceți o notificare ulterioară odată ce ați luat decizia.\n\nDacă comunicați încălcarea securității datelor persoanelor vizate în etape sau dacă nu puteți contacta încă toate persoanele vizate, vă rugăm să indicați acest lucru în câmpurile 98 și 98a.", "f.97.opt.a": "Da", "f.97.opt.b": "Nu, dar va fi comunicată la o dată specifică b1) Nu, dar va fi comunicată la o dată ce urmează să fie stabilită", "f.97.opt.c": "Nu, investigația este încă în curs", "f.97.opt.d": "Nu, nu va fi comunicată deoarece este puțin probabil ca încălcarea securității datelor cu caracter personal să genereze un risc ridicat pentru drepturile și libertățile persoanelor fizice", "f.97.opt.e": "Nu, nu va fi comunicată deoarece este îndeplinită una dintre condițiile menționate la articolul 34 alineatul (3) din GDPR", "f.98.label": "Data la care au fost furnizate informațiile persoanelor vizate", "f.98.tip": "Vă rugăm să indicați aici data la care ați început să informați persoanele vizate.", "f.99.label": "Data viitoare la care încălcarea securității datelor va fi comunicată persoanelor vizate", "f.100.label": "Informații suplimentare privind condițiile menționate la articolul 34 alineatul (3) din GDPR care sunt îndeplinite", "f.100.opt.a": "Operatorul a implementat măsuri tehnice și organizatorice de protecție adecvate, iar aceste măsuri au fost aplicate datelor cu caracter personal afectate de încălcarea securității datelor cu caracter personal, în special cele care fac datele cu caracter personal neinteligibile pentru orice persoană neautorizată să le acceseze, cum ar fi criptarea.", "f.100.opt.b": "Operatorul a luat măsuri ulterioare care asigură că riscul ridicat pentru drepturile și libertățile persoanelor vizate menționat la alineatul (1) nu mai este susceptibil să se materializeze.", "f.100.opt.c": "Ar implica un efort disproporționat. Într-un astfel de caz, se efectuează în schimb o comunicare publică sau o măsură similară prin care persoanele vizate sunt informate într-un mod la fel de eficace.", "f.101.label": "Descriere suplimentară a motivului pentru care sunt îndeplinite condițiile menționate la articolul 34 alineatul (3) din GDPR și a măsurilor luate", "f.102.label": "Numărul persoanelor vizate informate", "f.102.opt.a": "Toate persoanele vizate au fost informate", "f.102.opt.b": "Nu toate persoanele vizate au fost informate", "f.103.label": "Descriere suplimentară a motivului pentru care nu toate persoanele vizate au fost informate", "f.103.tip": "Vă rugăm să precizați motivul pentru care unele persoane vizate nu au fost informate, de exemplu unele ar putea să nu fi fost informate din motivul A, altele din motivul B etc.\n\nMotivele pot fi de natură diversă și nu trebuie luate în considerare doar cele tehnice: proces în curs, unele persoane vizate nu pot fi contactate în același mod, li se aplică legi suplimentare, costul informării este mult mai ridicat etc.", "f.104.label": "Mijloacele de comunicare utilizate pentru a informa persoana vizată", "f.104.opt.a": "Comunicare individuală (scrisoare/e-mail/comunicare personală)", "f.104.opt.b": "Anunț public (site web/comunicat de presă/rețea socială)", "f.104.opt.c": "Altele", "f.105.label": "Descriere suplimentară a celorlalte mijloace de comunicare", "f.106.label": "Conținutul informațiilor furnizate persoanelor vizate", "f.106.tip": "Vă rugăm să furnizați acest conținut în modul cel mai relevant. De exemplu, dacă informațiile furnizate constau doar într-un e-mail cu text simplu, este suficientă copierea textului aici. Dacă, de exemplu, informațiile dumneavoastră conțin imagini/videoclipuri utile pentru înțelegere, vă rugăm să furnizați mijloacele prin care autoritatea pentru protecția datelor le poate consulta (pagină web, capturi de ecran ale e-mailului, pagină de descărcare etc.).", "f.109.label": "A fost raportat incidentul poliției/autorităților judiciare ca infracțiune?", "f.109.opt.a": "Da", "f.109.opt.b": "Nu", "f.109.opt.c": "Necunoscut", "f.110.label": "A fost notificat incidentul altor autorități de supraveghere sau organisme de control în temeiul altor legislații relevante? (de exemplu, centrul național de securitate cibernetică etc.)", "f.110.opt.a": "Da", "f.110.opt.b": "Nu", "f.110.opt.c": "Necunoscut", "f.111.label": "Informații suplimentare privind notificarea altor autorități sau organisme", "f.111.tip": "Vă rugăm să precizați care autoritate (privind protecția datelor sau nu) și, dacă este posibil, să furnizați ID-ul cazului utilizat de această autoritate, la care se poate face apoi referire.", "f.113.label": "Implică încălcarea securității datelor cu caracter personal o prelucrare transfrontalieră efectuată de un operator stabilit în Spațiul Economic European (SEE)?", "f.113.opt.a": "Da", "f.113.opt.b": "Nu", "f.113.opt.c": "Necunoscut", "f.114.label": "Autoritatea de supraveghere principală este:", "f.115.label": "Lista țărilor din SEE în care operatorul are un sediu", "f.115.tip": "Indicați aici țările vizate de încălcare.", "f.116.label": "Lista țărilor din SEE în care se află persoanele vizate afectate", "f.116.tip": "Indicați aici țările vizate de încălcare.", "f.117.label": "Numărul aproximativ de persoane vizate pe țară", "f.118.label": "Lista autorităților de supraveghere din SEE cărora le-a fost sau le va fi notificată încălcarea", "f.118.tip": "Indicați aic l": "Date comportamentale (de exemplu, localizare, trafic, preferințe)", "enisa.dpc.base.financial": "Date financiare", "enisa.dpc.base.sensitive": "Date sensibile (categorii speciale, art. 9/10 GDPR)", "enisa.ei.label": "Ușurința identificării", "enisa.ei.lvl.negligible": "Neglijabilă - identificare practic imposibilă", "enisa.ei.lvl.limited": "Limitată - identificare dificilă, dar posibilă", "enisa.ei.lvl.significant": "Semnificativă - identificare relativ ușoară", "enisa.ei.lvl.maximum": "Maximă - datele identifică direct persoana vizată", "enisa.cb.confidentiality.label": "Pierderea confidențialității", "enisa.cb.confidentiality.lvl0": "Nicio dovadă de prelucrare ilicită", "enisa.cb.confidentiality.lvl1": "Divulgare către destinatari cunoscuți/limitați", "enisa.cb.confidentiality.lvl2": "Publicare / divulgare către destinatari necunoscuți", "enisa.cb.integrity.label": "Pierderea integrității", "enisa.cb.integrity.lvl0": "Nicio utilizare ilicită identificată", "enisa.cb.integrity.lvl1": "Date modificate, recuperare posibilă", "enisa.cb.integrity.lvl2": "Date modificate, recuperare imposibilă", "enisa.cb.availability.label": "Pierderea disponibilității", "enisa.cb.availability.lvl0": "Date recuperabile fără dificultate", "enisa.cb.availability.lvl1": "Indisponibilitate parțială / temporară", "enisa.cb.availability.lvl2": "Indisponibilitate totală, nerecuperabilă", "enisa.cb.malicious": "Intenție rău intenționată", "enisa.band.low": "Scăzut", "enisa.band.low.meaning": "Persoanele fie nu vor fi afectate, fie pot întâmpina câteva inconveniente.", "enisa.band.medium": "Mediu", "enisa.band.medium.meaning": "Persoanele pot întâmpina inconveniente semnificative, pe care le vor putea depăși în pofida unor dificultăți.", "enisa.band.high": "Ridicat", "enisa.band.high.meaning": "Persoanele pot întâmpina consecințe semnificative, pe care ar trebui să le poată depăși, deși cu dificultăți serioase.", "enisa.band.very_high": "Foarte ridicat", "enisa.band.very_high.meaning": "Persoanele pot întâmpina consecințe semnificative, sau chiar ireversibile, pe care s-ar putea să nu le poată depăși.", "enisa.mit.single_subject": "O singură persoană vizată / volum foarte redus", "enisa.mit.recipient_confirms_deletion": "Destinatarul greșit confirmă ștergerea datelor", "enisa.mit.weak_linkage": "Nume comun / omonimie / asociere slabă", "enisa.mit.strong_encryption": "Criptare puternică / date neinteligibile pentru destinatar", "enisa.mit.pseudonymisation_no_key": "Pseudonimizare fără cheie accesibilă", "enisa.mit.professional_secrecy": "Destinatar obligat la secret profesional / confidențialitate legală", "enisa.mit.availability_restored": "Disponibilitate restabilită rapid din backup (întrerupere scurtă)", "enisa.mit.public_low_criticality": "Date deja publice / criticitate scăzută", "enisa.mit.note": "Circumstanțe atenuante care reduc scorul. Conform principiului responsabilității (art. 5), acestea sunt sugestii EDITABILE, nu o ajustare de tip cutie neagră impusă: fiecare comutator deplasează variabila indicată în direcția indicată; operatorul poate suprascrie. Pașii numerici exacți sunt valori implicite ENISA și urmează să fie confirmați față de documentul PDF ENISA 2013.", "enisa.provenance": "SE < 2 = Scăzut este preluat verbatim din textul documentului ENISA. Pragurile superioare (Mediu 2-<3, Ridicat 3-<4, Foarte ridicat >=4) sunt nivelurile ENISA standard, citate universal, dar nu au fost extrase verbatim din stratul de text al acestui PDF; tratați-le ca „niveluri ENISA standard consolidate”.", "rk.circumstances_cause": "Circumstanțele și cauza încălcării (dacă sunt cunoscute)", "rk.date_or_period": "Data sau perioada încălcării (sau o aproximare)", "rk.personal_information": "Descrierea informațiilor cu caracter personal implicate (în măsura în care sunt cunoscute)", "rk.number_affected": "Numărul persoanelor afectate (sau o aproximare)", "rk.mitigation_steps": "Măsuri luate pentru a reduce/atenua riscul de prejudiciu", "rk.notification_steps": "Măsuri luate sau planificate pentru a notifica persoanele afectate (după caz)", "rk.retention_note": "Minimum 24 de luni de la ziua în care organizația stabilește că a avut loc încălcarea (SOR/2018-64).", "help.dpc": "Contextul prelucrării datelor: cât de critice sunt datele. 1 simple, 2 comportamentale, 3 financiare, 4 sensibile (categorii speciale).", "help.ei": "Ușurința identificării: cât de ușor identifică datele o persoană (multiplică DPC). De la 0,25 neglijabilă la 1 maximă.", "help.cb": "Circumstanțele încălcării: puncte adăugate pentru pierderea confidențialității, integrității, disponibilității (fiecare 0 / +0,25 / +0,5) și intenția rău intenționată (+0,5).", "enisa.mititle": "Factori atenuanți", "enisa.cbtitle_mal": "Intenție rău intenționată", "btn.export_csv": "Exportă CSV", "btn.export_xls": "Exportă XLS", "btn.export_aggregate": "Exportă statistici agregate (anonimizate)", "record.retention_prefix": "Păstrare", "record.aggregate_note": "Export agregat: numere anonimizate pe taxonomie, k-anonimitate", "obl.title": "Obligațiile dumneavoastră pentru această încălcare", "obl.intro": "Orientări indicative generate din datele pe care le-ați introdus.", "obl.badge.required": "Obligatoriu", "obl.badge.notreq": "Neobligatoriu", "obl.badge.assess": "De evaluat", "obl.auth.title": "Notificați autoritatea de supraveghere", "obl.auth.required": "Obligatoriu cu excepția cazului în care este puțin probabil ca încălcarea să genereze un risc pentru drepturile și libertățile persoanelor fizice (art. 33 alin. (1)). Termen: fără întârzieri nejustificate și, dacă este posibil, în termen de 72 de ore de la data la care a luat cunoștință de aceasta.", "obl.auth.notreq": "Neobligatoriu numai dacă este puțin probabil ca încălcarea să genereze un risc pentru drepturi și libertăți (art. 33 alin. (1)). Documentați raționamentul (art. 33 alin. (5)).", "obl.auth.assess": "Evaluați dacă este probabil ca încălcarea să genereze un risc. Scorul de gravitate ENISA fundamentează această evaluare, dar nu determină, de la sine, obligația legală.", "obl.subj.title": "Comunicați persoanelor afectate", "obl.subj.text": "Obligatoriu numai dacă este probabil ca încălcarea să genereze un risc RIDICAT pentru drepturile și libertățile (art. 34 alin. (1)), fără întârzieri nejustificate. Excepții (art. 34 alin. (3)): (a) date neinteligibile, de exemplu criptare puternică; (b) măsuri ulterioare care fac ca riscul ridicat să nu mai fie probabil; (c) efort disproporționat -> comunicare publică în schimb.", "obl.doc.title": "Documentați încălcarea la nivel intern", "obl.doc.text": "Întotdeauna obligatoriu, pentru TOATE încălcările, inclusiv cele nenotificate (art. 33 alin. (5)). GDPR nu stabilește o perioadă de păstrare; se recomandă un minimum de 24 de luni pe modelul canadian (PIPEDA, SOR/2018-64), astfel cum se propune în documentul de poziție (partea III.5).", "obl.disclaimer": "Acestea sunt orientări indicative generate din datele pe care le-ați introdus; nu constituie consultanță juridică și nu înlocuiesc evaluarea de la caz la caz efectuată de operator în temeiul articolelor 33 și 34 din GDPR. Operatorul rămâne responsabil pentru stabilire și pentru valorile declarate (responsabilitate, art. 5 alin. (2)).", "enisa.select_prompt": "Selectați DPC și EI pentru a calcula gravitatea.", "common.option_dash": "--", "mit.off": "Dezactivat", "mit.apply": "Aplică", "common.step": "Pasul", "record.aggregate_note2": "(celulele mici sunt suprimate). Niciun rând de notificare individuală, nicio identitate a operatorului.", "form.methodology_prefix": "Metodologia de gravitate ENISA: SE = DPC x EI + CB = "}, "sk": {"_meta": {"lang": "sk", "name": "Slovenčina", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Asistent EDPB pre oznamovanie porušenia ochrany osobných údajov", "app.subtitle": "Offline nástroj navrhnutý so zreteľom na sú   <script>
/* EDPB Breach Notification Assistant - app engine.

(function () {

  var DATA = window.EBNA_DATA;
  var I18N = window.EBNA_I18N;
  var lang = "en";
  var state = { pre: {}, enisa: {}, form: {}, severity: null };

  function t(key, fallback) {
    var L = I18N[lang] || {};
    if (L[key] != null) return L[key];
    if (I18N.en[key] != null) return I18N.en[key];
    return (fallback != null) ? fallback : key;
  }
  // Field/option content helpers (route the EDPB template strings through i18n).
  function fLabel(f) { return t("f." + f.id + ".label", f.label); }
  function fTip(f) { return f.tooltip ? t("f." + f.id + ".tip", f.tooltip) : ""; }
  function oLabel(fid, okey, fallback) { return t("f." + fid + ".opt." + okey, fallback); }
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function (k) {
      if (k === "class") e.className = attrs[k];
      else if (k === "html") e.innerHTML = attrs[k];
      else if (k.slice(0, 2) === "on") e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(function (c) {
      if (typeof c === "string") e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
    return e;
  }

  /* ---------- ENISA severity engine (graduated CB, verbatim ENISA Annex 3) ---------- */
  var ENISA = DATA.enisa;
  // cbState = { confidentiality: 0|0.25|0.5, integrity: ..., availability: ..., malicious: bool }
  function cbTotal(cb) {
    cb = cb || {};
    var sum = (cb.confidentiality || 0) + (cb.integrity || 0) + (cb.availability || 0);
    if (cb.malicious) sum += ENISA.cb.malicious_intent.points;
    return sum;
  }
  function computeSeverity(dpcBase, eiScore, cb) {
    var se = dpcBase * eiScore + cbTotal(cb);
    var band = ENISA.bands.find(function (b) {
      var okMin = (b.min == null) || se >= b.min;
      var okMax = (b.max == null) || se < b.max;
      return okMin && okMax;
    });
    return { se: Math.round(se * 100) / 100, band: band, notify: se >= 2 };
  }

  /* Segmented button group: immediate selection, active-state feedback, no dropdown.
     options: [{value,label,title}]; current: selected value; onpick(value). Updates
     its own active state in place (no full re-render) and calls onpick. */
  function segmented(options, current, onpick) {
    var group = el("div", { class: "segmented" });
    options.forEach(function (o) {
      var b = el("button", { type: "button", "aria-pressed": String(o.value === current),
        class: "seg" + (o.value === current ? " active" : ""), title: o.title || "",
        onclick: function () {
          Array.prototype.forEach.call(group.children, function (c) { c.className = "seg"; c.setAttribute("aria-pressed", "false"); });
          b.className = "seg active"; b.setAttribute("aria-pressed", "true");

      group.appendChild(b);
    });
    return group;
  }
  function helpLine(text) { return el("p", { class: "help muted small" }, [text]); }

  /* ---------- Conditional visibility (best-effort from raw business logic) ---------- */
  function fieldVisible(field) {
    // Section headers and unconditional fields always show. visible_if is raw
    // EDPB business logic; we surface it but default to visible so the form is
    // never under-inclusive. Fine-grained rule evaluation is a roadmap item.
    return true;
  }

  /* ---------- Views ---------- */
  function viewPreAssessment() {
    var wrap = el("section", { class: "card" }, [
      el("h2", {}, [t("pre.title")]),
      el("p", { class: "muted" }, [t("pre.intro")]),
    ]);

      ["personaldata", "pre.q_personaldata"],
      ["risk", "pre.q_risk"],
      ["highrisk", "pre.q_highrisk"],

        var id = "pre_" + q[0] + "_" + v;
        var input = el("input", {

          onchange: function () { state.pre[q[0]] = v; renderVerdict(); },
        });

        row.appendChild(el("span", { class: "opt" }, [input, el("label", { for: id }, [t("common." + v)])]));
      });
      wrap.appendChild(row);
    });

        if (p.risk === "yes") msgs.push(["alert", t("pre.verdict.notify_dpa")]);
        if (p.highrisk === "yes") msgs.push(["alert", t("pre.verdict.notify_subjects")]);
      }
      verdict.innerHTML = "";
      msgs.forEach(function (m) { verdict.appendChild(el("div", { class: "banner " + m[0] }, [m[1]])); });
    }
    renderVerdict();
    return wrap;
  }

  function viewSeverity() {
    var wrap = el("section", { class: "card" }, [
      el("h2", {}, [t("enisa.title")]),
      el("p", { class: "muted" }, [t("enisa.intro")]),
      el("p", { class: "formula" }, ["SE = DPC × EI + CB"]),
    ]);
    var s = state.enisa;
    s.cb = (s.cb && typeof s.cb === "object" && !Array.isArray(s.cb)) ? s.cb : { confidentiality: 0, integrity: 0, availability: 0, malicious: false };
    s.mitigants = s.mitigants || {};
    var result = el("div", { class: "verdict sticky", id: "enisa-result" });

    // DPC base - segmented buttons (verbatim ENISA values, only the control type changes)
    wrap.appendChild(el("h3", {}, [t("enisa.dpc")]));
    wrap.appendChild(helpLine(t("help.dpc")));
    wrap.appendChild(segmented(Object.keys(ENISA.dpc.base).map(function (k) {
      var b = ENISA.dpc.base[k], lbl = t("enisa.dpc.base." + k, b.label); return { value: b.score, label: lbl.split(" (")[0] + " (" + b.score + ")", title: lbl };
    }), s.dpc, function (v) { s.dpc = v; recalc(); }));

    // EI - segmented buttons
    wrap.appendChild(el("h3", {}, [t("enisa.ei")]));
    wrap.appendChild(helpLine(t("help.ei")));
    wrap.appendChild(segmented(Object.keys(ENISA.ei.levels).map(function (k) {
      var lv = ENISA.ei.levels[k], lbl = t("enisa.ei.lvl." + k, lv.label); return { value: lv.score, label: lbl.split(" -")[0] + " (" + lv.score + ")", title: lbl };
    }), s.ei, function (v) { s.ei = v; recalc(); }));

    // CB graduated 0 / +0.25 / +0.5 per C/I/A (verbatim ENISA Annex 3) + malicious +0.5
    wrap.appendChild(el("h3", {}, [t("enisa.cb")]));
    wrap.appendChild(helpLine(t("help.cb")));
    Object.keys(ENISA.cb.graduated).forEach(function (k) {
      var g = ENISA.cb.graduated[k];
      wrap.appendChild(el("label", { class: "seg-label" }, [t("enisa.cb." + k + ".label", g.label)]));
      wrap.appendChild(segmented(g.levels.map(function (lv, i) {
        return { value: lv.points, label: "+" + lv.points, title: t("enisa.cb." + k + ".lvl" + i, lv.label) };
      }), (s.cb[k] || 0), function (v) { s.cb[k] = v; recalc(); }));
    });

  /* ---------- Breach register export (Frank P8): rich record, CSV + XLS ---------- */
  // Columns combine the Canadian record fields with data pulled from the
  // pre-assessment, ENISA score and the EDPB notification.
  var REGISTER_COLUMNS = [
    ["reference", "Internal reference"],
    ["date_period", "Date / period of incident"],
    ["circumstances_cause", "Circumstances and cause"],
    ["nature_cia", "Nature (C-I-A)"],
    ["incident_type", "Incident type (taxonomy)"],
    ["data_categories", "Data categories"],
    ["numbers", "Number of data subjects / records (approx.)"],
    ["risk_outcome", "Risk assessment outcome"],
    ["methodology_enisa", "Methodology (ENISA SE)"],
    ["notified_authority", "Notified to supervisory authority"],
    ["notified_individuals", "Communicated to individuals"],
    ["reasoned_basis", "Reasoned basis if not notified/communicated"],
    ["measures", "Measures taken"],
    ["retention", "Retention"],
    ["saved_at", "Record created"],
  ];
  function optLabel(fieldId, key) {
    var f = DATA.fields.find(function (x) { return x.id === fieldId; });
    if (!f || !key) return key || "";
    var o = (f.options || []).find(function (x) { return x.key === key; });
    return o ? (key + ") " + oLabel(fieldId, key, o.label)) : key;
  }
  // Array-safe label: handles single value or a multi-select array of keys.
  function optLabelAny(fieldId, val) {
    if (Array.isArray(val)) return val.map(function (k) { return optLabel(fieldId, k); }).join("; ");
    return optLabel(fieldId, val);
  }
  function registerRow(r) {
    var n = r.notification || {}, mr = r.minimum_record || {}, sev = r.severity;
    var f97 = n.field_97; // communicated to data subjects
    var authority = (r.pre && r.pre.risk === "yes") ? "Yes (Art. 33)" : (r.pre && r.pre.risk === "no" ? "No (no likely risk - recorded)" : "To assess");
    var individuals = f97 ? optLabel(97, f97) : ((r.pre && r.pre.highrisk === "yes") ? "Yes (Art. 34)" : "No / not required");
    return {
      reference: n.field_7 || "",
      date_period: n.field_44 ? optLabel(44, n.field_44) : (mr.date_or_period || ""),
      circumstances_cause: (mr.circumstances_cause || "") + (n.field_61 ? " | cause: " + optLabel(61, n.field_61) : ""),
      nature_cia: n.field_55 ? optLabelAny(55, n.field_55) : "",
      incident_type: n.field_60 ? optLabel(60, n.field_60) : "",
      data_categories: mr.personal_information || (n.field_70 ? optLabelAny(70, n.field_70) : ""),
      numbers: mr.number_affected || n.field_68 || n.field_73 || "",
      risk_outcome: n.field_89 ? optLabel(89, n.field_89) : (sev && sev.notify ? "Risk -> notification path" : "No high risk"),
      methodology_enisa: sev ? ("ENISA SE = " + sev.se + " (" + sev.band.label + ")") : "",
      notified_authority: authority,
      notified_individuals: individuals,
      reasoned_basis: n.field_100 ? optLabel(100, n.field_100) : (n.field_101 || mr.notification_steps || ""),
      measures: mr.mitigation_steps || (n.field_92 || ""),
      retention: (r.retention_until_months || 24) + " months min.",
      saved_at: r.saved_at || "",
    };
  }
  function csvCell(v) { v = (v == null ? "" : String(v)); return '"' + v.replace(/"/g, '""') + '"'; }
  function registerCSV(recs) {
    var head = REGISTER_COLUMNS.map(function (c) { return csvCell(c[1]); }).join(",");
    var rows = recs.map(function (r) {
      var row = registerRow(r);
      return REGISTER_COLUMNS.map(function (c) { return csvCell(row[c[0]]); }).join(",");
    });
    return "﻿" + [head].concat(rows).join("\r\n");
  }
  function xmlEsc(v) { return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function registerXLS(recs) {
    // SpreadsheetML 2003 (Excel-native, dependency-free, opens offline).
    var head = REGISTER_COLUMNS.map(function (c) { return '<Cell><Data ss:Type="String">' + xmlEsc(c[1]) + "</Data></Cell>"; }).join("");
    var body = recs.map(function (r) {
      var row = registerRow(r);
      var cells = REGISTER_COLUMNS.map(function (c) { return '<Cell><Data ss:Type="String">' + xmlEsc(row[c[0]]) + "</Data></Cell>"; }).join("");
      return "<Row>" + cells + "</Row>";
    }).join("");
    return '<?xml version="1.0"?>\n' +
      '<?mso-application progid="Excel.Sheet"?>\n' +
      '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">' +
      '<Worksheet ss:Name="Breach register"><Table>' +
      "<Row>" + head + "</Row>" + body +
      "</Table></Worksheet></Workbook>";
  }

  /* ---------- Aggregate transparency (Frank/Martim P2, California model) ----------
   * Anonymised aggregate statistics by template taxonomy. Counts only, by category,
   * over a period. k-anonymity: cells with count < k are suppressed into __suppressed__.
   */
  function subjectsBucket(r) {
    var raw = (r.minimum_record && r.minimum_record.number_affected) || (r.notification && (r.notification.field_68 || r.notification.field_73)) || "";
    var n = parseInt(String(raw).replace(/[^0-9]/g, ""), 10);
    if (!n) return "unknown";
    if (n === 1) return "1";
    if (n < 10) return "2-9";
    if (n < 100) return "10-99";
    if (n < 1000) return "100-999";
    if (n < 10000) return "1k-10k";
    return ">10k";
  }
  function aggregateRecords(recs, k, period) {
    var dims = { incident_type: {}, cause: {}, nature_cia: {}, data_categories: {}, severity_band: {}, nace_sector: {}, data_subjects_range: {}, art34_communicated: {} };
    function bump(map, key) {
      if (key == null || key === "") return;
      if (Array.isArray(key)) { key.forEach(function (k) { bump(map, k); }); return; } // multi-select: count each value
      map[key] = (map[key] || 0) + 1;
    }
    recs.forEach(function (r) {
      var n = r.notification || {};
      bump(dims.incident_type, n.field_60);
      bump(dims.cause, n.field_61);
      bump(dims.nature_cia, n.field_55);
      bump(dims.data_categories, n.field_70);
      bump(dims.severity_band, r.severity && r.severity.band ? r.severity.band.key : null);
      bump(dims.nace_sector, n.field_17);
      bump(dims.data_subjects_range, subjectsBucket(r));
      bump(dims.art34_communicated, n.field_97 ? "communicated" : "not_communicated");
    });
    // k-anonymity: suppress small cells into __suppressed__
    Object.keys(dims).forEach(function (d) {
      var m = dims[d], supp = 0;
      Object.keys(m).forEach(function (key) { if (m[key] < k) { supp += m[key]; delete m[key]; } });
      if (supp > 0) m.__suppressed__ = supp;
    });
    return {
      period: { granularity: (period && period.granularity) || "year", label: (period && period.label) || String(new Date().getUTCFullYear ? "" : "") || "current" },
      k_anonymity_threshold: k,
      total_notifications: recs.length,
      anonymisation_guarantees: DATA.aggregate_transparency.guarantees,
      dimensions: dims,
    };
  }

    if (idx > 0) nav.appendChild(el("button", { onclick: function () { activeTab = order[idx - 1]; render(); window.scrollTo(0, 0); } }, ["← " + t("common.back")]));
    else nav.appendChild(el("span", {}));
    nav.appendChild(el("span", { class: "stepcount muted small" }, [t("common.step", "Step") + " " + (idx + 1) + " / " + order.length]));
    if (idx < order.length - 1) nav.appendChild(el("button", { class: "primary", onclick: function () { activeTab = order[idx + 1]; render(); window.scrollTo(0, 0); } }, [t("common.next") + " →"]));
    else nav.appendChild(el("span", {}));
    root.appendChild(nav);
    // footer
    root.appendChild(el("footer", {}, [
      el("span", {}, ["EDPB template v1.0 - consultation until 2026-08-05 - "]),
      el("a", { href: DATA.template.source_url, target: "_blank" }, ["source"]),
      el("span", {}, [" - Apache-2.0 + CC-BY-4.0 - (c) Nicola Franchetto, Martim Taborda Barata"]),
    ]));
  }

  /* Deep-link: #tab=<pre|enisa|form|record>[&demo=1] sets the initial tab and,
     with demo=1, seeds an example ENISA score (used for docs/screenshots). */
  function applyHash() {
    var h = (location.hash || "").replace(/^#/, "");
    var params = {};
    h.split("&").forEach(function (kv) { var p = kv.split("="); if (p[0]) params[p[0]] = p[1]; });
    if (params.lang && I18N[params.lang]) lang = params.lang;
    if (params.tab && ["pre", "enisa", "form", "record"].indexOf(params.tab) >= 0) activeTab = params.tab;
    if (params.demo === "1") {
      state.pre = { isbreach: "yes", personaldata: "yes", risk: "yes", highrisk: "yes" };
      var demoCb = { confidentiality: 0.5, integrity: 0, availability: 0, malicious: true };
      state.enisa = { dpc: 4, ei: 1.0, cb: demoCb };
      state.severity = computeSeverity(4, 1.0, demoCb);
      state.record = { circumstances_cause: "Ransomware exfiltration of customer database.", date_or_period: "2026-06-15", personal_information: "Names, emails, payment methods.", number_affected: "~12,000", mitigation_steps: "Isolated systems, rotated credentials, engaged IR firm.", notification_steps: "Email to affected individuals scheduled." };
      state.form = { field_55: ["a"], field_60: "b", field_89: "a", field_70: ["a", "q"] };
      // Seed one saved record so the export bar (JSON/CSV/XLS) is demonstrable.
      try {
        if (!getRecords().length) {
          localStorage.setItem("ebna_records", JSON.stringify([{ saved_at: "2026-06-16T09:00:00Z", retention_until_months: 24, severity: state.severity, pre: state.pre, minimum_record: state.record, notification: state.form }]));
        }
      } catch (e) { /* localStorage unavailable */ }
    }
  }

  window.addEventListener("DOMContentLoaded", function () { applyHash(); render(); });
})();

</script>
