entiality.label": "Perte de confidentialité", "enisa.cb.confidentiality.lvl0": "Aucune preuve de traitement illicite", "enisa.cb.confidentiality.lvl1": "Divulgation à des destinataires connus/limités", "enisa.cb.confidentiality.lvl2": "Publication / divulgation à des destinataires inconnus", "enisa.cb.integrity.label": "Perte d'intégrité", "enisa.cb.integrity.lvl0": "Aucune utilisation illicite identifiée", "enisa.cb.integrity.lvl1": "Données altérées, récupération possible", "enisa.cb.integrity.lvl2": "Données altérées, aucune récupération possible", "enisa.cb.availability.label": "Perte de disponibilité", "enisa.cb.availability.lvl0": "Données récupérables sans difficulté", "enisa.cb.availability.lvl1": "Indisponibilité partielle / temporaire", "enisa.cb.availability.lvl2": "Indisponibilité totale, non récupérable", "enisa.cb.malicious": "Intention malveillante", "enisa.band.low": "Faible", "enisa.band.low.meaning": "Les personnes ne seront pas affectées ou pourront rencontrer quelques désagréments.", "enisa.band.medium": "Moyen", "enisa.band.medium.meaning": "Les personnes peuvent rencontrer des désagréments importants, qu'elles pourront surmonter malgré quelques difficultés.", "enisa.band.high": "Élevé", "enisa.band.high.meaning": "Les personnes peuvent rencontrer des conséquences importantes, qu'elles devraient pouvoir surmonter, mais au prix de sérieuses difficultés.", "enisa.band.very_high": "Très élevé", "enisa.band.very_high.meaning": "Les personnes peuvent rencontrer des conséquences importantes, voire irréversibles, qu'elles pourraient ne pas surmonter.", "enisa.mit.single_subject": "Personne concernée unique / volume très faible", "enisa.mit.recipient_confirms_deletion": "Le mauvais destinataire confirme la suppression des données", "enisa.mit.weak_linkage": "Nom courant / homonymie / faible corrélation", "enisa.mit.strong_encryption": "Chiffrement fort / données incompréhensibles pour le destinataire", "enisa.mit.pseudonymisation_no_key": "Pseudonymisation sans clé accessible", "enisa.mit.professional_secrecy": "Destinataire tenu par le secret professionnel / une obligation légale de confidentialité", "enisa.mit.availability_restored": "Disponibilité rapidement rétablie à partir d'une sauvegarde (interruption courte)", "enisa.mit.public_low_criticality": "Données déjà publiques / faible criticité", "enisa.mit.note": "Circonstances atténuantes qui réduisent le score. Conformément au principe de responsabilité (art. 5), il s'agit de suggestions MODIFIABLES, et non d'un ajustement de type boîte noire imposé : chaque commutateur déplace la variable indiquée dans le sens indiqué ; le responsable du traitement peut passer outre. Les pas numériques exacts sont les valeurs par défaut de l'ENISA et restent à confirmer par rapport au PDF ENISA 2013.", "enisa.provenance": "SE < 2 = Faible est repris textuellement du texte du document ENISA. Les seuils supérieurs (Moyen 2-<3, Élevé 3-<4, Très élevé >=4) sont les niveaux ENISA standard, universellement cités, mais n'ont pas été extraits textuellement de la couche de texte de ce PDF ; à considérer comme des « niveaux ENISA standard consolidés ».", "rk.circumstances_cause": "Circonstances et cause de la violation (si connues)", "rk.date_or_period": "Date ou période de la violation (ou approximation)", "rk.personal_information": "Description des renseignements personnels concernés (dans la mesure du connu)", "rk.number_affected": "Nombre de personnes touchées (ou approximation)", "rk.mitigation_steps": "Mesures prises pour réduire/atténuer le risque de préjudice", "rk.notification_steps": "Mesures prises ou prévues pour informer les personnes touchées (le cas échéant)", "rk.retention_note": "Au minimum 24 mois après le jour où l'organisation détermine que la violation s'est produite (SOR/2018-64).", "help.dpc": "Contexte de traitement des données : caractère critique des données. 1 simples, 2 comportementales, 3 financières, 4 sensibles (catégories particulières).", "help.ei": "Facilité d'identification : facilité avec laquelle les données identifient une personne (multiplie le DPC). 0,25 négligeable à 1 maximale.", "help.cb": "Circonstances de la violation : points ajoutés pour la perte de confidentialité, d'intégrité, de disponibilité (chacune 0 / +0,25 / +0,5) et l'intention malveillante (+0,5).", "enisa.mititle": "Facteurs atténuants", "enisa.cbtitle_mal": "Intention malveillante", "btn.export_csv": "Exporter CSV", "btn.export_xls": "Exporter XLS", "btn.export_aggregate": "Exporter les statistiques agrégées (anonymisées)", "record.retention_prefix": "Conservation", "record.aggregate_note": "Export agrégé : décomptes anonymisés par taxonomie, k-anonymat", "obl.title": "Vos obligations pour cette violation", "obl.intro": "Orientations indicatives générées à partir des données que vous avez saisies.", "obl.badge.required": "Requis", "obl.badge.notreq": "Non requis", "obl.badge.assess": "À évaluer", "obl.auth.title": "Notifier l'autorité de contrôle", "obl.auth.required": "Requis sauf si la violation n'est pas susceptible d'engendrer un risque pour les droits et libertés des personnes physiques (art. 33(1)). Délai : dans les meilleurs délais et, si possible, dans les 72 heures après en avoir pris connaissance.", "obl.auth.notreq": "Non requis uniquement si la violation n'est pas susceptible d'engendrer un risque pour les droits et libertés (art. 33(1)). Documentez le raisonnement (art. 33(5)).", "obl.auth.assess": "Évaluez si la violation est susceptible d'engendrer un risque. Le score de gravité ENISA éclaire cette évaluation mais ne détermine pas à lui seul l'obligation légale.", "obl.subj.title": "Communiquer aux personnes concernées affectées", "obl.subj.text": "Requis uniquement si la violation est susceptible d'engendrer un risque ÉLEVÉ pour les droits et libertés (art. 34(1)), dans les meilleurs délais. Exemptions (art. 34(3)) : (a) données incompréhensibles, par ex. chiffrement fort ; (b) mesures ultérieures rendant le risque élevé non susceptible de se matérialiser ; (c) efforts disproportionnés -> communication publique à la place.", "obl.doc.title": "Documenter la violation en interne", "obl.doc.text": "Toujours requis, pour TOUTES les violations, y compris celles non notifiées (art. 33(5)). Le GDPR ne fixe pas de durée de conservation ; un minimum de 24 mois est recommandé sur le modèle canadien (PIPEDA, SOR/2018-64), comme proposé dans le document de position (Partie III.5).", "obl.disclaimer": "Il s'agit d'orientations indicatives générées à partir des données que vous avez saisies ; elles ne constituent pas un conseil juridique et ne remplacent pas l'évaluation au cas par cas du responsable du traitement au titre des articles 33 et 34 du GDPR. Le responsable du traitement demeure responsable de la détermination et des valeurs déclarées (responsabilité, art. 5(2)).", "enisa.select_prompt": "Sélectionnez le DPC et le EI pour calculer la gravité.", "common.option_dash": "--", "mit.off": "Inactif", "mit.apply": "Appliquer", "common.step": "Étape", "record.aggregate_note2": "(petites cellules supprimées). Aucune ligne de notification individuelle, aucune identité du responsable du traitement.", "form.methodology_prefix": "Méthodologie de gravité ENISA : SE = DPC x EI + CB = "}, "ga": {"_meta": {"lang": "ga", "name": "Gaeilge", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Cúntóir Fógartha Sáruithe an EDPB", "app.subtitle": "Uirlis as líne, príobháideachas trí dhearadh, le haghaidh triáis sáruithe ar shonraí pearsanta, scórála déine ENISA agus ullmhúchán fógraí EDPB", "app.disclaimer": "Dréacht bunaithe ar theimpléad EDPB v1.0 (comhairliúchán poiblí go dtí an 5 Lúnasa 2026). Ritheann sé go hiomlán i do bhrabhsálaí - ní fhágann aon sonraí do ghléas. Ní cainéal oifigiúil aighneachta é; ná húsáid é le haghaidh fógraí beo chuig údarás maoirseachta go dtí go gcuirfidh na húdaráis an teimpléad i bhfeidhm.", "nav.preassessment": "1. Réamh-mheasúnú", "nav.severity": "2. Déine ENISA", "nav.notification": "3. Fógra EDPB", "nav.record": "4. Taifead sáruithe", "lang.label": "Teanga", "lang.incomplete": "(dréacht-aistriúchán - Béarla mar chúltaca)", "pre.title": "Réamh-mheasúnú (triáis)", "pre.intro": "Triáis thapa, spreagtha ag féinmheasúnú an ICO, chun a chinneadh an sárú ar shonraí pearsanta infhógartha é seo sula gcomhlánaítear an teimpléad iomlán.", "pre.q_isbreach": "An sárú slándála é seo as a dtagann scriosadh, cailliúint, athrú, nochtadh neamhúdaraithe sonraí pearsanta, nó rochtain orthu, go timpisteach nó go neamhdhleathach?", "pre.q_personaldata": "An mbaineann an sárú le sonraí pearsanta (faisnéis a bhaineann le duine nádúrtha sainaitheanta nó inaitheanta)?", "pre.q_risk": "An dócha go mbeidh riosca do chearta agus saoirsí daoine aonair mar thoradh ar an sárú?", "pre.q_highrisk": "An dócha go mbeidh riosca ARD do dhaoine aonair mar thoradh ar an sárú?", "pre.verdict.notbreach": "Ní cosúil gur sárú ar shonraí pearsanta é seo faoin RGCS. Coinnigh taifead inmheánach mar sin féin.", "pre.verdict.norisk": "Sárú ar shonraí pearsanta gan riosca dóchúil: b'fhéidir nach gá fógra a thabhairt don údarás maoirseachta, ach ní mór duit é a thaifeadadh (Airt. 33(5)).", "pre.verdict.notify_dpa": "Is dócha go mbeidh sé infhógartha don údarás maoirseachta laistigh de 72 uair an chloig (Airt. 33).", "pre.verdict.notify_subjects": "Riosca ard: cuir in iúl freisin do na daoine aonair lena mbaineann gan mhoill mhíchuí (Airt. 34), mura mbaineann díolúine faoi Airt. 34(3).", "enisa.title": "Measúnú déine ENISA", "enisa.intro": "Ríomhann sé SE = DPC x EI + CB agus an banda déine. Scór in-atáirgthe chun freagra a thabhairt ar réimse an teimpléid 'déan cur síos ar an modheolaíocht a úsáideadh'.", "enisa.dpc": "Comhthéacs Próiseála Sonraí (DPC)", "enisa.ei": "Éascaíocht Sainaitheanta (EI)", "enisa.cb": "Imthosca an tSáraithe (CB)", "enisa.result": "Scór déine (SE)", "enisa.band": "Banda déine", "enisa.trigger_on": "SE >= 2: gníomhachtaíodh an conair measúnaithe / fógartha.", "enisa.trigger_off": "SE < 2 (Íseal): go ginearálta ní gá fógra a thabhairt don údarás, ach taifead an sárú.", "enisa.prefill": "Úsáid an scór seo chun fógra an EDPB a réamhlíonadh", "form.title": "Fógra EDPB", "form.intro": "An teimpléad EDPB iomlán, réamhlíonta ó do réamh-mheasúnú agus scór ENISA. Taispeántar réimsí coinníollacha bunaithe ar do fhreagraí.", "form.export_json": "Easpórtáil JSON (pálasta API)", "form.export_note": "Bailíochtaíonn an JSON easpórtáilte i gcoinne na scéime oscailte fógartha sáruithe agus is féidir é a chur isteach tríd an API oscailte ag do chóras bainistíochta.", "form.required": "riachtanach", "form.gdpr": "RGCS", "record.title": "Taifead sáruithe (cuntasacht)", "record.intro": "Clár de na sáruithe GO LÉIR, lena n-áirítear cinn nach bhfuil infhógartha, spreagtha ag an oibleagáid choimeádta taifead PIPEDA Cheanada agus Airt. 33(5) den RGCS. Stóráilte go háitiúil i do bhrabhsálaí.", "record.add": "Sábháil an sárú reatha sa taifead", "record.empty": "Níl aon sárú taifeadta go fóill.", "record.export": "Easpórtáil an taifead (JSON)", "common.yes": "Tá", "common.no": "Níl", "common.unknown": "Anaithnid", "common.next": "Ar aghaidh", "common.back": "Siar"}, "hr": {"_meta": {"lang": "hr", "name": "Hrvatski", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB pomoćnik za izvješćivanje o povredi osobnih podataka", "app.subtitle": "Izvanmrežni alat osmišljen po načelu tehničke zaštite privatnosti za trijažu povreda osobnih podataka, ocjenu ozbiljnosti prema ENISA-i i pripremu EDPB izvješća", "app.disclaimer": "Nacrt na temelju EDPB predloška v1.0 (javno savjetovanje do 5. kolovoza 2026.). Radi u potpunosti u vašem pregledniku - nijedan podatak ne napušta vaš uređaj. Nije službeni kanal za podnošenje izvješća; nemojte koristiti za stvarna izvješća nadzornom tijelu dok tijela ne uvedu predložak.", "nav.preassessment": "1. Prethodna procjena", "nav.severity": "2. Ozbiljnost prema ENISA-i", "nav.notification": "3. EDPB izvješće", "nav.record": "4. Evidencija o povredi", "lang.label": "Jezik", "lang.incomplete": "(nacrt prijevoda - zamjena na engleskom)", "pre.title": "Prethodna procjena (trijaža)", "pre.intro": "Brza trijaža nadahnuta ICO-ovom samoprocjenom za odluku o tome je li riječ o povredi osobnih podataka koju treba prijaviti, prije ispunjavanja cjelovitog predloška.", "pre.q_isbreach": "Je li riječ o povredi sigurnosti koja dovodi do slučajnog ili nezakonitog uništenja, gubitka, izmjene, neovlaštenog otkrivanja ili pristupa osobnim podacima?", "pre.q_personaldata": "Uključuje li povreda osobne podatke (informacije koje se odnose na pojedinca čiji je identitet utvrđen ili se može utvrditi)?", "pre.q_risk": "Je li vjerojatno da će povreda prouzročiti rizik za prava i slobode pojedinaca?", "pre.q_highrisk": "Je li vjerojatno da će povreda prouzročiti VISOK rizik za pojedince?", "pre.verdict.notbreach": "Ne čini se da je riječ o povredi osobnih podataka prema GDPR-u. Ipak vodite internu evidenciju.", "pre.verdict.norisk": "Povreda osobnih podataka bez vjerojatnog rizika: izvješćivanje nadzornom tijelu možda nije potrebno, ali je morate evidentirati (čl. 33. st. 5.).", "pre.verdict.notify_dpa": "Vjerojatno je treba prijaviti nadzornom tijelu u roku od 72 sata (čl. 33.).", "pre.verdict.notify_subjects": "Visok rizik: bez nepotrebnog odgađanja obavijestite i pogođene pojedince (čl. 34.), osim ako se primjenjuje izuzeće iz čl. 34. st. 3.", "enisa.title": "Procjena ozbiljnosti prema ENISA-i", "enisa.intro": "Izračunava SE = DPC x EI + CB i razred ozbiljnosti. Ponovljiva ocjena za ispunjavanje polja predloška 'opišite primijenjenu metodologiju'.", "enisa.dpc": "Kontekst obrade podataka (DPC)", "enisa.ei": "Lakoća identifikacije (EI)", "enisa.cb": "Okolnosti povrede (CB)", "enisa.result": "Ocjena ozbiljnosti (SE)", "enisa.band": "Razred ozbiljnosti", "enisa.trigger_on": "SE >= 2: aktiviran put procjene / izvješćivanja.", "enisa.trigger_off": "SE < 2 (niska): izvješćivanje tijelu općenito nije potrebno, ali evidentirajte povredu.", "enisa.prefill": "Upotrijebi ovu ocjenu za predispunjavanje EDPB izvješća", "form.title": "EDPB izvješće", "form.intro": "Cjelovit EDPB predložak, predispunjen na temelju vaše prethodne procjene i ENISA ocjene. Uvjetna polja prikazuju se prema vašim odgovorima.", "form.export_json": "Izvezi JSON (API sadržaj)", "form.export_note": "Izvezeni JSON valjan je u odnosu na otvorenu shemu za izvješćivanje o povredama i vaš ga upravljački sustav može podnijeti putem otvorenog API-ja.", "form.required": "obvezno", "form.gdpr": "GDPR", "record.title": "Evidencija o povredi (pouzdanost)", "record.intro": "Registar SVIH povreda, uključujući one koje se ne prijavljuju, nadahnut kanadskom obvezom vođenja evidencije prema PIPEDA-i i čl. 33. st. 5. GDPR-a. Pohranjeno lokalno u vašem pregledniku.", "record.add": "Spremi trenutnu povredu u evidenciju", "record.empty": "Zasad nema evidentiranih povreda.", "record.export": "Izvezi evidenciju (JSON)", "common.yes": "Da", "common.no": "Ne", "common.unknown": "Nepoznato", "common.next": "Dalje", "common.back": "Natrag"}, "hu": {"_meta": {"lang": "hu", "name": "Magyar", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB adatvedelmi incidens bejelentesi asszisztens", "app.subtitle": "Offline, beepitett adatvedelmet biztosito eszkoz a szemelyes adatok megsertesevel jaro incidensek osztalyozasahoz, ENISA sulyossagi pontozasahoz es EDPB bejelentes elokeszitesehez", "app.disclaimer": "Az EDPB v1.0 sablon alapjan keszult tervezet (nyilvanos konzultacio 2026. augusztus 5-ig). Teljes egeszeben a bongeszojeben fut - semmilyen adat nem hagyja el a keszuleket. Nem hivatalos benyujtasi csatorna; ne hasznalja eles bejelentesekre a felugyeleti hatosag fele, amig a hatosagok be nem vezetik a sablont.", "nav.preassessment": "1. Elozetes ertekeles", "nav.severity": "2. ENISA sulyossag", "nav.notification": "3. EDPB bejelentes", "nav.record": "4. Incidensnyilvantartas", "lang.label": "Nyelv", "lang.incomplete": "(forditas tervezete - angol tartalek)", "pre.title": "Elozetes ertekeles (osztalyozas)", "pre.intro": "Gyors osztalyozas az ICO onertekeles altal inspiralva, annak eldontesere, hogy ez bejelentesi kotelezettseg ala eso, a szemelyes adatok megsertesevel jaro incidens-e, mielott kitolti a teljes sablont.", "pre.q_isbreach": "Ez olyan biztonsagi incidens, amely a tovabbitott, tarolt vagy mas modon kezelt szemelyes adatok veletlen vagy jogellenes megsemmisiteset, elvesziteset, megvaltoztatasat, jogosulatlan kozleset vagy az azokhoz valo jogosulatlan hozzaferest eredmenyezi?", "pre.q_personaldata": "Az incidens erint-e szemelyes adatokat (azonositott vagy azonosithato szemelyre vonatkozo informaciot)?", "pre.q_risk": "Az incidens valoszinusitheto-e, hogy kockazatot jelent a termeszetes szemelyek jogaira es szabadsagaira nezve?", "pre.q_highrisk": "Az incidens valoszinusitheto-e, hogy MAGAS kockazatot jelent a termeszetes szemelyekre nezve?", "pre.verdict.notbreach": "Ez nem tunik a szemelyes adatok megsertesevel jaro incidensnek a GDPR ertelmeben. Belso nyilvantartast ennek ellenere vezessen.", "pre.verdict.norisk": "A szemelyes adatok megsertesevel jaro incidens, amely valoszinusitheto kockazat nelkuli: a felugyeleti hatosagnak torteno bejelentes lehet, hogy nem szukseges, de nyilvantartast kell vezetnie rola (33. cikk (5) bekezdes).", "pre.verdict.notify_dpa": "Valoszinuleg bejelentesi kotelezettseg ala esik a felugyeleti hatosag fele 72 oran belul (33. cikk).", "pre.verdict.notify_subjects": "Magas kockazat: indokolatlan kesedelem nelkul tajekoztassa az erintett termeszetes szemelyeket is (34. cikk), kiveve, ha a 34. cikk (3) bekezdese szerinti kivetel alkalmazando.", "enisa.title": "ENISA sulyossagi ertekeles", "enisa.intro": "Kiszamitja az SE = DPC x EI + CB erteket es a sulyossagi savot. Reprodukalhato pontszam a sablon 'irja le az alkalmazott modszertant' mezojenek megvalaszolasahoz.", "enisa.dpc": "Adatkezelesi kontextus (DPC)", "enisa.ei": "Azonosithatosag konnyusege (EI)", "enisa.cb": "Az incidens korulmenyei (CB)", "enisa.result": "Sulyossagi pontszam (SE)", "enisa.band": "Sulyossagi sav", "enisa.trigger_on": "SE >= 2: ertekelesi / bejelentesi utvonal aktivalva.", "enisa.trigger_off": "SE < 2 (Alacsony): a hatosagnak torteno bejelentes altalaban nem szukseges, de rogzitse az incidenst.", "enisa.prefill": "Hasznalja ezt a pontszamot az EDPB bejelentes elozetes kitoltesehez", "form.title": "EDPB bejelentes", "form.intro": "A teljes EDPB sablon, az elozetes ertekeles es az ENISA pontszam alapjan elore kitoltve. A felteteles mezok a valaszai alapjan jelennek meg.", "form.export_json": "JSON exportalasa (API adattartalom)", "form.export_note": "Az exportalt JSON megfelel a nyilt incidensbejelentesi semanak, es az iranyitasi rendszere a nyilt API-n keresztul benyujthatja.", "form.required": "kotelezo", "form.gdpr": "GDPR", "record.title": "Incidensnyilvantartas (elszamoltathatosag)", "record.intro": "AZ OSSZES incidens nyilvantartasa, beleertve a nem bejelentesi kotelezettseg ala esoket is, a kanadai PIPEDA nyilvantartasi kotelezettsege es a GDPR 33. cikk (5) bekezdese altal inspiralva. Helyileg, a bongeszojeben tarolva.", "record.add": "Aktualis incidens mentese a nyilvantartasba", "record.empty": "Meg nincs rogzitett incidens.", "record.export": "Nyilvantartas exportalasa (JSON)", "common.yes": "Igen", "common.no": "Nem", "common.unknown": "Ismeretlen", "common.next": "Tovabb", "common.back": "Vissza"}, "it": {"_meta": {"lang": "it", "name": "Italiano", "status": "complete", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Assistente per le notifiche di violazione EDPB", "app.subtitle": "Strumento offline, basato sulla privacy-by-design, per il triage delle violazioni dei dati personali, il calcolo della gravità ENISA e la preparazione delle notifiche EDPB", "app.disclaimer": "Bozza basata sul modello EDPB v1.0 (consultazione pubblica fino al 5 agosto 2026). Funziona interamente nel tuo browser - nessun dato lascia il tuo dispositivo. Non costituisce un canale di trasmissione ufficiale; non utilizzare per notifiche reali a un'autorità di controllo finché le autorità non avranno implementato il modello.", "nav.preassessment": "1. Valutazione preliminare", "nav.severity": "2. Gravità ENISA", "nav.notification": "3. Notifica EDPB", "nav.record": "4. Registro delle violazioni", "lang.label": "Lingua", "lang.incomplete": "(bozza di traduzione - fallback in inglese)", "pre.title": "Valutazione preliminare (triage)", "pre.intro": "Triage rapido, ispirato all'autovalutazione dell'ICO, per stabilire se si tratta di una violazione dei dati personali da notificare prima di completare il modello integrale.", "pre.q_isbreach": "Si tratta di una violazione di sicurezza che comporta accidentalmente o in modo illecito la distruzione, la perdita, la modifica, la divulgazione non autorizzata o l'accesso a dati personali?", "pre.q_personaldata": "La violazione riguarda dati personali (informazioni relative a una persona identificata o identificabile)?", "pre.q_risk": "È probabile che la violazione presenti un rischio per i diritti e le libertà delle persone fisiche?", "pre.q_highrisk": "È probabile che la violazione presenti un rischio ELEVATO per le persone fisiche?", "pre.verdict.notbreach": "Non sembra trattarsi di una violazione dei dati personali ai sensi del RGPD. Conservane comunque una registrazione interna.", "pre.verdict.norisk": "Violazione dei dati personali senza rischio probabile: la notifica all'autorità di controllo potrebbe non essere richiesta, ma devi documentarla (art. 33(5)).", "pre.verdict.notify_dpa": "Probabilmente da notificare all'autorità di controllo entro 72 ore (art. 33).", "pre.verdict.notify_subjects": "Rischio elevato: comunica la violazione anche alle persone fisiche interessate senza ingiustificato ritardo (art. 34), salvo che si applichi un'esenzione ai sensi dell'art. 34(3).", "enisa.title": "Valutazione della gravità ENISA", "enisa.intro": "Calcola SE = DPC x EI + CB e la fascia di gravità. Un punteggio riproducibile per rispondere al campo del modello 'descrivere la metodologia utilizzata'.", "enisa.dpc": "Contesto del trattamento dei dati (DPC)", "enisa.ei": "Facilità di identificazione (EI)", "enisa.cb": "Circostanze della violazione (CB)", "enisa.result": "Punteggio di gravità (SE)", "enisa.band": "Fascia di gravità", "enisa.trigger_on": "SE >= 2: percorso di valutazione / notifica attivato.", "enisa.trigger_off": "SE < 2 (bassa): la notifica all'autorità generalmente non è richiesta, ma documenta la violazione.", "enisa.prefill": "Usa questo punteggio per precompilare la notifica EDPB", "form.title": "Notifica EDPB", "form.intro": "Il modello EDPB completo, precompilato a partire dalla valutazione preliminare e dal punteggio ENISA. I campi condizionali compaiono in base alle tue risposte.", "form.export_json": "Esporta JSON (payload API)", "form.export_note": "Il JSON esportato è conforme allo schema aperto di notifica delle violazioni e può essere inviato tramite l'API aperta dal tuo sistema di gestione.", "form.required": "obbligatorio", "form.gdpr": "RGPD", "record.title": "Registro delle violazioni (responsabilizzazione)", "record.intro": "Un registro di TUTTE le violazioni, comprese quelle non soggette a notifica, ispirato all'obbligo di conservazione dei registri della normativa canadese PIPEDA e all'art. 33(5) del RGPD. Memorizzato localmente nel tuo browser.", "record.add": "Salva la violazione corrente nel registro", "record.empty": "Nessuna violazione ancora registrata.", "record.export": "Esporta registro (JSON)", "common.yes": "Sì", "common.no": "No", "common.unknown": "Sconosciuto", "common.next": "Avanti", "common.back": "Indietro", "f.3.label": "Tipo di notifica", "f.3.tip": "Indicare qui se si sta notificando una nuova violazione dei dati personali oppure se si sta integrando una notifica precedente", "f.3.opt.a": "Nuova notifica", "f.3.opt.b": "Notifica di follow-up", "f.4.label": "Sotto-tipo di notifica", "f.4.tip": "Indicare qui se si fornisce una notifica completa, se si integra una notifica preliminare (incompleta) o se si forniscono informazioni preliminari (incomplete) da integrare. Completa (è possibile fornire tutte le informazioni richieste). Incompleta (al momento non è possibile fornire tutte le informazioni). Ritiro (annullamento di una notifica precedente; ad es. duplicato, assenza di rischio dopo la valutazione iniziale)", "f.4.opt.a": "Completa", "f.4.opt.b": "Incompleta", "f.4.opt.c": "Ritiro", "f.5.label": "Motivi del ritiro di una notifica precedente", "f.6.label": "ID della violazione dei dati personali precedentemente notificata", "f.6.tip": "Indicare l'ID della violazione dei dati personali precedente che si sta completando o integrando.", "f.7.label": "Numero di riferimento interno del titolare del trattamento", "f.7.tip": "Indicare il proprio numero di riferimento interno, se presente", "f.10.label": "Tipo di identificativo", "f.10.opt.a": "ID società", "f.10.opt.b": "Numero di iscrizione dell'organizzazione", "f.10.opt.c": "Partita IVA (…) […]", "f.11.label": "Identificativo", "f.12.label": "Denominazione dell'organizzazione", "f.13.label": "Recapiti*", "f.14.label": "Settore", "f.14.opt.a": "Privato", "f.14.opt.b": "Pubblico", "f.15.label": "Tipo di organizzazione", "f.15.tip": "Se si ritiene che la propria organizzazione non rientri in queste quattro categorie, selezionare “Altro” e specificare in che modo.", "f.15.opt.a": "Libero profession /recuperare i danni nei confronti degli interessati", "f.59.label": "Tipo di violazione della disponibilità", "f.59.tip": "Valutare il problema di disponibilità dal punto di vista dell'interessato", "f.59.opt.a": "Problema di disponibilità temporaneo", "f.59.opt.b": "Problema di disponibilità permanente", "f.59.opt.c": "non determinato", "f.60.label": "Natura dell'incidente", "f.60.opt.a": "Abuso dei privilegi di accesso da parte di un dipendente", "f.60.opt.b": "Dispositivo cifrato / ransomware", "f.60.opt.c": "Rilevata attività di hacking / malware", "f.60.opt.d": "Phishing / ingegneria sociale", "f.60.opt.e": "Vulnerabilità di sicurezza (probabilmente) sfruttata (CVE nota o zero-day)", "f.60.opt.f": "Accesso non autorizzato a dati personali nei sistemi informatici", "f.60.opt.g": "Esfiltrazione di dati / estrazione non autorizzata di dati personali", "f.60.opt.h": "Visualizzazione di dati dell'interessato errato (scambio di record)", "f.60.opt.i": "Dispositivo smarrito o rubato", "f.60.opt.j": "Rifiuti elettronici (dati personali ancora presenti su un dispositivo obsoleto)", "f.60.opt.k": "Smaltimento non corretto di dati personali su supporto cartaceo", "f.60.opt.l": "Posta smarrita o aperta / mancata consegna (posta/e-mail)", "f.60.opt.m": "Configurazione errata", "f.60.opt.n": "Autorizzazioni di accesso errate (ad es. archiviazione cloud, cartella condivisa)", "f.60.opt.o": "Documenti cartacei smarriti o rubati o lasciati in un luogo non sicuro", "f.60.opt.p": "Dati personali cancellati/distrutti", "f.60.opt.q": "Dati personali visualizzati dal destinatario errato", "f.60.opt.r": "Dati personali inviati per errore (posta/e-mail)", "f.60.opt.s": "Invio di e-mail a più destinatari senza copia nascosta / con lista di distribuzione in chiaro", "f.60.opt.t": "Malfunzionamento tecnico", "f.60.opt.u": "Modifica non autorizzata dei dati", "f.60.opt.v": "Pubblicazione involontaria (ad es. link pubblico / sito web pubblico / unità condivisa)", "f.60.opt.w": "Divulgazione verbale non autorizzata di dati personali", "f.60.opt.x": "da determinare", "f.60.opt.y": "Altro (specificare nell'ulteriore descrizione)", "f.61.label": "Causa della violazione dei dati personali", "f.61.opt.a": "Interna non dolosa", "f.61.opt.b": "Interna dolosa", "f.61.opt.c": "Esterna non dolosa", "f.61.opt.d": "Esterna dolosa", "f.61.opt.e": "Da determinare", "f.61.opt.f": "Sconosciuta", "f.62.label": "Ulteriore descrizione della natura dell'incidente", "f.62.tip": "Descrivere brevemente la natura della violazione (rilevamento, conoscenza, causa, misure in atto) e indicare su quali fatti si fonda la decisione. Se possibile, indicare la causa principale dell'incidente.", "f.63.label": "Descrizione dei sistemi, software, servizi e infrastrutture coinvolti nella violazione dei dati personali e relativa ubicazione", "f.63.tip": "Elencare le descrizioni in gruppi semantici, ad es. \n\nSistemi:\n• database di produzione:\n  o database clienti (completo/parziale) che contiene ****, ubicato in ***\n  o database HR interno (completo/parziale) che contiene ****, ubicato in ***\n• infrastruttura di test\n  o database di test (completo/parziale) che contiene ****; ubicato in ***\nSoftware:\n• Software di contabilità\n• Software del sistema di pagamento", "f.65.label": "Categorie di interessati coinvolti", "f.65.tip": "Se è stata selezionata la risposta i), indicare quale tipo di persone vulnerabili. Se non si è certi se o in che modo gli interessati coinvolti siano vulnerabili, descriverli brevemente e indicare perché si ritiene che siano vulnerabili.", "f.65.opt.a": "Clienti (attuali e potenziali)", "f.65.opt.b": "Dipendenti (ex, attuali e candidati)", "f.65.opt.c": "Personale militare o delle forze dell'ordine", "f.65.opt.d": "Minori", "f.65.opt.e": "Pazienti", "f.65.opt.f": "Studenti", "f.65.opt.g": "Abbonati", "f.65.opt.h": "Utenti", "f.65.opt.i": "Persone vulnerabili (anziani, rifugiati, persone con disabilità, vittime, …)", "f.65.opt.j": "Ulteriori interessati coinvolti (specificare nell'ulteriore descrizione)", "f.65.opt.k": "Non ancora noto", "f.66.label": "Ulteriore descrizione delle categorie di interessati coinvolti e di ulteriori interessati", "f.67.label": "Interessati coinvolti dalla violazione dei dati personali", "f.67.opt.a": "Numero esatto", "f.67.opt.b": "Numero approssimativo", "f.67.opt.c": "Numero non determinabile", "f.67.opt.d": "Numero da determinare", "f.68.label": "Numero di interessati coinvolti dalla violazione dei dati personali", "f.70.label": "Tipo di dati violati", "f.70.opt.a": "Dati di base (ad es. nome, cognome, data di nascita)", "f.70.opt.b": "Recapiti (ad es. indirizzo, numero di telefono, e-mail)", "f.70.opt.c": "Dati biometrici", "f.70.opt.d": "Condanne penali, reati o misure di sicurezza", "f.70.opt.e": "Dati che rivelano opinioni politiche", "f.70.opt.f": "Dati che rivelano l'origine razziale o etnica", "f.70.opt.g": "Dati che rivelano convinzioni religiose o filosofiche", "f.70.opt.h": "Dati che rivelano la vita sessuale o l'orientamento sessuale", "f.70.opt.i": "Dati che rivelano l'appartenenza sindacale", "f.70.opt.j": "Dati genetici", "f.70.opt.k": "Dati relativi alla salute (es. cartelle cliniche, risultati di esami, …)", "f.70.opt.l": "Dati economici e finanziari", "f.70.opt.m": "Dati sulla salute connessi al rapporto di lavoro (es. certificati di malattia, attestazioni di visite mediche, esiti di accertamenti di idoneità sanitaria o simili)", "f.70.opt.n": "Dati identificativi (es. codice fiscale, numero di documento d'identità)", "f.70.opt.o": "Dati relativi all'ubicazione", "f.70.opt.p": "Documenti ufficiali (es. copie scansionate)", "f.70.opt.q": "Strumenti di pagamento (es. carte di credito, conti correnti)", "f.70.opt.r": "Dati di profilazione (es. social network, punteggio di affidabilità creditizia, profili psicologici o di altro tipo)", "f.70.opt.s": "Credenziali utente (es. nomi utente, password, token)", "f.70.opt.t": "Non ancora noto", "f.70.opt.u": "Ulteriori tipologie di dati (specificare nella descrizione aggiuntiva)", "f.71.label": "Ulteriore descrizione dei dati violati e delle categorie di dati aggiuntive", "f.72.label": "Record di dati personali interessati dalla violazione dei dati personali", "f.72.tip": "Specificare la tipologia di record: numero di dati relativi a ciascun interessato coinvolto. Ad esempio, evitare di indicare semplicemente “500”. Infatti “5 tipi di dati (ossia *,*,*,*,*) relativi a 100 persone” e “100 tipi di dati (ossia *,*,*,*,*) relativi a 5 persone” possono non comportare la medesima valutazione del rischio, anche se entrambi potrebbero essere sintetizzati come “500 record”.", "f.72.opt.a": "Numero esatto", "f.72.opt.b": "Numero approssimativo", "f.72.opt.c": "Numero non determinabile", "f.72.opt.d": "Numero da determinare", "f.73.label": "Numero di record di dati personali interessati dalla violazione dei dati personali", "f.73.tip": "Indicare qui il numero di record interessati dalla violazione, ossia il numero di singole voci presenti nella banca dati interessata dalla violazione.", "f.75.label": "Misure pertinenti in essere al momento del verificarsi della violazione dei dati personali", "f.75.tip": "Il presente elenco non è esaustivo e comprende soltanto le misure più comuni.\n\nÈ possibile che alcune misure non siano state applicate in quanto non applicabili o non utili.\n\nAllo stesso tempo, è possibile che siano state applicate misure non elencate ma utili. In tal caso, specificarle nella risposta L.", "f.75.opt.a": "Pseudonimizzazione", "f.75.opt.b": "Piano di backup / ripristino", "f.75.opt.c": "Cifratura dei dati", "f.75.opt.d": "Politiche in materia di protezione dei dati e sicurezza delle informazioni", "f.75.opt.e": "Formazione in materia di protezione dei dati e sicurezza", "f.75.opt.f": "Registro degli incidenti", "f.75.opt.g": "Livelli di accesso ai dati", "f.75.opt.h": "Controllo degli accessi logici (es. MFA)", "f.75.opt.i": "Audit periodici", "f.75.opt.j": "Controllo degli accessi fisici", "f.75.opt.k": "Sistemi informatici aggiornati", "f.75.opt.l": "Altre misure (specificare nella descrizione aggiuntiva)", "f.76.label": "Ulteriore descrizione delle misure pertinenti in essere al momento del verificarsi della violazione dei dati personali", "f.76.tip": "Promemoria: è stato indicato che le misure tecniche possono verosimilmente essere eluse dagli autori dell'attacco. Aggiungere qui il pertinente livello di dettaglio relativo a tali misure, unitamente alla descrizione delle altre misure pertinenti.", "f.79.label": "Conseguenze probabili in caso di violazione della riservatezza", "f.79.opt.a": "I dati sono stati divulgati al di là di quanto previsto dalla informativa sulla privacy o dalla normativa applicabile", "f.79.opt.b": "I dati possono essere collegati, senza sforzo irragionevole, ad altre informazioni relative agli interessati", "f.79.opt.c": "I dati possono essere utilizzati per finalità diverse da quelle previste o in modo illecito", "f.79.opt.d": "Altro", "f.79.opt.e": "In corso di valutazione", "f.80.label": "Descrizione delle altre conseguenze in materia di riservatezza", "f.81.label": "Conseguenze probabili in caso di violazione dell'integrità", "f.81.opt.a": "I dati possono essere stati modificati e utilizzati nonostante non siano più validi", "f.81.opt.b": "I dati possono essere stati modificati trasformandoli in dati altrimenti validi e successivamente utilizzati per altre finalità", "f.81.opt.c": "Altro", "f.81.opt.d": "In corso di valutazione", "f.82.label": "Descrizione delle altre conseguenze in materia di integrità", "f.83.label": "Conseguenze probabili in caso di violazione della disponibilità", "f.83.opt.a": "Impossibilità di accedere ai servizi", "f.83.opt.b": "Interruzioni del servizio e difficoltà nell'utilizzo del servizio", "f.83.opt.c": "Altro", "f.83.opt.d": "In corso di valutazione", "f.84.label": "Descrizione delle altre conseguenze in materia di disponibilità", "f.85.label": "Natura del potenziale impatto per l'interessato", "f.85.tip": "Indicare qui la natura dell'impatto sui diritti e sulle libertà dell'interessato.", "f.85.opt.a": "Perdita di controllo dei propri dati personali", "f.85.opt.b": "Limitazione dei propri diritti", "f.85.opt.c": "Discriminazione", "f.85.opt.d": "Furto o usurpazione d'identità", "f.85.opt.e": "Frode", "f.85.opt.f": "Perdita finanziaria", "f.85.opt.g": "Annullamento non autorizzato della pseudonimizzazione", "f.85.opt.h": "Pregiudizio alla reputazione", "f.85.opt.i": "Perdita di riservatezza dei dati personali protetti dal segreto professionale", "f.85.opt.j": "Divulgazione di dati a terzi non autorizzati", "f.85.opt.k": "Significativo svantaggio economico o sociale", "f.85.opt.l": "Danno fisico o psichico", "f.85.opt.m": "Danno patrimoniale o non patrimoniale ai beni", "f.85.opt.n": "Altro impatto (specificare nella descrizione aggiuntiva)", "f.85.opt.o": "Da determinare", "f.86.label": "Ulteriore descrizione degli altri impatti per gli interessati", "f.87.label": "Gravità dei potenziali impatti", "f.87.tip": "Indicare qui l'esito della propria autovalutazione della gravità dell'impatto della violazione per gli interessati. Selezionare la gravità più elevata qualora possano verificarsi più impatti potenziali.", "f.87.opt.a": "Lieve", "f.87.opt.b": "Moderato", "f.87.opt.c": "Grave", "f.87.opt.d": "Da determinare", "f.89.label": "Esito della valutazione del rischio effettuata dal titolare del trattamento", "f.89.opt.a": "È probabile che la violazione dei dati personali presenti un rischio elevato per i diritti e le libertà delle persone fisiche", "f.89.opt.b": "È probabile che la violazione dei dati personali presenti un rischio (non elevato) per i diritti e le libertà delle persone fisiche", "f.89.opt.c": "È improbabile che la violazione dei dati personali presenti un rischio per i diritti e le libertà delle persone fisiche c) Sono necessarie ulteriori informazioni per valutare il rischio per i diritti e le libertà delle persone fisiche", "f.90.label": "Ulteriore descrizione della valutazione del rischio effettuata dal titolare del trattamento", "f.90.tip": "Descrivere la metodologia utilizzata e i fattori pertinenti presi in considerazione.", "f.92.label": "Misure adottate per affrontare la violazione dei dati personali e per attenuarne le conseguenze", "f.92.tip": "Indicare in che misura tali misure risolvono il problema.", "f.94.label": "Misure pertinenti adottate per prevenire violazioni dei dati personali analoghe", "f.94.opt.a": "Anonimizzazione", "f.94.opt.b": "Piano di backup / ripristino", "f.94.opt.c": "Modifica dei processi", "f.94.opt.d": "Cifratura dei dati", "f.94.opt.e": "Politiche in materia di protezione dei dati e sicurezza delle informazioni", "f.94.opt.f": "Formazione in materia di protezione dei dati e sicurezza", "f.94.opt.g": "Cancellazione dei dati", "f.94.opt.h": "Registro degli incidenti", "f.94.opt.i": "Livelli di accesso ai dati", "f.94.opt.j": "Controllo degli accessi logici (es. MFA)", "f.94.opt.k": "Audit periodici", "f.94.opt.l": "Controllo degli accessi fisici", "f.94.opt.m": "Pseudonimizzazione", "f.94.opt.n": "Sistemi informatici aggiornati", "f.94.opt.o": "Altre misure (specificare nella descrizione aggiuntiva)", "f.95.label": "Ulteriore descrizione delle pertinenti misure permanenti aggiornate per evitare incidenti analoghi in futuro", "f.95.tip": "Indicare in che misura tali misure risolvono il problema e migliorano la situazione.\n\nÈ attesa una descrizione qualora sia stata selezionata l'opzione “Altre misure” nella domanda precedente m).\n\nIn ogni caso, non esitare a descrivere ulteriori misure adottate dopo la violazione, o da adottare, qualora le si ritenga pertinenti.", "f.97.label": "La violazione dei dati personali è stata comunicata agli interessati?", "f.97.tip": "Qualora non sia ancora stato valutato se procedere alla comunicazione, si tenga presente che sarà necessario effettuare una notifica di follow-up una volta presa la decisione.\n\nQualora la violazione dei dati venga comunicata agli interessati per fasi o qualora non sia ancora possibile raggiungere tutti gli interessati, indicarlo nei campi 98 e 98a.", "f.97.opt.a": "Sì", "f.97.opt.b": "No, ma sarà comunicata in una data specifica b1) No, ma sarà comunicata in una data da determinare", "f.97.opt.c": "No, l'indagine è ancora in corso", "f.97.opt.d": "No, non sarà comunicata in quanto è improbabile che la violazione dei dati personali presenti un rischio elevato per i diritti e le libertà delle persone fisiche", "f.97.opt.e": "No, non sarà comunicata in quanto è soddisfatta una delle condizioni di cui all'art. 34(3) del GDPR", "f.98.label": "Data in cui le informazioni sono state fornite agli interessati", "f.98.tip": "Indicare qui la data in cui si è iniziato a informare gli interessati.", "f.99.label": "Data futura in cui la violazione dei dati sarà comunicata agli interessati", "f.100.label": "Ulteriori informazioni sulle condizioni di cui all'art. 34(3) del GDPR che risultano soddisfatte", "f.100.opt.a": "Il titolare del trattamento ha messo in atto misure tecniche e organizzative adeguate di protezione e tali misure erano state applicate ai dati personali oggetto della violazione, in particolare quelle destinate a rendere i dati personali incomprensibili a chiunque non sia autorizzato ad accedervi, quali la cifratura.", "f.100.opt.b": "Il titolare del trattamento ha successivamente adottato misure atte a scongiurare il sopraggiungere di un rischio elevato per i diritti e le libertà degli interessati di cui al paragrafo 1.", "f.100.opt.c": "Detta comunicazione richiederebbe sforzi sproporzionati. In tal caso, si procede invece a una comunicazione pubblica o a una misura simile, tramite la quale gli interessati sono informati con analoga efficacia.", "f.101.label": "Ulteriore descrizione del motivo per cui risultano soddisfatte le condizioni di cui all'art. 34(3) del GDPR e delle misure adottate", "f.102.label": "Numero di interessati informati", "f.102.opt.a": "Tutti gli interessati sono stati informati", "f.102.opt.b": "Non tutti gli interessati sono stati informati", "f.103.label": "Ulteriore descrizione del motivo per cui non tutti gli interessati sono stati informati", "f.103.tip": "Specificare il motivo per cui alcuni interessati non sono stati informati; ad esempio, alcuni potrebbero non esserlo stati per il motivo A, altri per il motivo B, ecc.\n\nI motivi possono essere di varia natura e non vanno considerati soltanto quelli tecnici: processo in corso, alcuni interessati non possono essere raggiunti con la stessa modalità, ad essi si applicano leggi aggiuntive, il costo dell'informazione è molto più elevato, ecc.", "f.104.label": "Mezzi di comunicazione utilizzati per informare l'interessato", "f.104.opt.a": "Comunicazione individuale (lettera/email/comunicazione personale)", "f.104.opt.b": "Annuncio pubblico (sito web/comunicato stampa/social network)", "f.104.opt.c": "Altro", "f.105.label": "Ulteriore descrizione degli altri mezzi di comunicazione", "f.106.label": "Contenuto delle informazioni fornite agli interessati", "f.106.tip": "Fornire tale contenuto nel modo più pertinente. Ad esempio, se l'informazione fornita è semplicemente un'email in solo testo, è sufficiente copiarne qui il testo. Se, ad esempio, l'informazione contiene immagini/video utili alla comprensione, fornire all'autorità di controllo i mezzi per consultarli (pagina del sito web, screenshot delle email, pagina di download, ecc.).", "f.109.label": "L'incidente è stato segnalato alle autorità di polizia/giudiziarie come reato?", "f.109.opt.a": "Sì", "f.109.opt.b": "No", "f.109.opt.c": "Non noto", "f.110.label": "L'incidente è stato notificato ad altre autorità di controllo o organismi di vigilanza ai sensi di altra normativa applicabile? (es. centro nazionale per la sicurezza informatica, ecc.)", "f.110.opt.a": "Sì", "f.110.opt.b": "No", "f.110.opt.c": "Non noto", "f.111.label": "Ulteriori informazioni sulla notifica ad altre autorità o bel": "Perdita di integrità", "enisa.cb.integrity.lvl0": "Nessun uso illecito individuato", "enisa.cb.integrity.lvl1": "Dati alterati, ripristino possibile", "enisa.cb.integrity.lvl2": "Dati alterati, ripristino non possibile", "enisa.cb.availability.label": "Perdita di disponibilità", "enisa.cb.availability.lvl0": "Dati recuperabili senza difficoltà", "enisa.cb.availability.lvl1": "Indisponibilità parziale / temporanea", "enisa.cb.availability.lvl2": "Indisponibilità totale, non recuperabile", "enisa.cb.malicious": "Intento doloso", "enisa.band.low": "Basso", "enisa.band.low.meaning": "Le persone fisiche non saranno interessate oppure potranno incontrare alcuni lievi inconvenienti.", "enisa.band.medium": "Medio", "enisa.band.medium.meaning": "Le persone fisiche potranno incontrare inconvenienti significativi, che saranno in grado di superare nonostante alcune difficoltà.", "enisa.band.high": "Alto", "enisa.band.high.meaning": "Le persone fisiche potranno incontrare conseguenze significative, che dovrebbero essere in grado di superare seppur con serie difficoltà.", "enisa.band.very_high": "Molto alto", "enisa.band.very_high.meaning": "Le persone fisiche potranno incontrare conseguenze significative, o persino irreversibili, che potrebbero non riuscire a superare.", "enisa.mit.single_subject": "Singolo interessato / volume molto basso", "enisa.mit.recipient_confirms_deletion": "Il destinatario errato conferma la cancellazione dei dati", "enisa.mit.weak_linkage": "Nome comune / omonimia / collegamento debole", "enisa.mit.strong_encryption": "Cifratura robusta / dati inintelligibili per il destinatario", "enisa.mit.pseudonymisation_no_key": "Pseudonimizzazione senza chiave accessibile", "enisa.mit.professional_secrecy": "Destinatario vincolato da segreto professionale / riservatezza legale", "enisa.mit.availability_restored": "Disponibilità ripristinata rapidamente da backup (breve interruzione)", "enisa.mit.public_low_criticality": "Dati già pubblici / bassa criticità", "enisa.mit.note": "Circostanze attenuanti che abbassano il punteggio. In base al principio di responsabilizzazione (art. 5), si tratta di suggerimenti MODIFICABILI, non di un aggiustamento black-box imposto: ogni opzione sposta la variabile indicata nella direzione indicata; il titolare del trattamento può intervenire in deroga. Gli incrementi numerici esatti sono valori predefiniti ENISA e in attesa di conferma rispetto al PDF ENISA 2013.", "enisa.provenance": "SE < 2 = Basso è riportato testualmente dal testo del documento ENISA. Le soglie superiori (Medio 2-<3, Alto 3-<4, Molto alto >=4) sono i livelli ENISA standard, universalmente citati, ma non sono stati estratti testualmente dal livello testuale di questo PDF; vanno considerati come 'livelli consolidati standard ENISA'.", "rk.circumstances_cause": "Circostanze e causa della violazione (se note)", "rk.date_or_period": "Data o periodo della violazione (o approssimazione)", "rk.personal_information": "Descrizione dei dati personali coinvolti (nella misura in cui è noto)", "rk.number_affected": "Numero di persone interessate (o approssimazione)", "rk.mitigation_steps": "Misure adottate per ridurre/attenuare il rischio di danno", "rk.notification_steps": "Misure adottate o previste per notificare le persone interessate (ove applicabile)", "rk.retention_note": "Minimo 24 mesi dal giorno in cui l'organizzazione stabilisce che la violazione si è verificata (SOR/2018-64).", "help.dpc": "Contesto del trattamento dei dati: quanto sono critici i dati. 1 semplici, 2 comportamentali, 3 finanziari, 4 sensibili (categorie particolari).", "help.ei": "Facilità di identificazione: con quale facilità i dati identificano una persona (moltiplica il DPC). Da 0,25 trascurabile a 1 massima.", "help.cb": "Circostanze della violazione: punti aggiuntivi per perdita di riservatezza, integrità, disponibilità (ciascuna 0 / +0,25 / +0,5) e intento doloso (+0,5).", "enisa.mititle": "Fattori attenuanti", "enisa.cbtitle_mal": "Intento doloso", "btn.export_csv": "Esporta CSV", "btn.export_xls": "Esporta XLS", "btn.export_aggregate": "Esporta statistiche aggregate (anonimizzate)", "record.retention_prefix": "Conservazione", "record.aggregate_note": "Esportazione aggregata: conteggi anonimizzati per tassonomia, k-anonimato", "obl.title": "I tuoi obblighi per questa violazione", "obl.intro": "Orientamento indicativo generato dai dati inseriti.", "obl.badge.required": "Richiesto", "obl.badge.notreq": "Non richiesto", "obl.badge.assess": "Da valutare", "obl.auth.title": "Notificare all'autorità di controllo", "obl.auth.required": "Richiesta a meno che sia improbabile che la violazione presenti un rischio per i diritti e le libertà delle persone fisiche (art. 33(1)). Termine: senza ingiustificato ritardo e, ove possibile, entro 72 ore dall'essere venuto a conoscenza della violazione.", "obl.auth.notreq": "Non richiesta solo se è improbabile che la violazione presenti un rischio per i diritti e le libertà (art. 33(1)). Documentare il ragionamento (art. 33(5)).", "obl.auth.assess": "Valutare se è probabile che la violazione presenti un rischio. Il punteggio di gravità ENISA informa questa valutazione ma non determina, di per sé, l'obbligo giuridico.", "obl.subj.title": "Comunicare alle persone interessate", "obl.subj.text": "Richiesta solo se è probabile che la violazione presenti un rischio ELEVATO per i diritti e le libertà (art. 34(1)), senza ingiustificato ritardo. Esenzioni (art. 34(3)): (a) dati inintelligibili, es. cifratura robusta; (b) misure successive che rendono non più probabile il rischio elevato; (c) sforzo sproporzionato -> comunicazione pubblica in alternativa.", "obl.doc.title": "Documentare internamente la violazione", "obl.doc.text": "Sempre richiesta, per TUTTE le violazioni, comprese quelle non notificate (art. 33(5)). Il GDPR non fissa un periodo di conservazione; si raccomanda un minimo di 24 mesi sul modello canadese (PIPEDA, SOR/2018-64), come proposto nel position paper (Parte III.5).", "obl.disclaimer": "Si tratta di un orientamento indicativo generato dai dati inseriti; non costituisce consulenza legale e non sostituisce la valutazione caso per caso del titolare del trattamento ai sensi degli articoli 33 e 34 GDPR. Il titolare del trattamento resta responsabile della determinazione e dei valori dichiarati (responsabilizzazione, art. 5(2)).", "enisa.select_prompt": "Selezionare DPC ed EI per calcolare la gravità.", "common.option_dash": "--", "mit.off": "Off", "mit.apply": "Applica", "common.step": "Passo", "record.aggregate_note2": "(celle di piccole dimensioni soppresse). Nessuna riga di notifica singola, nessuna identità del titolare del trattamento.", "form.methodology_prefix": "Metodologia di gravità ENISA: SE = DPC x EI + CB = "}, "lt": {"_meta": {"lang": "lt", "name": "Lietuvių", "status": "partial", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "EDPB pranešimų apie duomenų saugumo pažeidimus pagalbinė priemonė", "app.subtitle": "Atsijungus veikianti, pagal pritaikytosios privatumo apsaugos principą sukurta priemonė asmens duomenų saugumo pažeidimų triažui, ENISA sunkumo vertinimui ir EDPB pranešimų rengimui", "app.disclaimer": "Juodraštis, parengtas pagal EDPB šabloną v1.0 (viešosios konsultacijos iki 2026 m. rugpjūčio 5 d.). Veikia tik jūsų naršyklėje - jokie duomenys neišeina iš jūsų įrenginio. Tai nėra oficialus pateikimo kanalas; nenaudokite realiems pranešimams priežiūros institucijai, kol institucijos neįdiegs šablono.", "nav.preassessment": "1. Išankstinis vertinimas", "nav.severity": "2. ENISA sunkumas", "nav.notification": "3. EDPB pranešimas", "nav.record": "4. Pažeidimų registras", "lang.label": "Kalba", "lang.incomplete": "(vertimo juodraštis - rodoma anglų kalba)", "pre.title": "Išankstinis vertinimas (triažas)", "pre.intro": "Greitas triažas, įkvėptas ICO savęs vertinimo, siekiant nuspręsti, ar tai yra a ieke stappen zijn ENISA-standaard en in afwachting van bevestiging aan de hand van de ENISA 2013-PDF.", "enisa.provenance": "SE < 2 = Laag is letterlijk overgenomen uit de tekst van het ENISA-document. De bovengrenzen (Gemiddeld 2-<3, Hoog 3-<4, Zeer hoog >=4) zijn de standaard, algemeen geciteerde ENISA-niveaus, maar zijn niet letterlijk uit de tekstlaag van deze PDF gehaald; behandel ze als 'ENISA-standaard geconsolideerde niveaus'.", "rk.circumstances_cause": "Omstandigheden en oorzaak van de inbreuk (indien bekend)", "rk.date_or_period": "Datum of periode van de inbreuk (of benadering)", "rk.personal_information": "Beschrijving van de betrokken persoonlijke informatie (voor zover bekend)", "rk.number_affected": "Aantal getroffen individuen (of benadering)", "rk.mitigation_steps": "Genomen stappen om het risico op schade te verminderen/beperken", "rk.notification_steps": "Genomen of geplande stappen om getroffen individuen te informeren (indien van toepassing)", "rk.retention_note": "Minimaal 24 maanden na de dag waarop de organisatie vaststelt dat de inbreuk heeft plaatsgevonden (SOR/2018-64).", "help.dpc": "Context van de gegevensverwerking: hoe kritiek de gegevens zijn. 1 eenvoudig, 2 gedrag, 3 financieel, 4 gevoelig (bijzondere categorieën).", "help.ei": "Gemak van identificatie: hoe gemakkelijk de gegevens een persoon identificeren (vermenigvuldigt DPC). 0,25 verwaarloosbaar tot 1 maximaal.", "help.cb": "Omstandigheden van de inbreuk: extra punten voor verlies van vertrouwelijkheid, integriteit, beschikbaarheid (elk 0 / +0,25 / +0,5) en kwaadwillig opzet (+0,5).", "enisa.mititle": "Verzachtende factoren", "enisa.cbtitle_mal": "Kwaadwillig opzet", "btn.export_csv": "CSV exporteren", "btn.export_xls": "XLS exporteren", "btn.export_aggregate": "Geaggregeerde statistieken exporteren (geanonimiseerd)", "record.retention_prefix": "Bewaartermijn", "record.aggregate_note": "Geaggregeerde export: geanonimiseerde aantallen per taxonomie, k-anonimiteit", "obl.title": "Uw verplichtingen voor deze inbreuk", "obl.intro": "Indicatieve richtsnoeren gegenereerd op basis van de door u ingevoerde gegevens.", "obl.badge.required": "Vereist", "obl.badge.notreq": "Niet vereist", "obl.badge.assess": "Te beoordelen", "obl.auth.title": "Meld aan de toezichthoudende autoriteit", "obl.auth.required": "Vereist tenzij de inbreuk waarschijnlijk geen risico voor de rechten en vrijheden van natuurlijke personen met zich meebrengt (art. 33, lid 1). Termijn: zonder onredelijke vertraging en, indien haalbaar, binnen 72 uur na kennisname.", "obl.auth.notreq": "Alleen niet vereist indien de inbreuk waarschijnlijk geen risico voor de rechten en vrijheden met zich meebrengt (art. 33, lid 1). Documenteer de redenering (art. 33, lid 5).", "obl.auth.assess": "Beoordeel of de inbreuk waarschijnlijk een risico met zich meebrengt. De ENISA-ernstscore voedt deze beoordeling, maar bepaalt op zichzelf niet de wettelijke verplichting.", "obl.subj.title": "Deel mee aan de getroffen individuen", "obl.subj.text": "Alleen vereist indien de inbreuk waarschijnlijk een HOOG risico voor de rechten en vrijheden met zich meebrengt (art. 34, lid 1), zonder onredelijke vertraging. Uitzonderingen (art. 34, lid 3): (a) gegevens onbegrijpelijk, bv. sterke versleuteling; (b) achteraf genomen maatregelen waardoor het hoge risico niet langer waarschijnlijk is; (c) onevenredige inspanning -> in plaats daarvan openbare mededeling.", "obl.doc.title": "Documenteer de inbreuk intern", "obl.doc.text": "Altijd vereist, voor ALLE inbreuken, inclusief die welke niet zijn gemeld (art. 33, lid 5). De GDPR stelt geen bewaartermijn vast; een minimum van 24 maanden wordt aanbevolen naar het Canadese model (PIPEDA, SOR/2018-64), zoals voorgesteld in het standpuntdocument (deel III.5).", "obl.disclaimer": "Dit zijn indicatieve richtsnoeren gegenereerd op basis van de door u ingevoerde gegevens; het is geen juridisch advies en vervangt niet de beoordeling per geval door de verwerkingsverantwoordelijke uit hoofde van de artikelen 33 en 34 GDPR. De verwerkingsverantwoordelijke blijft verantwoordelijk voor de vaststelling en voor de aangegeven waarden (verantwoordingsplicht, art. 5, lid 2).", "enisa.select_prompt": "Selecteer DPC en EI om de ernst te berekenen.", "common.option_dash": "--", "mit.off": "Uit", "mit.apply": "Toepassen", "common.step": "Stap", "record.aggregate_note2": "(kleine cellen onderdrukt). Geen rijen met enkele meldingen, geen identiteit van de verwerkingsverantwoordelijke.", "form.methodology_prefix": "ENISA-ernstmethodologie: SE = DPC x EI + CB = "}, "pl": {"_meta": {"lang": "pl", "name": "Polski", "status": "complete", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Asystent zgłaszania naruszeń EDPB", "app.subtitle": "Działające offline narzędzie zaprojektowane w duchu prywatności do segregacji naruszeń ochrony danych osobowych, oceny dotkliwości ENISA i przygotowania zgłoszenia EDPB", "app.disclaimer": "Projekt oparty na szablonie EDPB v1.0 (konsultacje publiczne do 5 sierpnia 2026 r.). Działa w całości w Twojej przeglądarce - żadne dane nie opuszczają Twojego urządzenia. Nie jest to oficjalny kanał zgłoszeń; nie używaj do rzeczywistych zgłoszeń do organu nadzorczego, dopóki organy nie wdrożą szablonu.", "nav.preassessment": "1. Wstępna ocena", "nav.severity": "2. Dotkliwość ENISA", "nav.notification": "3. Zgłoszenie EDPB", "nav.record": "4. Rejestr naruszeń", "lang.label": "Język", "lang.incomplete": "(robocze tłumaczenie - tekst zastępczy w języku angielskim)", "pre.title": "Wstępna ocena (segregacja)", "pre.intro": "Szybka segregacja, inspirowana samooceną ICO, pozwalająca ustalić, czy mamy do czynienia z naruszeniem ochrony danych osobowych podlegającym zgłoszeniu, przed wypełnieniem pełnego szablonu.", "pre.q_isbreach": "Czy jest to naruszenie bezpieczeństwa prowadzące do przypadkowego lub niezgodnego z prawem zniszczenia, utraty, modyfikacji, nieuprawnionego ujawnienia lub nieuprawnionego dostępu do danych osobowych?", "pre.q_personaldata": "Czy naruszenie dotyczy danych osobowych (informacji odnoszących się do zidentyfikowanej lub możliwej do zidentyfikowania osoby)?", "pre.q_risk": "Czy naruszenie może powodować ryzyko naruszenia praw lub wolności osób fizycznych?", "pre.q_highrisk": "Czy naruszenie może powodować WYSOKIE ryzyko dla osób fizycznych?", "pre.verdict.notbreach": "Nie wydaje się, aby było to naruszenie ochrony danych osobowych w rozumieniu RODO. Mimo to zachowaj wewnętrzny rejestr.", "pre.verdict.norisk": "Naruszenie ochrony danych osobowych bez prawdopodobnego ryzyka: zgłoszenie do organu nadzorczego może nie być wymagane, lecz musisz je udokumentować (art. 33 ust. 5).", "pre.verdict.notify_dpa": "Prawdopodobnie podlega zgłoszeniu do organu nadzorczego w ciągu 72 godzin (art. 33).", "pre.verdict.notify_subjects": "Wysokie ryzyko: zawiadom również osoby, których dane dotyczą, bez zbędnej zwłoki (art. 34), chyba że ma zastosowanie wyłączenie z art. 34 ust. 3.", "enisa.title": "Ocena dotkliwości ENISA", "enisa.intro": "Oblicza SE = DPC x EI + CB oraz przedział dotkliwości. Odtwarzalny wynik pozwalający odpowiedzieć na pole szablonu 'opisz zastosowaną metodologię'.", "enisa.dpc": "Kontekst przetwarzania danych (DPC)", "enisa.ei": "Łatwość identyfikacji (EI)", "enisa.cb": "Okoliczności naruszenia (CB)", "enisa.result": "Wynik dotkliwości (SE)", "enisa.band": "Przedział dotkliwości", "enisa.trigger_on": "SE >= 2: aktywowano ścieżkę oceny / zgłoszenia.", "enisa.trigger_off": "SE < 2 (niski): zgłoszenie do organu zazwyczaj nie jest wymagane, lecz udokumentuj naruszenie.", "enisa.prefill": "Użyj tego wyniku do wstępnego wypełnienia zgłoszenia EDPB", "form.title": "Zgłoszenie EDPB", "form.intro": "Pełny szablon EDPB, wstępnie wypełniony na podstawie Twojej wstępnej oceny i wyniku ENISA. Pola warunkowe pojawiają się w zależności od Twoich odpowiedzi.", "form.export_json": "Eksportuj JSON (ładunek API)", "form.export_note": "Wyeksportowany plik JSON jest zgodny z otwartym schematem zgłaszania naruszeń i może zostać przesłany przez otwarte API przez Twój system zarządzania.", "form.required": "wymagane", "form.gdpr": "RODO", "record.title": "Rejestr naruszeń (rozliczalność)", "record.intro": "Rejestr WSZYSTKICH naruszeń, w tym tych niepodlegających zgłoszeniu, inspirowany kanadyjskim obowiązkiem prowadzenia dokumentacji PIPEDA oraz art. 33 ust. 5 RODO. Przechowywany lokalnie w Twojej przeglądarce.", "record.add": "Zapisz bieżące naruszenie w rejestrze", "record.empty": "Nie zarejestrowano jeszcze żadnych naruszeń.", "record.export": "Eksportuj rejestr (JSON)", "common.yes": "Tak", "common.no": "Nie", "common.unknown": "Nieznane", "common.next": "Dalej", "common.back": "Wstecz", "f.3.label": "Rodzaj zgłoszenia", "f.3.tip": "Należy tu wskazać, czy zgłaszają Państwo nowe naruszenie ochrony danych osobowych, czy też zmieniają wcześniejsze zgłoszenie", "f.3.opt.a": "Nowe zgłoszenie", "f.3.opt.b": "Zgłoszenie uzupełniające", "f.4.label": "Podtyp zgłoszenia", "f.4.tip": "Należy tu wskazać, czy składają Państwo kompletne zgłoszenie, zmieniają wstępne (niekompletne) zgłoszenie, czy przekazują wstępne (niekompletne) informacje, które mają zostać uzupełnione. Kompletne (można przekazać wszystkie wymagane informacje) Niekompletne (nie wszystkie informacje można obecnie przekazać) Wycofanie (anulowanie wcześniejszego zgłoszenia; np. duplikat, brak ryzyka po wstępnej ocenie)", "f.4.opt.a": "Kompletne", "f.4.opt.b": "Niekompletne", "f.4.opt.c": "Wycofanie", "f.5.label": "Powody wycofania wcześniejszego zgłoszenia", "f.6.label": "Identyfikator wcześniej zgłoszonego naruszenia ochrony danych osobowych", "f.6.tip": "Proszę podać identyfikator wcześniejszego naruszenia ochrony danych osobowych, które Państwo uzupełniają lub zmieniają.", "f.7.label": "Wewnętrzny numer referencyjny administratora", "f.7.tip": "Proszę podać swój wewnętrzny numer referencyjny, ości", "f.83.label": "Prawdopodobne konsekwencje w przypadku naruszenia dostępności", "f.83.opt.a": "Brak możliwości dostępu do usług", "f.83.opt.b": "Zakłócenia usług i trudności w korzystaniu z usług", "f.83.opt.c": "Inne", "f.83.opt.d": "W trakcie oceny", "f.84.label": "Opis innych konsekwencji dla dostępności", "f.85.label": "Charakter potencjalnego wpływu na osobę, której dane dotyczą", "f.85.tip": "Proszę wskazać tutaj charakter wpływu na prawa i wolności osoby, której dane dotyczą.", "f.85.opt.a": "Utrata kontroli nad swoimi danymi osobowymi", "f.85.opt.b": "Ograniczenie ich praw", "f.85.opt.c": "Dyskryminacja", "f.85.opt.d": "Kradzież lub przywłaszczenie tożsamości", "f.85.opt.e": "Oszustwo", "f.85.opt.f": "Strata finansowa", "f.85.opt.g": "Nieuprawnione odwrócenie pseudonimizacji", "f.85.opt.h": "Naruszenie dobrego imienia", "f.85.opt.i": "Utrata poufności danych osobowych chronionych tajemnicą zawodową", "f.85.opt.j": "Ujawnienie danych nieuprawnionym stronom trzecim", "f.85.opt.k": "Znacząca niekorzyść gospodarcza lub społeczna", "f.85.opt.l": "Szkoda fizyczna lub psychiczna", "f.85.opt.m": "Szkoda majątkowa lub niemajątkowa na mieniu", "f.85.opt.n": "Inny wpływ (proszę określić w dalszym opisie)", "f.85.opt.o": "Do ustalenia", "f.86.label": "Dalszy opis innych rodzajów wpływu na osoby, których dane dotyczą", "f.87.label": "Dotkliwość potencjalnych skutków", "f.87.tip": "Proszę wskazać tutaj wynik własnej oceny dotkliwości skutków naruszenia dla osób, których dane dotyczą. Jeśli możliwe jest wystąpienie wielu potencjalnych skutków, proszę wybrać najwyższą dotkliwość.", "f.87.opt.a": "Niewielka", "f.87.opt.b": "Umiarkowana", "f.87.opt.c": "Poważna", "f.87.opt.d": "Do ustalenia", "f.89.label": "Wynik oceny ryzyka przeprowadzonej przez administratora", "f.89.opt.a": "Naruszenie ochrony danych osobowych może powodować wysokie ryzyko naruszenia praw lub wolności osób fizycznych", "f.89.opt.b": "Naruszenie ochrony danych osobowych może powodować (niewysokie) ryzyko naruszenia praw lub wolności osób fizycznych", "f.89.opt.c": "Jest mało prawdopodobne, by naruszenie ochrony danych osobowych powodowało ryzyko naruszenia praw lub wolności osób fizycznych c) Potrzebne są dodatkowe informacje do oceny ryzyka naruszenia praw lub wolności osób fizycznych", "f.90.label": "Dalszy opis oceny ryzyka przeprowadzonej przez administratora danych", "f.90.tip": "Proszę opisać zastosowaną metodologię oraz istotne czynniki, które wzięto pod uwagę.", "f.92.label": "Środki podjęte w celu zaradzenia naruszeniu ochrony danych osobowych i zminimalizowania jego konsekwencji", "f.92.tip": "Proszę wskazać, w jakim stopniu środki te rozwiązują problem.", "f.94.label": "Istotne środki podjęte w celu zapobieżenia podobnym naruszeniom ochrony danych osobowych", "f.94.opt.a": "Anonimizacja", "f.94.opt.b": "Plan tworzenia kopii zapasowych / odzyskiwania danych", "f.94.opt.c": "Zmiana procesów", "f.94.opt.d": "Szyfrowanie danych", "f.94.opt.e": "Polityki ochrony danych i bezpieczeństwa informacji", "f.94.opt.f": "Szkolenia z zakresu ochrony danych i bezpieczeństwa", "f.94.opt.g": "Usunięcie danych", "f.94.opt.h": "Rejestr incydentów", "f.94.opt.i": "Poziomy dostępu do danych", "f.94.opt.j": "Logiczna kontrola dostępu (np. MFA)", "f.94.opt.k": "Okresowe audyty", "f.94.opt.l": "Fizyczna kontrola dostępu", "f.94.opt.m": "Pseudonimizacja", "f.94.opt.n": "Aktualne systemy informatyczne", "f.94.opt.o": "Inne środki (proszę określić w dalszym opisie)", "f.95.label": "Dalszy opis istotnych zaktualizowanych stałych środków mających zapobiegać podobnym incydentom w przyszłości", "f.95.tip": "Proszę wskazać, w jakim stopniu środki te rozwiązują problem i poprawiają sytuację.\n\nOpis jest wymagany, jeśli w poprzednim pytaniu m) udzielono odpowiedzi „Inne środki”.\n\nNiemniej jednak prosimy nie wahać się opisać dalszych środków podjętych po naruszeniu lub planowanych, jeśli uznają Państwo, że jest to istotne.", "f.97.label": "Czy naruszenie ochrony danych osobowych zostało zakomunikowane osobom, których dane dotyczą?", "f.97.tip": "Jeśli nie dokonano jeszcze oceny, czy zamierzają Państwo zawiadomić, prosimy pamiętać, że po podjęciu decyzji konieczne będzie zgłoszenie uzupełniające.\n\nJeśli komunikują Państwo naruszenie osobom, których dane dotyczą, etapami lub jeśli nie są Państwo w stanie dotrzeć jeszcze do wszystkich osób, których dane dotyczą, prosimy wskazać to w polach 98 i 98a.", "f.97.opt.a": "Tak", "f.97.opt.b": "Nie, ale zostanie zakomunikowane w określonym terminie b1) Nie, ale zostanie zakomunikowane w terminie do ustalenia", "f.97.opt.c": "Nie, postępowanie wyjaśniające wciąż trwa", "f.97.opt.d": "Nie, nie zostanie zakomunikowane, ponieważ jest mało prawdopodobne, by naruszenie ochrony danych osobowych powodowało wysokie ryzyko naruszenia praw lub wolności osób fizycznych", "f.97.opt.e": "Nie, nie zostanie zakomunikowane, ponieważ spełniony jest jeden z warunków, o których mowa w art. 34 ust. 3 RODO", "f.98.label": "Data przekazania informacji osobom, których dane dotyczą", "f.98.tip": "Proszę wskazać tutaj datę, w której rozpoczęli Państwo informowanie osób, których dane dotyczą.", "f.99.label": "Przyszła data, w której naruszenie ochrony danych zostanie zakomunikowane osobom, których dane dotyczą", "f.100.label": "Dalsze informacje o spełnionych warunkach, o których mowa w art. 34 ust. 3 RODO", "f.100.opt.a": "Administrator wdrożył odpowiednie techniczne i organizacyjne środki ochrony i środki te zostały zastosowane do danych osobowych, których dotyczyło naruszenie, w szczególności środki takie jak szyfrowanie, uniemożliwiające odczyt danych osobowych osobom nieuprawnionym do dostępu do tych danych osobowych.", "f.100.opt.b": "Administrator zastosował następnie środki eliminujące prawdopodobieństwo wystąpienia wysokiego ryzyka naruszenia praw lub wolności osoby, której dane dotyczą, o którym mowa w ust. 1.", "f.100.opt.c": "Wymagałoby ono niewspółmiernie dużego wysiłku. W takim przypadku wydany zostaje publiczny komunikat lub zastosowany zostaje podobny środek, za pomocą którego osoby, których dane dotyczą, zostają poinformowane w równie skuteczny sposób.", "f.101.label": "Dalszy opis, dlaczego spełnione są warunki, o których mowa w art. 34 ust. 3 RODO, oraz podjętych środków", "f.102.label": "Liczba poinformowanych osób, których dane dotyczą", "f.102.opt.a": "Wszystkie osoby, których dane dotyczą, zostały poinformowane", "f.102.opt.b": "Nie wszystkie osoby, których dane dotyczą, zostały poinformowane", "f.103.label": "Dalszy opis, dlaczego nie wszystkie osoby, których dane dotyczą, zostały poinformowane", "f.103.tip": "Proszę określić powód, dla którego niektóre osoby, których dane dotyczą, nie zostały poinformowane, np. niektóre nie zostały poinformowane z powodu A, inne z powodu B itd.\n\nPowody mogą mieć różny charakter i należy uwzględnić nie tylko te techniczne: trwający proces, do niektórych osób, których dane dotyczą, nie można dotrzeć w ten sam sposób, mają do nich zastosowanie dodatkowe przepisy, koszt poinformowania jest znacznie wyższy itd.", "f.104.label": "Środki komunikacji wykorzystane do poinformowania osoby, której dane dotyczą", "f.104.opt.a": "Komunikacja indywidualna (list/e-mail/komunikacja osobista)", "f.104.opt.b": "Ogłoszenie publiczne (strona internetowa/komunikat prasowy/sieć społecznościowa)", "f.104.opt.c": "Inne", "f.105.label": "Dalszy opis innych środków komunikacji", "f.106.label": "Treść informacji przekazanej osobom, których dane dotyczą", "f.106.tip": "Proszę przekazać tę treść w najbardziej odpowiedni sposób. Na przykład, jeśli przekazana informacja to wyłącznie wiadomość e-mail zawierająca jedynie zwykły tekst, wystarczy skopiować ten tekst tutaj. Jeśli natomiast Państwa informacja zawiera obrazy/filmy przydatne do zrozumienia, prosimy udostępnić organowi ochrony danych środki umożliwiające zapoznanie się z nią (strona internetowa, zrzuty ekranu wiadomości e-mail, strona pobierania itp.).", "f.109.label": "Czy incydent został zgłoszony policji/organom wymiaru sprawiedliwości jako przestępstwo?", "f.109.opt.a": "Tak", "f.109.opt.b": "Nie", "f.109.opt.c": "Nieznane", "f.110.label": "Czy incydent został zgłoszony innym organom nadzorczym lub organom kontrolnym na podstawie innych właściwych przepisów? (np. krajowemu centrum cyberbezpieczeństwa itp.)", "f.110.opt.a": "Tak", "f.110.opt.b": "Nie", "f.110.opt.c": "Nieznane", "f.111.label": "Dalsze informacje o zgłoszeniu innym organom lub podmiotom", "f.111.tip": "Proszę określić, który to organ (zajmujący się ochroną danych lub nie) i, jeśli to możliwe, podać identyfikator sprawy nadany przez ten organ, do którego można się następnie odwołać.", "f.113.label": "Czy naruszenie ochrony danych osobowych dotyczy transgranicznego przetwarzania prowadzonego przez administratora mającego siedzibę w Europejskim Obszarze Gospodarczym (EOG)?", "f.113.opt.a": "Tak", "f.113.opt.b": "Nie", "f.113.opt.c": "Nieznane", "f.114.label": "Wiodącym organem nadzorczym jest:", "f.115.label": "Wykaz państw EOG, w których administrator ma jednostkę organizacyjną", "f.115.tip": "Proszę wskazać tutaj państwa, których dotyczy naruszenie.", "f.116.label": "Wykaz państw EOG, w których znajdują się osoby, których dane dotyczą, dotknięte naruszeniem", "f.116.tip": "Proszę wskazać tutaj państwa, których dotyczy naruszenie.", "f.117.label": "Przybliżona liczba osób, których dane dotyczą, w podziale na państwa", "f.118.label": "Wykaz organów nadzorczych EOG, którym naruszenie zostało lub zostanie zgłoszone", "f.118.tip": "Proszę wskazać tutaj wykaz innych organów nadzorczych UE, którym dokonali Państwo zgłoszenia lub planują je zgłosić.", "f.118.opt.a": "- Der Landesbeauftragte für Datenschutz und Informationsfreiheit Mecklenburg-Vorpommern Germany (North Rhine-Westphalia) - Landesbeauftragte für Datenschutz und Informationsfreiheit Nordrhein-Westfalen Germany (Rhineland-Palatinate) - Der Landesbeauftragte für den Datenschutz und die Informationsfreiheit Rheinland-Pfalz Germany (Saarland) ted": "Ograniczona - identyfikacja trudna, ale możliwa", "enisa.ei.lvl.significant": "Znacząca - identyfikacja stosunkowo łatwa", "enisa.ei.lvl.maximum": "Maksymalna - dane bezpośrednio identyfikują osobę, której dane dotyczą", "enisa.cb.confidentiality.label": "Utrata poufności", "enisa.cb.confidentiality.lvl0": "Brak dowodów na niezgodne z prawem przetwarzanie", "enisa.cb.confidentiality.lvl1": "Ujawnienie znanym/ograniczonym odbiorcom", "enisa.cb.confidentiality.lvl2": "Publikacja / ujawnienie nieznanym odbiorcom", "enisa.cb.integrity.label": "Utrata integralności", "enisa.cb.integrity.lvl0": "Nie zidentyfikowano niezgodnego z prawem wykorzystania", "enisa.cb.integrity.lvl1": "Dane zmienione, odzyskanie możliwe", "enisa.cb.integrity.lvl2": "Dane zmienione, odzyskanie niemożliwe", "enisa.cb.availability.label": "Utrata dostępności", "enisa.cb.availability.lvl0": "Dane możliwe do odzyskania bez trudności", "enisa.cb.availability.lvl1": "Częściowa / tymczasowa niedostępność", "enisa.cb.availability.lvl2": "Całkowita niedostępność, brak możliwości odzyskania", "enisa.cb.malicious": "Zamiar złośliwy", "enisa.band.low": "Niski", "enisa.band.low.meaning": "Osoby fizyczne albo nie zostaną dotknięte, albo mogą napotkać kilka niedogodności.", "enisa.band.medium": "Średni", "enisa.band.medium.meaning": "Osoby fizyczne mogą napotkać znaczące niedogodności, które będą w stanie przezwyciężyć mimo pewnych trudności.", "enisa.band.high": "Wysoki", "enisa.band.high.meaning": "Osoby fizyczne mogą napotkać znaczące konsekwencje, które powinny być w stanie przezwyciężyć, choć z poważnymi trudnościami.", "enisa.band.very_high": "Bardzo wysoki", "enisa.band.very_high.meaning": "Osoby fizyczne mogą napotkać znaczące, a nawet nieodwracalne konsekwencje, których mogą nie być w stanie przezwyciężyć.", "enisa.mit.single_subject": "Pojedyncza osoba, której dane dotyczą / bardzo mały wolumen", "enisa.mit.recipient_confirms_deletion": "Błędny odbiorca potwierdza usunięcie danych", "enisa.mit.weak_linkage": "Powszechne nazwisko / homonimia / słabe powiązanie", "enisa.mit.strong_encryption": "Silne szyfrowanie / dane nieczytelne dla odbiorcy", "enisa.mit.pseudonymisation_no_key": "Pseudonimizacja bez dostępnego klucza", "enisa.mit.professional_secrecy": "Odbiorca związany tajemnicą zawodową / poufnością prawną", "enisa.mit.availability_restored": "Dostępność szybko przywrócona z kopii zapasowej (krótka przerwa)", "enisa.mit.public_low_criticality": "Dane już publiczne / niska krytyczność", "enisa.mit.note": "Okoliczności łagodzące, które obniżają wynik. Zgodnie z zasadą rozliczalności (art. 5) są to EDYTOWALNE sugestie, a nie narzucona korekta typu czarna skrzynka: każdy przełącznik przesuwa wskazaną zmienną we wskazanym kierunku; administrator może je zmienić. Dokładne kroki liczbowe są domyślnymi wartościami ENISA i oczekują na potwierdzenie względem dokumentu PDF ENISA 2013.", "enisa.provenance": "SE < 2 = Low pochodzi dosłownie z tekstu dokumentu ENISA. Górne progi (Medium 2-<3, High 3-<4, Very High >=4) to standardowe, powszechnie cytowane poziomy ENISA, ale nie zostały wyodrębnione dosłownie z warstwy tekstowej tego dokumentu PDF; należy je traktować jako „standardowe skonsolidowane poziomy ENISA”.", "rk.circumstances_cause": "Okoliczności i przyczyna naruszenia (jeśli znane)", "rk.date_or_period": "Data lub okres naruszenia (lub przybliżenie)", "rk.personal_information": "Opis danych osobowych, których dotyczyło naruszenie (w zakresie znanym)", "rk.number_affected": "Liczba osób dotkniętych naruszeniem (lub przybliżenie)", "rk.mitigation_steps": "Kroki podjęte w celu zmniejszenia/złagodzenia ryzyka szkody", "rk.notification_steps": "Kroki podjęte lub planowane w celu zawiadomienia osób dotkniętych naruszeniem (w stosownych przypadkach)", "rk.retention_note": "Minimum 24 miesiące od dnia, w którym organizacja stwierdzi, że doszło do naruszenia (SOR/2018-64).", "help.dpc": "Kontekst przetwarzania danych: jak krytyczne są dane. 1 proste, 2 behawioralne, 3 finansowe, 4 wrażliwe (szczególne kategorie).", "help.ei": "Łatwość identyfikacji: jak łatwo dane identyfikują osobę (mnoży DPC). Od 0,25 znikoma do 1 maksymalna.", "help.cb": "Okoliczności naruszenia: dodatkowe punkty za utratę poufności, integralności, dostępności (każda 0 / +0,25 / +0,5) oraz zamiar złośliwy (+0,5).", "enisa.mititle": "Czynniki łagodzące", "enisa.cbtitle_mal": "Zamiar złośliwy", "btn.export_csv": "Eksportuj CSV", "btn.export_xls": "Eksportuj XLS", "btn.export_aggregate": "Eksportuj statystyki zbiorcze (zanonimizowane)", "record.retention_prefix": "Przechowywanie", "record.aggregate_note": "Eksport zbiorczy: zanonimizowane liczby według taksonomii, k-anonimowość", "obl.title": "Twoje obowiązki w związku z tym naruszeniem", "obl.intro": "Orientacyjne wskazówki wygenerowane na podstawie wprowadzonych danych.", "obl.badge.required": "Wymagane", "obl.badge.notreq": "Niewymagane", "obl.badge.assess": "Do oceny", "obl.auth.title": "Zgłoś naruszenie organowi nadzorczemu", "obl.auth.required": "Wymagane, chyba że jest mało prawdopodobne, by naruszenie powodowało ryzyko naruszenia praw lub wolności osób fizycznych (art. 33 ust. 1). Termin: bez zbędnej zwłoki, a w miarę możliwości w ciągu 72 godzin od stwierdzenia naruszenia.", "obl.auth.notreq": "Niewymagane tylko wtedy, gdy jest mało prawdopodobne, by naruszenie powodowało ryzyko naruszenia praw lub wolności (art. 33 ust. 1). Należy udokumentować uzasadnienie (art. 33 ust. 5).", "obl.auth.assess": "Oceń, czy jest prawdopodobne, że naruszenie spowoduje ryzyko. Wynik dotkliwości ENISA pomaga w tej ocenie, ale sam w sobie nie przesądza o obowiązku prawnym.", "obl.subj.title": "Zakomunikuj osobom dotkniętym naruszeniem", "obl.subj.text": "Wymagane tylko wtedy, gdy jest prawdopodobne, że naruszenie spowoduje WYSOKIE ryzyko naruszenia praw lub wolności (art. 34 ust. 1), bez zbędnej zwłoki. Wyłączenia (art. 34 ust. 3): (a) dane nieczytelne, np. silne szyfrowanie; (b) późniejsze środki sprawiające, że wysokie ryzyko nie jest już prawdopodobne; (c) niewspółmiernie duży wysiłek -> zamiast tego komunikat publiczny.", "obl.doc.title": "Udokumentuj naruszenie wewnętrznie", "obl.doc.text": "Zawsze wymagane, dla WSZYSTKICH naruszeń, w tym tych niezgłoszonych (art. 33 ust. 5). RODO nie określa okresu przechowywania; zaleca się minimum 24 miesiące na wzór kanadyjski (PIPEDA, SOR/2018-64), zgodnie z propozycją w dokumencie stanowiskowym (część III.5).", "obl.disclaimer": "Są to orientacyjne wskazówki wygenerowane na podstawie wprowadzonych danych; nie stanowią porady prawnej i nie zastępują indywidualnej oceny administratora dokonywanej dla każdego przypadku na podstawie art. 33 i 34 RODO. Administrator pozostaje odpowiedzialny za ustalenie oraz za zadeklarowane wartości (rozliczalność, art. 5 ust. 2).", "enisa.select_prompt": "Wybierz DPC i EI, aby obliczyć dotkliwość.", "common.option_dash": "--", "mit.off": "Wył.", "mit.apply": "Zastosuj", "common.step": "Krok", "record.aggregate_note2": "(małe komórki ukryte). Brak wierszy pojedynczych zgłoszeń, brak tożsamości administratora.", "form.methodology_prefix": "Metodologia dotkliwości ENISA: SE = DPC x EI + CB = "}, "pt": {"_meta": {"lang": "pt", "name": "Português", "status": "complete", "canonical": false, "note": "Legal terminology from official GDPR translations (EUR-Lex); template-specific labels unofficial pending native review."}, "app.title": "Assistente de notificação de violações do CEPD", "app.subtitle": "Ferramenta offline, com privacidade desde a conceção, para triagem de violações de dados pessoais, pontuação de gravidade da ENISA e preparação de notificações ao CEPD", "app.disclaimer": "Rascunho baseado no modelo do CEPD v1.0 (consulta pública até 5 de agosto de 2026). Executa-se inteiramente no seu navegador - nenhum dado sai do seu dispositivo. Não é um canal oficial de apresentação; não o utilize para notificações reais a uma autoridade de controlo até que as autoridades implementem o modelo.", "nav.preassessmen
