<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDPB Breach Notification Assistant</title>
  <meta name="description" content="Offline, privacy-by-design tool for personal data breach triage, ENISA severity scoring and EDPB notification preparation." />
  <style>
    :root {
      --navy: #0f2740; --blue: #1f5fae; --accent: #2e7d32; --alert: #b3261e;
      --warn: #8a6d00; --bg: #f5f7fa; --card: #ffffff; --line: #e2e8f0; --muted: #5b6b7c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: #16222e; line-height: 1.5; }
    #app { max-width: 920px; margin: 0 auto; padding: 24px 18px 64px; }
    header h1 { color: var(--navy); margin: 0 0 4px; font-size: 1.7rem; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); margin: 0 0 12px; }
    .disclaimer { background: #fff8e1; border: 1px solid #ffe08a; color: #6a5400; padding: 10px 12px;
      border-radius: 8px; font-size: 0.86rem; margin-bottom: 12px; }
    .langbox { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; }
    select, input[type=text], input[type=number], input[type=date], input[type=datetime-local], textarea {
      font: inherit; padding: 7px 9px; border: 1px solid var(--line); border-radius: 7px; width: 100%; max-width: 520px; background: #fff; }
    select.lang { width: auto; display: inline-block; }
    textarea { resize: vertical; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0; border-bottom: 1px solid var(--line); }
    .tab { background: none; border: none; padding: 9px 12px; cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent; font: inherit; }
    .tab.active { color: var(--navy); border-bottom-color: var(--blue); font-weight: 600; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 18px; }
    .card h2 { margin-top: 0; color: var(--navy); }
    .card h3 { color: var(--blue); margin: 18px 0 6px; font-size: 1rem; }
    .card h3.section { margin-top: 24px; padding-top: 10px; border-top: 1px solid var(--line); color: var(--navy); font-size: 0.95rem; }
    .muted { color: var(--muted); }
    .small { font-size: 0.84rem; }
    .formula { font-family: ui-monospace, Menlo, monospace; background: #f0f4f8; padding: 6px 10px; border-radius: 6px; display: inline-block; }
    .q { margin: 12px 0; }
    .q > label { display: block; font-weight: 500; margin-bottom: 6px; }
    .opt { display: inline-flex; align-items: center; gap: 4px; margin-right: 14px; }
    .opt label { font-weight: 400; }
    .field { margin: 12px 0; }
    .field > label { display: block; font-weight: 500; margin-bottom: 4px; }
    .gdpr { color: var(--accent); font-weight: 400; font-size: 0.82rem; }
    .tooltip { margin-bottom: 4px; }
    .cond { font-style: italic; }
    .multi .opt { display: flex; margin: 2px 0; }
    /* segmented buttons (DPC/EI/CB) */
    .segmented { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
    .seg { background: #fff; border: 1px solid var(--line); color: #16222e; padding: 8px 12px; border-radius: 8px;
      cursor: pointer; font: inherit; margin: 0; min-height: 40px; transition: background .12s, border-color .12s; }
    .seg:hover { border-color: var(--blue); }
    .seg.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
    .seg-label { display: block; font-weight: 500; margin: 8px 0 2px; font-size: .92rem; }
    .help { margin: 2px 0 4px; }
    .mitigant { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #eef2f7; }
    .mit-label { font-size: .9rem; }
    .mit-tag { color: var(--accent); font-size: .78rem; }
    .verdict.sticky { position: sticky; bottom: 8px; background: var(--card); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px 14px; box-shadow: 0 2px 10px rgba(15,39,64,.08); z-index: 5; }
    .se-num { font-size: 1.25rem; }
    .obligations { border-left: 4px solid var(--blue); }
    .obl { padding: 10px 12px; border-radius: 8px; margin: 8px 0; border: 1px solid var(--line); }
    .obl.yes { background: #fdecea; border-color: #f5c2bd; }
    .obl.no { background: #eef7ee; border-color: #cfe6cf; }
    .obl.assess { background: #fff8e1; border-color: #ffe08a; }
    .obl-head { margin-bottom: 3px; }
    .obl-badge { display: inline-block; font-size: .74rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; color: #fff; }
    .obl-badge.yes { background: var(--alert); } .obl-badge.no { background: var(--accent); } .obl-badge.assess { background: var(--warn); }
    .obl-ref { font-weight: 400; }
    .stepnav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 4px 0 18px; }
    .stepcount { white-space: nowrap; }
    .verdict { margin-top: 14px; }
    .banner { padding: 9px 12px; border-radius: 7px; margin: 6px 0; font-size: 0.9rem; }
    .banner.alert { background: #fdecea; border: 1px solid #f5c2bd; color: var(--alert); }
    .banner.info { background: #e8f1fb; border: 1px solid #bcd7f3; color: var(--blue); }
    .banner.warn { background: #fff8e1; border: 1px solid #ffe08a; color: var(--warn); }
    .score { font-size: 1.1rem; margin-bottom: 6px; }
    .band-low { color: var(--accent); } .band-medium { color: #b8860b; }
    .band-high { color: #d2691e; } .band-very_high { color: var(--alert); }
    button.primary { background: var(--blue); color: #fff; border: none; padding: 10px 16px; border-radius: 8px;
      cursor: pointer; font: inherit; font-weight: 600; margin-top: 8px; }
    button.primary:hover { background: #174a86; }
    button { background: #eef2f7; border: 1px solid var(--line); padding: 8px 14px; border-radius: 8px; cursor: pointer; font: inherit; margin-top: 8px; }
    .actions { margin-top: 16px; }
    .records { padding-left: 18px; }
    footer { margin-top: 26px; padding-top: 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: 0.8rem; }
    footer a { color: var(--blue); }
    /* mobile: full-width controls, larger tap targets, no overflow */
    @media (max-width: 600px) {
      #app { padding: 16px 12px 56px; }
      header h1 { font-size: 1.4rem; }
      .card { padding: 16px 14px; }
      .tabs { gap: 2px; }
      .tab { padding: 8px 8px; font-size: .9rem; flex: 1 1 auto; text-align: center; }
      .segmented { gap: 5px; }
      .seg { flex: 1 1 auto; min-width: 64px; text-align: center; min-height: 44px; }
      select, input[type=text], input[type=number], input[type=date], input[type=datetime-local], textarea { max-width: 100%; }
      .opt { margin-right: 8px; }
      .mitigant { flex-direction: column; align-items: stretch; }
      .verdict.sticky { bottom: 0; border-radius: 10px 10px 0 0; }
      .stepnav button { min-height: 44px; }
    }
  </style>
</head>

 false}, {"id": 58, "section": "3.2", "label": "Type of integrity breach", "type": "enum", "options": [{"key": "a", "label": "Alteration or modification of the data, with no evidence of illegal or wrong use"}, {"key": "b", "label": "Alteration or modification of the data, with evidence of illegal or wrong use, but with the possibility of reversing/recovering the damages to data subjects"}, {"key": "c", "label": "Alteration or modification of the data with evidence of illegal or wrong use, without the possibility of reversing/recovering damages to the data subjects"}], "mandatory": "conditional", "visible_if": "only if integrity", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 59, "section": "3.2", "label": "Type of availability breach", "type": "enum", "options": [{"key": "a", "label": "Temporary availability issue"}, {"key": "b", "label": "Permanent availability issue"}, {"key": "c", "label": "not determined"}], "mandatory": "conditional", "visible_if": "only if availability", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please assess the availability issue form the data subject’s perspective", "allow_multiple": false}, {"id": 60, "section": "3.2", "label": "Nature of the incident", "type": "enum", "options": [{"key": "a", "label": "Abuse of access privileges by employee"}, {"key": "b", "label": "Encrypted device / ransomware"}, {"key": "c", "label": "Hacking / malware activity detected"}, {"key": "d", "label": "Phishing / social engineering"}, {"key": "e", "label": "Security vulnerability (likely) exploited (known CVE or zero day)"}, {"key": "f", "label": "Unauthorised access to personal data in IT systems"}, {"key": "g", "label": "Data exfiltration / unauthorised extraction of personal data"}, {"key": "h", "label": "Data of wrong data subject shown (mix-up of records)"}, {"key": "i", "label": "Device lost or stolen"}, {"key": "j", "label": "E-waste (personal data still present on obsolete device)"}, {"key": "k", "label": "Incorrect disposal of personal data on paper"}, {"key": "l", "label": "Mail lost or opened / misdelivery (post/email)"}, {"key": "m", "label": "Misconfiguration"}, {"key": "n", "label": "Incorrect access permissions (e.g., cloud storage, shared folder)"}, {"key": "o", "label": "Paper lost or stolen or left in insecure location"}, {"key": "p", "label": "Personal data deleted/destroyed"}, {"key": "q", "label": "Personal data displayed to wrong recipient"}, {"key": "r", "label": "Personal data sent by mistake (post/email)"}, {"key": "s", "label": "Sending email to multiple recipients without blind copy / with open distribution list"}, {"key": "t", "label": "Technical malfunction"}, {"key": "u", "label": "Unauthorised data modification"}, {"key": "v", "label": "Unintended publication (e.g., public link / public website / shared drive)"}, {"key": "w", "label": "Verbal unauthorised disclosure of personal data"}, {"key": "x", "label": "to be determined"}, {"key": "y", "label": "Other (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 61, "section": "3.2", "label": "Cause of the personal data breach", "type": "enum", "options": [{"key": "a", "label": "Internal non malicious"}, {"key": "b", "label": "Internal malicious"}, {"key": "c", "label": "External non malicious"}, {"key": "d", "label": "External malicious"}, {"key": "e", "label": "To be determined"}, {"key": "f", "label": "Unknown"}], "mandatory": "yes", "visible_if": "”To be determined” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": null, "allow_multiple": false}, {"id": 62, "section": "3.2", "label": "Further description of the nature of the incident", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please describe the nature of the breach (detection, awareness, cause, measures in place) shortly and provide on what facts your decision is grounded. If possible indicate the root cause of the incident.", "allow_multiple": false}, {"id": 63, "section": "3.2", "label": "Description of the systems, software, services, and infrastructures involved in the personal data breach and where they are located", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please list the descriptions them in semantic groups, e.g. \n\nSystems:\n• production database :\n  o client database (full/partial) that countains ****, located in ***\n  o internal HR database (full/partial) that countains ****, located in ***\n• test infrastucture\n  o testing database (full/partial) that countains ****; located in ***\nSoftware:\n• Accounting software\n• Payment system software", "allow_multiple": false}, {"id": 65, "section": "3.3", "label": "Categories of concerned data subjects", "type": "multi-select", "options": [{"key": "a", "label": "Customers (current and prospects)"}, {"key": "b", "label": "Employees (former, current and candidates)"}, {"key": "c", "label": "Military or law enforcement staff"}, {"key": "d", "label": "Minors"}, {"key": "e", "label": "Patients"}, {"key": "f", "label": "Students"}, {"key": "g", "label": "Subscribers"}, {"key": "h", "label": "Users"}, {"key": "i", "label": "Vulnerable individuals (elderly, refugees, disabled people, victims, …)"}, {"key": "j", "label": "Additional concerned data subjects (please specify in further description)"}, {"key": "k", "label": "Not yet known"}], "mandatory": "yes", "visible_if": "”Not yet known” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "If you answered i), please indicate what kind of vulnerable people. If you are not sure if or how the concerned data subject are vulnerable, please describe them shortly and why you would consider them as vulnerable.", "allow_multiple": false}, {"id": 66, "section": "3.3", "label": "Further description of cate mber of personal data records concerned by the personal data breach", "type": "number", "options": [], "mandatory": "yes", "visible_if": "ask according to selected value before", "gdpr_ref": "Art. 33(3)(a)", "tooltip": "Please indicate here the number of records concerned by the breach, meaning the number of single entries in the database concerned by the breach.", "allow_multiple": false}, {"id": 75, "section": "3.5", "label": "Relevant measures in place when the personal data breach occurred", "type": "multi-select", "options": [{"key": "a", "label": "Pseudonymisation"}, {"key": "b", "label": "Backup / Recovery plan"}, {"key": "c", "label": "Data encryption"}, {"key": "d", "label": "Data protection and information security policies"}, {"key": "e", "label": "Data protection and security training"}, {"key": "f", "label": "Incident log"}, {"key": "g", "label": "Levels of access to data"}, {"key": "h", "label": "Logical access control (e.g. MFA)"}, {"key": "i", "label": "Periodic audits"}, {"key": "j", "label": "Physical access control"}, {"key": "k", "label": "Up-to-date IT systems"}, {"key": "l", "label": "Other measures (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 32; Art. 33(3)", "tooltip": "This list is not exhaustive and just covers common measures. \n\nYou may have not applied some measures because they were not applicables or useful.\n\nAt the same time, you may have applied non-listed measures that were useful. If so, please specify them with answer L.", "allow_multiple": false}, {"id": 76, "section": "3.5", "label": "Further description of relevant measures in place when the personal data breach occurred", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": "If 57 indicated that measures in place are likely to be subverted, remind DCs here to detail on this in the tooltip", "gdpr_ref": "Art. 32; Art. 33(3)", "tooltip": "Reminder: You indicated that technical measures are likely to be subverted by the adversaries. Please add the relevant level of detail here to these measures, along the description of the other relevant measures.", "allow_multiple": false}, {"id": 79, "section": "4.1", "label": "Likely consequences in case of breach of confidentiality", "type": "multi-select", "options": [{"key": "a", "label": "Data were disclosed beyond the scope of the privacy policy or relevant legislation"}, {"key": "b", "label": "Data may be linked, without unreasonable effort, with other information regarding data subjects"}, {"key": "c", "label": "Data may be used for purposes other than the intended purpose or unlawfully"}, {"key": "d", "label": "Other"}, {"key": "e", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Confidentiality\"= yes\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 80, "section": "4.1", "label": "Description of other confidentiality consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 81, "section": "4.1", "label": "Likely consequences in case of breach of integrity", "type": "multi-select", "options": [{"key": "a", "label": "Data may have been modified and used even though it is no longer valid"}, {"key": "b", "label": "Data may have been modified into otherwise valid data and subsequently used for other purposes"}, {"key": "c", "label": "Other"}, {"key": "d", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Integrity\"= 1\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 82, "section": "4.1", "label": "Description of other integrity consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 83, "section": "4.1", "label": "Likely consequences in case of breach of availability", "type": "multi-select", "options": [{"key": "a", "label": "Inability to access services"}, {"key": "b", "label": "Service disruptions and difficulties in service use"}, {"key": "c", "label": "Other"}, {"key": "d", "label": "Under assessment"}], "mandatory": "conditional", "visible_if": "visible only if \"Integrity\"= 1\n”Under assessment ” only available for incomplete notification.", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 84, "section": "4.1", "label": "Description of other availability consequences", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Other\" = Yes", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 85, "section": "4.1", "label": "Nature of the potential impact for the data subject", "type": "multi-select", "options": [{"key": "a", "label": "Loss of control of their personal data"}, {"key": "b", "label": "Limitation of their rights"}, {"key": "c", "label": "Discrimination"}, {"key": "d", "label": "Identity theft or usurpation"}, {"key": "e", "label": "Fraud"}, {"key": "f", "label": "Financial loss"}, {"key": "g", "label": "Unauthorised reversal of pseudonymisation"}, {"key": "h", "label": "Damage to reputation"}, {"key": "i", "label": "Loss of confidentiality of personal data protected by professional secrecy"}, {"key": "j", "label": "Disclosure of data to unauthorised third parties"}, {"key": "k", "label": "Significant economic or social disadvantage"}, {"key": "l", "label": "Physical or mental harm"}, {"key": "m", "label": "Material or non-material damage to property"}, {"key": "n", "label": "Other impact (please specify in further description)"}, {"key": "o", "label": "To be determined"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(c)", "tooltip": "Please indicate here the nature of the impact on the data subject rights and freedoms.", "allow_multiple": false}, {"id": 86, "section": "4.1", "label": "Further description of the other impacts for the data subjects", "type": "textarea", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"Description of the potential impact for the data subject\" = \"other\"", "gdpr_ref": "Art. 33(3)(c)", "tooltip": null, "allow_multiple": false}, {"id": 87, "section": "4.1", "label": "Severity of the potential impacts", "type": "enum", "options": [{"key": "a", "label": "Minor"}, {"key": "b", "label": "Moderate"}, {"key": "c", "label": "Severe"}, {"key": "d", "label": "To be determined"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(c)", "tooltip": "Indicate here the result of your self-assessment of the severity of the impact of the breach for the data subjects. Please select the highest severity if multiple potential impacts can occur.", "allow_multiple": false}, {"id": 89, "section": "4.2", "label": "Outcome of the risk assessment carried out by the controller", "type": "enum", "options": [{"key": "a", "label": "The personal data breach is likely to result in a high risk to the rights and freedoms of natural persons"}, {"key": "b", "label": "The personal data breach is likely to result in a (not high) risk to the rights and freedoms of natural persons"}, {"key": "c", "label": "The personal data breach is unlikely to result in a risk to the rights and freedoms of natural personsc) Additional information is needed to assess the risk to the rights and freedoms of natural persons"}], "mandatory": "yes", "visible_if": "”Additional information is needed to assess the risk to the rights and freedoms of natural persons ” only available for incomplete notification.", "gdpr_ref": "Art. 33(1); Art. 34(1)", "tooltip": null, "allow_multiple": false}, {"id": 90, "section": "4.2", "label": "Further description  of the risk assessment carried out by the data controller", "type": "textarea", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(1); Art. 34(1)", "tooltip": "Please describe the metodology used and the relevant factors you put into account.", "allow_multiple": false}, {"id": 92, "section": "4.3", "label": "Measures taken to address the personal data breach and to mitigate its consequences", "type": "text", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": "Please indicate to what extend the measures resolve the issue.", "allow_multiple": false}, {"id": 94, "section": "4.4", "label": "Relevant measures taken to prevent similar personal data breach", "type": "multi-select", "options": [{"key": "a", "label": "Anonymisation"}, {"key": "b", "label": "Backup / Recovery plan"}, {"key": "c", "label": "Change of processes"}, {"key": "d", "label": "Data encryption"}, {"key": "e", "label": "Data protection and information security policies"}, {"key": "f", "label": "Data protection and security training"}, {"key": "g", "label": "Erasure of the data"}, {"key": "h", "label": "Incident log"}, {"key": "i", "label": "Levels of access to data"}, {"key": "j", "label": "Logical access control (e.g. MFA)"}, {"key": "k", "label": "Periodic audits"}, {"key": "l", "label": "Physical access control"}, {"key": "m", "label": "Pseudonymisation"}, {"key": "n", "label": "Up-to-date IT systems"}, {"key": "o", "label": "Other measures (please specify in further description)"}], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": null, "allow_multiple": false}, {"id": 95, "section": "4.4", "label": "Further description of relevant updated permanent measures to avoid similar incidents in the future", "type": "date", "options": [], "mandatory": "yes", "visible_if": null, "gdpr_ref": "Art. 33(3)(d)", "tooltip": "Please indicate to what extend the measures resolve the issue and improve the situation.\n\nA description is expected if you answered with “Other measures” in the previous question m).\n\nNevertheless, do not hesitate to describe further measures taken after the breach, or to be taken, if you think it is relevant.", "allow_multiple": false}, {"id": 97, "section": "4.4", "label": "Has the personal data breach been communicated to data subjects?", "type": "enum", "options": [{"key": "a", "label": "Yes"}, {"key": "b", "label": "No, but it will be communicated on a specific date b1) No, but it will be communicated on a date to be determined"}, {"key": "c", "label": "No, the investigation is still ongoing"}, {"key": "d", "label": "No, it will not be communicated since the personal data breach is unlikely to result in a high risk to the rights and freedoms of natural persons"}, {"key": "e", "label": "No, it will not be communicated since one of the conditions referred to in article 34(3) of the GDPR is met"}], "mandatory": "yes", "visible_if": "No, the risk assessment is still ongoing’ only available for incomplete notifications.", "gdpr_ref": "Art. 34(1); Art. 34(2)", "tooltip": "If you have not assessed yet if you are going to notify, please note that you will have to make a follow-up notification once you have make your decision\n\nIf you communicate the data breach to the data subjects in phases or if you cannot reach out to all data subjects, yet. Please indicated that in field 98 and 98a.", "allow_multiple": false}, {"id": 98, "section": "4.4", "label": "Date of when information was given to data subjects", "type": "date", "options": [], "mandatory": "conditional", "visible_if": "visible only if \"information of data subject\" = Yes", "gdpr_ref": "Art. 34(1); Art. 34(2)", "tooltip": "Please indicate here the date on which you have started to inform the data subjects.", "allow_multiple": false}, {"id": 99, "section": "4.4", "label": "Future date on which the data breach will be communicated to the data subjects", "type": "date", "options": [], "m τοποίηση, πριν από τη συμπλήρωση του πλήρους υποδείγματος.", "pre.q_isbreach": "Πρόκειται για παραβίαση της ασφάλειας που οδηγεί σε τυχαία ή παράνομη καταστροφή, απώλεια, μεταβολή, άνευ αδείας κοινολόγηση ή πρόσβαση δεδομένων προσωπικού χαρακτήρα;", "pre.q_personaldata": "Η παραβίαση αφορά δεδομένα προσωπικού χαρακτήρα (πληροφορίες που αφορούν ταυτοποιημένο ή ταυτοποιήσιμο πρόσωπο);", "pre.q_risk": "Είναι πιθανό η παραβίαση να επιφέρει κίνδυνο για τα δικαιώματα και τις ελευθερίες των φυσικών προσώπων;", "pre.q_highrisk": "Είναι πιθανό η παραβίαση να επιφέρει ΥΨΗΛΟ κίνδυνο για τα φυσικά πρόσωπα;", "pre.verdict.notbreach": "Αυτό δεν φαίνεται να αποτελεί παραβίαση δεδομένων προσωπικού χαρακτήρα βάσει του ΓΚΠΔ. Τηρήστε ωστόσο εσωτερικό αρχείο.", "pre.verdict.norisk": "Παραβίαση δεδομένων προσωπικού χαρακτήρα χωρίς πιθανό κίνδυνο: η γνωστοποίηση προς την εποπτική αρχή ενδέχεται να μην απαιτείται, αλλά οφείλετε να την καταγράψετε (άρθρο 33 παρ. 5).", "pre.verdict.notify_dpa": "Πιθανώς υπόκειται σε γνωστοποίηση προς την εποπτική αρχή εντός 72 ωρών (άρθρο 33).", "pre.verdict.notify_subjects": "Υψηλός κίνδυνος: ανακοινώστε επίσης στα θιγόμενα φυσικά πρόσωπα χωρίς αδικαιολόγητη καθυστέρηση (άρθρο 34), εκτός εάν ισχύει εξαίρεση του άρθρου 34 παρ. 3.", "enisa.title": "Αξιολόγηση σοβαρότητας ENISA", "enisa.intro": "Υπολογίζει SE = DPC x EI + CB και τη ζώνη σοβαρότητας. Μια αναπαραγώγιμη βαθμολογία για την απάντηση στο πεδίο του υποδείγματος 'περιγράψτε τη μεθοδολογία που χρησιμοποιήθηκε'.", "enisa.dpc": "Πλαίσιο επεξεργασίας δεδομένων (DPC)", "enisa.ei": "Ευκολία ταυτοποίησης (EI)", "enisa.cb": "Περιστάσεις της παραβίασης (CB)", "enisa.result": "Βαθμολογία σοβαρότητας (SE)", "enisa.band": "Ζώνη σοβαρότητας", "enisa.trigger_on": "SE >= 2: ενεργοποιήθηκε η διαδρομή αξιολόγησης / γνωστοποίησης.", "enisa.trigger_off": "SE < 2 (χαμηλή): η γνωστοποίηση προς την αρχή γενικά δεν απαιτείται, αλλά καταγράψτε την παραβίαση.", "enisa.prefill": "Χρησιμοποιήστε αυτή τη βαθμολογία για την προσυμπλήρωση της γνωστοποίησης EDPB", "form.title": "Γνωστοποίηση EDPB", "form.intro": "Το πλήρες υπόδειγμα EDPB, προσυμπληρωμένο με βάση την προκαταρκτική αξιολόγησή σας και τη βαθμολογία ENISA. Τα υπό όρους πεδία εμφανίζονται ανάλογα με τις απαντήσεις σας.", "form.export_json": "Εξαγωγή JSON (φορτίο API)", "form.export_note": "Το εξαγόμενο αρχείο JSON επικυρώνεται έναντι του ανοικτού σχήματος γνωστοποίησης παραβιάσεων και μπορεί να υποβληθεί μέσω του ανοικτού API από το σύστημα διαχείρισής σας.", "form.required": "υποχρεωτικό", "form.gdpr": "ΓΚΠΔ", "record.title": "Αρχείο παραβιάσεων (λογοδοσία)", "record.intro": "Μητρώο ΟΛΩΝ των παραβιάσεων, συμπεριλαμβανομένων εκείνων που δεν υπόκεινται σε γνωστοποίηση, εμπνευσμένο από την καναδική υποχρέωση τήρησης αρχείων PIPEDA και το άρθρο 33 παρ. 5 του ΓΚΠΔ. Αποθηκεύεται τοπικά στο πρόγραμμα περιήγησής σας.", "record.add": "Αποθήκευση της τρέχουσας παραβίασης στο αρχείο", "record.empty": "Δεν έχουν καταγραφεί ακόμη παραβιάσεις.", "record.export": "Εξαγωγή αρχείου (JSON)", "common.yes": "Ναι", "common.no": "Όχι", "common.unknown": "Άγνωστο", "common.next": "Επόμενο", "common.back": "Πίσω"}, "en": {"_meta": {"lang": "en", "name": "English", "status": "complete", "canonical": true}, "app.title": "EDPB Breach Notification Assistant", "app.subtitle": "Offline, privacy-by-design tool for personal data breach triage, ENISA severity scoring and EDPB notification preparation", "app.disclaimer": "Draft based on the EDPB template v1.0 (public consultation until 5 August 2026). Runs entirely in your browser - no data leaves your device. Not an official submission channel; do not use for live notifications to a supervisory authority until authorities implement the template.", "nav.preassessment": "1. Pre-assessment", "nav.severity": "2. ENISA severity", "nav.notification": "3. EDPB notification", "nav.record": "4. Breach record", "lang.label": "Language", "lang.incomplete": "(draft translation - English fallback)", "pre.title": "Pre-assessment (triage)", "pre.intro": "Quick triage, inspired by the ICO self-assessment, to decide whether this is a notifiable personal data breach before completing the full template.", "pre.q_isbreach": "Is this a breach of security leading to accidental or unlawful destruction, loss, alteration, unauthorised disclosure of, or access to personal data?", "pre.q_personaldata": "Does the breach involve personal data (information relating to an identified or identifiable person)?", "pre.q_risk": "Is the breach likely to result in a risk to the rights and freedoms of individuals?", "pre.q_highrisk": "Is the breach likely to result in a HIGH risk to individuals?", "pre.verdict.notbreach": "This does not appear to be a personal data breach under the GDPR. Keep an internal record anyway.", "pre.verdict.norisk": "Personal data breach with no likely risk: notification to the supervisory authority may not be required, but you must record it (Art. 33(5)).", "pre.verdict.notify_dpa": "Likely notifiable to the supervisory authority within 72 hours (Art. 33).", "pre.verdict.notify_subjects": "High risk: also communicate to the affected individuals without undue delay (Art. 34), unless an Art. 34(3) exemption applies.", "enisa.title": "ENISA severity assessment", "enisa.intro": "Computes SE = DPC x EI + CB and the severity band. A reproducible score to answer the template field 'describe the methodology used'.", "enisa.dpc": "Data Processing Context (DPC)", "enisa.ei": "Ease of Identification (EI)", "enisa.cb": "Circumstances of the Breach (CB)", "enisa.result": "Severity score (SE)", "enisa.band": "Severity band", "enisa.trigger_on": "SE >= 2: assessment / notification path activated.", "enisa.trigger_off": "SE < 2 (Low): notification to the authority is generally not required, but record the breach.", "enisa.prefill": "Use this score to pre-fill the EDPB notification", "form.title": "EDPB notification", "form.intro": "The full EDPB template, prepopulated from your pre-assessment and ENISA score. Conditional fields appear based on your answers.", "form.export_json": "Export JSON (API payload)", "form.export_note": "The exported JSON validates against the open breach-notification schema and can be submitted via the open API by your management system.", "form.required": "required", "form.gdpr": "GDPR", "record.title": "Breach record (accountability)", "record.intro": "A register of ALL breaches, including non-notifiable ones, inspired by the Canadian PIPEDA record-keeping obligation and GDPR Art. 33(5). Stored locally in your browser.", "record.add": "Save current breach to record", "record.empty": "No breaches recorded yet.", "record.export": "Export record (JSON)", "common.yes": "Yes", "common.no": "No", "common.unknown": "Unknown", "common.next": "Next", "common.back": "Back"}, "es": {"_meta": {"lang": "es", "name": "Español", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "Asistente de notificación de violaciones del CEPD", "app.subtitle": "Herramienta offline, basada en la privacidad desde el diseño, para el triaje de violaciones de la seguridad de los datos personales, la puntuación de gravedad de ENISA y la preparación de notificaciones al CEPD", "app.disclaimer": "Borrador basado en la plantilla del CEPD v1.0 (consulta pública hasta el 5 de agosto de 2026). Se ejecuta íntegramente en su navegador - ningún dato sale de su dispositivo. No es un canal oficial de presentación; no lo utilice para notificaciones reales a una autoridad de control hasta que las autoridades implementen la plantilla.", "nav.preassessment": "1. Evaluación previa", "nav.severity": "2. Gravedad ENISA", "nav.notification": "3. Notificación al CEPD", "nav.record": "4. Registro de violaciones", "lang.label": "Idioma", "lang.incomplete": "(traducción provisional - se recurre al inglés)", "pre.title": "Evaluación previa (triaje)", "pre.intro": "Triaje rápido, inspirado en la autoevaluación de la ICO, para decidir si se trata de una violación de la seguridad de los datos personales notificable antes de completar la plantilla completa.", "pre.q_isbreach": "¿Es esta una violación de la seguridad que ocasione la destrucción, pérdida o alteración accidental o ilícita de datos personales, o la comunicación o acceso no autorizados a dichos datos?", "pre.q_personaldata": "¿La violación afecta a datos personales (información sobre una persona física identificada o identificable)?", "pre.q_risk": "¿Es probable que la violación entrañe un riesgo para los derechos y libertades de las personas físicas?", "pre.q_highrisk": "¿Es probable que la violación entrañe un ALTO riesgo para las personas físicas?", "pre.verdict.notbreach": "Esto no parece ser una violación de la seguridad de los datos personales con arreglo al RGPD. Mantenga igualmente un registro interno.", "pre.verdict.norisk": "Violación de la seguridad de los datos personales sin riesgo probable: puede que no se requiera notificación a la autoridad de control, pero debe documentarla (art. 33(5)).", "pre.verdict.notify_dpa": "Probablemente notificable a la autoridad de control en un plazo de 72 horas (art. 33).", "pre.verdict.notify_subjects": "Alto riesgo: comuníquela también a las personas físicas afectadas sin dilación indebida (art. 34), salvo que sea aplicable una exención del art. 34(3).", "enisa.title": "Evaluación de gravedad de ENISA", "enisa.intro": "Calcula SE = DPC x EI + CB y la franja de gravedad. Una puntuación reproducible para responder al campo de la plantilla 'describa la metodología utilizada'.", "enisa.dpc": "Contexto del tratamiento de datos (DPC)", "enisa.ei": "Facilidad de identificación (EI)", "enisa.cb": "Circunstancias de la violación (CB)", "enisa.result": "Puntuación de gravedad (SE)", "enisa.band": "Franja de gravedad", "enisa.trigger_on": "SE >= 2: vía de evaluación / notificación activada.", "enisa.trigger_off": "SE < 2 (Baja): por lo general no se requiere notificación a la autoridad, pero documente la violación.", "enisa.prefill": "Utilice esta puntuación para rellenar previamente la notificación al CEPD", "form.title": "Notificación al CEPD", "form.intro": "La plantilla completa del CEPD, rellenada previamente a partir de su evaluación previa y su puntuación ENISA. Los campos condicionales aparecen en función de sus respuestas.", "form.export_json": "Exportar JSON (carga útil de la API)", "form.export_note": "El JSON exportado se valida con el esquema abierto de notificación de violaciones y puede presentarse a través de la API abierta mediante su sistema de gestión.", "form.required": "obligatorio", "form.gdpr": "RGPD", "record.title": "Registro de violaciones (responsabilidad proactiva)", "record.intro": "Un registro de TODAS las violaciones, incluidas las no notificables, inspirado en la obligación de mantenimiento de registros de la PIPEDA canadiense y en el art. 33(5) del RGPD. Almacenado localmente en su navegador.", "record.add": "Guardar la violación actual en el registro", "record.empty": "Aún no se ha registrado ninguna violación.", "record.export": "Exportar registro (JSON)", "common.yes": "Sí", "common.no": "No", "common.unknown": "Desconocido", "common.next": "Siguiente", "common.back": "Atrás"}, "et": {"_meta": {"lang": "et", "name": "Eesti", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "EDPB rikkumisest teavitamise assistent", "app.subtitle": "Vorguvaba, lojimuga sisseehitatud andmekaitset pakkuv tooriist isikuandmetega seotud rikkumiste triaaziks, ENISA raskusastme hindamiseks ja EDPB teavituse ettevalmistamiseks", "app.disclaimer": "Kavand pohineb EDPB nailisel v1.0 (avalik konsultatsioon kuni 5. august 2026). Tootab taielikult teie brauseris - ukski andmed ei lahku teie seadmest. Ei ole ametlik esitamiskanal; arge kasutage tegelikeks teavitusteks jarelevalveasutusele enne, kui asutused nailise kasutusele votavad.", "nav.preassessment": "1. Eelhindamine", "nav.severity": "2. ENISA raskusaste", "nav.notification": "3. EDPB teavitus", "nav.record": "4. Rikkumiste register", "lang.label": "Keel", "lang.incomplete": "(tolke kavand - ingliskeelne varuvariant)", "pre.title": "Eelhindamine (triaaz)", "pre.intro": "Kiire triaaz, mille inspiratsiooniks on ICO enesehindamine, et otsustada, kas tegemist on teavitamiskohustusliku isikuandmetega seotud rikkumisega enne taieliku nailise taitmist.", "pre.q_isbreach": "Kas tegemist on turvanouete rikkumisega, mis pohjustab edastatavate, salvestatavate voi muul viisil tooeldavate isikuandmete juhuslikku voi ebaseaduslikku havitamist, kaotsiminekut, muutmist, loata avalikustamist voi neile juurdepaasu?", "pre.q_personaldata": "Kas rikkumine hoolmab isikuandmeid (tuvastatud voi tuvastatava isikuga seotud teavet)?", "pre.q_risk": "Kas rikkumine tooenaoliselt seab ohtu fuusiliste isikute oigused ja vabadused?", "pre.q_highrisk": "Kas rikkumine tooenaoliselt pohjustab fuusilistele isikutele SUURT ohtu?", "pre.verdict.notbreach": "See ei tundu olevat isikuandmetega seotud rikkumine isikuandmete kaitse uldmaaruse tahenduses. Pidage siiski sisemist registrit.", "pre.verdict.norisk": "Isikuandmetega seotud rikkumine ilma tooenaolise ohuta: jarelevalveasutusele teavitamine ei pruugi olla nouutav, kuid peate selle registreerima (art 33 lg 5).", "pre.verdict.notify_dpa": "Tooenaoliselt teavitamiskohustuslik jarelevalveasutusele 72 tunni jooksul (art 33).", "pre.verdict.notify_subjects": "Suur oht: teavitage pohjendamatu viivituseta ka asjaomaseid fuusilisi isikuid (art 34), valja arvatud juhul, kui kohaldub art 34 lg 3 erand.", "enisa.title": "ENISA raskusastme hindamine", "enisa.intro": "Arvutab SE = DPC x EI + CB ja raskusastme vahemiku. Korratav skoor nailise valja 'kirjeldage kasutatud metoodikat' taitmiseks.", "enisa.dpc": "Andmetootluse kontekst (DPC)", "enisa.ei": "Tuvastamise lihtsus (EI)", "enisa.cb": "Rikkumise asjaolud (CB)", "enisa.result": "Raskusastme skoor (SE)", "enisa.band": "Raskusastme vahemik", "enisa.trigger_on": "SE >= 2: hindamis- / teavitamistee aktiveeritud.", "enisa.trigger_off": "SE < 2 (Madal): asutusele teavitamine ei ole uldjuhul nouutav, kuid registreerige rikkumine.", "enisa.prefill": "Kasutage seda skoori EDPB teavituse eeltaitmiseks", "form.title": "EDPB teavitus", "form.intro": "Taielik EDPB nailis, mis on eeltaidetud teie eelhindamise ja ENISA skoori pohjal. Tingimuslikud valjad ilmuvad teie vastuste pohjal.", "form.export_json": "Ekspordi JSON (API andmemaht)", "form.export_note": "Eksporditud JSON vastab avatud rikkumisest teavitamise skeemile ja teie haldussusteem saab selle esitada avatud API kaudu.", "form.required": "kohustuslik", "form.gdpr": "GDPR", "record.title": "Rikkumiste register (vastutus)", "record.intro": "KOIGI rikkumiste register, sealhulgas teavitamiskohustuseta rikkumised, mille inspiratsiooniks on Kanada PIPEDA registripidamiskohustus ja isikuandmete kaitse uldmaaruse art 33 lg 5. Salvestatakse lokaalselt teie brauseris.", "record.add": "Salvesta praegune rikkumine registrisse", "record.empty": "Rikkumisi ei ole veel registreeritud.", "record.export": "Ekspordi register (JSON)", "common.yes": "Jah", "common.no": "Ei", "common.unknown": "Teadmata", "common.next": "Edasi", "common.back": "Tagasi"}, "fi": {"_meta": {"lang": "fi", "name": "Suomi", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "EDPB:n tietoturvaloukkausilmoituksen avustaja", "app.subtitle": "Offline-tilassa toimiva, sisaanrakennetun tietosuojan periaatteen mukainen tyokalu henkilotietojen tietoturvaloukkausten triageen, ENISA-vakavuusarviointiin ja EDPB-ilmoituksen valmisteluun", "app.disclaimer": "Luonnos perustuu EDPB:n malliin v1.0 (julkinen kuuleminen 5. elokuuta 2026 asti). Toimii kokonaan selaimessasi - mitkaan tiedot eivat poistu laitteeltasi. Ei virallinen ilmoituskanava; ala kayta todellisiin ilmoituksiin valvontaviranomaiselle ennen kuin viranomaiset ovat ottaneet mallin kayttoon.", "nav.preassessment": "1. Esiarviointi", "nav.severity": "2. ENISA-vakavuus", "nav.notification": "3. EDPB-ilmoitus", "nav.record": "4. Loukkausseloste", "lang.label": "Kieli", "lang.incomplete": "(kaannosluonnos - englanninkielinen varateksti)", "pre.title": "Esiarviointi (triage)", "pre.intro": "Nopea triage, joka pohjautuu ICO:n itsearviointiin, sen ratkaisemiseksi, onko kyseessa ilmoitettava henkilotietojen tietoturvaloukkaus ennen koko mallin tayttamista.", "pre.q_isbreach": "Onko kyseessa tietoturvaloukkaus, joka johtaa henkilotietojen vahingossa tapahtuvaan tai lainvastaiseen tuhoamiseen, hakvioon, muuttamiseen, luvattomaan luovuttamiseen tai paasyyn niihin?", "pre.q_personaldata": "Liittyyko loukkaukseen henkilotietoja (tunnistettuun tai tunnistettavissa olevaan henkiloon liittyvia tietoja)?", "pre.q_risk": "Aiheutuuko loukkauksesta todennakoisesti riski luonnollisten henkiloiden oikeuksille ja vapauksille?", "pre.q_highrisk": "Aiheutuuko loukkauksesta todennakoisesti KORKEA riski luonnollisille henkiloille?", "pre.verdict.notbreach": "Tama ei nayta olevan GDPR:n mukainen henkilotietojen tietoturvaloukkaus. Pida silti sisainen seloste.", "pre.verdict.norisk": "Henkilotietojen tietoturvaloukkaus ilman todennakoista riskia: ilmoitusta valvontaviranomaiselle ei valttamatta vaadita, mutta sinun on dokumentoitava se (33 artiklan 5 kohta).", "pre.verdict.notify_dpa": "Todennakoisesti ilmoitettava valvontaviranomaiselle 72 tunnin kuluessa (33 artikla).", "pre.verdict.notify_subjects": "Korkea riski: ilmoita myos asianomaisille luonnollisille henkiloille ilman aiheetonta viivytysta (34 artikla), ellei 34 artiklan 3 kohdan mukaista poikkeusta sovelleta.", "enisa.title": "ENISA-vakavuusarviointi", "enisa.intro": "Laskee SE = DPC x EI + CB ja vakavuusluokan. Toistettavissa oleva pistemaara mallin kentan 'kuvaile kaytetty menetelma' vastaamiseen.", "enisa.dpc": "Tietojenkasittelyn konteksti (DPC)", "enisa.ei": "Tunnistamisen helppous (EI)", "enisa.cb": "Loukkauksen olosuhteet (CB)", "enisa.result": "Vakavuuspistemaara (SE)", "enisa.band": "Vakavuusluokka", "enisa.trigger_on": "SE >= 2: arviointi-/ilmoituspolku aktivoitu.", "enisa.trigger_off": "SE < 2 (Matala): ilmoitusta viranomaiselle ei yleensa vaadita, mutta dokumentoi loukkaus.", "enisa.prefill": "Kayta tata pistemaaraa EDPB-ilmoituksen esitaytossa", "form.title": "EDPB-ilmoitus", "form.intro": "Koko EDPB-malli, esitaytettyna esiarviointisi ja ENISA-pistemaarasi perusteella. Ehdolliset kentat tulevat nakyviin vastaustesi mukaan.", "form.export_json": "Vie JSON (API-data)", "form.export_note": "Viety JSON validoidaan avointa tietoturvaloukkausilmoituksen skeemaa vasten, ja hallintajarjestelmasi voi lahettaa sen avoimen API:n kautta.", "form.required": "pakollinen", "form.gdpr": "GDPR", "record.title": "Loukkausseloste (osoitusvelvollisuus)", "record.intro": "Rekisteri KAIKISTA loukkauksista, mukaan lukien ei-ilmoitettavat, joka pohjautuu Kanadan PIPEDA-selostevelvoitteeseen ja GDPR:n 33 artiklan 5 kohtaan. Tallennetaan paikallisesti selaimeesi.", "record.add": "Tallenna nykyinen loukkaus selosteeseen", "record.empty": "Loukkauksia ei ole viela kirjattu.", "record.export": "Vie seloste (JSON)", "common.yes": "Kylla", "common.no": "Ei", "common.unknown": "Tuntematon", "common.next": "Seuraava", "common.back": "Takaisin"}, "fr": {"_meta": {"lang": "fr", "name": "Français", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "Assistant de notification de violation EDPB", "app.subtitle": "Outil hors ligne, conçu selon le principe de protection des données dès la conception, pour le tri des violations de données à caractère personnel, le calcul de la gravité ENISA et la préparation des notifications EDPB", "app.disclaimer": "Projet fondé sur le modèle EDPB v1.0 (consultation publique jusqu'au 5 août 2026). Fonctionne entièrement dans votre navigateur - aucune donnée ne quitte votre appareil. Ne constitue pas un canal de transmission officiel ; ne pas utiliser pour des notifications réelles à une autorité de contrôle tant que les autorités n'ont pas mis en œuvre le modèle.", "nav.preassessment": "1. Évaluation préalable", "nav.severity": "2. Gravité ENISA", "nav.notification": "3. Notification EDPB", "nav.record": "4. Registre des violations", "lang.label": "Langue", "lang.incomplete": "(traduction provisoire - repli sur l'anglais)", "pre.title": "Évaluation préalable (tri)", "pre.intro": "Tri rapide, inspiré de l'auto-évaluation de l'ICO, pour déterminer s'il s'agit d'une violation de données à caractère personnel à notifier avant de remplir le modèle complet.", "pre.q_isbreach": "S'agit-il d'une violation de la sécurité entraînant, de manière accidentelle ou illicite, la destruction, la perte, l'altération, la divulgation non autorisée de données à caractère personnel ou l'accès non autorisé à de telles données ?", "pre.q_personaldata": "La violation concerne-t-elle des données à caractère personnel (informations se rapportant à une personne identifiée ou identifiable) ?", "pre.q_risk": "La violation est-elle susceptible d'engendrer un risque pour les droits et libertés des personnes physiques ?", "pre.q_highrisk": "La violation est-elle susceptible d'engendrer un risque ÉLEVÉ pour les personnes physiques ?", "pre.verdict.notbreach": "Il ne semble pas s'agir d'une violation de données à caractère personnel au sens du RGPD. Conservez néanmoins une trace interne.", "pre.verdict.norisk": "Violation de données à caractère personnel sans risque probable : la notification à l'autorité de contrôle peut ne pas être requise, mais vous devez la documenter (art. 33, par. 5).", "pre.verdict.notify_dpa": "Probablement à notifier à l'autorité de contrôle dans un délai de 72 heures (art. 33).", "pre.verdict.notify_subjects": "Risque élevé : communiquez également la violation aux personnes physiques concernées dans les meilleurs délais (art. 34), sauf si une exemption au titre de l'art. 34, par. 3 s'applique.", "enisa.title": "Évaluation de la gravité ENISA", "enisa.intro": "Calcule SE = DPC x EI + CB et le niveau de gravité. Un score reproductible pour répondre au champ du modèle 'décrire la méthodologie utilisée'.", "enisa.dpc": "Contexte du traitement des données (DPC)", "enisa.ei": "Facilité d'identification (EI)", "enisa.cb": "Circonstances de la violation (CB)", "enisa.result": "Score de gravité (SE)", "enisa.band": "Niveau de gravité", "enisa.trigger_on": "SE >= 2 : parcours d'évaluation / notification activé.", "enisa.trigger_off": "SE < 2 (faible) : la notification à l'autorité n'est généralement pas requise, mais documentez la violation.", "enisa.prefill": "Utiliser ce score pour préremplir la notification EDPB", "form.title": "Notification EDPB", "form.intro": "Le modèle EDPB complet, prérempli à partir de votre évaluation préalable et de votre score ENISA. Les champs conditionnels apparaissent en fonction de vos réponses.", "form.export_json": "Exporter le JSON (charge utile API)", "form.export_note": "Le JSON exporté est conforme au schéma ouvert de notification des violations et peut être transmis via l'API ouverte par votre système de gestion.", "form.required": "obligatoire", "form.gdpr": "RGPD", "record.title": "Registre des violations (responsabilité)", "record.intro": "Un registre de TOUTES les violations, y compris celles non soumises à notification, inspiré de l'obligation de conservation des registres de la loi canadienne PIPEDA et de l'art. 33, par. 5 du RGPD. Stocké localement dans votre navigateur.", "record.add": "Enregistrer la violation actuelle dans le registre", "record.empty": "Aucune violation enregistrée pour le moment.", "record.export": "Exporter le registre (JSON)", "common.yes": "Oui", "common.no": "Non", "common.unknown": "Inconnu", "common.next": "Suivant", "common.back": "Précédent"}, "ga": {"_meta": {"lang": "ga", "name": "Gaeilge", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "Cúntóir Fógartha Sáruithe an EDPB", "app.subtitle": "Uirlis as líne, príobháideachas trí dhearadh, le haghaidh triáis sáruithe ar shonraí pearsanta, scórála déine ENISA agus ullmhúchán fógraí EDPB", "app.disclaimer": "Dréacht bunaithe ar theimpléad EDPB v1.0 (comhairliúchán poiblí go dtí an 5 Lúnasa 2026). Ritheann sé go hiomlán i do bhrabhsálaí - ní fhágann aon sonraí do ghléas. Ní cainéal oifigiúil aighneachta é; ná húsáid é le haghaidh fógraí beo chuig údarás maoirseachta go dtí go gcuirfidh na húdaráis an teimpléad i bhfeidhm.", "nav.preassessment": "1. Réamh-mheasúnú", "nav.severity": "2. Déine ENISA", "nav.notification": "3. Fógra EDPB", "nav.record": "4. Taifead sáruithe", "lang.label": "Teanga", "lang.incomplete": "(dréacht-aistriúchán - Béarla mar chúltaca)", "pre.title": "Réamh-mheasúnú (triáis)", "pre.intro": "Triáis thapa, spreagtha ag féinmheasúnú an ICO, chun a chinneadh an sárú ar shonraí pearsanta infhógartha é seo sula gcomhlánaítear an teimpléad iomlán.", "pre.q_isbreach": "An sárú slándála é seo as a dtagann scriosadh, cailliúint, athrú, nochtadh neamhúdaraithe sonraí pearsanta, nó rochtain orthu, go timpisteach nó go neamhdhleathach?", "pre.q_personaldata": "An mbaineann an sárú le sonraí pearsanta (faisnéis a bhaineann le duine nádúrtha sainaitheanta nó inaitheanta)?", "pre.q_risk": "An dócha go mbeidh riosca do chearta agus saoirsí daoine aonair mar thoradh ar an sárú?", "pre.q_highrisk": "An dócha go mbeidh riosca ARD do dhaoine aonair mar thoradh ar an sárú?", "pre.verdict.notbreach": "Ní cosúil gur sárú ar shonraí pearsanta é seo faoin RGCS. Coinnigh taifead inmheánach mar sin féin.", "pre.verdict.norisk": "Sárú ar shonraí pearsanta gan riosca dóchúil: b'fhéidir nach gá fógra a thabhairt don údarás maoirseachta, ach ní mór duit é a thaifeadadh (Airt. 33(5)).", "pre.verdict.notify_dpa": "Is dócha go mbeidh sé infhógartha don údarás maoirseachta laistigh de 72 uair an chloig (Airt. 33).", "pre.verdict.notify_subjects": "Riosca ard: cuir in iúl freisin do na daoine aonair lena mbaineann gan mhoill mhíchuí (Airt. 34), mura mbaineann díolúine faoi Airt. 34(3).", "enisa.title": "Measúnú déine ENISA", "enisa.intro": "Ríomhann sé SE = DPC x EI + CB agus an banda déine. Scór in-atáirgthe chun freagra a thabhairt ar réimse an teimpléid 'déan cur síos ar an modheolaíocht a úsáideadh'.", "enisa.dpc": "Comhthéacs Próiseála Sonraí (DPC)", "enisa.ei": "Éascaíocht Sainaitheanta (EI)", "enisa.cb": "Imthosca an tSáraithe (CB)", "enisa.result": "Scór déine (SE)", "enisa.band": "Banda déine", "enisa.trigger_on": "SE >= 2: gníomhachtaíodh an conair measúnaithe / fógartha.", "enisa.trigger_off": "SE < 2 (Íseal): go ginearálta ní gá fógra a thabhairt don údarás, ach taifead an sárú.", "enisa.prefill": "Úsáid an scór seo chun fógra an EDPB a réamhlíonadh", "form.title": "Fógra EDPB", "form.intro": "An teimpléad EDPB iomlán, réamhlíonta ó do réamh-mheasúnú agus scór ENISA. Taispeántar réimsí coinníollacha bunaithe ar do fhreagraí.", "form.export_json": "Easpórtáil JSON (pálasta API)", "form.export_note": "Bailíochtaíonn an JSON easpórtáilte i gcoinne na scéime oscailte fógartha sáruithe agus is féidir é a chur isteach tríd an API oscailte ag do chóras bainistíochta.", "form.required": "riachtanach", "form.gdpr": "RGCS", "record.title": "Taifead sáruithe (cuntasacht)", "record.intro": "Clár de na sáruithe GO LÉIR, lena n-áirítear cinn nach bhfuil infhógartha, spreagtha ag an oibleagáid choimeádta taifead PIPEDA Cheanada agus Airt. 33(5) den RGCS. Stóráilte go háitiúil i do bhrabhsálaí.", "record.add": "Sábháil an sárú reatha sa taifead", "record.empty": "Níl aon sárú taifeadta go fóill.", "record.export": "Easpórtáil an taifead (JSON)", "common.yes": "Tá", "common.no": "Níl", "common.unknown": "Anaithnid", "common.next": "Ar aghaidh", "common.back": "Siar"}, "hr": {"_meta": {"lang": "hr", "name": "Hrvatski", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "EDPB pomoćnik za izvješćivanje o povredi osobnih podataka", "app.subtitle": "Izvanmrežni alat osmišljen po načelu tehničke zaštite privatnosti za trijažu povreda osobnih podataka, ocjenu ozbiljnosti prema ENISA-i i pripremu EDPB izvješća", "app.disclaimer": "Nacrt na temelju EDPB predloška v1.0 (javno savjetovanje do 5. kolovoza 2026.). Radi u potpunosti u vašem pregledniku - nijedan podatak ne napušta vaš uređaj. Nije službeni kanal za podnošenje izvješća; nemojte koristiti za stvarna izvješća nadzornom tijelu dok tijela ne uvedu predložak.", "nav.preassessment": "1. Prethodna procjena", "nav.severity": "2. Ozbiljnost prema ENISA-i", "nav.notification": "3. EDPB izvješće", "nav.record": "4. Evidencija o povredi", "lang.label": "Jezik", "lang.incomplete": "(nacrt prijevoda - zamjena na engleskom)", "pre.title": "Prethodna procjena (trijaža)", "pre.intro": "Brza trijaža nadahnuta ICO-ovom samoprocjenom za odluku o tome je li riječ o povredi osobnih podataka koju treba prijaviti, prije ispunjavanja cjelovitog predloška.", "pre.q_isbreach": "Je li riječ o povredi sigurnosti koja dovodi do slučajnog ili nezakonitog uništenja, gubitka, izmjene, neovlaštenog otkrivanja ili pristupa osobnim podacima?", "pre.q_personaldata": "Uključuje li povreda osobne podatke (informacije koje se odnose na pojedinca čiji je identitet utvrđen ili se može utvrditi)?", "pre.q_risk": "Je li vjerojatno da će povreda prouzročiti rizik za prava i slobode pojedinaca?", "pre.q_highrisk": "Je li vjerojatno da će povreda prouzročiti VISOK rizik za pojedince?", "pre.verdict.notbreach": "Ne čini se da je riječ o povredi osobnih podataka prema GDPR-u. Ipak vodite internu evidenciju.", "pre.verdict.norisk": "Povreda osobnih podataka bez vjerojatnog rizika: izvješćivanje nadzornom tijelu možda nije potrebno, ali je morate evidentirati (čl. 33. st. 5.).", "pre.verdict.notify_dpa": "Vjerojatno je treba prijaviti nadzornom tijelu u roku od 72 sata (čl. 33.).", "pre.verdict.notify_subjects": "Visok rizik: bez nepotrebnog odgađanja obavijestite i pogođene pojedince (čl. 34.), osim ako se primjenjuje izuzeće iz čl. 34. st. 3.", "enisa.title": "Procjena ozbiljnosti prema ENISA-i", "enisa.intro": "Izračunava SE = DPC x EI + CB i razred ozbiljnosti. Ponovljiva ocjena za ispunjavanje polja predloška 'opišite primijenjenu metodologiju'.", "enisa.dpc": "Kontekst obrade podataka (DPC)", "enisa.ei": "Lakoća identifikacije (EI)", "enisa.cb": "Okolnosti povrede (CB)", "enisa.result": "Ocjena ozbiljnosti (SE)", "enisa.band": "Razred ozbiljnosti", "enisa.trigger_on": "SE >= 2: aktiviran put procjene / izvješćivanja.", "enisa.trigger_off": "SE < 2 (niska): izvješćivanje tijelu općenito nije potrebno, ali evidentirajte povredu.", "enisa.prefill": "Upotrijebi ovu ocjenu za predispunjavanje EDPB izvješća", "form.title": "EDPB izvješće", "form.intro": "Cjelovit EDPB predložak, predispunjen na temelju vaše prethodne procjene i ENISA ocjene. Uvjetna polja prikazuju se prema vašim odgovorima.", "form.export_json": "Izvezi JSON (API sadržaj)", "form.export_note": "Izvezeni JSON valjan je u odnosu na otvorenu shemu za izvješćivanje o povredama i vaš ga upravljački sustav može podnijeti putem otvorenog API-ja.", "form.required": "obvezno", "form.gdpr": "GDPR", "record.title": "Evidencija o povredi (pouzdanost)", "record.intro": "Registar SVIH povreda, uključujući one koje se ne prijavljuju, nadahnut kanadskom obvezom vođenja evidencije prema PIPEDA-i i čl. 33. st. 5. GDPR-a. Pohranjeno lokalno u vašem pregledniku.", "record.add": "Spremi trenutnu povredu u evidenciju", "record.empty": "Zasad nema evidentiranih povreda.", "record.export": "Izvezi evidenciju (JSON)", "common.yes": "Da", "common.no": "Ne", "common.unknown": "Nepoznato", "common.next": "Dalje", "common.back": "Natrag"}, "hu": {"_meta": {"lang": "hu", "name": "Magyar", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "EDPB adatvedelmi incidens bejelentesi asszisztens", "app.subtitle": "Offline, beepitett adatvedelmet biztosito eszkoz a szemelyes adatok megsertesevel jaro incidensek osztalyozasahoz, ENISA sulyossagi pontozasahoz es EDPB bejelentes elokeszitesehez", "app.disclaimer": "Az EDPB v1.0 sablon alapjan keszult tervezet (nyilvanos konzultacio 2026. augusztus 5-ig). Teljes egeszeben a bongeszojeben fut - semmilyen adat nem hagyja el a keszuleket. Nem hivatalos benyujtasi csatorna; ne hasznalja eles bejelentesekre a felugyeleti hatosag fele, amig a hatosagok be nem vezetik a sablont.", "nav.preassessment": "1. Elozetes ertekeles", "nav.severity": "2. ENISA sulyossag", "nav.notification": "3. EDPB bejelentes", "nav.record": "4. Incidensnyilvantartas", "lang.label": "Nyelv", "lang.incomplete": "(forditas tervezete - angol tartalek)", "pre.title": "Elozetes ertekeles (osztalyozas)", "pre.intro": "Gyors osztalyozas az ICO onertekeles altal inspiralva, annak eldontesere, hogy ez bejelentesi kotelezettseg ala eso, a szemelyes adatok megsertesevel jaro incidens-e, mielott kitolti a teljes sablont.", "pre.q_isbreach": "Ez olyan biztonsagi incidens, amely a tovabbitott, tarolt vagy mas modon kezelt szemelyes adatok veletlen vagy jogellenes megsemmisiteset, elvesziteset, megvaltoztatasat, jogosulatlan kozleset vagy az azokhoz valo jogosulatlan hozzaferest eredmenyezi?", "pre.q_personaldata": "Az incidens erint-e szemelyes adatokat (azonositott vagy azonosithato szemelyre vonatkozo informaciot)?", "pre.q_risk": "Az incidens valoszinusitheto-e, hogy kockazatot jelent a termeszetes szemelyek jogaira es szabadsagaira nezve?", "pre.q_highrisk": "Az incidens valoszinusitheto-e, hogy MAGAS kockazatot jelent a termeszetes szemelyekre nezve?", "pre.verdict.notbreach": "Ez nem tunik a szemelyes adatok megsertesevel jaro incidensnek a GDPR ertelmeben. Belso nyilvantartast ennek ellenere vezessen.", "pre.verdict.norisk": "A szemelyes adatok megsertesevel jaro incidens, amely valoszinusitheto kockazat nelkuli: a felugyeleti hatosagnak torteno bejelentes lehet, hogy nem szukseges, de nyilvantartast kell vezetnie rola (33. cikk (5) bekezdes).", "pre.verdict.notify_dpa": "Valoszinuleg bejelentesi kotelezettseg ala esik a felugyeleti hatosag fele 72 oran belul (33. cikk).", "pre.verdict.notify_subjects": "Magas kockazat: indokolatlan kesedelem nelkul tajekoztassa az erintett termeszetes szemelyeket is (34. cikk), kiveve, ha a 34. cikk (3) bekezdese szerinti kivetel alkalmazando.", "enisa.title": "ENISA sulyossagi ertekeles", "enisa.intro": "Kiszamitja az SE = DPC x EI + CB erteket es a sulyossagi savot. Reprodukalhato pontszam a sablon 'irja le az alkalmazott modszertant' mezojenek megvalaszolasahoz.", "enisa.dpc": "Adatkezelesi kontextus (DPC)", "enisa.ei": "Azonosithatosag konnyusege (EI)", "enisa.cb": "Az incidens korulmenyei (CB)", "enisa.result": "Sulyossagi pontszam (SE)", "enisa.band": "Sulyossagi sav", "enisa.trigger_on": "SE >= 2: ertekelesi / bejelentesi utvonal aktivalva.", "enisa.trigger_off": "SE < 2 (Alacsony): a hatosagnak torteno bejelentes altalaban nem szukseges, de rogzitse az incidenst.", "enisa.prefill": "Hasznalja ezt a pontszamot az EDPB bejelentes elozetes kitoltesehez", "form.title": "EDPB bejelentes", "form.intro": "A teljes EDPB sablon, az elozetes ertekeles es az ENISA pontszam alapjan elore kitoltve. A felteteles mezok a valaszai alapjan jelennek meg.", "form.export_json": "JSON exportalasa (API adattartalom)", "form.export_note": "Az exportalt JSON megfelel a nyilt incidensbejelentesi semanak, es az iranyitasi rendszere a nyilt API-n keresztul benyujthatja.", "form.required": "kotelezo", "form.gdpr": "GDPR", "record.title": "Incidensnyilvantartas (elszamoltathatosag)", "record.intro": "AZ OSSZES incidens nyilvantartasa, beleertve a nem bejelentesi kotelezettseg ala esoket is, a kanadai PIPEDA nyilvantartasi kotelezettsege es a GDPR 33. cikk (5) bekezdese altal inspiralva. Helyileg, a bongeszojeben tarolva.", "record.add": "Aktualis incidens mentese a nyilvantartasba", "record.empty": "Meg nincs rogzitett incidens.", "record.export": "Nyilvantartas exportalasa (JSON)", "common.yes": "Igen", "common.no": "Nem", "common.unknown": "Ismeretlen", "common.next": "Tovabb", "common.back": "Vissza"}, "it": {"_meta": {"lang": "it", "name": "Italiano", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "Assistente per le notifiche di violazione EDPB", "app.subtitle": "Strumento offline, basato sulla privacy-by-design, per il triage delle violazioni dei dati personali, il calcolo della gravità ENISA e la preparazione delle notifiche EDPB", "app.disclaimer": "Bozza basata sul modello EDPB v1.0 (consultazione pubblica fino al 5 agosto 2026). Funziona interamente nel tuo browser - nessun dato lascia il tuo dispositivo. Non costituisce un canale di trasmissione ufficiale; non utilizzare per notifiche reali a un'autorità di controllo finché le autorità non avranno implementato il modello.", "nav.preassessment": "1. Valutazione preliminare", "nav.severity": "2. Gravità ENISA", "nav.notification": "3. Notifica EDPB", "nav.record": "4. Registro delle violazioni", "lang.label": "Lingua", "lang.incomplete": "(bozza di traduzione - fallback in inglese)", "pre.title": "Valutazione preliminare (triage)", "pre.intro": "Triage rapido, ispirato all'autovalutazione dell'ICO, per stabilire se si tratta di una violazione dei dati personali da notificare prima di completare il modello integrale.", "pre.q_isbreach": "Si tratta di una violazione di sicurezza che comporta accidentalmente o in modo illecito la distruzione, la perdita, la modifica, la divulgazione non autorizzata o l'accesso a dati personali?", "pre.q_personaldata": "La violazione riguarda dati personali (informazioni relative a una persona identificata o identificabile)?", "pre.q_risk": "È probabile che la violazione presenti un rischio per i diritti e le libertà delle persone fisiche?", "pre.q_highrisk": "È probabile che la violazione presenti un rischio ELEVATO per le persone fisiche?", "pre.verdict.notbreach": "Non sembra trattarsi di una violazione dei dati personali ai sensi del RGPD. Conservane comunque una registrazione interna.", "pre.verdict.norisk": "Violazione dei dati personali senza rischio probabile: la notifica all'autorità di controllo potrebbe non essere richiesta, ma devi documentarla (art. 33(5)).", "pre.verdict.notify_dpa": "Probabilmente da notificare all'autorità di controllo entro 72 ore (art. 33).", "pre.verdict.notify_subjects": "Rischio elevato: comunica la violazione anche alle persone fisiche interessate senza ingiustificato ritardo (art. 34), salvo che si applichi un'esenzione ai sensi dell'art. 34(3).", "enisa.title": "Valutazione della gravità ENISA", "enisa.intro": "Calcola SE = DPC x EI + CB e la fascia di gravità. Un punteggio riproducibile per rispondere al campo del modello 'descrivere la metodologia utilizzata'.", "enisa.dpc": "Contesto del trattamento dei dati (DPC)", "enisa.ei": "Facilità di identificazione (EI)", "enisa.cb": "Circostanze della violazione (CB)", "enisa.result": "Punteggio di gravità (SE)", "enisa.band": "Fascia di gravità", "enisa.trigger_on": "SE >= 2: percorso di valutazione / notifica attivato.", "enisa.trigger_off": "SE < 2 (bassa): la notifica all'autorità generalmente non è richiesta, ma documenta la violazione.", "enisa.prefill": "Usa questo punteggio per precompilare la notifica EDPB", "form.title": "Notifica EDPB", "form.intro": "Il modello EDPB completo, precompilato a partire dalla valutazione preliminare e dal punteggio ENISA. I campi condizionali compaiono in base alle tue risposte.", "form.export_json": "Esporta JSON (payload API)", "form.export_note": "Il JSON esportato è conforme allo schema aperto di notifica delle violazioni e può essere inviato tramite l'API aperta dal tuo sistema di gestione.", "form.required": "obbligatorio", "form.gdpr": "RGPD", "record.title": "Registro delle violazioni (responsabilizzazione)", "record.intro": "Un registro di TUTTE le violazioni, comprese quelle non soggette a notifica, ispirato all'obbligo di conservazione dei registri della normativa canadese PIPEDA e all'art. 33(5) del RGPD. Memorizzato localmente nel tuo browser.", "record.add": "Salva la violazione corrente nel registro", "record.empty": "Nessuna violazione ancora registrata.", "record.export": "Esporta registro (JSON)", "common.yes": "Sì", "common.no": "No", "common.unknown": "Sconosciuto", "common.next": "Avanti", "common.back": "Indietro"}, "lt": {"_meta": {"lang": "lt", "name": "Lietuvių", "status": "complete", "canonical": false, "note": "Translations follow official GDPR terminology; native-speaker review welcome."}, "app.title": "EDPB pranešimų apie duomenų saugumo pažeidimus pagalbinė priemonė", "app.subtitle": "Atsijungus veikianti, pagal pritaikytosios privatumo apsaugos principą sukurta priemonė asmens duomenų saugumo pažeidimų triažui, ENISA sunkumo vertinimui ir EDPB pranešimų rengimui", "app.disclaimer": "Juodraštis, parengtas pagal EDPB šabloną v1.0 (viešosios konsultacijos iki 2026 m. rugpjūčio 5 d.). Veikia tik jūsų naršyklėje - jokie duomenys neišeina iš jūsų įrenginio. Tai nėra oficialus pateikimo kanalas; nenaudokite realiems pranešimams priežiūros institucijai, kol institucijos neįdiegs šablono.", "nav.preassessment": "1. Išankstinis vertinimas", "nav.severity": "2. ENISA sunkumas", "nav.notification": "3. EDPB pranešimas", "nav.record": "4. Pažeidimų registras", "lang.label": "Kalba", "lang.incomplete": "(vertimo juodraštis - rodoma anglų kalba)", "pre.title": "Išankstinis vertinimas (triažas)", "pre.intro": "Greitas triažas, įkvėptas ICO savęs vertinimo, siekiant nuspręsti, ar tai yra asmens duomenų saugumo pažeidimas, apie kurį reikia pranešti, prieš užpildant visą šabloną.", "pre.q_isbreach": "Ar tai yra saugumo pažeidimas, dėl kurio netyčia arba neteisėtai sunaikinami, prarandami, pakeičiami, be leidimo atskleidžiami persiųsti, saugomi arba kitaip tvarkomi asmens duomenys, arba prie jų be leidimo gaunama prieiga?", "pre.q_personaldata": "Ar pažeidimas susijęs su asmens duomenimis (informacija, susijusia su fiziniu asmeniu, kurio tapatybė nustatyta arba kurio tapatybę galima nustatyti)?", "pre.q_risk": "Ar tikėtina, kad dėl pažeidimo kils pavojus fizinių asmenų teisėms ir laisvėms?", "pre.q_highrisk": "Ar tikėtina, kad dėl pažeidimo kils DIDELIS pavojus fiziniams asmenims?", "pre.verdict.notbreach": "Tai nėra asmens duomenų saugumo pažeidimas pagal BDAR. Vis tiek tvarkykite vidaus registrą.", "pre.verdict.norisk": "Asmens duomenų saugumo pažeidimas be tikėtino pavojaus: pranešti priežiūros institucijai gali būti nereikalaujama, tačiau privalote jį registruoti (33 str. 5 d.).", "pre.verdict.notify_dpa": "Tikėtina, kad apie jį reikia pranešti priežiūros institucijai per 72 valandas (33 str.).", "pre.verdict.notify_subjects": "Didelis pavojus: taip pat nedelsiant praneškite paveiktiems fiziniams asmenims (34 str.), nebent taikoma 34 str. 3 d. išimtis.", "enisa.title": "ENISA sunkumo vertinimas", "enisa.intro": "Apskaičiuoja SE = DPC x EI + CB ir sunkumo lygį. Atkartojamas įvertis, kuriuo atsakoma į šablono lauką „aprašykite naudotą metodiką“.", "enisa.dpc": "Duomenų tvarkymo kontekstas (DPC)", "enisa.ei": "Tapatybės nustatymo paprastumas (EI)", "enisa.cb": "Pažeidimo aplinkybės (CB)", "enisa.result": "Sunkumo įvertis (SE)", "enisa.band": "Sunkumo lygis", "enisa.trigger_on": "SE >= 2: vertinimo / pranešimo eiga aktyvuota.", "enisa.trigger_off": "SE < 2 (žemas): pranešti institucijai paprastai nereikalaujama, tačiau pažeidimą registruokite.", "enisa.prefill": "Naudokite šį įvertį EDPB pranešimui iš anksto užpildyti", "form.title": "EDPB pranešimas", "form.intro": "Visas ējums (triāža)", "pre.intro": "Ātra triāža, iedvesmota no ICO pašnovērtējuma, lai pirms pilnas veidnes aizpildīšanas izlemtu, vai šis ir paziņojams personas datu aizsardzības pārkāpums.", "pre.q_isbreach": "Vai šis ir drošības pārkāpums, kura rezultātā notiek nejauša vai nelikumīga personas datu iznīcināšana, nozaudēšana, pārveidošana, neatļauta izpaušana vai piekļuve tiem?", "pre.q_personaldata": "Vai pārkāpums skar personas datus (informāciju, kas attiecas uz identificētu vai identificējamu personu)?", "pre.q_risk": "Vai pārkāpums varētu radīt risku fizisku personu tiesībām un brīvībām?", "pre.q_highrisk": "Vai pārkāpums varētu radīt AUGSTU risku fiziskām personām?", "pre.verdict.notbreach": "Šķiet, ka šis nav personas datu aizsardzības pārkāpums saskaņā ar VDAR. Tomēr veiciet iekšēju uzskaiti.", "pre.verdict.norisk": "Personas datu aizsardzības pārkāpums bez iespējama riska: paziņošana uzraudzības iestādei var nebūt nepieciešama, taču jums tas ir jādokumentē (33. panta 5. punkts).", "pre.verdict.notify_dpa": "Iespējams, par to ir jāpaziņo uzraudzības iestādei 72 stundu laikā (33. pants).", "pre.verdict.notify_subjects": "Augsts risks: bez nepamatotas kavēšanās paziņojiet arī skartajām fiziskajām personām (34. pants), ja vien nav piemērojams 34. panta 3. punkta izņēmums.", "enisa.title": "ENISA smaguma novērtējums", "enisa.intro": "Aprēķina SE = DPC x EI + CB un smaguma līmeni. Atkārtojams rezultāts, lai atbildētu uz veidnes lauku “aprakstiet izmantoto metodiku”.", "enisa.dpc": "Datu apstrādes konteksts (DPC)", "enisa.ei": "Identifikācijas vieglums (EI)", "enisa.cb": "Pārkāpuma apstākļi (CB)", "enisa.result": "Smaguma rezultāts (SE)", "enisa.band": "Smaguma līmenis", "enisa.trigger_on": "SE >= 2: novērtēšanas / paziņošanas ceļš aktivizēts.", "enisa.trigger_off": "SE < 2 (zems): paziņošana iestādei parasti nav nepieciešama, taču dokumentējiet pārkāpumu.", "enisa.prefill": "Izmantojiet šo rezultātu, lai iepriekš aizpildītu EDPB paziņojumu", "form.title": "EDPB paziņ
