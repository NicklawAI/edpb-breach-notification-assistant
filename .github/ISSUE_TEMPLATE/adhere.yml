name: "Adhere to the proposal"
description: "Add your name in support of the position paper on the EDPB breach-notification template. No technical knowledge required."
title: "[Adhesion] <your name / organisation>"
labels: ["adhesion"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for supporting this proposal to the EDPB public consultation.
        Fill in the fields below and click **Submit new issue**.

        **Your adhesion is public** and is reviewed manually before being added to [`SIGNATORIES.md`](../blob/main/SIGNATORIES.md), so your name appears after verification, not instantly.

        Before submitting, please read the **[Privacy Notice (Article 13 GDPR)](../blob/main/PRIVACY.md)** ([versione italiana](../blob/main/PRIVACY.it.md)): the data you enter is published publicly in this repository and accessible worldwide. Legal basis is your consent; you can withdraw at any time by emailing nicola@franchetto.legal.
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: e.g. Jane Doe
    validations:
      required: true
  - type: input
    id: role
    attributes:
      label: Role / title
      placeholder: e.g. Data Protection Officer, Lawyer, DPA officer
    validations:
      required: true
  - type: input
    id: organisation
    attributes:
      label: Organisation
      placeholder: e.g. Acme Ltd / Supervisory Authority of ...
    validations:
      required: false
  - type: input
    id: country
    attributes:
      label: Country
      placeholder: e.g. Italy
    validations:
      required: true
  - type: textarea
    id: comment
    attributes:
      label: Comment (optional)
      placeholder: Optional note on why you support the proposal.
    validations:
      required: false
  - type: checkboxes
    id: consent
    attributes:
      label: Consent (required)
      description: "See the Privacy Notice: ../blob/main/PRIVACY.md"
      options:
        - label: "I have read the Privacy Notice and I consent to my name, role, organisation, country and optional comment being published publicly in this repository (in the Issue and in SIGNATORIES.md) to record my adherence to the position paper. I understand this data will be publicly accessible worldwide and that I can withdraw at any time by emailing nicola@franchetto.legal."
          required: true
